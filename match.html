<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analyse Match — IASHARK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c12;--card:#0d1520;--card2:#111a26;--cyan:#22d3ee;--cyan2:#06b6d4;--amber:#f59e0b;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--muted:#4a6580;--border:rgba(255,255,255,0.06);--border-cyan:rgba(34,211,238,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:90px;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(34,211,238,0.03) 0%,transparent 70%);pointer-events:none;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:99;background:rgba(8,12,18,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:14px;}
.hdr-back{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;transition:.2s;flex-shrink:0;}
.hdr-back:hover{color:var(--cyan);border-color:var(--cyan);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);text-decoration:none;}
.logo span{color:var(--cyan);}
.hdr-badge{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--border-cyan);padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.06);margin-left:auto;}

/* LAYOUT */
.wrap{max-width:680px;margin:20px auto 0;padding:0 16px;}
.match-card{border:1px solid var(--border);border-radius:20px;overflow:hidden;animation:reveal .5s ease forwards;}
.match-card.hot{border-color:rgba(245,158,11,0.25);}
@keyframes reveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.section{padding:0 20px 14px;}
.section.pt{padding-top:16px;}
.dv{height:1px;background:var(--border);margin:0 20px 14px;}
.block-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.block-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* TOPBAR */
.card-topbar{background:linear-gradient(135deg,#0a1628,#0d1d30);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.league-info{display:flex;align-items:center;gap:8px;}
.league-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.match-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);}
.badge-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.b-hot{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--amber);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 10px 2px rgba(245,158,11,0.15)}}
.b-val{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.07);border:1px solid var(--border-cyan);color:var(--cyan);}

/* TEAMS HEADER */
.teams-header{padding:24px 20px 18px;background:linear-gradient(180deg,#0a1628 0%,var(--card) 100%);}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:14px;}
.team{text-align:center;}
.team-logo{width:52px;height:52px;border-radius:50%;object-fit:contain;background:rgba(255,255,255,0.03);margin:0 auto 8px;display:block;}
.team-logo-ph{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:#4a6580;margin:0 auto 8px;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,28px);letter-spacing:1px;line-height:1;margin-bottom:4px;}
.team-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;}
.team-form{display:flex;justify-content:center;gap:3px;margin-top:6px;}
.fd{width:16px;height:16px;border-radius:3px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;}
.fw{background:rgba(16,185,129,0.2);color:var(--green);}
.fn{background:rgba(245,158,11,0.12);color:var(--amber);}
.fl{background:rgba(239,68,68,0.15);color:var(--red);}
.team.away .team-name{color:rgba(226,232,240,0.7);}
.vs-block{text-align:center;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);display:block;}
.vs-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--cyan);margin-top:2px;}
.proba-bar{display:flex;height:4px;border-radius:4px;overflow:hidden;margin-bottom:8px;}
.pb1{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.pbn{background:rgba(255,255,255,0.08);}
.pb2{background:rgba(226,232,240,0.2);}
.proba-labels{display:flex;justify-content:space-between;}
.prob-item{text-align:center;}
.prob-pct{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.prob-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;}
.meta-item{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}

/* CONTEXTE */
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ctx-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.ctx-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.ctx-txt{font-size:12px;color:#94a3b8;line-height:1.6;}
.ctx-txt strong{color:var(--text);}

/* ANALYSE COMPARATIVE */
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--border);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.comp-col{background:var(--card2);padding:14px;}
.comp-col:first-child{border-right:1px solid var(--border);}
.comp-team-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.comp-rows{display:flex;flex-direction:column;gap:9px;}
.comp-row{display:flex;flex-direction:column;gap:4px;}
.comp-row-top{display:flex;justify-content:space-between;align-items:center;}
.comp-row-label{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.comp-row-val{font-family:'Space Mono',monospace;font-size:9px;}
.comp-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.comp-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
.comp-fill.hi{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.comp-fill.mid{background:linear-gradient(90deg,#d97706,var(--amber));}
.comp-fill.lo{background:linear-gradient(90deg,#dc2626,var(--red));}

/* VERDICT */
.verdict-box{background:linear-gradient(135deg,rgba(34,211,238,0.06),rgba(6,182,212,0.02));border:1px solid var(--border-cyan);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.verdict-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);}
.verdict-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-top:4px;}
.verdict-pari{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cyan);letter-spacing:1px;line-height:1;}
.verdict-cote-wrap{text-align:right;}
.verdict-cote{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--text);line-height:1;}
.verdict-bk{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);}
.edge-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;color:var(--green);background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);padding:4px 12px;border-radius:6px;margin-bottom:10px;}
.verdict-txt{font-size:13px;line-height:1.65;color:#94a3b8;}
.verdict-txt strong{color:var(--text);}

/* FACTEUR */
.facteur-box{background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.15);border-radius:12px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;}
.facteur-icon{font-size:20px;flex-shrink:0;}
.facteur-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--amber);letter-spacing:2px;margin-bottom:4px;}
.facteur-txt{font-size:13px;color:var(--text);line-height:1.5;}

/* CONFIANCE */
.conf-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.conf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.conf-score{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;color:var(--cyan);}
.conf-score sup{font-size:20px;color:var(--muted);}
.conf-lvl-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:6px 14px;border-radius:20px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:var(--amber);margin-bottom:4px;}
.conf-hint{font-size:11px;color:var(--muted);}
.conf-bar-track{background:rgba(255,255,255,0.04);border-radius:6px;height:6px;overflow:hidden;}
.conf-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan2),var(--amber),#f97316);}
.conf-scale{display:flex;justify-content:space-between;margin-top:6px;}
.conf-scale span{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}

/* CONSEIL */
.conseil-box{background:rgba(34,211,238,0.03);border:1px solid rgba(34,211,238,0.1);border-radius:12px;padding:14px 16px;}
.conseil-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.conseil-txt{font-size:13px;color:#94a3b8;line-height:1.65;font-style:italic;}
.conseil-txt strong{color:var(--text);font-style:normal;}

/* PARIS VALEUR */
.pari-valeur-box{background:linear-gradient(135deg,rgba(34,211,238,0.06),rgba(6,182,212,0.02));border:1px solid var(--border-cyan);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
.pari-valeur-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);}
.pv-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.pv-left{}
.pv-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);letter-spacing:2px;margin-bottom:4px;}
.pv-bet{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);line-height:1.1;margin-bottom:4px;}
.pv-hint{font-size:12px;color:var(--muted);line-height:1.5;}
.pv-right{text-align:right;flex-shrink:0;}
.pv-cote{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--cyan);line-height:1;}
.pv-bookie{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);}
.pv-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:10px;border-top:1px solid var(--border);}
.pv-edge{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.18);padding:4px 10px;border-radius:6px;}
.pv-kelly{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.pv-mise{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.pv-warn{margin-top:8px;font-family:'Space Mono',monospace;font-size:8px;color:var(--amber);}

/* SCORE PREDIT */
.score-predit{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.sp-left{}
.sp-tag{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;}
.sp-score{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:8px;color:var(--text);line-height:1;}
.sp-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;}
.sp-right{text-align:right;}
.sp-cote-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:2px;}
.sp-cote{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--cyan);}
.sp-impl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px;}

/* H2H */
.h2h-list{display:flex;flex-direction:column;gap:6px;}
.h2h-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;}
.h2h-date{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);flex-shrink:0;width:68px;}
.h2h-teams{flex:1;font-size:12px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.h2h-score{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);flex-shrink:0;}
.h2h-w{font-family:'Space Mono',monospace;font-size:8px;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.h2h-w.w1{background:rgba(34,211,238,0.08);color:var(--cyan);}
.h2h-w.wn{background:rgba(255,255,255,0.04);color:var(--muted);}
.h2h-w.w2{background:rgba(226,232,240,0.06);color:rgba(226,232,240,0.4);}

/* ARBITRE */
.arb-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;}
.arb-avatar{width:46px;height:46px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--amber);background:linear-gradient(135deg,#1a2a3e,#0d1520);border:1px solid rgba(245,158,11,0.2);}
.arb-info{flex:1;}
.arb-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;margin-bottom:8px;}
.arb-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.arb-stat{background:var(--card);padding:8px 6px;text-align:center;}
.arb-stat-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--amber);line-height:1;}
.arb-stat-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);margin-top:2px;}
.arb-warn{font-size:11px;color:var(--amber);background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.12);border-radius:6px;padding:7px 10px;line-height:1.5;}

/* MOUVEMENT COTES */
.odds-move{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.odds-move-item{text-align:center;}
.odds-move-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.odds-move-vals{display:flex;align-items:center;justify-content:center;gap:6px;}
.odds-move-open{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);text-decoration:line-through;}
.odds-move-curr{font-family:'Bebas Neue',sans-serif;font-size:22px;}
.odds-move-curr.down{color:var(--green);}
.odds-move-curr.up{color:var(--red);}
.odds-move-curr.flat{color:var(--text);}
.odds-move-note{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:8px;padding:0 2px;}

/* PATTERNS — NOUVEAU DESIGN avec mini barres par tranche */
.patterns-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pat-col{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.pat-team-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
/* Tranches buts */
.pat-slots{margin-bottom:10px;}
.pat-slots-title{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;}
.pat-slot{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.pat-slot-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);width:32px;flex-shrink:0;}
.pat-slot-bar{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.pat-slot-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan2),var(--cyan));transition:width .8s ease;}
.pat-slot-n{font-family:'Space Mono',monospace;font-size:8px;color:var(--text);width:10px;text-align:right;flex-shrink:0;}
/* Stats résumées */
.pat-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.pat-stat{background:var(--card);border-radius:6px;padding:6px 8px;text-align:center;}
.pat-stat-val{font-family:'Bebas Neue',sans-serif;font-size:16px;line-height:1;}
.pat-stat-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);margin-top:1px;}
.pat-stat.red .pat-stat-val{color:var(--red);}
.pat-stat.amber .pat-stat-val{color:var(--amber);}
.pat-stat.cyan .pat-stat-val{color:var(--cyan);}

/* SCENARIO */
.scen-list{display:flex;flex-direction:column;}
.scen-phase{display:flex;align-items:stretch;}
.scen-left{display:flex;flex-direction:column;align-items:center;width:50px;flex-shrink:0;}
.scen-badge{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);background:rgba(34,211,238,0.07);border:1px solid var(--border-cyan);padding:3px 5px;border-radius:5px;text-align:center;line-height:1.3;white-space:nowrap;}
.scen-line{flex:1;width:2px;background:linear-gradient(180deg,rgba(34,211,238,0.2),rgba(34,211,238,0.03));margin:4px auto 0;}
.scen-body{flex:1;padding:0 0 14px 12px;}
.scen-prob-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.scen-bar{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.scen-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.scen-pct{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);white-space:nowrap;}
.scen-txt{font-size:12px;color:#94a3b8;line-height:1.6;}
.scen-txt strong{color:var(--text);}
.scen-resume{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:10px;}
.scen-resume-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:7px;}
.scen-resume-txt{font-size:13px;color:#94a3b8;line-height:1.7;}

/* JOUEURS — grille 2 colonnes compactes */
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.players-col{background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.players-col-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;padding:10px 12px 8px;border-bottom:1px solid var(--border);}
.player-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);}
.player-row:last-child{border-bottom:none;}
.player-photo{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--card);}
.player-photo-ph{width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);flex-shrink:0;}
.player-info{flex:1;min-width:0;}
.player-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-absent-tag{font-family:'Space Mono',monospace;font-size:7px;color:var(--red);margin-top:1px;}
.player-stats{display:flex;gap:6px;flex-shrink:0;}
.player-stat{text-align:center;}
.player-stat-val{font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;}
.player-stat-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);}
.player-stat.g .player-stat-val{color:var(--text);}
.player-stat.a .player-stat-val{color:var(--muted);}

/* FIFA CARD — JOUEUR DECISIF */
.fifa-section{padding:0 20px 14px;}
.fifa-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.fifa-title::after{content:'';flex:1;height:1px;background:var(--border);}
.fifa-card-wrap{display:flex;gap:14px;align-items:stretch;}

.fifa-card{width:140px;flex-shrink:0;background:linear-gradient(160deg,#2a1f00,#1a1200,#2a1800);border:1px solid rgba(245,158,11,0.35);border-radius:14px;padding:12px 10px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}
.fifa-card::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(245,158,11,0.12) 0%,transparent 50%,rgba(245,158,11,0.06) 100%);pointer-events:none;}
.fifa-rating{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;text-align:center;}

.fifa-photo-ph{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#1a2a3e,#0d1520);border:2px solid rgba(245,158,11,0.4);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amber);margin-bottom:6px;}
.fifa-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--amber);text-align:center;line-height:1.1;margin-bottom:8px;}
.fifa-mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;width:100%;}
.fifa-ms{text-align:center;}
.fifa-ms-val{font-family:'Bebas Neue',sans-serif;font-size:14px;color:rgba(245,158,11,0.9);line-height:1;}

/* Info droite */
.fifa-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.fifa-marche-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;}
.fifa-marche-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);letter-spacing:0.5px;line-height:1;margin-bottom:8px;}
.fifa-raison{font-size:12px;color:#94a3b8;line-height:1.55;margin-bottom:10px;}
.fifa-cote-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.fifa-cote-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);}
.fifa-cote-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--amber);line-height:1;}
.fifa-alert{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.15);border-radius:8px;padding:8px 10px;font-family:'Space Mono',monospace;font-size:7px;color:rgba(245,158,11,0.7);letter-spacing:0.5px;line-height:1.6;}
.fifa-absent{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.18);border-radius:10px;padding:12px 14px;font-family:'Space Mono',monospace;font-size:9px;color:var(--red);letter-spacing:1px;}

/* ALERTE SECURITE */
.skip-box{border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.skip-box.danger{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);}

/* PRO WALL */
.pro-wall{position:relative;margin:0 20px 14px;border-radius:16px;overflow:hidden;border:1px solid var(--border);}

.pro-wall-overlay:hover .pw-cta-btn{opacity:.85;}
.pw-topbar{background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.05);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.pw-topbar-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:3px;}

.pw-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#f1f5f9;letter-spacing:2px;line-height:1;margin-bottom:5px;}

.pw-feat-badge.c2{background:rgba(34,211,238,0.05);color:rgba(34,211,238,0.4);border:1px solid rgba(34,211,238,0.1);}

.pw-cta-btn{width:100%;background:var(--cyan);color:#080c12;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2.5px;font-weight:700;padding:15px;border:none;border-radius:10px;cursor:pointer;text-align:center;display:block;}
.pw-note{font-family:'Space Mono',monospace;font-size:7px;color:rgba(148,163,184,0.2);text-align:center;margin-top:8px;letter-spacing:1px;}

/* PRO CONTENT */
.paris-list{display:flex;flex-direction:column;gap:8px;}
.pari-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.pari-card.value{border-color:rgba(34,211,238,0.2);background:rgba(34,211,238,0.03);}

.pari-hint{font-size:11px;color:var(--muted);margin-top:2px;}
.pari-right{text-align:right;flex-shrink:0;}

.pari-bookie{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);}

/* COTES GRID */
.cotes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cote-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}

/* LOADING / FOOTER */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,12,18,0.97);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;height:64px;}

  .fifa-card{width:100%;flex-direction:row;align-items:center;padding:12px 14px;gap:12px;}
  .fifa-mini-stats{grid-template-columns:repeat(3,1fr);}
}

<script>
var fId = new URLSearchParams(location.search).get('id');
var isPro = true;

// ─── HELPERS ─────────────────────────────────────────────
function buildForme(str){
  if(!str) return '';
  return str.split('').slice(0,5).map(function(c){
    var cls=c==='W'||c==='V'?'fw':c==='D'||c==='N'?'fn':'fl';
    var l=c==='W'?'V':c==='D'?'N':c==='L'?'D':c;
    return '<div class="fd '+cls+'">'+l+'</div>';
  }).join('');
}

function getLogo(team,ini){
  if(!team) return '';
  var url=team.logo||(team.id?'https://media.api-sports.io/football/teams/'+team.id+'.png':'');
  if(!url) return '<div class="team-logo-ph">'+ini+'</div>';
  return '<img class="team-logo" src="'+url+'" onerror="this.outerHTML=\'<div class=team-logo-ph>'+ini+'</div>\'">';
}

function buildComp(hn,an,ch,ca){
  var dh=ch&&ch.length?ch:[{label:'ATTAQUE xG',val:55},{label:'DÉFENSE',val:50},{label:'FORME (5J)',val:60},{label:'POSSESSION',val:50},{label:'PRESSING',val:55}];
  var da=ca&&ca.length?ca:[{label:'ATTAQUE xG',val:60},{label:'DÉFENSE',val:65},{label:'FORME (5J)',val:70},{label:'POSSESSION',val:55},{label:'PRESSING',val:60}];
  function rows(crits){
    return crits.map(function(c){
      var w=Math.min(Math.max(c.val||0,0),100);
      var cls=w>=65?'hi':w>=40?'mid':'lo';
      var col=w>=65?'var(--green)':w>=40?'var(--amber)':'var(--red)';
      return '<div class="comp-row"><div class="comp-row-top"><span class="comp-row-label">'+(c.label||'')+'</span><span class="comp-row-val" style="color:'+col+'">'+w+'</span></div><div class="comp-bar"><div class="comp-fill '+cls+'" data-w="'+w+'" style="width:0%"></div></div></div>';
    }).join('');
  }
  return '<div class="comp-grid"><div class="comp-col"><div class="comp-team-lbl" style="color:var(--cyan)">'+hn.toUpperCase().slice(0,14)+'</div><div class="comp-rows">'+rows(dh)+'</div></div><div class="comp-col"><div class="comp-team-lbl" style="color:var(--text)">'+an.toUpperCase().slice(0,14)+'</div><div class="comp-rows">'+rows(da)+'</div></div></div>';
}

function buildH2H(h2h,hn){
  if(!h2h||!h2h.length) return '';
  return '<div class="section"><div class="block-title">HEAD TO HEAD</div><div class="h2h-list">'+h2h.slice(0,5).map(function(g){var bc=g.w==='1'?'w1':g.w==='N'?'wn':'w2';var wl=g.w==='1'?(hn||'').slice(0,7).toUpperCase():g.w==='N'?'NUL':(g.away||'').slice(0,7).toUpperCase();return '<div class="h2h-item"><span class="h2h-date">'+(g.d||'')+'</span><span class="h2h-teams">'+(g.home||'')+' — '+(g.away||'')+'</span><span class="h2h-score">'+(g.s||'')+'</span><span class="h2h-w '+bc+'">'+wl+'</span></div>';}).join('')+'</div></div>';
}

function buildCotes(m){
  var items=[{t:'DOM',v:m.c1},{t:'NUL',v:m.cn},{t:'EXT',v:m.c2},{t:'OVER 1.5',v:m.co15},{t:'OVER 2.5',v:m.co25},{t:'UNDER 2.5',v:m.cu25},{t:'DC 1X',v:m.dc1x},{t:'DC X2',v:m.dc2x},{t:'BTTS OUI',v:m.btts_oui},{t:'BTTS NON',v:m.btts_non}].filter(function(x){return x.v&&x.v!=='--';});
  if(!items.length) return '';
  return '<div class="section"><div class="block-title">COTES DU MATCH</div><div class="cotes-grid">'+items.map(function(x){var hot=parseFloat(x.v)>=2.0?' hot':'';return '<div class="cote-item"><div class="cote-type">'+x.t+'</div><div class="cote-val'+hot+'">'+x.v+'</div></div>';}).join('')+'</div></div>';
}

function buildArbitre(arb){
  if(!arb||!arb.nom) return '';
  var ini=(arb.nom||'').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  return '<div class="section"><div class="block-title">ARBITRE</div><div class="arb-card"><div class="arb-avatar">'+ini+'</div><div class="arb-info"><div class="arb-name">'+(arb.nom||'').toUpperCase()+'</div><div class="arb-stats"><div class="arb-stat"><div class="arb-stat-val">'+(arb.cartons||'—')+'</div><div class="arb-stat-lbl">CARTONS/M</div></div><div class="arb-stat"><div class="arb-stat-val">'+(arb.penaltys||'—')+'</div><div class="arb-stat-lbl">PENALTYS/M</div></div><div class="arb-stat"><div class="arb-stat-val">'+(arb.matchs||'—')+'</div><div class="arb-stat-lbl">MATCHS</div></div></div>'+(arb.note?'<div class="arb-warn">'+arb.note+'</div>':'')+'</div></div></div><div class="dv"></div>';
}

function buildOddsMovement(mv){
  if(!mv||!mv.open_c1||!mv.curr_c1) return '';
  function item(lbl,open,curr){
    if(!open||!curr) return '';
    var o=parseFloat(open),c=parseFloat(curr);
    var cls=c<o?'down':c>o?'up':'flat';
    var delta=((c-o)/o*100).toFixed(1);
    var deltaHtml=Math.abs(delta)>=1?'<span style="font-family:\'Space Mono\',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:'+(c<o?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.1)')+';color:'+(c<o?'var(--green)':'var(--red)')+';">'+(c<o?'▼':'▲')+Math.abs(delta)+'%</span>':'';
    return '<div class="odds-move-item"><div class="odds-move-lbl">'+lbl+'</div><div class="odds-move-vals"><span class="odds-move-open">'+open+'</span><span class="odds-move-curr '+cls+'">'+curr+'</span>'+deltaHtml+'</div></div>';
  }
  var h=item('VICTOIRE DOM',mv.open_c1,mv.curr_c1);
  var a=item('VICTOIRE EXT',mv.open_c2,mv.curr_c2);
  if(!h&&!a) return '';
  return '<div class="section"><div class="block-title">MOUVEMENT DE COTES</div><div class="odds-move">'+h+a+'</div><div class="odds-move-note">Cote en baisse = argent des sharps = signal fort</div></div><div class="dv"></div>';
}

function buildPatterns(hn, an, evH, evA){
  if(!evH&&!evA) return '';
  var maxSlot=1;
  function getSlots(ev){ return ev&&ev.slots?ev.slots:[]; }
  // Calculer le max pour normaliser les barres
  [evH,evA].forEach(function(ev){ if(!ev||!ev.slots) return; ev.slots.forEach(function(s){ if(s.n>maxSlot) maxSlot=s.n; }); });

  function col(lbl, ev, colorStyle){
    if(!ev) return '';
    var slots=getSlots(ev);
    var slotsHtml=slots.length?'<div class="pat-slots"><div class="pat-slots-title">BUTS PAR TRANCHE (10 MATCHS)</div>'
      +slots.map(function(s){
        var w=maxSlot>0?Math.round((s.n/maxSlot)*100):0;
        return '<div class="pat-slot"><span class="pat-slot-lbl">'+s.t+'</span><div class="pat-slot-bar"><div class="pat-slot-fill" style="width:'+w+'%"></div></div><span class="pat-slot-n">'+s.n+'</span></div>';
      }).join('')+'</div>':'';
    return '<div class="pat-col">'
      +'<div class="pat-team-lbl" style="color:'+colorStyle+'">'+lbl.toUpperCase().slice(0,14)+'</div>'
      +slotsHtml
      +'<div class="pat-stats">'
      +'<div class="pat-stat amber"><div class="pat-stat-val">'+(ev.yellow_per_game||'—')+'</div><div class="pat-stat-lbl">JAUNES/M</div></div>'
      +'<div class="pat-stat red"><div class="pat-stat-val">'+(ev.red_cards||0)+'</div><div class="pat-stat-lbl">ROUGES</div></div>'
      +(ev.corners_per_game?'<div class="pat-stat cyan"><div class="pat-stat-val">'+ev.corners_per_game+'</div><div class="pat-stat-lbl">CORNERS/M</div></div>':'')
      +(ev.goals_total?'<div class="pat-stat"><div class="pat-stat-val">'+ev.goals_total+'</div><div class="pat-stat-lbl">BUTS TOTAL</div></div>':'')
      +'</div>'
      +'</div>';
  }
  return '<div class="section"><div class="block-title">PATTERNS — 10 MATCHS</div><div class="patterns-wrap">'+col(hn,evH,'var(--cyan)')+col(an,evA,'var(--text)')+'</div></div><div class="dv"></div>';
}

function buildScen15(phases){
  if(!phases||!phases.length) return '';
  return '<div class="scen-list">'+phases.map(function(p,i){
    var w=Math.min((p.prob||0)*4,100);
    var last=i===phases.length-1;
    return '<div class="scen-phase"><div class="scen-left"><div class="scen-badge">'+(p.t||'')+'</div>'+(!last?'<div class="scen-line"></div>':'')+'</div><div class="scen-body"><div class="scen-prob-row"><div class="scen-bar"><div class="scen-bar-fill" style="width:'+w+'%"></div></div><span class="scen-pct">'+(p.prob||0)+'% but</span></div><div class="scen-txt">'+(p.txt||'')+'</div></div></div>';
  }).join('')+'</div>';
}

function buildScenario(m){
  var scen15=m.scenario_15min||null;
  var scenHtml='';
  if(scen15&&scen15.length){scenHtml=buildScen15(scen15);}
  else if(m.scenario){var fb=[];if(m.scenario.phase1)fb.push({t:"0–25'",prob:10,txt:m.scenario.phase1});if(m.scenario.phase2)fb.push({t:"25–65'",prob:16,txt:m.scenario.phase2});if(m.scenario.phase3)fb.push({t:"65–90'",prob:14,txt:m.scenario.phase3});if(fb.length)scenHtml=buildScen15(fb);}
  if(!scenHtml) return '';
  // Résumé narratif — concaténation directe des txt
  var resumeHtml='';
  var phases=scen15||(m.scenario?[{txt:m.scenario.phase1},{txt:m.scenario.phase2},{txt:m.scenario.phase3}]:[]);
  var resumeTxt=phases.map(function(p){return p.txt||'';}).filter(Boolean).join(' ');
  if(resumeTxt){resumeHtml='<div class="scen-resume"><div class="scen-resume-lbl">RÉSUMÉ DU SOIR</div><div class="scen-resume-txt">'+resumeTxt+'</div></div>';}
  return '<div class="section"><div class="block-title">SCÉNARIO ATTENDU</div>'+scenHtml+resumeHtml+'</div><div class="dv"></div>';
}

function buildPlayers(hn, an, scH, scA){
  if((!scH||!scH.length)&&(!scA||!scA.length)) return '';
  function col(lbl, scorers, colorStyle){
    if(!scorers||!scorers.length) return '';
    var rows=scorers.map(function(p){
      var photoHtml=p.photo
        ?'<img class="player-photo" src="'+p.photo+'" onerror="this.outerHTML=\'<div class=player-photo-ph>'+p.name.slice(0,2).toUpperCase()+'</div>\'">'
        :'<div class="player-photo-ph">'+p.name.slice(0,2).toUpperCase()+'</div>';
      var absentHtml=p.absent?'<div class="player-absent-tag">ABSENT</div>':'';
      return '<div class="player-row">'+photoHtml
        +'<div class="player-info"><div class="player-name">'+p.name+'</div>'+absentHtml+'</div>'
        +'<div class="player-stats">'
        +'<div class="player-stat g"><div class="player-stat-val">'+(p.goals||0)+'</div><div class="player-stat-lbl">BUT</div></div>'
        +(p.assists!=null?'<div class="player-stat a"><div class="player-stat-val">'+(p.assists||0)+'</div><div class="player-stat-lbl">PD</div></div>':'')
        +'</div>'
        +'</div>';
    }).join('');
    return '<div class="players-col"><div class="players-col-lbl" style="color:'+colorStyle+'">'+lbl.toUpperCase().slice(0,14)+'</div>'+rows+'</div>';
  }
  return '<div class="section"><div class="block-title">BUTEURS CLÉS</div><div class="players-grid">'+col(hn,scH,'var(--cyan)')+col(an,scA,'var(--text)')+'</div></div><div class="dv"></div>';
}

function buildFifaCard(jd, scH, scA){
  if(!jd||!jd.nom) return '';
  if(jd.absent){return '<div class="fifa-section"><div class="fifa-title">BONUS — JOUEUR DU SOIR</div><div class="fifa-absent">ABSENT · '+jd.nom.toUpperCase()+' — Pari joueur déconseillé</div></div><div class="dv"></div>';}
  var all=(scH||[]).concat(scA||[]);
  var found=all.find(function(p){return p.name===jd.nom;});
  var photoHtml=found&&found.photo
    ?'<img class="fifa-photo" src="'+found.photo+'" onerror="this.outerHTML=\'<div class=fifa-photo-ph>'+jd.nom.slice(0,2).toUpperCase()+'</div>\'">'
    :'<div class="fifa-photo-ph">'+jd.nom.slice(0,2).toUpperCase()+'</div>';
  var goals=found?found.goals:'—';
  var assists=found&&found.assists!=null?found.assists:'—';
  var games=found?found.games:'—';
  var rating=found&&found.rating?parseFloat(found.rating).toFixed(0):'—';
  var equipeTag=jd.equipe==='DOM'?'DOM':'EXT';
  return '<div class="fifa-section"><div class="fifa-title">BONUS — JOUEUR DU SOIR</div>'
    +'<div class="fifa-card-wrap">'
    // Carte FIFA
    +'<div class="fifa-card">'
    +'<div class="fifa-rating">'+(rating!=='—'?rating:'★')+'</div>'
    +'<div class="fifa-pos">'+equipeTag+'</div>'
    +photoHtml
    +'<div class="fifa-name">'+jd.nom.split(' ').pop().toUpperCase()+'</div>'
    +'<div class="fifa-mini-stats">'
    +'<div class="fifa-ms"><div class="fifa-ms-val">'+goals+'</div><div class="fifa-ms-lbl">BUT</div></div>'
    +'<div class="fifa-ms"><div class="fifa-ms-val">'+assists+'</div><div class="fifa-ms-lbl">PD</div></div>'
    +'<div class="fifa-ms"><div class="fifa-ms-val">'+games+'</div><div class="fifa-ms-lbl">MJ</div></div>'
    +'</div>'
    +'</div>'
    // Info droite
    +'<div class="fifa-info">'
    +'<div>'
    +'<div class="fifa-marche-lbl">MARCHÉ</div>'
    +'<div class="fifa-marche-val">'+(jd.marche||'Buteur dans le match')+'</div>'
    +'<div class="fifa-raison">'+(jd.raison||'')+'</div>'
    +(jd.cote_estimee?'<div class="fifa-cote-row"><span class="fifa-cote-lbl">COTE EST.</span><span class="fifa-cote-val">'+jd.cote_estimee+'</span></div>':'')
    +'</div>'
    +'<div class="fifa-alert">Toujours vérifier la composition officielle avant de jouer. Ne pas miser si le joueur n\'est pas titulaire.</div>'
    +'</div>'
    +'</div>'
    +'</div><div class="dv"></div>';
}

// ─── RENDER PRINCIPAL ────────────────────────────────────
function render(m){

  }

  // Paris Valeur (public, 1 seul)
  var valeurHtml='';

    var cMin=v.cote?((parseFloat(v.cote)-0.20).toFixed(2)):'';
    valeurHtml='<div class="section"><div class="block-title">PARI VALEUR</div>'

      +'<div class="pv-bottom">'+(m.edge?'<span class="pv-edge">EDGE '+m.edge+'</span>':'<span></span>')+'<span class="pv-mise">'+(v.mise||'2-3% bankroll')+'</span>'+(m.kelly?'<span class="pv-kelly">KELLY '+m.kelly+'%</span>':'')+'</div>'

    // 1. CONTEXTE
    +((m.contexte||m.enjeux)?'<div class="section pt"><div class="block-title">CONTEXTE</div><div class="ctx-grid">'+(m.contexte?'<div class="ctx-card"><div class="ctx-lbl">SITUATION</div><div class="ctx-txt">'+m.contexte+'</div></div>':'')+(m.enjeux?'<div class="ctx-card"><div class="ctx-lbl">ENJEUX</div><div class="ctx-txt">'+m.enjeux+'</div></div>':'')+'</div></div>':'<div style="height:14px"></div>')
    +'<div class="dv"></div>'
    // 2. ANALYSE COMPARATIVE
    +'<div class="section"><div class="block-title">ANALYSE COMPARATIVE</div>'+buildComp(hn,an,m.crit_home,m.crit_away)+'</div>'

    // 3. VERDICT
    +(m.verdict_shark||m.pari_rec?'<div class="section"><div class="block-title">VERDICT DU SHARK</div><div class="verdict-box">'+(m.pari_rec?'<div class="verdict-top"><div><div class="verdict-pari">'+m.pari_rec.toUpperCase()+'</div></div><div class="verdict-cote-wrap"><div class="verdict-cote">'+(m.cote_rec||'—')+'</div><div class="verdict-bk">'+(bk?bk.n:'')+'</div></div></div>':'')+(m.edge?'<div class="edge-tag">EDGE '+m.edge+'</div>':'')+(m.verdict_shark?'<div class="verdict-txt">'+m.verdict_shark+'</div>':'')+'</div></div>':'')

    +'<div class="dv"></div>'
    // 5. CONFIANCE
    +'<div class="section"><div class="block-title">JAUGE DE CONFIANCE</div><div class="conf-box"><div class="conf-top"><div><div class="conf-score">'+(m.conf||0).toFixed(1)+'<sup>/10</sup></div></div><div style="text-align:right"><div class="conf-lvl-badge"'+confStyle+'>'+confLvl+'</div><div class="conf-hint">'+(m.argument?(m.argument.split('.')[0]):'')+'</div></div></div><div class="conf-bar-track"><div class="conf-bar-fill" style="width:'+confPct+'%"></div></div><div class="conf-scale"><span>PRUDENT</span><span>CONFIANT</span><span>ÉLEVÉ</span><span>LOCK</span></div></div></div>'

    // 7. PARIS VALEUR
    +valeurHtml
    // 8. SCORE PRÉDIT (justifie le pari)

    // 9. COTES
    +buildCotes(m)
    +(m.c1||m.co25?'<div class="dv"></div>':'')
    // 10. PATTERNS
    +buildPatterns(hn,an,m.events_home||null,m.events_away||null)
    // 11. SCÉNARIO
    +buildScenario(m)
    // 12. JOUEURS
    +buildPlayers(hn,an,m.top_scorers_home||[],m.top_scorers_away||[])
    // 13. FIFA CARD

      +'<div class="pw-header"><div class="pw-title">IASHARK <span>PRO</span></div><div class="pw-subtitle">Accède à l\'intégralité de l\'analyse pour chaque match.</div></div>'
      +'<div class="pw-features">'
      +'<div class="pw-feat"><div class="pw-feat-left"><div class="pw-feat-index">01</div><div><div class="pw-feat-name">SCÉNARIO 15MIN</div><div class="pw-feat-desc">Déroulement prédit tranche par tranche.</div></div></div><div class="pw-feat-badge c2">MODÈLE IA</div></div>'
      +'<div class="pw-feat"><div class="pw-feat-left"><div class="pw-feat-index">02</div><div><div class="pw-feat-name">SCORE PRÉDIT</div><div class="pw-feat-desc">Score le plus probable avec probabilité et cote implicite.</div></div></div><div class="pw-feat-badge c2">MODÈLE IA</div></div>'
      +'<div class="pw-feat"><div class="pw-feat-left"><div class="pw-feat-index">03</div><div><div class="pw-feat-name">MISE KELLY</div><div class="pw-feat-desc">Montant optimal calculé sur l\'edge réel.</div></div></div><div class="pw-feat-badge c1">KELLY</div></div>'

      +'<div class="pw-cta-wrap"><div class="pw-cta-btn">DÉBLOQUER IASHARK PRO</div><div class="pw-note">PAIEMENT SÉCURISÉ · ANNULABLE À TOUT MOMENT</div></div>'
      +'</div></div>')
    // 15. ALERTE SÉCURITÉ
    +'<div class="dv"></div><div class="section"><div class="block-title">ALERTE SÉCURITÉ</div>'+skipHtml+'</div>'
    +'<div class="card-footer"></div>'
    +'</div></div>';
}

async function checkSession(){
  try{
    var sb=supabase.createClient(SUPA_URL,SUPA_KEY);
    var res=await sb.auth.getSession();
    var session=res.data&&res.data.session;
    if(!session) return false;
    var ur=await sb.from('users').select('plan').eq('id',session.user.id).maybeSingle();
    return ur.data&&ur.data.plan==='pro';
  }catch(e){return false;}
}

async function init(){
  var el=document.getElementById('root');
  if(!fId){el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-family:\'Space Mono\',monospace;color:var(--muted)">ID MANQUANT</div><div style="margin-top:16px"><a href="/" style="color:var(--cyan);font-family:\'Space Mono\',monospace;font-size:10px">← RETOUR</a></div></div>';return;}
  try{
    var results=await Promise.all([
      fetch('data.json?t='+Date.now()).then(function(r){return r.json();}),
      checkSession()
    ]);

    isPro=true; // résultats[1] ignoré — Stripe non configuré

    var m=(data.matchs||[]).find(function(x){return String(x.id)===String(fId);});

    el.innerHTML=render(m);

    console.error(e);
    el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div>Erreur de chargement</div></div>';
  }
}
