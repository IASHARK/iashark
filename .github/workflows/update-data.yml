            tr:'Türkçe',el:'Ελληνικά',ro:'Română'
          };
          const GUIDE_RTL = ['ar'];
          const GUIDES_CONFIG = [
            {slug:'meilleurs-bookmakers-monde-2026', title_fr:'Top 10 Meilleurs Bookmakers Monde 2026'},
            {slug:'value-bet-guide-complet-2026', title_fr:'Value Bet — Guide Complet 2026'},
