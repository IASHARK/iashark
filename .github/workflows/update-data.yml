              +'    "valeur": {"bet":"[Le VALUE BET identifie, meilleur rapport edge/cote]", "cote":"[cote reelle fournie]", "hint":"[edge calcule precisement]",   "mise":"2-3% bankroll", "bookie":"[bookmaker avec meilleure cote]"},\n'
              +'    "specu":  {"bet":"[Pari audacieux coherent avec les stats, cote haute]",   "cote":"[cote reelle ou estimee]",  "hint":"[justification courte]",   "mise":"0.5-1% bankroll", "bookie":"[bookmaker]"}\n'
              +'  }\n'
              +'}\n\n'
              +'CONTRAINTES STRICTES:\n'
              +'- confiance: decimal 1.0-10.0 AJUSTE AU PARI RECOMMANDE specifiquement (pas une note generale du match)\n'
