              +'    "valeur": {"bet":"[Le VALUE BET identifie, meilleur rapport edge/cote]", "cote":"[cote reelle fournie]", "hint":"[edge calcule precisement]",   "mise":"2-3% bankroll", "bookie":"[bookmaker avec meilleure cote]"},\n'
              +'    "specu":  {"bet":"[Pari audacieux coherent avec les stats, cote haute]",   "cote":"[cote reelle ou estimee]",  "hint":"[justification courte]",   "mise":"0.5-1% bankroll", "bookie":"[bookmaker]"}\n'
              +'  }\n'
              +'}\n\n'
              +'CONTRAINTES STRICTES:\n'
              +'- confiance: decimal 1.0-10.0 AJUSTE AU PARI RECOMMANDE specifiquement (pas une note generale du match)\n'
              +'- p1+pn+p2 = 100 exactement\n'
              +'- vbet = "OUI" uniquement si edge reel > +4%\n'
              +'- risque: exactement "FAIBLE", "MODERE" ou "ELEVE"\n'
              +'- argument: 3 points numerotes avec chiffres concrets issus des donnees ci-dessus\n'
              +'- analyse_card: phrase complete 2-3 lignes, vocabulaire pro, chiffres inclus\n'
              +'- paris_3.safe.cote et valeur.cote doivent venir des cotes reelles fournies\n'
              +'- mise: entre 1% et 5% bankroll selon confiance';

            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 1400,
              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});

            var txt = (r.content&&r.content[0]&&r.content[0].text)||'{}';
            try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
            catch(e) { console.log('Parse error:', txt.slice(0,200)); return null; }
          }

          // ─── GENERER COMBINÉS ────────────────────────────────────────────
          async function genCombis(list) {
            if (list.length < 2) return [];
            var lines = list.map(function(a){
              return '- '+a.home+' vs '+a.away+': '+a.pari+' (confiance '+a.conf+'/10, edge '+(a.edge||'?')+')';
            }).join('\n');
            var prompt =
              'Expert paris sportifs IASHARK. Analyses du jour:\n'+lines+'\n\n'
              +'Genere 3 combines intelligents en combinant uniquement les paris confiance >= 7.0. '
              +'Reponds UNIQUEMENT avec ce JSON sans backticks:\n'
              +'{"c1":{"label":"SHARK SAFE","type":"safe","selections":"pari1, pari2","matchs":"match1, match2","cote_totale":"2.1","conseil":"Court et percutant"},'
              +'"c2":{"label":"SHARK VALUE","type":"value","selections":"pari1, pari2, pari3","matchs":"m1, m2, m3","cote_totale":"3.8","conseil":"..."},'
              +'"c3":{"label":"SHARK AUDACE","type":"audace","selections":"pari1, pari2, pari3","matchs":"m1, m2, m3","cote_totale":"7.2","conseil":"..."}}';

            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 600,
              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});
            var txt = (r.content&&r.content[0]&&r.content[0].text)||'{}';
            try {
              var obj = JSON.parse(txt.replace(/```json|```/g,'').trim());
              return Object.values(obj).filter(Boolean).map(function(c){
                return {
                  label: c.label||'COMBINÉ',
                  type: c.type||'safe',
                  selections: c.selections||'',
                  matchs: c.matchs||'',
                  cote_totale: c.cote_totale||'',
                  conseil: c.conseil||''
                };
              });
            } catch(e) { return []; }
          }

          // ─── FORMAT H2H ──────────────────────────────────────────────────
          function formatH2H(fixtures, homeId, awayId) {
            return fixtures.slice(0,5).map(function(f) {
              var gfH=f.goals.home||0, gfA=f.goals.away||0;
              var isH = f.teams.home.id===homeId;
              var w;
              if(gfH>gfA) w=isH?'1':'2';
              else if(gfH<gfA) w=isH?'2':'1';
              else w='N';
              return {
                d:    (f.fixture.date||'').split('T')[0],
                home: f.teams.home.name,
                away: f.teams.away.name,
                s:    gfH+'-'+gfA,
                w:    w
              };
            });
          }

          // ─── MAIN ────────────────────────────────────────────────────────
          async function main() {
            console.log('=== IASHARK', TODAY, '===');
            var fixtures = await getFixtures();
            console.log('Fixtures trouves:', fixtures.length);

            if (!fixtures.length) {
              fs.writeFileSync('data.json', JSON.stringify({matchs:[],combis:[]},null,2));
              return;
            }

            var matchsData = [];
            var forCombis  = [];
            var standingsCache = {};

            for (var fi=0; fi<fixtures.length; fi++) {
              var fix  = fixtures[fi];
              var f    = fix.fixture;
              var lg   = fix.league;
              var home = fix.teams.home;
              var away = fix.teams.away;
              console.log('\n-> '+home.name+' vs '+away.name+' ('+lg.name+')');

              // Classement (cache par ligue)
              if (!standingsCache[lg.id]) {
                standingsCache[lg.id] = await getFullStanding(lg.id);
                await sleep(250);
              }
              var standings = standingsCache[lg.id];
              var entryH = standings.find(function(s){return s.team.id===home.id;});
              var entryA = standings.find(function(s){return s.team.id===away.id;});
              var rkH = entryH?entryH.rank:null;
              var rkA = entryA?entryA.rank:null;

              // Appels parallèles groupés
              var batch1 = await Promise.all([
                getTeamStats(home.id, lg.id),
                getTeamStats(away.id, lg.id),
                getLast10(home.id),
                getLast10(away.id),
              ]);
              await sleep(400);

              var batch2 = await Promise.all([
                getOdds(f.id),
                getInjuries(f.id),
                getH2H(home.id, away.id),
                getWeather(f.venue&&f.venue.city?f.venue.city:''),
                getNews(home.name),
                getNews(away.name),
              ]);
              await sleep(400);

              var sH=batch1[0], sA=batch1[1];
              var raw10H=batch1[2], raw10A=batch1[3];
              var oddsRaw=batch2[0], injRaw=batch2[1], h2hRaw=batch2[2];
              var wx=batch2[3], nH=batch2[4], nA=batch2[5];

              // Formatage données
              var last10H = formatLast10(raw10H, home.id);
              var last10A = formatLast10(raw10A, away.id);
              var odds    = parseOdds(oddsRaw);
              var critH   = calcCriteres(sH, true,  rkH);
              var critA   = calcCriteres(sA, false, rkA);
              var fatigueH = calcFatigue(last10H, home.name);
              var fatigueA = calcFatigue(last10A, away.name);
              var tendances = calcTendances(last10H, last10A, home.id, away.id);

              // Injuries avec team id
              var injuries = (injRaw||[]).map(function(inj){
                return {
                  name:   inj.name,
                  team:   inj.team===home.id?'home':'away',
                  reason: inj.reason||'Blessure',
                  status: (inj.status||'out').toLowerCase().includes('suspend')?'suspended':
                           (inj.status||'').toLowerCase().includes('doubt')?'doubt':'out',
                  impact: 'medium'
                };
              });

              // H2H formaté
              var h2hFormatted = formatH2H(h2hRaw, home.id, away.id);

              // Stats pour le prompt
              var totalH=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.total)||30;
              var totalA=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.total)||30;
              var mdH=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.home)||Math.round(totalH/2);
              var meA=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.away)||Math.round(totalA/2);

              var d10Hstr = last10H.slice(0,5).map(function(m){
                return m.result+' '+m.score+' vs '+m.match+' ('+m.lieu+')';
              }).join(' | ')||'N/A';
              var d10Astr = last10A.slice(0,5).map(function(m){
                return m.result+' '+m.score+' vs '+m.match+' ('+m.lieu+')';
              }).join(' | ')||'N/A';

              var heure = (f.date||'').split('T')[1]?(f.date||'').split('T')[1].slice(0,5):'';
              var meteoStr = wx?wx.desc+' '+wx.emoji+' '+wx.temp+' | Vent: '+wx.wind:'N/A';

              // Génération analyse Claude
              var an = await genAnalyse({
                home:home.name, away:away.name,
                homeId:home.id, awayId:away.id,
                league:lg.name,
                date:TODAY+' '+heure,
                stade:(f.venue&&f.venue.name)||'',
                meteo:meteoStr,
                fH:(sH&&sH.form)||'', fA:(sA&&sA.form)||'',
                rkH,rkA,
                totalH,totalA,mdH,meA,
                bmH:(sH&&sH.goals&&sH.goals.for&&sH.goals.for.total&&sH.goals.for.total.total)||0,
