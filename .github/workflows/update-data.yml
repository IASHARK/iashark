                      pts:      s.points,
                      form:     s.form||''
                    };
                  }),
                  home: entryH?{
                    rank:entryH.rank, pts:entryH.points,
                    played:entryH.all.played, won:entryH.all.win,
                    lost:entryH.all.lose, gd:entryH.goalsDiff,
                    form:entryH.form||''
                  }:null,
                  away: entryA?{
                    rank:entryA.rank, pts:entryA.points,
                    played:entryA.all.played, won:entryA.all.win,
                    lost:entryA.all.lose, gd:entryA.goalsDiff,
                    form:entryA.form||''
                  }:null
                };
              }

              // Risque en chiffre pour la jauge
              var risqueRaw = an?(an.risque||'MODERE'):'MODERE';
              var risqueNorm = risqueRaw.toUpperCase();
              if(risqueNorm.includes('FAIBLE')||risqueNorm.includes('LOW')) risqueNorm='FAIBLE';
              else if(risqueNorm.includes('ELEVE')||risqueNorm.includes('HIGH')||risqueNorm.includes('FORT')) risqueNorm='ELEVE';
              else risqueNorm='MODERE';

              var matchObj = {
