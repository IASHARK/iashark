              +'"c3":{"label":"SHARK EXPERT","type":"audace","selections":"Over 2.5 + DC X2 + DC 1X","matchs":"m1, m2, m3","cote_totale":"5.50","conseil":"..."}}';
            var r = await postJSONWithRetry('api.anthropic.com', '/v1/messages', {
              model: 'claude-sonnet-4-6',
              max_tokens: 800,
              messages: [{role:'user', content:promptClassic}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});
            var txt = (r.content&&r.content[0]&&r.content[0].text)||'{}';
            var classics = [];
            try {
              var obj = JSON.parse(txt.replace(/```json|```/g,'').trim());
              classics = Object.values(obj).filter(Boolean).map(function(c){
                return {label:c.label||'COMBINE',type:c.type||'safe',selections:c.selections||'',matchs:c.matchs||'',cote_totale:c.cote_totale||'',conseil:c.conseil||''};
              });
            } catch(e) { classics = []; }
            if (!isSamedi && !isDimanche) return classics;
            var labelFou = isSamedi ? 'SAMEDI FOU' : 'DIMANCHE FOU';
            var typeFou  = isSamedi ? 'samedi_fou' : 'dimanche_fou';
            var pool = [];
            (allMatchs||[]).forEach(function(m) {
              var matchLabel = m.home.n+' vs '+m.away.n;
              var edgeNum = parseFloat((m.edge||'').replace(/[^0-9.]/g,''))||0;
              var candidates = [];
              if (m.dc1x &&m.dc1x !=='--'&&parseFloat(m.dc1x)>=1.20&&parseFloat(m.dc1x)<=2.00) candidates.push({match:matchLabel,sel:'Double Chance 1X',cote:parseFloat(m.dc1x),edge:edgeNum,prob:Math.round(100/parseFloat(m.dc1x))});
              if (m.dc2x &&m.dc2x !=='--'&&parseFloat(m.dc2x)>=1.20&&parseFloat(m.dc2x)<=2.00) candidates.push({match:matchLabel,sel:'Double Chance X2',cote:parseFloat(m.dc2x),edge:edgeNum,prob:Math.round(100/parseFloat(m.dc2x))});
              if (m.btts_non&&m.btts_non!=='--'&&parseFloat(m.btts_non)>=1.20&&parseFloat(m.btts_non)<=2.00) candidates.push({match:matchLabel,sel:'BTTS Non',cote:parseFloat(m.btts_non),edge:edgeNum,prob:Math.round(100/parseFloat(m.btts_non))});
              if (m.co25 &&m.co25 !=='--'&&parseFloat(m.co25)>=1.20&&parseFloat(m.co25)<=2.50) candidates.push({match:matchLabel,sel:'Over 2.5 buts',cote:parseFloat(m.co25),edge:edgeNum,prob:Math.round(100/parseFloat(m.co25))});
              if (!candidates.length) return;
              candidates.sort(function(a,b){return b.edge-a.edge||a.cote-b.cote;});
              pool.push(candidates[0]);
            });
            if (pool.length < 2) {
              classics.push({label:labelFou,type:typeFou,selections:'Pas assez de matchs qualifiés ce jour',matchs:'',cote_totale:'--',conseil:'Reviens demain pour le combiné fou !'});
              return classics;
            }
            pool.sort(function(a,b){return b.edge-a.edge;});
            var TARGET_MIN = 5, TARGET_MAX = 10;
            var selected = [];
            var coteTotale = 1.0;
            for (var si=0; si<pool.length; si++) {
              if(selected.length>=5) break;
              var next = coteTotale * pool[si].cote;
              if(next > TARGET_MAX) break;
              selected.push(pool[si]);
              coteTotale = next;
              if (coteTotale >= TARGET_MIN) break;
            }
            if(selected.length < 2) {
