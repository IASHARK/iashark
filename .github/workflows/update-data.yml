          // ─── GENERER COMBINÉS ────────────────────────────────────────────
          async function genCombis(list) {
            if (list.length < 2) return [];
            var lines = list.map(function(a){
              return '- '+a.home+' vs '+a.away+': '+a.pari+' (confiance '+a.conf+'/10, edge '+(a.edge||'?')+')';
            }).join('\n');
            var prompt =
              'Expert paris sportifs IASHARK. Analyses du jour:\n'+lines+'\n\n'
              +'Genere 3 combines intelligents en combinant uniquement les paris confiance >= 7.0. '
              +'Reponds UNIQUEMENT avec ce JSON sans backticks:\n'
              +'{"c1":{"label":"SHARK SAFE","type":"safe","selections":"pari1, pari2","matchs":"match1, match2","cote_totale":"2.1","conseil":"Court et percutant"},'
              +'"c2":{"label":"SHARK VALUE","type":"value","selections":"pari1, pari2, pari3","matchs":"m1, m2, m3","cote_totale":"3.8","conseil":"..."},'
              +'"c3":{"label":"SHARK AUDACE","type":"audace","selections":"pari1, pari2, pari3","matchs":"m1, m2, m3","cote_totale":"7.2","conseil":"..."}}';

            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-haiku-4-5-20251001',
