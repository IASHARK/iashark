          function calcFatigue(last10, teamName) {
            if (!last10||!last10.length) return {val:40, info:'Calendrier inconnu'};
            var now = new Date();
            var last = new Date(last10[0].date_full||last10[0].d);
            var daysSince = Math.round((now-last)/(1000*60*60*24));
            var matchesIn14 = last10.filter(function(m){
              var d = new Date(m.date_full||m.d);
              return (now-d)/(1000*60*60*24) <= 14;
            }).length;
            var score = 0;
            if (daysSince<=2)  score=90;
            else if(daysSince<=4) score=70;
            else if(daysSince<=6) score=50;
            else if(daysSince<=8) score=30;
            else score=15;
            if (matchesIn14>=3) score = Math.min(100,score+20);
            var info = daysSince<=7
              ? 'Dernier match il y a '+daysSince+'j \u2014 '+matchesIn14+' match(s) en 14j'
              : 'Repos '+daysSince+' jours';
            return {val:Math.round(score), info:info};
          }
          function calcTendances(last10Home, last10Away, homeId, awayId) {
            function countOver25(games) {
              return games.filter(function(g){
                var parts = (g.score||'').split('-');
                var total = parseInt(parts[0]||0)+parseInt(parts[1]||0);
                return total>2;
              }).length;
            }
            function countBTTS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                return parseInt(parts[0]||0)>0 && parseInt(parts[1]||0)>0;
              }).length;
            }
            function countCS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                if(g.home) return parseInt(parts[1]||0)===0;
                return parseInt(parts[0]||0)===0;
              }).length;
            }
            var domGames=last10Home.filter(function(g){return g.home===true;});
            var extGames=last10Away.filter(function(g){return g.home===false;});
            var o25Hn=Math.max(domGames.length,1);
            var o25An=Math.max(extGames.length,1);
            return {
              over25_home: countOver25(domGames), over25_away: countOver25(extGames),
              over25_home_n: o25Hn, over25_away_n: o25An,
              btts_home: countBTTS(domGames), btts_away: countBTTS(extGames),
              btts_home_n: o25Hn, btts_away_n: o25An,
              cs_home: countCS(domGames),
            };
          }
          function calcCriteres(stats, isDom, rank) {
            if (!stats) return {fd:50,att:50,def:50,fr:50,mot:70,fat:50};
            var total=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.total)||30;
            var bm=(stats.goals&&stats.goals.for&&stats.goals.for.total&&stats.goals.for.total.total)||0;
            var be=(stats.goals&&stats.goals.against&&stats.goals.against.total&&stats.goals.against.total.total)||0;
            var form=(stats.form||'').slice(-5);
            var pts=form.split('').reduce(function(a,c){return a+(c==='W'?3:c==='D'?1:0);},0);
            var fr=Math.round(pts/Math.max(form.length*3,1)*100);
            var att=Math.min(100,Math.round(bm/Math.max(total,1)*40));
            var def=Math.max(0,Math.min(100,Math.round((2.5-be/Math.max(total,1))*35)));
            var vd=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.home)||0;
            var ve=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.away)||0;
            var md=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.home)||Math.round(total/2);
            var me=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.away)||Math.round(total/2);
            var fd=isDom?Math.min(100,Math.round(vd/Math.max(md,1)*100)):Math.min(100,Math.round(ve/Math.max(me,1)*100));
            var mot=70;
            if(rank){if(rank<=3)mot=95;else if(rank<=6)mot=85;else if(rank<=10)mot=70;else if(rank>=17)mot=90;else mot=60;}
            return {
              fd:Math.max(0,Math.min(100,fd)),
              att:Math.max(0,Math.min(100,att)),
              def:Math.max(0,Math.min(100,def)),
              fr:Math.max(0,Math.min(100,fr)),
              mot:Math.max(0,Math.min(100,mot)),
              fat:50
            };
          }
          function calcDisciplineRisk(refStats, xgH, xgA, homeName, awayName) {
            if(!refStats) return null;
            var cartons = parseFloat(refStats.cards_per_game)||0;
            var foutesH = xgH&&xgH.fouls_avg?parseFloat(xgH.fouls_avg):0;
            var foutesA = xgA&&xgA.fouls_avg?parseFloat(xgA.fouls_avg):0;
            var alerts  = [];
            var riskScore = 0;
            if(cartons>=5.0){ riskScore+=30; alerts.push('\uD83D\uDFE8 Arbitre tr\u00e8s s\u00e9v\u00e8re ('+cartons+' cartons/match)'); }
            else if(cartons>=4.0){ riskScore+=15; alerts.push('\uD83D\uDFE8 Arbitre s\u00e9v\u00e8re ('+cartons+' cartons/match)'); }
            if(foutesH>=14&&cartons>=4.0){ riskScore+=25; alerts.push('\u26a0\ufe0f '+homeName+' tr\u00e8s agressif ('+foutesH+' fautes/match) + arbitre s\u00e9v\u00e8re'); }
            if(foutesA>=14&&cartons>=4.0){ riskScore+=25; alerts.push('\u26a0\ufe0f '+awayName+' tr\u00e8s agressif ('+foutesA+' fautes/match) + arbitre s\u00e9v\u00e8re'); }
            if(!alerts.length) return null;
            return {score: Math.min(riskScore,100), alerts: alerts, conseil: riskScore>=40?'Pr\u00e9f\u00e9rer march\u00e9s sans handicap d\'homme':'Mod\u00e9rer les paris sur victoire nette'};
          }
          function calcMotivation(rank, totalTeams, pts, ptsLeader, matchsLeft, isHome, leagueName, homeName, awayName) {
            totalTeams = totalTeams||20;
            matchsLeft = matchsLeft||5;
            var relegZone = totalTeams-3;
            var euroZone  = 5;
            var alerts    = [];
            var score     = 50;
            if(!rank) return {score:50, alerts:[], label:'Enjeu standard'};
            if(rank>=relegZone){
              score += 30;
              alerts.push('\u26a0\ufe0f EN ZONE DE REL\u00c9GATION (#'+rank+'/'+totalTeams+')');
            } else if(rank<=3 && ptsLeader){
              var gap = (ptsLeader - pts)||0;
              if(gap<=6){ score+=20; alerts.push('\uD83C\uDFC6 \u00c0 '+gap+' pts du titre'); }
            }
            if(rank<=euroZone && rank>1){
              score += 10;
              alerts.push('\uD83C\uDF0D En course pour l\'Europe (#'+rank+')');
            }
            var cityWords = ['manchester','london','milan','madrid','rome','glasgow','paris'];
            var hLow = (homeName||'').toLowerCase();
            var aLow = (awayName||'').toLowerCase();
            var isDerby = cityWords.some(function(c){return hLow.includes(c)&&aLow.includes(c);}) ||
              (hLow.includes('city')&&aLow.includes('united')) ||
              (hLow.includes('celtic')&&aLow.includes('rangers')) ||
              (hLow.includes('inter')&&aLow.includes('milan'));
            if(isDerby){ score+=25; alerts.push('\uD83D\uDD25 DERBY — imprévisibilité maximale'); }
            score = Math.max(0,Math.min(100,score));
            var label = score>=80?'ENJEU CRITIQUE':score>=60?'ENJEU \u00c9LEV\u00c9':score>=40?'Enjeu mod\u00e9r\u00e9':'Enjeu faible';
            return {score:score, alerts:alerts, label:label, isDerby:isDerby};
          }
          function calcMatchup(xgH, xgA, sH, sA) {
            var possH = xgH&&xgH.possession_avg?parseFloat(xgH.possession_avg):50;
            var possA = xgA&&xgA.possession_avg?parseFloat(xgA.possession_avg):50;
            var shotsH = xgH&&xgH.shots_total_avg?parseFloat(xgH.shots_total_avg):10;
            var shotsA = xgA&&xgA.shots_total_avg?parseFloat(xgA.shots_total_avg):10;
            var xgHavg = xgH&&xgH.xg_avg?parseFloat(xgH.xg_avg):1.2;
            var xgAavg = xgA&&xgA.xg_avg?parseFloat(xgA.xg_avg):1.0;
            var totalH=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.total)||20;
            var totalA=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.total)||20;
            var defH = sH&&sH.goals&&sH.goals.against&&sH.goals.against.total?(sH.goals.against.total.total/totalH).toFixed(2):1.2;
            var defA = sA&&sA.goals&&sA.goals.against&&sA.goals.against.total?(sA.goals.against.total.total/totalA).toFixed(2):1.2;
            var styleH = possH>=55?'Possession':(shotsH>=14?'Pressing haut':'Équilibré');
            var styleA = possA>=55?'Possession':(shotsA>=14?'Pressing haut':'Équilibré');
            if(possH<45) styleH='Contre-attaque';
            if(possA<45) styleA='Contre-attaque';
            var insights=[];
            if(xgHavg>=1.4&&xgAavg>=1.2) insights.push('\u26bd Deux équipes offensives (xG DOM '+xgHavg+' / EXT '+xgAavg+') — renforce Over 2.5');
            if(parseFloat(defH)<=1.0&&parseFloat(defA)<=1.0) insights.push('\uD83D\uDD12 Deux défenses solides ('+defH+' et '+defA+' buts encaissés/match) — renforce BTTS Non');
            return {styleH, styleA, possH, possA, defH, defA, insights};
          }

          // ── CHANGEMENT 4A : calcKeyAbsences — correction IDs ────
          function calcKeyAbsences(injuries, topScorersH, topScorersA, homeId, awayId, bmHdom, mdHdom, bmAext, meAext) {
            var alerts=[];
            if(!injuries||!injuries.length) return alerts;
            // CORRECTION BUG : utilisation de homeId/awayId (number) au lieu de 'home'/'away' (string)
            var injH=injuries.filter(function(x){return x.team===homeId;});
            var injA=injuries.filter(function(x){return x.team===awayId;});
            function checkAbsence(injList, scorers, teamGoals, teamGames, teamLabel){
              if(!injList.length||!scorers||!scorers.length) return;
              scorers.forEach(function(player){
                var isAbsent=injList.find(function(inj){
                  var pn=(player.name||'').toLowerCase();
                  var in_=(inj.name||'').toLowerCase();
                  var words=pn.split(' ');
                  return words.some(function(w){return w.length>=4&&in_.includes(w);});
                });
                if(isAbsent){
                  var goalsContrib=player.goals||0;
                  var assistContrib=player.assists||0;
                  var totalContrib=goalsContrib+assistContrib;
                  var pct=Math.round((totalContrib/Math.max((teamGoals||1)*1.5,1))*100);
                  var severity=pct>=30?'\uD83D\uDEA8 ALERTE ROUGE':pct>=20?'\uD83D\uDD34 ABSENCE MAJEURE':'\uD83D\uDFE1 Absence notable';
                  alerts.push(severity+': '+player.name+' ('+teamLabel+') ABSENT — ~'+pct+'% des buts ('+goalsContrib+' buts + '+assistContrib+' passes D. en '+player.games+' matchs)');
                }
              });
            }
            checkAbsence(injH, topScorersH, bmHdom, mdHdom, 'DOM');
            checkAbsence(injA, topScorersA, bmAext, meAext, 'EXT');
            return alerts;
          }

          // ── CHANGEMENT 3 : REFONTE genAnalyse ───────────────────
          async function genAnalyse(d) {
            var moyBmHdom = d.bmHdom&&d.mdHdom?(d.bmHdom/d.mdHdom).toFixed(2):'?';
            var moyBeHdom = d.beHdom&&d.mdHdom?(d.beHdom/d.mdHdom).toFixed(2):'?';
            var moyBmAext = d.bmAext&&d.meAext?(d.bmAext/d.meAext).toFixed(2):'?';
            var moyBeAext = d.beAext&&d.meAext?(d.beAext/d.meAext).toFixed(2):'?';

            // Détection edge aberrant — signal de bug Poisson
            var edgeAberrant = d.best_edge && d.best_edge > 15;

            var injStr = 'Aucune absence majeure confirmée.';
            if (d.injuries && d.injuries.length) {
              var injH = d.injuries.filter(function(x){return x.team===d.homeId||x.team==='home';});
              var injA = d.injuries.filter(function(x){return x.team===d.awayId||x.team==='away';});
              var parts = [];
              if(injH.length) parts.push(d.home+' absents: '+injH.map(function(x){return x.name;}).join(', '));
              if(injA.length) parts.push(d.away+' absents: '+injA.map(function(x){return x.name;}).join(', '));
              if(parts.length) injStr = parts.join(' | ');
            }

            var h2hStr = 'Indisponible.';
            if(d.h2h && d.h2h.length) {
              var w1=0,wN=0,w2=0;
              d.h2h.forEach(function(g){
                var gfH=g.goals.home||0,gfA=g.goals.away||0;
                var isH=g.teams.home.id===d.homeId;
                if(gfH>gfA) isH?w1++:w2++; else if(gfH<gfA) isH?w2++:w1++; else wN++;
              });
              h2hStr = d.home+' '+w1+'V / '+wN+'N / '+w2+'D | Moy buts: '+d.h2hAvgButs;
            }

            // BTTS Non condition : au moins une équipe a scored dans < 65% de ses matchs
            var failHpct = d.mdHdom>0 ? Math.round((d.failHdom/d.mdHdom)*100) : 0;
            var failApct = d.meAext>0 ? Math.round((d.failAext/d.meAext)*100) : 0;
            var bttsNonCondition = failHpct >= 35 || failApct >= 35;

            // ── PRÉ-CALCUL score central Poisson (fix #5 — pas de biais narratif de Claude) ──
            var poissonScoreH = Math.round(lambdas ? (d.poisson_lambdaH||1.2) : 1.2);
            var poissonScoreA = Math.round(lambdas ? (d.poisson_lambdaA||1.0) : 1.0);
            var scoreCentral = poissonScoreH + '-' + poissonScoreA;

            var prompt =
              '=== MATCH ===\n'
              +d.home+' (DOM, #'+(d.rkH||'?')+') vs '+d.away+' (EXT, #'+(d.rkA||'?')+')\n'
              +d.league+' | '+d.date+' | '+d.stade+'\n\n'

              +'=== PHASE 1 — ANALYSE INDÉPENDANTE ===\n'
              +'Analyse ces données SANS regarder les probas Poisson. Forme-toi une opinion sur le scénario le plus probable avant de passer à la Phase 2.\n\n'

              +'DOM — Bilan domicile: '+d.vdH+'V / '+d.mdHdom+' matchs | Marqués: '+moyBmHdom+'/match | Encaissés: '+moyBeHdom+'/match\n'
              +'DOM — Sans marquer: '+d.failHdom+'/'+d.mdHdom+' ('+failHpct+'%) | Clean sheets: '+d.csHdom+'/'+d.mdHdom+'\n'
              +'DOM — Forme 5 derniers: '+d.forme5H+(d.streakH?' | Série: '+d.streakH:'')+'\n'
              +(d.xgH_avg?'DOM — xG offensif: '+d.xgH_avg+' | xGA défensif: '+(d.xgH_xga||'N/A')+(d.xgH_defense_surchauffe?' ⚠️ DÉFENSE EN SURCHAUFFE — elle devrait encaisser plus':'')+'\n':'')
              +'\n'
              +'EXT — Bilan extérieur: '+d.veA+'V / '+d.meAext+' matchs | Marqués: '+moyBmAext+'/match | Encaissés: '+moyBeAext+'/match\n'
              +'EXT — Sans marquer: '+d.failAext+'/'+d.meAext+' ('+failApct+'%) | Clean sheets: '+d.csAext+'/'+d.meAext+'\n'
              +'EXT — Forme 5 derniers: '+d.forme5A+(d.streakA?' | Série: '+d.streakA:'')+'\n'
              +(d.xgA_avg?'EXT — xG offensif: '+d.xgA_avg+' | xGA défensif: '+(d.xgA_xga||'N/A')+(d.xgA_defense_surchauffe?' ⚠️ DÉFENSE EN SURCHAUFFE — elle devrait encaisser plus':'')+'\n':'')
              +'\n'
              +'H2H: '+h2hStr+'\n'
              +'Absences confirmées: '+injStr+'\n'
              +(d.eloH&&d.eloA
                ?'ELO: '+d.home+' '+Math.round(d.eloH)+' pts vs '+d.away+' '+Math.round(d.eloA)+' pts | Écart: '+(d.eloStats?d.eloStats.diff:0)+' pts (signal '+(d.eloStats?d.eloStats.signal:'?')+')\n'
                 +(d.eloStats&&Math.abs(d.eloStats.diff)>=100?'→ Écart ELO significatif : l\'équipe plus faible a statistiquement moins de 35% de chances de ne pas perdre\n':'')
                :'ELO: non disponible — poids du signal réduit\n')
              +(d.motivH&&d.motivH.alerts&&d.motivH.alerts.length?'Enjeu DOM: '+d.motivH.alerts.join(' | ')+'\n':'')
              +(d.motivA&&d.motivA.alerts&&d.motivA.alerts.length?'Enjeu EXT: '+d.motivA.alerts.join(' | ')+'\n':'')
              +(d.matchup&&d.matchup.insights&&d.matchup.insights.length?'Opposition tactique: '+d.matchup.insights.join(' | ')+'\n':'')
              +'\n'

              +'=== PHASE 2 — MODÈLE MATHÉMATIQUE ===\n'
              +'Ces chiffres CONFIRMENT ou INFIRMENT ton analyse Phase 1. Si contradiction → passe ton tour.\n\n'
              +'Buts attendus Poisson: DOM '+d.poisson_lambdaH+' | EXT '+d.poisson_lambdaA+'\n'
              +'Poisson: DOM '+d.poisson_p1+'% | Nul '+d.poisson_pN+'% | EXT '+d.poisson_p2+'%\n'
              +'Poisson Over 2.5: '+d.poisson_over25+'% | BTTS Non: '+d.poisson_bttsN+'%\n'
              +(d.pinnacle_p1
                ?'Pinnacle (marché sharp, très fiable): DOM '+d.pinnacle_p1+'% | Nul '+d.pinnacle_pN+'% | EXT '+d.pinnacle_p2+'%\n'
                 +'→ Si Pinnacle et Poisson divergent de plus de 15 pts sur un marché : méfie-toi, donne priorité à Pinnacle\n'
                :'Pinnacle: non disponible\n')
              +(edgeAberrant?'⚠️ ALERTE : Edge calculé à +'+d.best_edge+'% — edge > 15% = probablement un bug Poisson, pas une vraie opportunité. Ignore-le et base-toi sur Phase 1.\n':'')
              +'\n'
              +'Cotes réelles disponibles (UTILISE CES VALEURS EXACTES dans cote_rec) :\n'
              +(d.dc1x&&d.dc1x!=='--'?'DC 1X: '+d.dc1x+'\n':'DC 1X: non disponible\n')
              +(d.dc2x&&d.dc2x!=='--'?'DC X2: '+d.dc2x+'\n':'DC X2: non disponible\n')
              +(d.co25&&d.co25!=='--'?'Over 2.5: '+d.co25+'\n':'Over 2.5: non disponible\n')
              +(d.btts_non&&d.btts_non!=='--'?'BTTS Non: '+d.btts_non+'\n':'BTTS Non: non disponible\n')
              +'\n'

              +'=== PHASE 3 — DÉCISION ===\n\n'
              +'RÈGLE 1 — QUAND PASSER TON TOUR (passe_ton_tour: true) :\n'
