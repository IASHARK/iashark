              if (m.btts_non&&m.btts_non!=='--'&&parseFloat(m.btts_non)>=1.20&&parseFloat(m.btts_non)<=2.00) candidates.push({match:matchLabel,sel:'BTTS Non',cote:parseFloat(m.btts_non),prob:Math.round(100/parseFloat(m.btts_non))});
              if (m.co25 &&m.co25 !=='--'&&parseFloat(m.co25)>=1.20&&parseFloat(m.co25)<=2.50) candidates.push({match:matchLabel,sel:'Over 2.5 buts',cote:parseFloat(m.co25),prob:Math.round(100/parseFloat(m.co25))});
              if (m.btts_oui&&m.btts_oui!=='--'&&parseFloat(m.btts_oui)>=1.20&&parseFloat(m.btts_oui)<=2.00) candidates.push({match:matchLabel,sel:'BTTS Oui',cote:parseFloat(m.btts_oui),prob:Math.round(100/parseFloat(m.btts_oui))});
              if (!candidates.length) return;
              candidates.sort(function(a,b){return a.cote-b.cote;});
              pool.push(candidates[0]);
            });
            if (pool.length < 3) {
              classics.push({label:labelFou,type:typeFou,selections:'Pas assez de matchs ce jour',matchs:'',cote_totale:'--',conseil:'Reviens demain pour le combiné fou !'});
              return classics;
            }
            pool.sort(function(a,b){return a.cote-b.cote;});
            var TARGET_MIN = 5, TARGET_MAX = 10;
            var selected = [];
            var coteTotale = 1.0;
            for (var si=0; si<pool.length; si++) {
              if(selected.length>=5) break; // max 5 sélections
              var next = coteTotale * pool[si].cote;
              if(next > TARGET_MAX) break; // s'arrête dès qu'on dépasse 10
              selected.push(pool[si]);
              coteTotale = next;
              if (coteTotale >= TARGET_MIN) break;
            }
            if(selected.length < 2) {
              classics.push({label:labelFou,type:typeFou,selections:'Pas assez de sélections sûres',matchs:'',cote_totale:'--',conseil:'Pas de combiné fou aujourd\'hui — marchés trop serrés.'});
              return classics;
            }
            var coteFinalStr = coteTotale.toFixed(2);
            var selectionsStr = selected.map(function(s){return s.sel;}).join(', ');
            var matchsStr     = selected.map(function(s){return s.match;}).join(', ');
            var probMin = selected.reduce(function(mn,s){return Math.min(mn,s.prob);},100);
            var probMax = selected.reduce(function(mx,s){return Math.max(mx,s.prob);},0);
            var nbSel = selected.length;
            var conseil = nbSel+' sélections parmi les plus sécurisées du jour (Over 1.5 & DC uniquement), probabilités IA entre '+probMin+'% et '+probMax+'% — combiné réaliste à cote '+coteFinalStr;
            classics.push({label:labelFou,type:typeFou,selections:selectionsStr,matchs:matchsStr,cote_totale:coteFinalStr,conseil:conseil});
            return classics;
          }
          function formatH2H(fixtures, homeId, awayId) {
            return fixtures.slice(0,5).map(function(f) {
              var gfH=f.goals.home||0, gfA=f.goals.away||0;
              var isH = f.teams.home.id===homeId;
              var w;
              if(gfH>gfA) w=isH?'1':'2';
              else if(gfH<gfA) w=isH?'2':'1';
              else w='N';
              return {d:(f.fixture.date||'').split('T')[0],home:f.teams.home.name,away:f.teams.away.name,s:gfH+'-'+gfA,w:w};
            });
          }
          function toParisHeure(utcDate) {
            if (!utcDate) return '';
            var d = new Date(utcDate);
            if (isNaN(d.getTime())) return '';
            var year = d.getUTCFullYear();
            function lastSundayOf(month) {
              var last = new Date(Date.UTC(year, month+1, 0));
              last.setUTCDate(last.getUTCDate() - last.getUTCDay());
              return last;
            }
            var startCEST = lastSundayOf(2);
            var endCEST   = lastSundayOf(9);
            var offset = (d >= startCEST && d < endCEST) ? 2 : 1;
            var parisMs = d.getTime() + offset * 3600 * 1000;
            var paris = new Date(parisMs);
            var hh = String(paris.getUTCHours()).padStart(2,'0');
            var mm = String(paris.getUTCMinutes()).padStart(2,'0');
            return hh+':'+mm;
          }
          async function main() {
            console.log('=== IASHARK', TODAY, '===');
            var fixtures = await getFixtures();
            console.log('Fixtures trouves:', fixtures.length);
            if (!fixtures.length) {
              fs.writeFileSync('data.json', JSON.stringify({matchs:[],combis:[]},null,2));
              generateWorldCupPages();
              generateSitemaps([]);
              return;
            }

            // ── CACHE xG CONCÉDÉ — 1 appel par équipe, réutilisé tout le run ──
            var xgConcededCache = {};
            var allTeamIds = [];
            fixtures.forEach(function(fix){
              if(fix.teams.home.id&&allTeamIds.indexOf(fix.teams.home.id)===-1) allTeamIds.push(fix.teams.home.id);
              if(fix.teams.away.id&&allTeamIds.indexOf(fix.teams.away.id)===-1) allTeamIds.push(fix.teams.away.id);
            });
            console.log('Pré-chargement xG cache pour', allTeamIds.length, 'équipes...');
            for(var ti=0;ti<allTeamIds.length;ti++){
              try{
                var tid=allTeamIds[ti];
                var lgId=fixtures.find(function(f){return f.teams.home.id===tid||f.teams.away.id===tid;});
                lgId=lgId?lgId.league.id:null;
                if(!lgId){xgConcededCache[tid]=null;continue;}
                var rs=await get('https://v3.football.api-sports.io/teams/statistics?team='+tid+'&season='+SEASON+'&league='+lgId,APS);
                var played=rs&&rs.response&&rs.response.fixtures&&rs.response.fixtures.played&&rs.response.fixtures.played.total||null;
                var conceded=rs&&rs.response&&rs.response.goals&&rs.response.goals.against&&rs.response.goals.against.total&&rs.response.goals.against.total.total||null;
                xgConcededCache[tid]=(played&&conceded&&played>0)?(conceded/played):null;
                await sleep(80);
              }catch(e){xgConcededCache[allTeamIds[ti]]=null;}
            }
            console.log('Cache xG prêt. Valeurs nulles:', Object.values(xgConcededCache).filter(function(v){return v===null;}).length+'/'+allTeamIds.length);

            // ── CLUBELO — 1 appel CSV pour toutes les équipes ───────
            var eloData = await loadClubElo();

            // ── DROPPING ODDS — charger cotes Pinnacle sauvegardées hier ──
            // On compare cotes actuelles vs cotes du run précédent sauvegardées dans data.json
            var prevPinnacleOdds = {};
            try {
              if(fs.existsSync('data.json')){
                var prevData=JSON.parse(fs.readFileSync('data.json','utf8'));
                (prevData.matchs||[]).forEach(function(m){
                  if(m.pinnacle_snapshot){
                    var key=m.home.n+'|'+m.away.n;
                    prevPinnacleOdds[key]=m.pinnacle_snapshot;
                  }
                });
                console.log('Dropping odds: '+Object.keys(prevPinnacleOdds).length+' snapshots chargés');
              }
            } catch(e){ console.log('Dropping odds: pas de données précédentes'); }

            var matchsData = [];
            var forCombis  = [];
            var standingsCache = {};
            for (var fi=0; fi<fixtures.length; fi++) {
              var fix  = fixtures[fi];
              var f    = fix.fixture;
              var lg   = fix.league;
              var home = fix.teams.home;
              var away = fix.teams.away;
              console.log('\n-> '+home.name+' vs '+away.name+' ('+lg.name+')');
              if (!standingsCache[lg.id]) {
                standingsCache[lg.id] = await getFullStanding(lg.id);
                await sleep(250);
              }
              var standings = standingsCache[lg.id];
              var entryH = standings.find(function(s){return s.team.id===home.id;});
              var entryA = standings.find(function(s){return s.team.id===away.id;});
              var rkH = entryH?entryH.rank:null;
              var rkA = entryA?entryA.rank:null;
              var batch1 = await Promise.all([
                getTeamStats(home.id, lg.id),
                getTeamStats(away.id, lg.id),
                getLast10(home.id),
                getLast10(away.id),
              ]);
              await sleep(400);
              var batch2 = await Promise.all([
                getOdds(f.id),
                getInjuries(f.id),
                getH2H(home.id, away.id),
                getWeather(f.venue&&f.venue.city?f.venue.city:''),
                getNews(home.name),
                getNews(away.name),
                getPredictions(f.id),
                getLineups(f.id),
                getRefereeStats(f.referee||null),
                getTopScorers(home.id, lg.id),
                getTopScorers(away.id, lg.id),
                getPinnacleOdds(home.name, away.name, lgKey(lg.id)),
              ]);
              await sleep(400);
              var sH=batch1[0], sA=batch1[1];
              var raw10H=batch1[2], raw10A=batch1[3];
              var oddsRaw=batch2[0], injRaw=batch2[1], h2hRaw=batch2[2];
              var wx=batch2[3], nH=batch2[4], nA=batch2[5];
              var predictions=batch2[6]||null, lineups=batch2[7]||null;
              var refStats=batch2[8]||null;
              var topScorersH=batch2[9]||[], topScorersA=batch2[10]||[];
              var pinnacleOdds=batch2[11]||null;
              // Events des 20 derniers matchs de chaque equipe
              var last20IdsH = (raw10H||[]).slice(0,20).map(function(fx){return fx.fixture.id;});
              var last20IdsA = (raw10A||[]).slice(0,20).map(function(fx){return fx.fixture.id;});
              var eventsH_raw = await Promise.all(last20IdsH.map(function(id){return getFixtureEvents(id);}));
              await sleep(300);
              var eventsA_raw = await Promise.all(last20IdsA.map(function(id){return getFixtureEvents(id);}));
              await sleep(300);
              function calcEventsPattern(eventsArr, teamId) {
                var allEvts=[].concat.apply([],eventsArr);
                var teamEvts=allEvts.filter(function(e){return e.team&&e.team.id===teamId;});
                var allGoals=teamEvts.filter(function(e){return e.type==='Goal'&&e.detail!=='Missed Penalty';});
                var games=Math.max(eventsArr.length,1);
                function goalsIn(min1,min2){return allGoals.filter(function(e){var m=e.time&&e.time.elapsed||0;return m>=min1&&m<min2;}).length;}
                var allCorners=[].concat.apply([],eventsArr).filter(function(e){return e.detail==='Corner'&&e.team&&e.team.id===teamId;});
                var redCards=teamEvts.filter(function(e){return e.type==='Card'&&e.detail==='Red Card';}).length;
                var yellowCards=teamEvts.filter(function(e){return e.type==='Card'&&e.detail==='Yellow Card';}).length;
                // Slots en moyenne par match (1 décimale)
                function avg(n){return (n/games).toFixed(2);}
                return {
                  goals_total: allGoals.length,
                  goals_avg: avg(allGoals.length),
                  slots: [
                    {t:'0-15', n:goalsIn(0,15), avg:avg(goalsIn(0,15))},
                    {t:'15-30',n:goalsIn(15,30),avg:avg(goalsIn(15,30))},
                    {t:'30-45',n:goalsIn(30,45),avg:avg(goalsIn(30,45))},
                    {t:'45-60',n:goalsIn(45,60),avg:avg(goalsIn(45,60))},
                    {t:'60-75',n:goalsIn(60,75),avg:avg(goalsIn(60,75))},
                    {t:'75-90',n:goalsIn(75,91),avg:avg(goalsIn(75,91))}
                  ],
                  corners_per_game: (allCorners.length/games).toFixed(1),
                  red_cards: redCards,
                  red_per_game: (redCards/games).toFixed(2),
                  yellow_per_game: (yellowCards/games).toFixed(1),
                  goals_after70: allGoals.filter(function(e){return (e.time&&e.time.elapsed)>=70;}).length,
                  goals_before30: allGoals.filter(function(e){return (e.time&&e.time.elapsed)<=30;}).length,
                  games: games
                };
              }
              var evPatH = calcEventsPattern(eventsH_raw, home.id);
              var evPatA = calcEventsPattern(eventsA_raw, away.id);
              var last10H = formatLast10(raw10H, home.id);
              var last10A = formatLast10(raw10A, away.id);
              // xG pondéré sur 10 derniers matchs
              var last10IdsH_xg = raw10H.slice(0,10).map(function(fx){return fx.fixture.id;});
              var last10IdsA_xg = raw10A.slice(0,10).map(function(fx){return fx.fixture.id;});
              var xgH = await getWeightedXGStats(home.id, last10IdsH_xg, raw10H, xgConcededCache);
              var xgA = await getWeightedXGStats(away.id, last10IdsA_xg, raw10A, xgConcededCache);
              await sleep(300);
              var odds    = parseOdds(oddsRaw);
              var critH   = calcCriteres(sH, true,  rkH);
              var critA   = calcCriteres(sA, false, rkA);
              var fatigueH = calcFatigue(last10H, home.name);
              var fatigueA = calcFatigue(last10A, away.name);
              var tendances = calcTendances(last10H, last10A, home.id, away.id);

              // ── MOTIVATION / ENJEU ────────────────────────────────
              var totalTeams = standings.length||20;
              var matchsPlayedH = entryH?entryH.all.played:20;
              var matchsLeft = totalTeams*2 - Math.max(matchsPlayedH, 1); // approx matchs restants
              var motivH = calcMotivation(rkH, totalTeams, entryH?entryH.points:0, standings[0]?standings[0].points:0, matchsLeft, true, lg.name, home.name, away.name);
              var motivA = calcMotivation(rkA, totalTeams, entryA?entryA.points:0, standings[0]?standings[0].points:0, matchsLeft, false, lg.name, home.name, away.name);

              // ── ELO ───────────────────────────────────────────────
              var eloH = getElo(eloData, home.name);
              var eloA = getElo(eloData, away.name);
              var eloStats = eloWinProb(eloH, eloA, (sH&&sH.fixtures&&sH.fixtures.wins&&sH.fixtures.wins.home)||0, mdHdom);
              if(eloH&&eloA) console.log('ELO: '+home.name+' '+Math.round(eloH)+' vs '+away.name+' '+Math.round(eloA));

              // ── DROPPING ODDS ────────────────────────────────────
              var droppingOdds = null;
              var matchKey = home.name+'|'+away.name;
              if(prevPinnacleOdds[matchKey]&&pinnacleOdds){
                var prev=prevPinnacleOdds[matchKey];
                var drops=[];
                if(prev.c1&&pinnacleOdds.c1){
                  var d1=Math.round(((prev.c1-pinnacleOdds.c1)/prev.c1)*100);
                  if(Math.abs(d1)>=5) drops.push({team:home.name, pct:d1, dir:d1>0?'baisse':'hausse', coteOuv:prev.c1, coteCurr:pinnacleOdds.c1});
                }
                if(prev.c2&&pinnacleOdds.c2){
                  var d2=Math.round(((prev.c2-pinnacleOdds.c2)/prev.c2)*100);
                  if(Math.abs(d2)>=5) drops.push({team:away.name, pct:d2, dir:d2>0?'baisse':'hausse', coteOuv:prev.c2, coteCurr:pinnacleOdds.c2});
                }
                if(drops.length) droppingOdds=drops;
              }

              // ── CALCUL POISSON ────────────────────────────────────
              var mdHdom_p=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.home)||10;
              var meAext_p=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.away)||10;
              var bmHdom_p=(sH&&sH.goals&&sH.goals.for&&sH.goals.for.total&&sH.goals.for.total.home)||0;
              var beHdom_p=(sH&&sH.goals&&sH.goals.against&&sH.goals.against.total&&sH.goals.against.total.home)||0;
              var bmAext_p=(sA&&sA.goals&&sA.goals.for&&sA.goals.for.total&&sA.goals.for.total.away)||0;
              var beAext_p=(sA&&sA.goals&&sA.goals.against&&sA.goals.against.total&&sA.goals.against.total.away)||0;
              var lambdas = calcLambdas(bmHdom_p, beHdom_p, mdHdom_p, bmAext_p, beAext_p, meAext_p);
              // Ajustement xG si disponible
              if(xgH.xg_avg&&xgA.xg_avg){
                var xgTotal=parseFloat(xgH.xg_avg)+parseFloat(xgA.xg_avg);
                // Blend 60% Poisson + 40% xG récent
                lambdas.lambdaH = parseFloat((lambdas.lambdaH*0.6 + parseFloat(xgH.xg_avg)*0.4).toFixed(3));
                lambdas.lambdaA = parseFloat((lambdas.lambdaA*0.6 + parseFloat(xgA.xg_avg)*0.4).toFixed(3));
              }
              var poissonProbs = calcPoissonProbs(lambdas.lambdaH, lambdas.lambdaA);

              // ── PROBAS PINNACLE via Shin ──────────────────────────
              var shinProbs = null;
              if(pinnacleOdds&&pinnacleOdds.c1&&pinnacleOdds.cn&&pinnacleOdds.c2){
                var pinnOdds=[pinnacleOdds.c1, pinnacleOdds.cn, pinnacleOdds.c2];
                var raw=shinProbabilities(pinnOdds);
                if(raw) shinProbs={p1:Math.round(raw[0]*100),pN:Math.round(raw[1]*100),p2:Math.round(raw[2]*100)};
              }

              // ── EDGE REELS calculés en Node.js ───────────────────
              // Utilise Poisson comme prob IA, Pinnacle/Shin ou bookmaker normal comme prob implicite
              function calcEdge(probIA, cote) {
                if(!probIA||!cote||cote==='--') return null;
                var probImpl = 1/parseFloat(cote);
                var edge = probIA/100 - probImpl;
                return edge>0 ? Math.round(edge*100) : null; // edge en %
              }
              var edgeOver25 = calcEdge(poissonProbs.over25, odds.co25);
              var edgeUnder25 = calcEdge(poissonProbs.under25, odds.cu25);
              var edgeBttsY = calcEdge(poissonProbs.bttsY, odds.btts_oui);
              var edgeBttsN = calcEdge(poissonProbs.bttsN, odds.btts_non);
              var edgeP1 = calcEdge(shinProbs?shinProbs.p1:poissonProbs.p1, odds.c1);
              var edgePN = calcEdge(shinProbs?shinProbs.pN:poissonProbs.pN, odds.cn);
              var edgeP2 = calcEdge(shinProbs?shinProbs.p2:poissonProbs.p2, odds.c2);

              // Trouver le meilleur edge
              var allEdges = [
                {market:'Victoire '+home.name, edge:edgeP1, cote:odds.c1, prob:shinProbs?shinProbs.p1:poissonProbs.p1},
                {market:'Nul', edge:edgePN, cote:odds.cn, prob:shinProbs?shinProbs.pN:poissonProbs.pN},
                {market:'Victoire '+away.name, edge:edgeP2, cote:odds.c2, prob:shinProbs?shinProbs.p2:poissonProbs.p2},
                {market:'Over 2.5', edge:edgeOver25, cote:odds.co25, prob:poissonProbs.over25},
                {market:'Under 2.5', edge:edgeUnder25, cote:odds.cu25, prob:poissonProbs.under25},
                {market:'BTTS Oui', edge:edgeBttsY, cote:odds.btts_oui, prob:poissonProbs.bttsY},
                {market:'BTTS Non', edge:edgeBttsN, cote:odds.btts_non, prob:poissonProbs.bttsN},
              ].filter(function(e){return e.edge!==null&&e.edge>=5&&e.cote&&e.cote!=='--'&&parseFloat(e.cote)<=3.0;});
              allEdges.sort(function(a,b){return b.edge-a.edge;});
              var bestEdge = allEdges[0]||null;

              // Kelly fractionnel 1/4 basé sur prob Poisson
              var nodeKelly = null;
              if(bestEdge){
                nodeKelly = fractionalKelly(bestEdge.prob/100, parseFloat(bestEdge.cote), 0.25);
              }

              var injuries = (injRaw||[]).map(function(inj){
                return {
                  name:inj.name, team:inj.team===home.id?'home':'away',
                  reason:inj.reason||'Blessure',
                  status:(inj.status||'out').toLowerCase().includes('suspend')?'suspended':(inj.status||'').toLowerCase().includes('doubt')?'doubt':'out',
                  impact:'medium'
                };
              });

              // ── MATCHUP TACTIQUE ──────────────────────────────────
              var matchup = calcMatchup(xgH, xgA, sH, sA, last10H, last10A);

              // ── ABSENCES CLÉS ─────────────────────────────────────
              var keyAbsenceAlerts = calcKeyAbsences(
                injuries, topScorersH, topScorersA,
                'home', 'away',
                (sH&&sH.goals&&sH.goals.for&&sH.goals.for.home)||0, mdHdom,
                (sA&&sA.goals&&sA.goals.for&&sA.goals.for.away)||0, meAext
              );

              // ── GARDIEN ABSENT ────────────────────────────────────
              var gkAlerts = calcGoalkeeperAlert(injuries, lineups, home.id, away.id, home.name, away.name);
              var allAbsenceAlerts = keyAbsenceAlerts.concat(gkAlerts||[]);

              // ── RISQUE DISCIPLINAIRE ──────────────────────────────
              var disciplineRisk = calcDisciplineRisk(refStats, xgH, xgA, home.name, away.name);
              var h2hFormatted = formatH2H(h2hRaw, home.id, away.id);
              var totalH=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.total)||30;
              var totalA=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.total)||30;
              var mdH=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.home)||Math.round(totalH/2);
              var meA=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.away)||Math.round(totalA/2);
              var d10Hstr = last10H.slice(0,5).map(function(m){return m.result+' '+m.score+' vs '+m.match+' ('+m.lieu+')';}).join(' | ')||'N/A';
              var d10Astr = last10A.slice(0,5).map(function(m){return m.result+' '+m.score+' vs '+m.match+' ('+m.lieu+')';}).join(' | ')||'N/A';
              // 20 derniers matchs format compact
              var d20Hstr = last10H.slice(0,20).map(function(m){return m.result+'('+m.score+')';}).join(' ')||'N/A';
              var d20Astr = last10A.slice(0,20).map(function(m){return m.result+'('+m.score+')';}).join(' ')||'N/A';
              // Bilan DOM/EXT sur 20 derniers
              var domH20 = last10H.slice(0,20).filter(function(m){return m.home===true;});
              var extA20 = last10A.slice(0,20).filter(function(m){return m.home===false;});
              var domH20w = domH20.filter(function(m){return m.result==='W';}).length;
              var domH20d = domH20.filter(function(m){return m.result==='D';}).length;
