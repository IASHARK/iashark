          async function translateGuideContent(frText, targetLang) {
            const langName = GUIDE_LANG_NAMES[targetLang] || targetLang;
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
              method:'POST',
              headers:{'Content-Type':'application/json','x-api-key':process.env.ANTHROPIC_KEY,'anthropic-version':'2023-06-01'},
              body: JSON.stringify({
                model:'claude-haiku-4-5-20251001',
                max_tokens:4000,
                messages:[{role:'user',content:'Translate this HTML content to '+langName+'. Keep ALL HTML tags exactly as-is. Only translate the visible text. Keep SEO keywords natural in the target language. Return only the translated HTML, nothing else:\n\n'+frText}]
              })
            });
            const data = await resp.json();
            return data.content&&data.content[0]?data.content[0].text:frText;
          }

          async function generateTranslatedGuides() {
            console.log('\n=== TRADUCTION GUIDES EVERGREEN ===');
            const fs2 = require('fs');
            for (const guide of GUIDES_CONFIG) {
              const srcPath = 'blog/guides/'+guide.slug+'.html';
              if (!fs2.existsSync(srcPath)) {
                console.log('  Guide introuvable: '+srcPath+' — skip');
                continue;
              }
              const frHTML = fs2.readFileSync(srcPath, 'utf8');
              const bodyMatch = frHTML.match(/<body[^>]*>([\s\S]*)<\/body>/);
              if (!bodyMatch) continue;
              const bodyContent = bodyMatch[1];

              for (const lg of GUIDE_LANGS) {
                const outDir = lg+'/blog/guides';
                if (!fs2.existsSync(outDir)) fs2.mkdirSync(outDir, {recursive:true});
                const outPath = outDir+'/'+guide.slug+'.html';
                if (fs2.existsSync(outPath)) { console.log('  '+lg+'/'+guide.slug+' déjà existant — skip'); continue; }
                try {
                  const translatedBody = await translateGuideContent(bodyContent, lg);
                  const isRTL = GUIDE_RTL.includes(lg);
                  const translatedHTML = frHTML
                    .replace('<html lang="fr">', '<html lang="'+lg+'"'+(isRTL?' dir="rtl"':'')+'>') 
                    .replace(/<body[^>]*>[\s\S]*<\/body>/, '<body>'+translatedBody+'<\/body>')
                    .replace('<link rel="canonical" href="https://iashark.com/blog/guides/'+guide.slug+'.html">', 
                             '<link rel="canonical" href="https://iashark.com/blog/guides/'+guide.slug+'.html">\n<link rel="alternate" hreflang="'+lg+'" href="https://iashark.com/'+lg+'/blog/guides/'+guide.slug+'.html">\n<link rel="alternate" hreflang="fr" href="https://iashark.com/blog/guides/'+guide.slug+'.html">');
                  fs2.writeFileSync(outPath, translatedHTML);
                  console.log('  ✓ '+lg+'/blog/guides/'+guide.slug+'.html');
                  await new Promise(r=>setTimeout(r,800));
                } catch(e) {
                  console.log('  ✗ Erreur '+lg+' '+guide.slug+': '+e.message);
                }
              }
              console.log('  Guide '+guide.slug+' traduit en '+GUIDE_LANGS.length+' langues');
            }
            console.log('=== GUIDES TRADUITS ===');
          }

