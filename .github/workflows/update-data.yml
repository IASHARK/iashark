              +'  → Under 2.5: si les deux defenses solides (<1 but encaisse/match) ET faibles attaques\n'
              +'  → Over 2.5: si les deux attaques prolifiques (>1.5 but/match) ET defenses poreuses\n'
              +'  → BTTS: si les DEUX equipes marquent dans >55% de leurs matchs respectifs\n'
              +'  → Double chance: si une equipe est favorite mais cote 1 trop basse (faible edge)\n'
              +'  → Combine: uniquement si les deux paris sont independants ET chacun avec edge positif\n\n'
              +'ETAPE 3 — Rejette si:\n'
              +'  → Les stats ne supportent pas le pari (ne force rien)\n'
              +'  → La cote implicite est deja proche de ta probabilite estimee (edge < 3%)\n'
              +'  → Blessures majeures non encore pricees par le bookmaker dans le bon sens\n\n'
              +'ETAPE 4 — Quantifie le risque:\n'
              +'  → FAIBLE: prob. estimee > 65%, stats convergentes, faible variance\n'
              +'  → MODERE: prob. estimee 50-65%, quelques facteurs incertains\n'
              +'  → ELEVE: prob. < 50% mais edge important (value sur cote haute), ou facteurs volatils\n\n'

              +'=== FORMAT REPONSE OBLIGATOIRE — JSON STRICT ===\n'
              +'IMPORTANT: Les exemples ci-dessous sont des STRUCTURES, pas des suggestions de paris. Choisis le VRAI meilleur pari selon les donnees ci-dessus.\n\n'
              +'{\n'
              +'  "confiance": 7.4,\n'
              +'  "pari_rec": "[LE MEILLEUR PARI SELON LES STATS — peut etre 1, N, 2, 1X, X2, Over, Under, BTTS, Combine...]",\n'
              +'  "marche": "[RESULTAT | DOUBLE_CHANCE | TOTAL_BUTS | BTTS | COMBINE]",\n'
              +'  "risque": "[FAIBLE | MODERE | ELEVE]",\n'
              +'  "vbet": "[OUI si edge reel > +4% sinon NON]",\n'
              +'  "edge": "[+X% ou -X% calcule depuis prob. IA vs prob. implicite]",\n'
              +'  "argument": "1. [Argument chiffre specifique a CE match et CE pari]. 2. [Deuxieme argument avec stat concrete]. 3. [Edge exact: cote X implique Y% mais tu estimes Z%].",\n'
              +'  "analyse_card": "[2-3 phrases fluides qui se lisent comme un article: commencer par le contexte, inclure les stats cles, conclure avec le pari et pourquoi il bat le bookmaker. Pas de liste, vraie phrase.]",\n'
              +'  "conseil": "[Analyse complete 3-4 phrases. Stats exactes. Pourquoi ce pari gagne. Risques identifies.]",\n'
              +'  "contexte": "[2-3 phrases: importance du match, dynamique, serie en cours, pression sportive.]",\n'
