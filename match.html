<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analyse Match — IASHARK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#060a10;--card:#0c1520;--card2:#101d2a;--cyan:#22d3ee;--cyan2:#06b6d4;--amber:#f59e0b;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--muted:#4a6580;--muted2:#2a3f55;--border:rgba(255,255,255,0.05);--bc:rgba(34,211,238,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;}
.hdr{position:sticky;top:0;z-index:99;background:rgba(6,10,16,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:50px;display:flex;align-items:center;padding:0 16px;gap:12px;}
.hdr-back{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);border:1px solid var(--border);padding:5px 10px;border-radius:6px;background:none;cursor:pointer;transition:.15s;}
.hdr-back:hover{color:var(--cyan);border-color:var(--bc);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;text-decoration:none;color:var(--text);}
.logo span{color:var(--cyan);}
.hdr-pill{margin-left:auto;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--bc);padding:3px 8px;border-radius:20px;background:rgba(34,211,238,0.05);}
.wrap{max-width:660px;margin:16px auto 0;padding:0 14px;}
.card{border:1px solid var(--border);border-radius:18px;overflow:hidden;animation:up .4s ease forwards;}
.card.hot{border-color:rgba(245,158,11,0.2);}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.s{padding:0 18px 13px;}
.s.pt{padding-top:14px;}
.sep{height:1px;background:var(--border);margin:0 18px 13px;}
.stitle{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}
/* TOPBAR */
.topbar{background:linear-gradient(135deg,#090f1c,#0c1828);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.lg-row{display:flex;align-items:center;gap:7px;}
.lg-name{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;}
.badges{display:flex;gap:5px;align-items:center;}
.badge{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1.5px;padding:3px 9px;border-radius:20px;}
.badge.hot{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:var(--amber);}
.badge.val{background:rgba(34,211,238,0.06);border:1px solid var(--bc);color:var(--cyan);}
.badge.time{font-size:10px;letter-spacing:0;color:var(--text);padding:0;}
/* TEAMS */
.teams{padding:22px 18px 16px;background:linear-gradient(180deg,#090f1c,var(--card));}
.teams-row{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;gap:8px;margin-bottom:14px;}
.team{text-align:center;}
.team-logo{width:48px;height:48px;border-radius:50%;object-fit:contain;background:rgba(255,255,255,0.03);margin:0 auto 7px;display:block;}
.team-logo-ph{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);margin:0 auto 7px;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4.5vw,26px);letter-spacing:1px;line-height:1;margin-bottom:3px;}
.team-sub{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.team-form{display:flex;justify-content:center;gap:2px;margin-top:5px;}
.fd{width:14px;height:14px;border-radius:2px;font-size:6px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;}
.fw{background:rgba(16,185,129,0.18);color:var(--green);}
.fn{background:rgba(245,158,11,0.1);color:var(--amber);}
.fl{background:rgba(239,68,68,0.13);color:var(--red);}
.team.away .team-name{color:rgba(226,232,240,0.65);}
.vs-col{text-align:center;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted2);display:block;}
.vs-hr{font-family:'Space Mono',monospace;font-size:10px;color:var(--cyan);margin-top:2px;}
.pbar{display:flex;height:3px;border-radius:3px;overflow:hidden;margin-bottom:7px;}
.pb1{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.pbn{background:rgba(255,255,255,0.07);}
.pb2{background:rgba(226,232,240,0.15);}
.plabels{display:flex;justify-content:space-between;}
.pi{text-align:center;}
.pi-pct{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.pi-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:1px;}
.meteo{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
.meteo-item{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);}
/* CONTEXTE */
.ctx{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ctx-c{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.ctx-l{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:2px;margin-bottom:5px;}
.ctx-t{font-size:11px;color:#94a3b8;line-height:1.6;}
.ctx-t strong{color:var(--text);}
/* COMP */
.comp{display:grid;grid-template-columns:1fr 1fr;background:var(--border);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.comp-c{background:var(--card2);padding:12px;}
.comp-c:first-child{border-right:1px solid var(--border);}
.comp-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.crit{display:flex;flex-direction:column;gap:8px;}
.cr{display:flex;flex-direction:column;gap:3px;}
.cr-top{display:flex;justify-content:space-between;}
.cr-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:1px;}
.cr-val{font-family:'Space Mono',monospace;font-size:8px;}
.cr-bar{height:2px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.cr-fill{height:100%;border-radius:2px;transition:width 1.2s ease;}
.cr-fill.hi{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.cr-fill.mid{background:linear-gradient(90deg,#d97706,var(--amber));}
.cr-fill.lo{background:linear-gradient(90deg,#dc2626,var(--red));}
/* PARIS RECOMMANDE — bloc principal fusionné */
.pari-main{background:linear-gradient(135deg,rgba(34,211,238,0.06),rgba(6,182,212,0.01));border:1px solid var(--bc);border-radius:13px;padding:16px;position:relative;overflow:hidden;}
.pari-main::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);}
.pm-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.pm-left{}
.pm-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--cyan);letter-spacing:2px;margin-bottom:3px;}
.pm-bet{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1;margin-bottom:3px;}
.pm-hint{font-size:11px;color:var(--muted);line-height:1.5;max-width:240px;}
.pm-right{text-align:right;flex-shrink:0;}
.pm-cote{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--cyan);line-height:1;}
.pm-bk{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);}
/* Score prédit intégré dans le bloc pari */
.pm-score-band{background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 12px;margin:10px 0;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.pm-score-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:2px;}
.pm-score{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:var(--text);line-height:1;}
.pm-score-sub{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);margin-top:2px;}
.pm-ci-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);text-align:right;margin-bottom:2px;}
.pm-ci{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cyan);text-align:right;}
/* Footer pari */
.pm-foot{display:flex;align-items:center;gap:7px;padding-top:9px;border-top:1px solid var(--border);flex-wrap:wrap;}
.pm-tag{font-family:'Space Mono',monospace;font-size:8px;padding:3px 8px;border-radius:4px;}
.pm-tag.edge{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.18);color:var(--green);}
.pm-tag.kelly{background:rgba(34,211,238,0.06);border:1px solid var(--bc);color:var(--cyan);}
.pm-tag.mise{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);}
.pm-warn{margin-top:7px;font-family:'Space Mono',monospace;font-size:7px;color:var(--amber);}
/* FACTEUR */
.facteur{background:rgba(245,158,11,0.03);border:1px solid rgba(245,158,11,0.12);border-radius:10px;padding:11px 14px;display:flex;gap:10px;align-items:flex-start;}
.fact-icon{font-size:18px;flex-shrink:0;}
.fact-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--amber);letter-spacing:2px;margin-bottom:3px;}
.fact-txt{font-size:12px;color:var(--text);line-height:1.5;}
/* CONFIANCE */
.conf{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:14px;}
.conf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.conf-score{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--cyan);}
.conf-score sup{font-size:18px;color:var(--muted);}
.conf-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:5px 12px;border-radius:20px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);color:var(--amber);display:inline-block;margin-bottom:3px;}
.conf-hint{font-size:10px;color:var(--muted);text-align:right;}
.conf-track{background:rgba(255,255,255,0.03);border-radius:5px;height:5px;overflow:hidden;}
.conf-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--cyan2),var(--amber),#f97316);}
.conf-scale{display:flex;justify-content:space-between;margin-top:5px;}
.conf-scale span{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted2);letter-spacing:1px;}
/* CONSEIL */
.conseil{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
/* Conseil orange */
.conseil-orange{display:flex;gap:12px;align-items:flex-start;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.25);border-radius:11px;padding:13px 14px;}
.conseil-orange-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.conseil-orange-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--amber);letter-spacing:2px;margin-bottom:5px;}
.conseil-orange-txt{font-size:13px;color:var(--text);line-height:1.7;font-style:italic;}
/* Jauge inline dans paris */
.conf-inline{margin:10px 0;padding:10px 0 4px;}
.conf-inline .conf-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.conf-inline .conf-score{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--cyan);line-height:1;}
.conf-inline .conf-score sup{font-size:14px;color:var(--muted);}
/* Résumé percutant */
.resume-soir{background:linear-gradient(135deg,rgba(34,211,238,0.05),rgba(15,23,42,0));border:1px solid rgba(34,211,238,0.12);border-radius:12px;padding:14px 16px;margin-top:4px;}
.resume-verdict{font-size:14px;color:var(--cyan);font-weight:600;line-height:1.6;margin-bottom:8px;}
.resume-ctx{font-size:12px;color:#64748b;line-height:1.7;border-top:1px solid rgba(255,255,255,0.05);padding-top:8px;margin-top:4px;}
/* Verdict Shark final */
.verdict-shark-block{background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.18);border-radius:12px;padding:16px;}
.verdict-shark-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--amber);background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.verdict-shark-title{font-size:14px;color:var(--cyan);font-weight:600;line-height:1.6;margin-bottom:10px;}
.verdict-shark-body{font-size:12px;color:#64748b;line-height:1.75;}
.conseil-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:5px;}
.conseil-txt{font-size:12px;color:#94a3b8;line-height:1.65;font-style:italic;}
.conseil-txt strong{color:var(--text);font-style:normal;}
/* PATTERNS */
.pat-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.pat-stat-row{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;}
.pat-stat-lbl{font-size:12px;color:var(--muted);}
.pat-stat-vals{display:flex;align-items:center;gap:8px;}
.psv{text-align:center;}
.psv-n{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.psv-n.h{color:var(--cyan);}
.psv-n.a{color:var(--text);}
.psv-n.r{color:var(--red);}
.psv-n.am{color:var(--amber);}
.psv-t{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);}
.pat-sep{font-size:12px;color:var(--muted2);}
/* Cartons par mi-temps */
.halves{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.half-card{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.half-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.half-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.half-row:last-child{border-bottom:none;}
.half-rl{font-size:11px;color:var(--muted);}
.half-vals{display:flex;gap:10px;}
.hv{font-family:'Bebas Neue',sans-serif;font-size:16px;width:24px;text-align:center;}
.hv.h{color:var(--cyan);}
.hv.a{color:var(--text);}
.hv.r{color:var(--red);}
.hv.am{color:var(--amber);}
.pat-chart-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;}
.pat-legend{display:flex;gap:14px;margin-bottom:8px;}
.pat-leg{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.pat-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
/* JAUGES */
.jauge-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.jauge-col{}
.jauge-team-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.jauge-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-radius:5px;}
.jauge-row.jauge-hot{background:rgba(34,211,238,0.04);padding:4px 6px;border-radius:6px;margin:0 -6px;}
.jauge-row.jauge-warm{background:rgba(245,158,11,0.03);padding:4px 6px;border-radius:6px;margin:0 -6px;}
.jauge-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);width:32px;flex-shrink:0;}
.jauge-track{flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;}
.jauge-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.jauge-fill.h{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.jauge-fill.a{background:linear-gradient(90deg,#3a5070,#4a6580);}
.jauge-fill.h.jauge-hot{background:var(--cyan);}
.jauge-val{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text);line-height:1;width:30px;text-align:right;flex-shrink:0;}
.jauge-unit{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);}
.jauge-tag{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:1px;padding:2px 5px;border-radius:3px;flex-shrink:0;background:rgba(34,211,238,0.1);color:var(--cyan);border:1px solid rgba(34,211,238,0.2);}
.jauge-tag.warm{background:rgba(245,158,11,0.08);color:var(--amber);border-color:rgba(245,158,11,0.2);}
/* Commentaire auto */
.pat-comment{background:rgba(34,211,238,0.04);border:1px solid rgba(34,211,238,0.1);border-radius:9px;padding:11px 13px;margin-top:12px;font-size:12px;color:#94a3b8;line-height:1.7;}
.pat-comment strong{color:var(--text);}
@media(max-width:480px){.jauge-wrap{grid-template-columns:1fr;}}
.chart-wrap{position:relative;width:100%;height:150px;}
/* SCENARIO */
.scen-list{display:flex;flex-direction:column;}
.scen-phase{display:flex;align-items:stretch;}
.scen-l{display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;}
.scen-badge{font-family:'Space Mono',monospace;font-size:7px;color:var(--cyan);background:rgba(34,211,238,0.06);border:1px solid var(--bc);padding:3px 4px;border-radius:4px;text-align:center;line-height:1.3;white-space:nowrap;}
.scen-line{flex:1;width:1px;background:linear-gradient(180deg,rgba(34,211,238,0.18),rgba(34,211,238,0.02));margin:3px auto 0;}
.scen-body{flex:1;padding:0 0 12px 10px;}
.scen-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.scen-bar{flex:1;height:2px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.scen-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.scen-pct{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);white-space:nowrap;}
.scen-txt{font-size:11px;color:#94a3b8;line-height:1.6;}
.scen-resume{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-top:9px;}
.scen-resume-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.scen-resume-txt{font-size:12px;color:#94a3b8;line-height:1.7;}
/* JOUEURS */
.team-section{margin-bottom:14px;}
.team-sec-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;padding:5px 10px;border-radius:5px;display:inline-block;margin-bottom:8px;}
.team-sec-lbl.h{color:var(--cyan);background:rgba(34,211,238,0.06);border:1px solid var(--bc);}
.team-sec-lbl.a{color:var(--text);background:rgba(255,255,255,0.03);border:1px solid var(--border);}
.players{display:flex;flex-direction:column;gap:7px;}
.pcard{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.pcard.absent-card{border-color:rgba(239,68,68,0.15);}
.p-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,0.08);}
.p-photo-ph{width:44px;height:44px;border-radius:50%;background:var(--card);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}
.pmain{flex:1;min-width:0;}
.pname-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.pname{font-size:14px;font-weight:500;color:var(--text);}

.pcontext{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:8px;}
.pstats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.pstat{background:var(--card);border-radius:6px;padding:7px 5px;text-align:center;}

.pstat.goals .pstat-n{color:var(--cyan);}

/* FIFA CARD */
.fut-wrap{display:flex;gap:14px;align-items:flex-start;}
.fut-card{width:128px;flex-shrink:0;border-radius:13px;padding:11px 9px 13px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at top,#3d2a00 0%,#1e1400 40%,#150e00 100%);border:1px solid rgba(245,158,11,0.4);}
.fut-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,0.14) 0%,transparent 55%,rgba(245,158,11,0.06) 100%);pointer-events:none;}
.fut-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.6),transparent);}
.fut-rating{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;z-index:1;}

.fut-photo{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid rgba(245,158,11,0.45);margin-bottom:5px;background:var(--card);z-index:1;}
.fut-photo-ph{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#1a2a3e,#0d1520);border:2px solid rgba(245,158,11,0.45);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--amber);margin-bottom:5px;z-index:1;}
.fut-name{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--amber);text-align:center;line-height:1.1;margin-bottom:7px;z-index:1;max-width:108px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.fut-st{text-align:center;}
.fut-st-v{font-family:'Bebas Neue',sans-serif;font-size:14px;color:rgba(245,158,11,0.9);line-height:1;}
.fut-st-l{font-family:'Space Mono',monospace;font-size:5px;color:rgba(245,158,11,0.45);}
.fut-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}

.fut-alert{background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.12);border-radius:7px;padding:7px 9px;font-family:'Space Mono',monospace;font-size:7px;color:rgba(245,158,11,0.6);letter-spacing:.5px;line-height:1.6;}

.pw-badge{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:1px;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.pw-badge.c1{background:rgba(245,158,11,0.06);color:rgba(245,158,11,0.5);border:1px solid rgba(245,158,11,0.12);}

.pw-item{font-size:10px;color:rgba(148,163,184,0.4);display:flex;align-items:center;gap:6px;padding:1px 0;}

<body>
<header class="hdr">
  <button class="hdr-back" onclick="history.back()">← RETOUR</button>
  <a class="logo" href="/">IA<span>SHARK</span></a>
  <span class="hdr-pill">ANALYSE IA</span>
</header>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-lbl">CHARGEMENT...</div></div></div>
<nav class="nav">
  <div class="ni" onclick="location='/'"><div class="ni-icon">⚡</div><div class="ni-lbl">ANALYSES</div></div>
  <div class="ni" onclick="location='/historique.html'"><div class="ni-icon">📊</div><div class="ni-lbl">HISTORIQUE</div></div>
  <div class="ni" onclick="location='/combis.html'"><div class="ni-icon">🎰</div><div class="ni-lbl">COMBINÉS</div></div>
  <div class="ni" onclick="location='/blog/'"><div class="ni-icon">📖</div><div class="ni-lbl">GUIDES</div></div>
  <div class="ni" onclick="location='/compte.html'"><div class="ni-icon">👤</div><div class="ni-lbl">COMPTE</div></div>
</nav>
<script>
var fId=new URLSearchParams(location.search).get('id');
var isPro=true;

function forme(str){if(!str)return '';return str.split('').slice(0,5).map(function(c){var cls=c==='W'||c==='V'?'fw':c==='D'||c==='N'?'fn':'fl';var l=c==='W'?'V':c==='D'?'N':c==='L'?'D':c;return '<div class="fd '+cls+'">'+l+'</div>';}).join('');}
function lgImg(team,ini){if(!team)return '';var url=team.logo||(team.id?'https://media.api-sports.io/football/teams/'+team.id+'.png':'');if(!url)return '<div class="team-logo-ph">'+ini+'</div>';return '<img class="team-logo" src="'+url+'" onerror="this.outerHTML=\'<div class=team-logo-ph>'+ini+'</div>\'">';}
function ph(name){return name?name.slice(0,2).toUpperCase():'??';}

function buildComp(hn,an,ch,ca){
  var dh=ch&&ch.length?ch:[{label:'ATTAQUE xG',val:55},{label:'DEFENSE',val:50},{label:'FORME',val:60},{label:'POSSESSION',val:50},{label:'PRESSING',val:55}];
  var da=ca&&ca.length?ca:[{label:'ATTAQUE xG',val:60},{label:'DEFENSE',val:65},{label:'FORME',val:70},{label:'POSSESSION',val:55},{label:'PRESSING',val:60}];
  function rows(crits){return crits.map(function(c){var w=Math.min(Math.max(c.val||0,0),100);var cls=w>=65?'hi':w>=40?'mid':'lo';var col=w>=65?'var(--green)':w>=40?'var(--amber)':'var(--red)';return '<div class="cr"><div class="cr-top"><span class="cr-lbl">'+(c.label||'')+'</span><span class="cr-val" style="color:'+col+'">'+w+'</span></div><div class="cr-bar"><div class="cr-fill '+cls+'" data-w="'+w+'" style="width:0%"></div></div></div>';}).join('');}
  return '<div class="comp"><div class="comp-c"><div class="comp-lbl" style="color:var(--cyan)">'+hn.toUpperCase().slice(0,13)+'</div><div class="crit">'+rows(dh)+'</div></div><div class="comp-c"><div class="comp-lbl" style="color:var(--text)">'+an.toUpperCase().slice(0,13)+'</div><div class="crit">'+rows(da)+'</div></div></div>';
}

function buildPatterns(hn,an,evH,evA,m){
  if(!evH&&!evA&&!m) return '';
  var hn3=hn.slice(0,3).toUpperCase(), an3=an.slice(0,3).toUpperCase();
  var games=(evH&&evH.games)||20;

  // ── Grille stats moy/match ──────────────────────────────
  function statRow(lbl,nh,na,clsH,clsA){
    if(!nh&&!na) return '';
    return '<div class="pat-stat-row"><span class="pat-stat-lbl">'+lbl+'</span>'
      +'<div class="pat-stat-vals">'
      +'<div class="psv"><div class="psv-n '+(clsH||'h')+'">'+(nh||'—')+'</div><div class="psv-t">'+hn3+'</div></div>'
      +'<span class="pat-sep">/</span>'
      +'<div class="psv"><div class="psv-n '+(clsA||'a')+'">'+(na||'—')+'</div><div class="psv-t">'+an3+'</div></div>'
      +'</div></div>';
  }
  var statsHtml='<div class="pat-stats-grid">'
    +statRow('xG moyen / match', m&&m.xgH_avg, m&&m.xgA_avg)
    +statRow('Tirs totaux / match', m&&m.xgH_shots_total, m&&m.xgA_shots_total)
    +statRow('Tirs cadrés / match', m&&m.xgH_shots, m&&m.xgA_shots)
    +statRow('Fautes / match', m&&m.xgH_fouls, m&&m.xgA_fouls)
    +'</div>';

  // ── Jauges buts par tranche ─────────────────────────────
  var slotsH=evH&&evH.slots||[];
  var slotsA=evA&&evA.slots||[];
  var jaugesHtml='';
  if(slotsH.length||slotsA.length){
    // Trouver le max pour normaliser
    var allAvgs=slotsH.concat(slotsA).map(function(s){return parseFloat(s.avg)||0;});
    var maxAvg=Math.max.apply(null,allAvgs.concat([0.01]));

    function jauge(slot,col,label){
      var avg=parseFloat(slot&&slot.avg)||0;
      var pct=Math.round((avg/maxAvg)*100);
      var heat=avg>=0.4?'hot':avg>=0.25?'warm':'';
      return '<div class="jauge-row '+(heat==='hot'?'jauge-hot':heat==='warm'?'jauge-warm':'')+'">'
        +'<div class="jauge-lbl">'+slot.t+'</div>'
        +'<div class="jauge-track"><div class="jauge-fill '+col+'" style="width:'+pct+'%"></div></div>'
        +'<div class="jauge-val">'+avg.toFixed(2)+'<span class="jauge-unit">/m</span></div>'
        +(heat==='hot'?'<div class="jauge-tag">CHAUD</div>':heat==='warm'?'<div class="jauge-tag warm">ACTIF</div>':'')
        +'</div>';
    }

    var slots6=slotsH.length>=6?slotsH:[{t:'0-15',avg:'0'},{t:'15-30',avg:'0'},{t:'30-45',avg:'0'},{t:'45-60',avg:'0'},{t:'60-75',avg:'0'},{t:'75-90',avg:'0'}];
    var slots6A=slotsA.length>=6?slotsA:slots6.map(function(s){return {t:s.t,avg:'0'};});

    jaugesHtml='<div class="jauge-wrap">'
      // DOM
      +'<div class="jauge-col">'
      +'<div class="jauge-team-lbl" style="color:var(--cyan)">'+hn.slice(0,14).toUpperCase()+' — buts moy/match</div>'
      +slots6.map(function(s){return jauge(s,'h',hn);}).join('')
      +'</div>'
      // EXT
      +'<div class="jauge-col">'
      +'<div class="jauge-team-lbl">'+an.slice(0,14).toUpperCase()+' — buts moy/match</div>'
      +slots6A.map(function(s){return jauge(s,'a',an);}).join('')
      +'</div>'
      +'</div>';

    // ── Commentaire auto-généré ─────────────────────────
    function topSlot(slots){
      var best=null,bestV=0;
      (slots||[]).forEach(function(s){var v=parseFloat(s.avg)||0;if(v>bestV){bestV=v;best=s;}});
      return best;
    }
    function halfLabel(t){
      if(!t) return '';
      var min=parseInt(t.split('-')[0]);
      return min<45?'1ère mi-temps':'2ème mi-temps';
    }
    var topH=topSlot(slotsH), topA=topSlot(slotsA);
    var allSlots=slotsH.map(function(s,i){return {t:s.t,avgH:parseFloat(s.avg)||0,avgA:parseFloat((slotsA[i]||{}).avg)||0,total:(parseFloat(s.avg)||0)+(parseFloat((slotsA[i]||{}).avg)||0)};});
    allSlots.sort(function(a,b){return b.total-a.total;});
    var hotSlot=allSlots[0];

    var commentLines=[];
    if(topH) commentLines.push('<strong>'+hn+'</strong> marque surtout entre <strong>'+topH.t+'</strong> ('+parseFloat(topH.avg).toFixed(2)+' but/match) — principalement en '+halfLabel(topH.t)+'.');
    if(topA) commentLines.push('<strong>'+an+'</strong> est le plus dangereux sur la tranche <strong>'+topA.t+'</strong> ('+parseFloat(topA.avg).toFixed(2)+' but/match) — en '+halfLabel(topA.t)+'.');
    if(hotSlot) commentLines.push('La tranche la plus à risque pour les buts des deux équipes réunies : <strong>'+hotSlot.t+'</strong>.');

    jaugesHtml+='<div class="pat-comment">'+commentLines.join(' ')+'</div>';
  }

  return '<div class="s"><div class="stitle">PATTERNS — 20 MATCHS</div>'+statsHtml+jaugesHtml+'</div><div class="sep"></div>';
}

function buildScen(m){
  var sc15=m.scenario_15min||null;
  var phases=[];
  if(sc15&&sc15.length){phases=sc15;}
  else if(m.scenario){if(m.scenario.phase1)phases.push({t:"0-25'",prob:10,txt:m.scenario.phase1});if(m.scenario.phase2)phases.push({t:"25-65'",prob:16,txt:m.scenario.phase2});if(m.scenario.phase3)phases.push({t:"65-90'",prob:14,txt:m.scenario.phase3});}
  if(!phases.length)return '';
  var list=phases.map(function(p,i){var w=Math.min((p.prob||0)*4,100);var last=i===phases.length-1;return '<div class="scen-phase"><div class="scen-l"><div class="scen-badge">'+(p.t||'')+'</div>'+(!last?'<div class="scen-line"></div>':'')+'</div><div class="scen-body"><div class="scen-bar-row"><div class="scen-bar"><div class="scen-bar-fill" style="width:'+w+'%"></div></div><span class="scen-pct">'+(p.prob||0)+'%</span></div><div class="scen-txt">'+(p.txt||'')+'</div></div></div>';}).join('');
  var resumeTxt=phases.map(function(p){return p.txt||'';}).filter(Boolean).join(' ');
  var resume=resumeTxt?'<div class="scen-resume"><div class="scen-resume-lbl">RESUME DU SOIR</div><div class="scen-resume-txt">'+resumeTxt+'</div></div>':'';
  return '<div class="s"><div class="stitle">SCENARIO ATTENDU</div><div class="scen-list">'+list+'</div>'+resume+'</div><div class="sep"></div>';
}

function buildPlayers(hn,an,scH,scA){
  if((!scH||!scH.length)&&(!scA||!scA.length))return '';
  function teamBlock(lbl,cls,scorers){
    if(!scorers||!scorers.length)return '';
    var cards=scorers.map(function(p){
      var photoHtml=p.photo?'<img class="p-photo" src="'+p.photo+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"><div class="p-photo-ph" style="display:none">'+ph(p.name)+'</div>':'<div class="p-photo-ph">'+ph(p.name)+'</div>';
      var absent=p.absent?'<span class="absent-tag">ABSENT</span>':'';
      return '<div class="pcard'+(p.absent?' absent-card':'')+'">'+photoHtml+'<div class="pmain"><div class="pname-row"><span class="pname">'+p.name+'</span>'+absent+'</div><div class="pcontext">Saison en cours · '+p.games+' matchs joués</div><div class="pstats"><div class="pstat goals"><div class="pstat-n">'+(p.goals||0)+'</div><div class="pstat-l">Buts</div></div><div class="pstat assists"><div class="pstat-n">'+(p.assists||0)+'</div><div class="pstat-l">Passes D.</div></div><div class="pstat shots"><div class="pstat-n">'+(p.shots_total||0)+'</div><div class="pstat-l">Tirs totaux</div></div><div class="pstat shots-on"><div class="pstat-n">'+(p.shots_on||0)+'</div><div class="pstat-l">Tirs cadrés</div></div></div></div></div>';
    }).join('');
    return '<div class="team-section"><div class="team-sec-lbl '+cls+'">'+lbl+'</div><div class="players">'+cards+'</div></div>';
  }
  return '<div class="s"><div class="stitle">BUTEURS CLES</div>'+teamBlock(hn.toUpperCase()+' — DOMICILE','h',scH)+teamBlock(an.toUpperCase()+' — EXTERIEUR','a',scA)+'</div><div class="sep"></div>';
}

function buildFifa(jd,scH,scA){
  if(!jd||!jd.nom)return '';
  if(jd.absent)return '<div class="s"><div class="stitle">BONUS — JOUEUR DU SOIR</div><div class="skip danger"><div class="skip-icon">⛔</div><div><div class="skip-lbl">ABSENT</div><div class="skip-txt">'+jd.nom.toUpperCase()+' — Pari joueur déconseillé ce soir</div></div></div></div><div class="sep"></div>';
  var all=(scH||[]).concat(scA||[]);
  var found=all.find(function(p){return p&&p.name===jd.nom;});
  var goals=found?found.goals:'—',assists=found&&found.assists!=null?found.assists:'—',games=found?found.games:'—';
  var rating=found&&found.rating?Math.round(parseFloat(found.rating)):'—';
  var photoHtml=found&&found.photo?'<img class="fut-photo" src="'+found.photo+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"><div class="fut-photo-ph" style="display:none">'+ph(jd.nom)+'</div>':'<div class="fut-photo-ph">'+ph(jd.nom)+'</div>';
  var lastName=jd.nom.split(' ').pop().toUpperCase();
  var eq=jd.equipe==='DOM'?'DOM':'EXT';
  return '<div class="s"><div class="stitle">BONUS — JOUEUR DU SOIR</div><div class="fut-wrap">'
    +'<div class="fut-card"><div class="fut-rating">'+(rating!=='—'?rating:'★')+'</div><div class="fut-pos">'+eq+'</div>'+photoHtml+'<div class="fut-name">'+lastName+'</div><div class="fut-divider"></div><div class="fut-stats"><div class="fut-st"><div class="fut-st-v">'+goals+'</div><div class="fut-st-l">BUT</div></div><div class="fut-st"><div class="fut-st-v">'+assists+'</div><div class="fut-st-l">PD</div></div><div class="fut-st"><div class="fut-st-v">'+games+'</div><div class="fut-st-l">MJ</div></div></div></div>'
    +'<div class="fut-info"><div><div class="fut-marche-l">MARCHE</div><div class="fut-marche-v">'+(jd.marche||'Buteur dans le match')+'</div><div class="fut-raison">'+(jd.raison||'')+'</div>'+(jd.cote_estimee?'<div class="fut-cote-row"><span class="fut-cote-l">COTE EST.</span><span class="fut-cote-v">'+jd.cote_estimee+'</span></div>':'')+'</div><div class="fut-alert">Vérifier la composition avant de jouer. Ne pas miser si non titulaire.</div></div></div></div><div class="sep"></div>';
}

function render(m){
  var hn=m.home&&m.home.n||'',an=m.away&&m.away.n||'';
  var heure=(m.date||'').split(' ')[1]||'';
  var isHot=m.hot||(m.conf||0)>=8,isVal=m.val||m.vbet==='OUI';
  var confPct=Math.round(((m.conf||0)/10)*100);
  var confLvl=(m.conf||0)>=7.5?'SHARK LOCK':(m.conf||0)>=6.5?'ELEVE':'MODERE';
  var confStyle=(m.conf||0)>=7.5?'':' style="background:rgba(34,211,238,0.07);border-color:rgba(34,211,238,0.18);color:var(--cyan)"';
  var p3=m.paris_3||{};
  var bk=m.bookies&&m.bookies[0]||null;
  var meteo='';
  if(m.meteo)meteo='<div class="meteo">'+(m.meteo.temp?'<span class="meteo-item">'+m.meteo.temp+'°C</span>':'')+(m.meteo.desc?'<span class="meteo-item">'+m.meteo.desc+'</span>':'')+(m.meteo.vent?'<span class="meteo-item">'+m.meteo.vent+' km/h</span>':'')+'</div>';

  // PARIS RECOMMANDE — pari + jauge intégrée + score
  var pv=p3&&p3.valeur||null;
  var sp=m.score_predit||null;
  var pmHtml='';
  var pariRec=pv?pv.bet:(m.pari_rec||'');
  var pariCote=pv?pv.cote:(m.cote_rec||'—');
  var pariBk=pv?pv.bookie:(bk?bk.n:'');
  var pariHint=pv?pv.hint:'';
  var cMin=pariCote&&pariCote!=='—'?((parseFloat(pariCote)-0.20).toFixed(2)):'';
  if(pariRec){
    var spScore=sp?((sp.score||'?-?').replace('-','—')):'';
    var scoreBlock=sp?'<div class="pm-score-band"><div><div class="pm-score-lbl">SCORE LE PLUS PROBABLE</div><div class="pm-score">'+spScore+'</div>'+(sp.prob?'<div class="pm-score-sub">'+sp.prob+' de probabilité</div>':'')+'</div>'+(sp.cote_implicite?'<div><div class="pm-ci-lbl">COTE IMPLICITE</div><div class="pm-ci">'+sp.cote_implicite+'</div></div>':'')+'</div>':'';
    // Jauge intégrée (sans titre)
    var jaugeInline='<div class="conf-inline">'
      +'<div class="conf-top"><div><div class="conf-score">'+(m.conf||0).toFixed(1)+'<sup>/10</sup></div></div><div style="text-align:right"><div class="conf-badge"'+confStyle+'>'+confLvl+'</div></div></div>'
      +'<div class="conf-track"><div class="conf-fill" style="width:'+confPct+'%"></div></div>'
      +'<div class="conf-scale"><span>PRUDENT</span><span>CONFIANT</span><span>ELEVE</span><span>LOCK</span></div>'
      +'</div>';
    pmHtml='<div class="s"><div class="stitle">PARIS RECOMMANDE</div>'
      +'<div class="pari-main">'
      +'<div class="pm-top"><div class="pm-left"><div class="pm-lbl">SELECTION IA DU SOIR</div><div class="pm-bet">'+pariRec.toUpperCase()+'</div>'+(pariHint?'<div class="pm-hint">'+pariHint+'</div>':'')+'</div><div class="pm-right"><div class="pm-cote">'+pariCote+'</div><div class="pm-bk">'+pariBk+'</div></div></div>'
      +jaugeInline
      +(cMin?'<div class="pm-warn">Si la cote passe sous '+cMin+' — ne pas jouer</div>':'')
      +scoreBlock
      +'</div>'
      +'</div><div class="sep"></div>';
  }

  // Skip
  var skipHtml=m.passe_ton_tour?'<div class="skip danger"><div class="skip-icon">🚨</div><div><div class="skip-lbl">PASSE TON TOUR CE SOIR</div><div class="skip-txt">'+(m.passe_ton_tour_raison||'Signaux contradictoires. <strong>Ne pas jouer</strong>.')+'</div></div></div>':'<div class="skip ok"><div class="skip-icon">✅</div><div><div class="skip-lbl">FEU VERT CE SOIR</div><div class="skip-txt">Aucun signal d\'alerte. <strong>Configuration favorable.</strong></div></div></div>';

  // Pro content
  var proContent='<div class="s pt"><div class="stitle">PARIS RECOMMANDES</div>'+(pv?'<div class="pro-pari"><div class="pro-pari-l"><div class="pro-pari-lbl">VALEUR</div><div class="pro-pari-bet">'+(pv.bet||'')+'</div><div class="pro-pari-hint">'+(pv.hint||'')+'</div></div><div class="pro-pari-cote">'+(pv.cote||'—')+'</div></div>':'')+'</div>';

  // RÉSUMÉ PERCUTANT après scénario
  var resumeHtml='';
  if(m.verdict_shark||m.contexte||m.enjeux){
    var ctx=m.contexte||''; var enj=m.enjeux||''; var vrd=m.verdict_shark||'';
    var resumeTxt='';
    if(ctx) resumeTxt+=ctx+' ';
    if(enj) resumeTxt+=enj+' ';
    resumeHtml='<div class="resume-soir">'
      +(vrd?'<div class="resume-verdict">🦈 '+vrd+'</div>':'')
      +(resumeTxt.trim()?'<div class="resume-ctx">'+resumeTxt.trim()+'</div>':'')
      +'</div><div class="sep"></div>';
  }

  document.title=hn+' vs '+an+' — IASHARK';
  return '<div class="wrap"><div class="card '+(isHot?'hot':'')+'">'
    // TOPBAR
    +'<div class="topbar"><div class="lg-row"><span style="font-size:14px">'+(m.ligue_icon||'🏆')+'</span><span class="lg-name">'+(m.league||'').toUpperCase()+(m.round?' · '+m.round:'')+'</span></div><div class="badges">'+(heure?'<span class="badge time">'+heure+'</span>':'')+(isHot?'<span class="badge hot">SHARK LOCK</span>':isVal?'<span class="badge val">VALUE BET</span>':'')+'</div></div>'
    // TEAMS + PROBAS
    +'<div class="teams"><div class="teams-row"><div class="team home">'+lgImg(m.home,hn.slice(0,2).toUpperCase())+'<div class="team-name">'+hn.toUpperCase()+'</div><div class="team-sub">DOMICILE</div>'+(forme(m.forme_h)?'<div class="team-form">'+forme(m.forme_h)+'</div>':'')+'</div><div class="vs-col"><span class="vs">VS</span>'+(heure?'<div class="vs-hr">'+heure+'</div>':'')+'</div><div class="team away">'+lgImg(m.away,an.slice(0,2).toUpperCase())+'<div class="team-name">'+an.toUpperCase()+'</div><div class="team-sub">EXTERIEUR</div>'+(forme(m.forme_a)?'<div class="team-form">'+forme(m.forme_a)+'</div>':'')+'</div></div><div class="pbar"><div class="pb1" style="width:'+(m.p1||0)+'%"></div><div class="pbn" style="width:'+(m.pn||0)+'%"></div><div class="pb2" style="width:'+(m.p2||0)+'%"></div></div><div class="plabels"><div class="pi"><div class="pi-pct" style="color:var(--cyan)">'+(m.p1||0)+'%</div><div class="pi-lbl">'+hn.slice(0,8).toUpperCase()+'</div></div><div class="pi"><div class="pi-pct" style="color:var(--muted)">'+(m.pn||0)+'%</div><div class="pi-lbl">NUL</div></div><div class="pi"><div class="pi-pct" style="color:rgba(226,232,240,0.45)">'+(m.p2||0)+'%</div><div class="pi-lbl">'+an.slice(0,8).toUpperCase()+'</div></div></div>'+meteo+'</div>'
    // 1. PARIS RECOMMANDE (jauge intégrée)
    +'<div class="sep"></div>'
    +pmHtml
    // 2. CONSEIL IA — style orange
    +((m.conseil_public||m.analyse)?'<div class="s"><div class="conseil-orange"><div class="conseil-orange-icon">💡</div><div><div class="conseil-orange-lbl">CONSEIL IA</div><div class="conseil-orange-txt">'+(m.conseil_public||m.analyse)+'</div></div></div></div><div class="sep"></div>':'')
    // 3. ANALYSE COMPARATIVE
    +'<div class="s"><div class="stitle">ANALYSE COMPARATIVE</div>'+buildComp(hn,an,m.crit_home,m.crit_away)+'</div><div class="sep"></div>'
    // 4. PATTERNS
    +buildPatterns(hn,an,m.events_home||null,m.events_away||null,m)
    // 5. SCENARIO
    +buildScen(m)
    // 6. BUTEURS CLES
    +buildPlayers(hn,an,m.top_scorers_home||[],m.top_scorers_away||[])
    // 8. FIFA CARD
    +buildFifa(m.joueur_decisif||null,m.top_scorers_home||[],m.top_scorers_away||[])
    // 9. VERDICT SHARK — tout en bas
    +(m.verdict_shark||m.contexte||m.enjeux?'<div class="s"><div class="verdict-shark-block">'
      +'<div class="verdict-shark-badge">🦈 VERDICT DU SHARK</div>'
      +(m.verdict_shark?'<div class="verdict-shark-title">'+m.verdict_shark+'</div>':'')
      +((m.contexte||m.enjeux)?'<div class="verdict-shark-body">'+(m.contexte?m.contexte+' ':'')+( m.enjeux||'')+'</div>':'')
      +'</div></div>':'')
    +'<div class="card-footer"></div></div></div>';
}

async function init(){
  var el=document.getElementById('root');
  if(!fId){el.innerHTML='<div style="text-align:center;padding:60px 20px;font-family:Space Mono,monospace;font-size:10px;color:var(--muted)">ID MANQUANT<br><br><a href="/" style="color:var(--cyan)">← RETOUR</a></div>';return;}

    var res=await Promise.all([fetch('data.json?t='+Date.now()).then(function(r){return r.json();}),checkSession()]);

  }catch(e){console.error(e);el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)">Erreur de chargement</div>';}
}
