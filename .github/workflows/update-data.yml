                // Paris 3 profils
                paris_3:        an?(an.paris_3||null):null,
                paris_safe:     {bet:an?(an.pari_rec||''):'',cote:odds.c1,proba:an?(an.p1||0)+'%':''},
                paris_risque:   {bet:'',cote:'',proba:''},
                // Kelly
                kelly_pct:      kellyVal,
                // Stade & météo
                stade: {
                  nom:   f.venue&&f.venue.name?(f.venue.name+(f.venue.city?' \u2014 '+f.venue.city:'')):home.name+' (domicile)',
                  cap:   '',
                  meteo: wx?wx.emoji:'\ud83c\udf24\ufe0f',
                  temp:  wx?wx.temp:'',
                  desc:  wx?wx.desc:''
                },
                // Critères radar
                crit_home: critH,
                crit_away: critA,
                // Forme
                form_home: last10H.slice(0,5),
                form_away: last10A.slice(0,5),
                forme_h:   (sH&&sH.form)||'',
                forme_a:   (sA&&sA.form)||'',
                // H2H
                h2h:     h2hFormatted,
                h2h_txt: h2hRaw.length?'Historique sur '+h2hRaw.length+' match(s) recents':'',
                // Blessures
                injuries: injuries,
                // Fatigue
                fatigue: {
                  home: {val:fatigueH.val, info:fatigueH.info},
                  away: {val:fatigueA.val, info:fatigueA.info}
                },
                // Tendances buts
                tendances: tendances,
                // Classement pro
                classement: classementObj,
                // Actualités
                actu: (nH||[]).concat(nA||[]),
              };

              matchsData.push(matchObj);
              if (an&&(an.confiance||0)>=6.5) {
                forCombis.push({
                  home:home.name, away:away.name,
                  pari:an.pari_rec, conf:an.confiance,
                  edge:an.edge||''
                });
              }
              console.log('  OK conf='+matchObj.conf+' edge='+matchObj.edge+' pari='+matchObj.pari_rec);
            }

            // Générer combinés
            var combisRaw = await genCombis(forCombis);
            var combisData = combisRaw.map(function(c){
              return {
                label:      c.label,
                type:       c.type,
                selections: c.selections,
                matchs:     c.matchs,
                cote_totale:c.cote_totale,
                conseil:    c.conseil
              };
            });

            fs.writeFileSync('data.json',
              JSON.stringify({matchs:matchsData, combis:combisData}, null, 2)
            );
            console.log('\n=== DONE: '+matchsData.length+' matchs | '+combisData.length+' combis ===');
          }

          main().catch(function(e){ console.error('FATAL:', e.message); process.exit(0); });
          JSEOF

      - name: Run pipeline
        env:
          APISPORTS_KEY:   ${{ secrets.APISPORTS_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          NEWSAPI_KEY:     ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY:   ${{ secrets.ANTHROPIC_KEY }}
        run: node pipeline.js

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily update - $(date +%Y-%m-%d)"
          git push
