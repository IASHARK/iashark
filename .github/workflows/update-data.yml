          function generateSitemaps(matchsData) {
            console.log('  Generating sitemaps...');
            var sitemapFiles = [];
            // Un sitemap par langue
            Object.keys(LANGS).forEach(function(lang) {
              var urls = [];
              // Page index langue
              urls.push('<url><loc>https://iashark.com/'+lang+'/</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>0.8</priority></url>');
              // Pages WC
              urls.push('<url><loc>https://iashark.com/'+lang+'/world-cup-2026/</loc><lastmod>'+TODAY+'</lastmod><changefreq>weekly</changefreq><priority>0.9</priority></url>');
              WC_TEAMS.forEach(function(t){
                urls.push('<url><loc>https://iashark.com/'+lang+'/world-cup-2026/'+t.slug+'.html</loc><lastmod>'+TODAY+'</lastmod><changefreq>weekly</changefreq><priority>0.8</priority></url>');
              });
              // Pages match
              matchsData.forEach(function(m) {
                var slug = slugify(m.home.n+'-vs-'+m.away.n+'-'+m.date.split(' ')[0]);
                urls.push('<url><loc>https://iashark.com/'+lang+'/match/'+slug+'.html</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>');
              });
              var xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
                +'<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
                +urls.join('\n')+'\n</urlset>';
              var fname = 'sitemap-'+lang+'.xml';
              fs.writeFileSync(fname, xml);
              sitemapFiles.push(fname);
            });
            // Sitemap français (racine)
            var urlsFr = ['<url><loc>https://iashark.com/</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>'];
            matchsData.forEach(function(m) {
              var slug = slugify(m.home.n+'-vs-'+m.away.n+'-'+m.date.split(' ')[0]);
              urlsFr.push('<url><loc>https://iashark.com/match/'+slug+'.html</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>0.9</priority></url>');
            });
            var xmlFr = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+urlsFr.join('\n')+'\n</urlset>';
            fs.writeFileSync('sitemap-fr.xml', xmlFr);
            sitemapFiles.push('sitemap-fr.xml');
            // Sitemap index global
            var entries = sitemapFiles.map(function(f){
              return '<sitemap><loc>https://iashark.com/'+f+'</loc><lastmod>'+TODAY+'</lastmod></sitemap>';
            }).join('\n');
            fs.writeFileSync('sitemap.xml', '<?xml version="1.0" encoding="UTF-8"?>\n<sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+entries+'\n</sitemapindex>');
            console.log('  Sitemaps done: '+sitemapFiles.length+' files + sitemap.xml index');
          }
          async function translateMatchBatch(matchsData, lang, langName) {
            if (!matchsData.length) return [];
            var texts = matchsData.map(function(m){
              return {
                title: m.home.n+' vs '+m.away.n+' AI Football Prediction '+m.date.split(' ')[0],
                desc: (m.analyse_card||m.pari_rec||'AI football analysis').slice(0,200)
              };
            });
            var prompt = 'Translate these '+texts.length+' football texts to '+langName+'.'
              +' Return ONLY a valid JSON array of objects with "title" and "desc" keys.'
              +' No markdown, no backticks, no explanation. Only the JSON array.\n'
              +JSON.stringify(texts);
            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-sonnet-4-6',
              max_tokens: 3000,
              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});
            var txt = (r.content&&r.content[0]&&r.content[0].text)||'[]';
            try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
            catch(e) { console.log('  Translation parse error for '+lang+', using fallback'); return texts; }
          }
