                var t = translations[idx] || {};
                var slug = slugify(m.home.n+'-vs-'+m.away.n+'-'+m.date.split(' ')[0]);
                var title = t.title || (m.home.n+' vs '+m.away.n+' AI Prediction '+m.date.split(' ')[0]);
