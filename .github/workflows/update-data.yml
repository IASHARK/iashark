                fatA:fatigueA.info, fatScoreA:fatigueA.val,
              });
              await sleep(500);

              // Cote recommandée = cote qui correspond au pari IA
              (function(){
                var p=(an&&an.pari_rec||'').toLowerCase();
                var coteRec;
                if(p.includes(' 2)')||p.includes('away')||p.includes('ext')||p.endsWith('(2)')||p.includes('victoire (2)')) coteRec=odds.c2;
                else if(p.includes('nul')||p.includes('draw')||p==='n') coteRec=odds.cn;
                else if(p.includes('over 2.5')||p.includes('plus de 2.5')) coteRec=odds.co25;
                else if(p.includes('over 1.5')||p.includes('plus de 1.5')) coteRec=odds.co15;
                else if(p.includes('under')||p.includes('moins de')) coteRec=odds.cu25;
                else if(p.includes('btts')||p.includes('les deux')) coteRec=odds.btts_oui;
                else if(p.includes('1x')) coteRec=odds.dc1x;
                else if(p.includes('x2')) coteRec=odds.dcx2;
                else coteRec=odds.c1;
                // bookies[0].c = bonne cote → l'index affiche automatiquement la bonne
                if(odds.bookies&&odds.bookies.length&&coteRec&&coteRec!=='--') {
                  odds.bookies[0].c=coteRec;
                }
              })();

              // Kelly criterion
              var kellyVal = null;
              if (an&&an.pari_rec&&odds.c1&&odds.c1!=='--') {
                var bestCote = parseFloat(odds.c1)||0;
                var aiProb = (an.p1||0)/100;
                if (bestCote>1&&aiProb>0) {
                  var b = bestCote-1;
                  var k = Math.max(0,((aiProb*b-(1-aiProb))/b)*100);
                  kellyVal = Math.min(k,10).toFixed(1); // cap à 10% bankroll
                }
              }

              // Build classement object
              var classementObj = null;
              if (entryH||entryA) {
                // Trouver les équipes voisines dans le classement
                var rankH = rkH||99, rankA = rkA||99;
                var minRank = Math.max(1,Math.min(rankH,rankA)-2);
                var maxRank = Math.min(Math.max(rankH,rankA)+2, standings.length);
                var nearStandings = standings.filter(function(s){
                  return s.rank>=minRank && s.rank<=maxRank;
                });
                classementObj = {
                  league_name: lg.name,
                  standings: nearStandings.map(function(s){
                    return {
                      rank:     s.rank,
                      name:     s.team.name,
