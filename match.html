<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analyse Match — IASHARK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c12;--card:#0d1520;--card2:#111a26;--cyan:#22d3ee;--cyan2:#06b6d4;--amber:#f59e0b;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--text:#e2e8f0;--muted:#4a6580;--border:rgba(255,255,255,0.06);--border-cyan:rgba(34,211,238,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(34,211,238,0.035) 0%,transparent 70%);pointer-events:none;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:99;background:rgba(8,12,18,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:14px;}
.hdr-back{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;transition:.2s;flex-shrink:0;}
.hdr-back:hover{color:var(--cyan);border-color:var(--cyan);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);text-decoration:none;}
.logo span{color:var(--cyan);}
.hdr-badge{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--border-cyan);padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.06);margin-left:auto;}

/* WRAP */
.wrap{max-width:680px;margin:20px auto 0;padding:0 16px;}

/* MATCH CARD */
.match-card{border:1px solid var(--border);border-radius:20px;overflow:hidden;animation:reveal .5s ease forwards;}
.match-card.free{border-color:rgba(34,211,238,0.15);}
.match-card.hot{border-color:rgba(245,158,11,0.25);}
@keyframes reveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
.card-topbar{background:linear-gradient(135deg,#0a1628,#0d1d30);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.league-info{display:flex;align-items:center;gap:8px;}
.league-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.match-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);}
.badge-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.b-hot{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.08));border:1px solid rgba(245,158,11,0.35);color:var(--amber);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 12px 2px rgba(245,158,11,0.2)}}
.b-val{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.08);border:1px solid var(--border-cyan);color:var(--cyan);}
.b-free{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:var(--green);}

/* TEAMS */
.teams-header{padding:24px 20px 18px;background:linear-gradient(180deg,#0a1628 0%,var(--card) 100%);}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:14px;}
.team{text-align:center;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,28px);letter-spacing:1px;line-height:1;margin-bottom:4px;}
.team-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;}
.team.away .team-name{color:rgba(226,232,240,0.7);}
.vs-block{text-align:center;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);display:block;}
.vs-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--cyan);margin-top:2px;}
.proba-bar{display:flex;height:4px;border-radius:4px;overflow:hidden;margin-bottom:8px;}
.pb1{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.pbn{background:rgba(255,255,255,0.1);}
.pb2{background:rgba(226,232,240,0.2);}
.proba-labels{display:flex;justify-content:space-between;}
.prob-item{text-align:center;}
.prob-pct{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.prob-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}

/* SECTION */
.section{padding:0 20px 14px;}
.block-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.block-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* VERDICT */
.verdict-box{background:linear-gradient(135deg,rgba(34,211,238,0.07),rgba(6,182,212,0.03));border:1px solid var(--border-cyan);border-radius:12px;padding:14px 16px;}
.verdict-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);letter-spacing:2px;margin-bottom:6px;}
.verdict-txt{font-size:13px;line-height:1.65;color:var(--text);}
.verdict-txt strong{color:var(--cyan);}

/* SCENARIO */
.scenario-phases{display:flex;flex-direction:column;gap:8px;}
.phase{display:flex;gap:12px;align-items:flex-start;}
.phase-time{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);background:rgba(34,211,238,0.08);border:1px solid var(--border-cyan);padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.phase-txt{font-size:13px;color:#94a3b8;line-height:1.6;}
.phase-txt strong{color:var(--text);}

/* FACTEUR X */
.facteur-box{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:12px 16px;display:flex;gap:12px;align-items:center;}
.facteur-icon{font-size:22px;flex-shrink:0;}
.facteur-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--amber);letter-spacing:2px;margin-bottom:4px;}
.facteur-txt{font-size:13px;color:var(--text);line-height:1.5;}

/* JAUGES */
.gauges-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.gauge-team-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
.gauge-rows{display:flex;flex-direction:column;gap:7px;}
.gauge-meta{display:flex;justify-content:space-between;margin-bottom:3px;}
.gauge-name{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.gauge-tag{font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}
.gauge-tag.mid{color:var(--amber);}
.gauge-tag.low{color:var(--red);}
.gauge-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan2),var(--cyan));transition:width 1.2s ease;}
.gauge-fill.mid{background:linear-gradient(90deg,#d97706,var(--amber));}
.gauge-fill.low{background:linear-gradient(90deg,#dc2626,var(--red));}

/* CONFIANCE */
.conf-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.conf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.conf-score{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;color:var(--cyan);}
.conf-score sup{font-size:20px;color:var(--muted);}
.conf-lvl-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.08));border:1px solid rgba(245,158,11,0.3);color:var(--amber);margin-bottom:4px;}
.conf-hint{font-size:11px;color:var(--muted);}
.conf-bar-track{background:rgba(255,255,255,0.04);border-radius:6px;height:6px;overflow:hidden;}
.conf-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan2),var(--amber),#f97316);}
.conf-scale{display:flex;justify-content:space-between;margin-top:6px;}
.conf-scale span{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}

/* PARIS */
.paris-list{display:flex;flex-direction:column;gap:8px;}
.pari-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.pari-card.safe{border-color:rgba(16,185,129,0.2);}
.pari-card.value{border-color:rgba(34,211,238,0.2);}
.pari-card.audace{border-color:rgba(139,92,246,0.2);}
.pari-left{flex:1;min-width:0;}
.pari-type{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;margin-bottom:3px;}
.pari-card.safe .pari-type{color:var(--green);}
.pari-card.value .pari-type{color:var(--cyan);}
.pari-card.audace .pari-type{color:var(--purple);}
.pari-bet{font-size:14px;font-weight:600;color:var(--text);}
.pari-hint{font-size:11px;color:var(--muted);margin-top:2px;}
.pari-right{text-align:right;flex-shrink:0;}
.pari-cote{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;}
.pari-mise{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px;}
.pari-bookie{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);}

/* KELLY */
.kelly-box{background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.kelly-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);letter-spacing:2px;margin-bottom:4px;}
.kelly-desc{font-size:12px;color:var(--muted);}
.kelly-val{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--green);line-height:1;text-align:right;}
.kelly-unit{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);text-align:right;}

/* COTES TABLE */
.cotes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cote-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.cote-type{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.cote-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);line-height:1;}
.cote-val.hot{color:var(--amber);}

/* CONTEXTE */
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ctx-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.ctx-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.ctx-txt{font-size:12px;color:#94a3b8;line-height:1.6;}
.ctx-txt strong{color:var(--text);}

/* CONSEIL */
.conseil-box{background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.15);border-radius:12px;padding:14px 16px;}
.conseil-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--purple);letter-spacing:2px;margin-bottom:6px;}
.conseil-txt{font-size:13px;color:#94a3b8;line-height:1.65;font-style:italic;}
.conseil-txt strong{color:var(--text);font-style:normal;}

/* H2H */
.h2h-list{display:flex;flex-direction:column;gap:6px;}
.h2h-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;}
.h2h-date{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);flex-shrink:0;width:68px;}
.h2h-teams{flex:1;font-size:12px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.h2h-score{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);flex-shrink:0;}
.h2h-w{font-family:'Space Mono',monospace;font-size:8px;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.h2h-w.w1{background:rgba(34,211,238,0.1);color:var(--cyan);}
.h2h-w.wn{background:rgba(255,255,255,0.05);color:var(--muted);}
.h2h-w.w2{background:rgba(226,232,240,0.08);color:rgba(226,232,240,0.5);}

/* FORME */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-team-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;}
.form-list{display:flex;flex-direction:column;gap:4px;}
.form-item{display:flex;align-items:center;gap:8px;}
.form-badge{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;flex-shrink:0;}
.form-badge.W{background:rgba(16,185,129,0.2);color:var(--green);}
.form-badge.D{background:rgba(255,255,255,0.06);color:var(--muted);}
.form-badge.L{background:rgba(239,68,68,0.15);color:var(--red);}
.form-match{font-size:11px;color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.form-score{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0;}

/* CLASSEMENT */
.table{width:100%;border-collapse:collapse;}
.table th{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);}
.table td{font-size:12px;color:#94a3b8;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);}
.table tr.hl td{color:var(--text);}
.fdots{display:flex;gap:2px;}
.fdot{width:8px;height:8px;border-radius:50%;}
.fdot.W{background:var(--green);}
.fdot.D{background:rgba(255,255,255,0.2);}
.fdot.L{background:var(--red);}

/* BLESSURES */
.injuries-box{background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:12px 16px;}
.injuries-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--red);letter-spacing:2px;margin-bottom:8px;}
.inj-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8;margin-bottom:4px;}
.inj-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;}
.inj-team{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);}

/* BOOKIE CTA */
.bookie-cta{background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(6,182,212,0.04));border:1px solid var(--border-cyan);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.bookie-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:2px;}
.bookie-promo{font-family:'Space Mono',monospace;font-size:9px;color:var(--green);letter-spacing:1px;}
.bookie-btn{background:var(--cyan);color:#000;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .15s;}
.bookie-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,211,238,0.3);}

/* FOOTER */
.card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.2);}
.footer-edge{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);padding:6px 12px;border-radius:8px;}

/* DIVIDER */
.dv{height:1px;background:var(--border);margin:0 20px 14px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;}

@media(max-width:480px){
  .ctx-grid,.form-grid,.gauges-grid{grid-template-columns:1fr;}
  .cotes-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header class="hdr">
  <button class="hdr-back" onclick="history.back()">← RETOUR</button>
  <a href="/" class="logo"><span>IA</span>SHARK</a>
  <div class="hdr-badge">🦈 ANALYSE IA</div>
</header>

<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-lbl">CHARGEMENT DE L'ANALYSE...</div>
  </div>
</div>

<script>
var fId = new URLSearchParams(location.search).get('id');

function gc(v){ if(!v&&v!==0)return'low'; if(v>=65)return''; if(v>=40)return'mid'; return'low'; }
function gl(v){ if(!v&&v!==0)return''; if(v>=75)return'Excellent'; if(v>=60)return'Bon'; if(v>=40)return'Moyen'; return'Faible'; }

function buildGauges(crit, lbl) {
  var keys = [{k:'att',n:'ATTAQUE'},{k:'def',n:'DÉFENSE'},{k:'fr',n:'FORME'},{k:'fd',n:'DOM/EXT'},{k:'mot',n:'MOTIVATION'}];
  return keys.map(function(x){
    var v = crit ? (crit[x.k]||0) : 0;
    var c = gc(v);
    return '<div class="gauge-item">'
      +'<div class="gauge-meta"><span class="gauge-name">'+x.n+'</span><span class="gauge-tag '+c+'">'+gl(v)+'</span></div>'
      +'<div class="gauge-bar"><div class="gauge-fill '+c+'" style="width:'+v+'%" data-w="'+v+'"></div></div>'
      +'</div>';
  }).join('');
}

function buildH2H(h2h, hn) {
  if(!h2h||!h2h.length) return '';
  return '<div class="section"><div class="block-title">⚔️ HEAD TO HEAD</div><div class="h2h-list">'
    + h2h.slice(0,5).map(function(g){
        var bc = g.w==='1'?'w1':g.w==='N'?'wn':'w2';
        var wl = g.w==='1'?(hn||'').slice(0,7).toUpperCase():g.w==='N'?'NUL':(g.away||'').slice(0,7).toUpperCase();
        return '<div class="h2h-item">'
          +'<span class="h2h-date">'+(g.d||'')+'</span>'
          +'<span class="h2h-teams">'+(g.home||'')+' — '+(g.away||'')+'</span>'
          +'<span class="h2h-score">'+(g.s||'')+'</span>'
          +'<span class="h2h-w '+bc+'">'+wl+'</span>'
          +'</div>';
      }).join('')
    +'</div></div>';
}

function buildForm(fh, fa, hn, an) {
  function rows(list){
    if(!list||!list.length) return '<div style="color:var(--muted);font-size:12px;padding:6px 0">—</div>';
    return list.slice(0,5).map(function(m){
      return '<div class="form-item">'
        +'<div class="form-badge '+(m.result||'D')+'">'+(m.result||'D')+'</div>'
        +'<span class="form-match">'+(m.match||'')+'</span>'
        +'<span class="form-score">'+(m.score||'')+'</span>'
        +'</div>';
    }).join('');
  }
  return '<div class="section"><div class="block-title">📈 FORME RÉCENTE</div>'
    +'<div class="form-grid">'
    +'<div><div class="form-team-lbl">'+(hn||'').toUpperCase().slice(0,14)+'</div><div class="form-list">'+rows(fh)+'</div></div>'
    +'<div><div class="form-team-lbl">'+(an||'').toUpperCase().slice(0,14)+'</div><div class="form-list">'+rows(fa)+'</div></div>'
    +'</div></div>';
}

function buildClassement(cl, hId, aId) {
  if(!cl||!cl.standings||!cl.standings.length) return '';
  var rows = cl.standings.map(function(s){
    var hl = s.team_id===hId||s.team_id===aId;
    var dots = (s.form||'').split('').slice(-5).map(function(f){return'<div class="fdot '+f+'"></div>';}).join('');
    return '<tr'+(hl?' class="hl"':'')+'>'
      +'<td>'+(s.rank||'')+'</td>'
      +'<td>'+(s.name||'')+(hl?' ◀':'')+'</td>'
      +'<td>'+(s.played||0)+'</td>'
      +'<td>'+(s.pts||0)+'</td>'
      +'<td><div class="fdots">'+dots+'</div></td>'
      +'</tr>';
  }).join('');
  return '<div class="section"><div class="block-title">📊 CLASSEMENT '+(cl.league_name||'').toUpperCase()+'</div>'
    +'<table class="table"><thead><tr><th>#</th><th>ÉQUIPE</th><th>J</th><th>PTS</th><th>FORME</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}

function buildParis3(p3) {
  if(!p3) return '';
  var types = [{k:'safe',t:'✅ SAFE',c:'safe'},{k:'valeur',t:'💎 VALUE',c:'value'},{k:'specu',t:'🚀 AUDACE',c:'audace'}];
  var cards = types.map(function(x){
    var p = p3[x.k];
    if(!p) return '';
    return '<div class="pari-card '+x.c+'">'
      +'<div class="pari-left">'
      +'<div class="pari-type">'+x.t+' — '+(p.mise||'2-3% bankroll')+'</div>'
      +'<div class="pari-bet">'+(p.bet||'')+'</div>'
      +'<div class="pari-hint">'+(p.hint||'')+'</div>'
      +'</div>'
      +'<div class="pari-right">'
      +'<div class="pari-cote">'+(p.cote||'—')+'</div>'
      +'<div class="pari-bookie">'+(p.bookie||'')+'</div>'
      +'</div>'
      +'</div>';
  }).join('');
  return '<div class="section"><div class="block-title">🎯 LES 3 PARIS DU SHARK</div><div class="paris-list">'+cards+'</div></div>';
}

function buildCotes(m) {
  var items = [
    {t:'VICTOIRE DOM',v:m.c1},{t:'NUL',v:m.cn},{t:'VICTOIRE EXT',v:m.c2},
    {t:'OVER 1.5',v:m.co15},{t:'OVER 2.5',v:m.co25},{t:'UNDER 2.5',v:m.cu25},
    {t:'DC 1X',v:m.dc1x},{t:'DC X2',v:m.dc2x},{t:'BTTS OUI',v:m.btts_oui},{t:'BTTS NON',v:m.btts_non}
  ].filter(function(x){return x.v&&x.v!=='--';});
  if(!items.length) return '';
  return '<div class="section"><div class="block-title">📋 COTES MÉDIANES</div><div class="cotes-grid">'
    + items.map(function(x){
        var hot = parseFloat(x.v)>=1.5?' hot':'';
        return '<div class="cote-item"><div class="cote-type">'+x.t+'</div><div class="cote-val'+hot+'">'+x.v+'</div></div>';
      }).join('')
    +'</div></div>';
}

function render(m) {
  var hn = m.home&&m.home.n||'';
  var an = m.away&&m.away.n||'';
  var heure = (m.date||'').split(' ')[1]||'';
  var isHot = m.hot||(m.conf||0)>=8.0;
  var isVal = m.val||m.vbet==='OUI';
  var cardCls = 'match-card '+(isHot?'hot':isVal?'free':'free');
  var topBadge = isHot?'<span class="b-hot">🔥 SHARK LOCK</span>':isVal?'<span class="b-val">⚡ VALUE BET</span>':'<span class="b-free">✓ GRATUIT</span>';
  var confPct = Math.round(((m.conf||0)/10)*100);
  var confLvl = (m.conf||0)>=7.5?'🔥 SHARK LOCK':(m.conf||0)>=6.5?'⚡ ÉLEVÉ':'✓ MODÉRÉ';
  var confBadgeStyle = (m.conf||0)>=7.5?'':' style="background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.25);color:var(--cyan)"';

  // Scenario
  var scen = m.scenario||{};
  var scenHtml = '';
  if(scen.phase1||scen.phase2||scen.phase3){
    scenHtml = '<div class="section"><div class="block-title">🎬 SCÉNARIO ATTENDU</div><div class="scenario-phases">';
    if(scen.phase1) scenHtml+='<div class="phase"><span class="phase-time">0–25\'</span><div class="phase-txt">'+scen.phase1+'</div></div>';
    if(scen.phase2) scenHtml+='<div class="phase"><span class="phase-time">25–65\'</span><div class="phase-txt">'+scen.phase2+'</div></div>';
    if(scen.phase3) scenHtml+='<div class="phase"><span class="phase-time">65–90\'</span><div class="phase-txt">'+scen.phase3+'</div></div>';
    scenHtml+='</div></div>';
  }

  // Injuries
  var injHtml = '';
  if(m.injuries&&m.injuries.length){
    injHtml='<div class="section"><div class="injuries-box"><div class="injuries-lbl">🚑 ABSENCES CONFIRMÉES</div>'
      +m.injuries.map(function(inj){
        var tn = inj.team==='home'?hn:an;
        return '<div class="inj-item"><div class="inj-dot"></div><strong>'+(inj.name||'')+'</strong><span class="inj-team">'+tn.slice(0,10)+'</span><span style="margin-left:auto;font-size:11px;color:var(--red)">'+(inj.reason||'Blessé')+'</span></div>';
      }).join('')
      +'</div></div>';
  }

  // Bookie
  var bk = m.bookies&&m.bookies[0]||null;
  var bkHtml = bk?'<div class="section"><div class="bookie-cta"><div><div class="bookie-name">'+bk.n+'</div><div class="bookie-promo">✓ '+(bk.o||bk.promo||'Bonus bienvenue')+'</div></div><button class="bookie-btn" onclick="event.stopPropagation()">PARIER →</button></div></div>':'';

  document.title = hn+' vs '+an+' — IASHARK';

  return '<div class="wrap"><div class="'+cardCls+'">'

    // TOPBAR
    +'<div class="card-topbar">'
    +'<div class="league-info"><span style="font-size:16px">'+(m.ligue_icon||'🏆')+'</span><span class="league-name">'+(m.league||'').toUpperCase()+(m.round?' · '+m.round:'')+'</span></div>'
    +'<div class="badge-row">'+(heure?'<span class="match-time">'+heure+'</span>':'')+topBadge+'</div>'
    +'</div>'

    // TEAMS HEADER
    +'<div class="teams-header">'
    +'<div class="teams-row">'
    +'<div class="team home"><div class="team-name">'+hn.toUpperCase()+'</div><div class="team-sub">'+((m.classement&&m.classement.home)?'DOM · #'+m.classement.home.rank:'DOMICILE')+'</div></div>'
    +'<div class="vs-block"><span class="vs">VS</span>'+(heure?'<div class="vs-time">'+heure+'</div>':'')+'</div>'
    +'<div class="team away"><div class="team-name">'+an.toUpperCase()+'</div><div class="team-sub">'+((m.classement&&m.classement.away)?'EXT · #'+m.classement.away.rank:'EXTÉRIEUR')+'</div></div>'
    +'</div>'
    +'<div class="proba-bar"><div class="pb1" style="width:'+(m.p1||0)+'%"></div><div class="pbn" style="width:'+(m.pn||0)+'%"></div><div class="pb2" style="width:'+(m.p2||0)+'%"></div></div>'
    +'<div class="proba-labels">'
    +'<div class="prob-item"><div class="prob-pct" style="color:var(--cyan)">'+(m.p1||0)+'%</div><div class="prob-lbl">'+hn.slice(0,8).toUpperCase()+'</div></div>'
    +'<div class="prob-item"><div class="prob-pct" style="color:var(--muted)">'+(m.pn||0)+'%</div><div class="prob-lbl">NUL</div></div>'
    +'<div class="prob-item"><div class="prob-pct" style="color:rgba(226,232,240,0.5)">'+(m.p2||0)+'%</div><div class="prob-lbl">'+an.slice(0,8).toUpperCase()+'</div></div>'
    +'</div>'
    +'</div>'

    // VERDICT SHARK
    +(m.verdict_shark?'<div class="section"><div class="verdict-box"><div class="verdict-lbl">🦈 VERDICT DU SHARK</div><div class="verdict-txt">'+m.verdict_shark+'</div></div></div>':'')

    // SCÉNARIO
    +scenHtml

    // FACTEUR X
    +(m.facteur_x?'<div class="section"><div class="facteur-box"><div class="facteur-icon">⚡</div><div><div class="facteur-lbl">FACTEUR DÉCISIF</div><div class="facteur-txt">'+m.facteur_x+'</div></div></div></div>':'')

    +'<div class="dv"></div>'

    // JAUGES
    +'<div class="section"><div class="block-title">📊 ANALYSE COMPARATIVE</div><div class="gauges-grid">'
    +'<div><div class="gauge-team-lbl">⚪ '+hn.toUpperCase().slice(0,14)+'</div><div class="gauge-rows">'+buildGauges(m.crit_home)+'</div></div>'
    +'<div><div class="gauge-team-lbl">🔵 '+an.toUpperCase().slice(0,14)+'</div><div class="gauge-rows">'+buildGauges(m.crit_away)+'</div></div>'
    +'</div></div>'

    +'<div class="dv"></div>'

    // CONFIANCE
    +'<div class="section"><div class="conf-box">'
    +'<div class="conf-top">'
    +'<div><div class="conf-score">'+(m.conf||0).toFixed(1)+'<sup>/10</sup></div></div>'
    +'<div style="text-align:right"><div class="conf-lvl-badge"'+confBadgeStyle+'>'+confLvl+'</div><div class="conf-hint">'+(m.argument?(m.argument.split('.')[0]):'')+'</div></div>'
    +'</div>'
    +'<div class="conf-bar-track"><div class="conf-bar-fill" style="width:'+confPct+'%"></div></div>'
    +'<div class="conf-scale"><span>PRUDENT</span><span>CONFIANT</span><span>ÉLEVÉ</span><span>🔥 LOCK</span></div>'
    +'</div></div>'

    // 3 PARIS
    +buildParis3(m.paris_3)

    // KELLY
    +(m.kelly?'<div class="section"><div class="kelly-box"><div><div class="kelly-lbl">📐 CRITÈRE DE KELLY</div><div class="kelly-desc">Mise optimale calculée par l\'IA</div></div><div><div class="kelly-val">'+m.kelly+'</div><div class="kelly-unit">% BANKROLL</div></div></div></div>':'')

    +'<div class="dv"></div>'

    // COTES
    +buildCotes(m)

    // CONTEXTE
    +((m.contexte||m.enjeux)?'<div class="section"><div class="ctx-grid">'
    +(m.contexte?'<div class="ctx-card"><div class="ctx-lbl">📍 CONTEXTE</div><div class="ctx-txt">'+m.contexte+'</div></div>':'')
    +(m.enjeux?'<div class="ctx-card"><div class="ctx-lbl">🎯 ENJEUX</div><div class="ctx-txt">'+m.enjeux+'</div></div>':'')
    +'</div></div>':'')

    // CONSEIL IA
    +(m.conseil_public?'<div class="section"><div class="conseil-box"><div class="conseil-lbl">💡 CONSEIL IA</div><div class="conseil-txt">'+m.conseil_public+'</div></div></div>':'')
    +(m.analyse?'<div class="section"><div class="conseil-box"><div class="conseil-lbl">🦈 ANALYSE IA</div><div class="conseil-txt">'+m.analyse+'</div></div></div>':'')

    // BOOKIE
    +bkHtml

    +'<div class="dv"></div>'

    // H2H
    +buildH2H(m.h2h, hn)

    // FORME
    +buildForm(m.form_home, m.form_away, hn, an)

    // BLESSURES
    +injHtml

    // CLASSEMENT
    +buildClassement(m.classement, m.home&&m.home.id, m.away&&m.away.id)

    // FOOTER
    +'<div class="card-footer">'
    +'<div style="font-size:12px;color:#94a3b8">'+(m.stade&&m.stade.nom?'🏟️ '+m.stade.nom:'🏟️ '+hn+' — Domicile')+'</div>'
    +(m.edge?'<div class="footer-edge">EDGE '+m.edge+' 🎯</div>':'')
    +'</div>'

    +'</div></div>'; // close card + wrap
}

async function init(){
  var el = document.getElementById('root');
  if(!fId){
    el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="font-family:\'Space Mono\',monospace;color:var(--muted)">ID MANQUANT</div><div style="margin-top:16px"><a href="/" style="color:var(--cyan);font-family:\'Space Mono\',monospace;font-size:10px">← RETOUR</a></div></div>';
    return;
  }
  try {
    var r = await fetch('data.json?t='+Date.now());
    var data = await r.json();
    var m = (data.matchs||[]).find(function(x){return String(x.id)===String(fId);});
    if(!m){
      el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:16px">🦈</div><div style="font-family:\'Space Mono\',monospace;color:var(--muted)">MATCH INTROUVABLE</div><div style="margin-top:16px"><a href="/" style="color:var(--cyan);font-family:\'Space Mono\',monospace;font-size:10px">← RETOUR AUX ANALYSES</a></div></div>';
      return;
    }
    el.innerHTML = render(m);
    // Animate gauges
    setTimeout(function(){
      document.querySelectorAll('.gauge-fill[data-w]').forEach(function(b){
        var w = b.getAttribute('data-w');
        b.style.width='0%';
        requestAnimationFrame(function(){ setTimeout(function(){ b.style.width=w+'%'; },60); });
      });
    },100);
  } catch(e){
    el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px">⚠️</div><div style="margin-top:16px">Erreur de chargement</div></div>';
  }
}
init();
</script>
</body>
</html>
