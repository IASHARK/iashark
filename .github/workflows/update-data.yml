            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});
            var txt = (r.content&&r.content[0]&&r.content[0].text)||'{}';
            try {
              var obj = JSON.parse(txt.replace(/```json|```/g,'').trim());
              return Object.values(obj).filter(Boolean).map(function(c){
                return {
                  label: c.label||'COMBINÉ',
                  type: c.type||'safe',
                  selections: c.selections||'',
                  matchs: c.matchs||'',
                  cote_totale: c.cote_totale||'',
                  conseil: c.conseil||''
                };
              });
            } catch(e) { return []; }
          }

          // ─── FORMAT H2H ──────────────────────────────────────────────────
          function formatH2H(fixtures, homeId, awayId) {
            return fixtures.slice(0,5).map(function(f) {
              var gfH=f.goals.home||0, gfA=f.goals.away||0;
              var isH = f.teams.home.id===homeId;
              var w;
              if(gfH>gfA) w=isH?'1':'2';
              else if(gfH<gfA) w=isH?'2':'1';
              else w='N';
              return {
                d:    (f.fixture.date||'').split('T')[0],
                home: f.teams.home.name,
                away: f.teams.away.name,
                s:    gfH+'-'+gfA,
                w:    w
              };
            });
          }

          // ─── MAIN ────────────────────────────────────────────────────────
          async function main() {
            console.log('=== IASHARK', TODAY, '===');
