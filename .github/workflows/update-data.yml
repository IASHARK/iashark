name: Update IASHARK Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Write pipeline script
        run: |
          cat > pipeline.js << 'JSEOF'
          const https = require('https');
          const fs    = require('fs');

          const APS_KEY  = process.env.APISPORTS_KEY;
          const OWM_KEY  = process.env.OPENWEATHER_KEY;
          const NEWS_KEY = process.env.NEWSAPI_KEY;
          const ANT_KEY  = process.env.ANTHROPIC_KEY;
          const APS      = {'x-apisports-key': APS_KEY};
          const LEAGUES  = [39, 61, 140, 135, 78, 2, 3, 40];
          const SEASON   = 2025;
          const TODAY    = new Date().toISOString().split('T')[0];

          // ─── LEAGUE KEY MAP ────────────────────────────────────────────
          var LG_KEY = {
            39:'premier', 40:'champ', 61:'ligue1', 140:'laliga',
            135:'seriea', 78:'bundesliga', 2:'ldc', 3:'el'
          };

          // ─── BOOKMAKER MAP — domaine pour logo favicon + promo ─────────
          // ─── 8 BOOKMAKERS FR/EU — logos Google Favicon sz=64 ──────
          const ODDS_KEY = process.env.ODDS_KEY;
          var BOOKS = {
            betclic:    {name:'Betclic',      domain:'betclic.fr',           promo:'200€ offerts',           affiliate:'#'},
            winamax:    {name:'Winamax',      domain:'winamax.fr',           promo:'100€ offerts',           affiliate:'#'},
            unibet:     {name:'Unibet',       domain:'unibet.fr',            promo:'100€ remboursés',   affiliate:'#'},
            parionssport:{name:'Parions Sport',domain:'enligne.pmuparis.fr', promo:'100€ offerts',           affiliate:'#'},
            pmu:        {name:'PMU',          domain:'pmu.fr',               promo:'100€ offerts',           affiliate:'#'},
            bet365:     {name:'Bet365',       domain:'bet365.com',           promo:'100€ bonus',             affiliate:'#'},
            bwin:       {name:'Bwin',         domain:'bwin.fr',              promo:'50€ offerts',            affiliate:'#'},
            zebet:      {name:'ZEbet',        domain:'zebet.fr',             promo:'100€ offerts',           affiliate:'#'},
          };

          // ─── SPORT KEYS The Odds API (clés exactes vérifiées) ─────────
          var SPORT_KEYS = {
            39:  'soccer_epl',
            40:  'soccer_england_league2',
            61:  'soccer_france_ligue_one',
            140: 'soccer_spain_la_liga',
            135: 'soccer_italy_serie_a',
            78:  'soccer_germany_bundesliga',
            2:   'soccer_uefa_champs_league',
            3:   'soccer_uefa_europa_league',
          };

          // ─── MATCHING ROBUSTE — bidirectionnel ────────────────────────
          function normTeam(s) {
            var ALIASES = {
              'psg':'paris saint germain','man city':'manchester city',
              'man utd':'manchester united','man united':'manchester united',
              'spurs':'tottenham hotspur','atletico':'atletico madrid',
              'inter':'inter milan','juve':'juventus','roma':'as roma',
              'lyon':'olympique lyonnais','om':'olympique marseille',
              'rennes':'stade rennais','ajax':'afc ajax',
              'bayer':'bayer leverkusen',
            };
            var n = (s||'').toLowerCase()
              .replace(/[-'\.]/g,' ')
              .replace(/[éèê]/g,'e').replace(/[àâ]/g,'a')
              .replace(/[üù]/g,'u').replace(/[öô]/g,'o')
              .replace(/[îï]/g,'i').trim();
            return ALIASES[n]||n;
          }

          function teamSim(a, b) {
            var na=normTeam(a), nb=normTeam(b);
            if(na===nb) return 1.0;
            if(na.includes(nb)||nb.includes(na)) return 0.9;
            var wa=na.split(' ').filter(function(w){return w.length>2;});
            var wb=nb.split(' ').filter(function(w){return w.length>2;});
            if(!wa.length||!wb.length) return 0;
            var exact=wa.filter(function(w){return wb.indexOf(w)>=0;}).length;
            var partial=wa.filter(function(w){
              return wb.some(function(v){return v!==w&&(v.includes(w)||w.includes(v));});
            }).length;
            return Math.min(1.0,(exact+partial*0.4)/Math.max(wa.length,wb.length));
          }

          function findBestEvent(apsHome, apsAway, events) {
            var best=null, bestScore=0;
            (events||[]).forEach(function(ev) {
              var sH=teamSim(apsHome, ev.home_team||'');
              var sA=teamSim(apsAway, ev.away_team||'');
              if(sH<0.4||sA<0.4) return;
              var total=sH*1.2+sA;
              if(total>bestScore){bestScore=total; best=ev;}
            });
            return bestScore>=1.0?best:null;
          }

          // ─── CACHE ODDS 1 appel/ligue/jour ────────────────────────────
          var ODDS_CACHE={};

          async function loadLeagueOdds(leagueId) {
            if(ODDS_CACHE[leagueId]!==undefined) return ODDS_CACHE[leagueId];
            var sportKey=SPORT_KEYS[leagueId];
            if(!sportKey||!ODDS_KEY) { ODDS_CACHE[leagueId]=[]; return []; }
            var bookList=Object.keys(BOOKS).join(',');
            var url='https://api.the-odds-api.com/v4/sports/'+sportKey+'/odds/'
              +'?apiKey='+ODDS_KEY
              +'&regions=eu'
              +'&markets=h2h,totals,double_chance,btts'
              +'&oddsFormat=decimal'
              +'&bookmakers='+bookList;
            var r=await get(url,{});
            var events=Array.isArray(r)?r:[];
            console.log('  Odds '+sportKey+': '+events.length+' events, '+(r.error||'OK'));
            ODDS_CACHE[leagueId]=events;
            await sleep(300);
            return events;
          }

          function parseLeagueOdds(ev, apsHome, apsAway) {
            var empty={c1:'--',cn:'--',c2:'--',co15:'--',co25:'--',cu25:'--',
                       dc1x:'--',dcx2:'--',btts_oui:'--',btts_non:'--',bookies:[]};
            if(!ev||!ev.bookmakers||!ev.bookmakers.length) return empty;

            var allC1=[],allCN=[],allC2=[];
            var allO15=[],allO25=[],allU25=[];
            var allDC1X=[],allDCX2=[];
            var allBTTS_Y=[],allBTTS_N=[];
            var bookiesList=[];

            ev.bookmakers.forEach(function(bk) {
              var info=BOOKS[bk.key]||{name:bk.title,domain:bk.key+'.com',promo:'',affiliate:'#'};
              var bkC1='--',bkCN='--',bkC2='--';

              (bk.markets||[]).forEach(function(mkt) {
                if(mkt.key==='h2h') {
                  (mkt.outcomes||[]).forEach(function(o) {
                    if(teamSim(o.name, apsHome)>=0.5) {
                      bkC1=parseFloat(o.price).toFixed(2);
                      allC1.push(parseFloat(o.price));
                    } else if(o.name==='Draw') {
                      bkCN=parseFloat(o.price).toFixed(2);
                      allCN.push(parseFloat(o.price));
                    } else if(teamSim(o.name, apsAway)>=0.5) {
                      bkC2=parseFloat(o.price).toFixed(2);
                      allC2.push(parseFloat(o.price));
                    }
                  });
                }
                if(mkt.key==='totals') {
                  (mkt.outcomes||[]).forEach(function(o) {
                    var p=parseFloat(o.point||0);
                    if(o.name==='Over' &&Math.abs(p-1.5)<0.1) allO15.push(parseFloat(o.price));
                    if(o.name==='Over' &&Math.abs(p-2.5)<0.1) allO25.push(parseFloat(o.price));
                    if(o.name==='Under'&&Math.abs(p-2.5)<0.1) allU25.push(parseFloat(o.price));
                  });
                }
                if(mkt.key==='double_chance') {
                  (mkt.outcomes||[]).forEach(function(o) {
                    if(o.name==='Home/Draw') allDC1X.push(parseFloat(o.price));
                    if(o.name==='Away/Draw') allDCX2.push(parseFloat(o.price));
                  });
                }
                if(mkt.key==='btts') {
                  (mkt.outcomes||[]).forEach(function(o) {
                    if(o.name==='Yes') allBTTS_Y.push(parseFloat(o.price));
                    if(o.name==='No')  allBTTS_N.push(parseFloat(o.price));
                  });
                }
              });

              if(bkC1!=='--') {
                bookiesList.push({
                  n:      info.name,
                  domain: info.domain,
                  logo:   'https://www.google.com/s2/favicons?domain='+info.domain+'&sz=64',
                  o:      info.promo,
                  c:      bkC1,
                  cn:     bkCN,
                  c2:     bkC2,
                  l:      info.affiliate,
                });
              }
            });

            function best(arr){ return arr.length?Math.max.apply(null,arr).toFixed(2):'--'; }

            // Trier par meilleure cote 1 (parieur veut la plus haute)
            bookiesList.sort(function(a,b){ return parseFloat(b.c||0)-parseFloat(a.c||0); });

            return {
              c1:best(allC1), cn:best(allCN), c2:best(allC2),
              co15:best(allO15), co25:best(allO25), cu25:best(allU25),
              dc1x:best(allDC1X), dcx2:best(allDCX2),
              btts_oui:best(allBTTS_Y), btts_non:best(allBTTS_N),
              bookies:bookiesList, nb_books:bookiesList.length
            };
          }

          async function getOddsForFixture(leagueId, apsHome, apsAway) {
            var events=await loadLeagueOdds(leagueId);
            if(!events.length) { console.log('  -- Cotes non dispo: '+apsHome+' vs '+apsAway); return parseLeagueOdds(null); }
            var ev=findBestEvent(apsHome, apsAway, events);
            if(!ev) { console.log('  ⚠️ Match non trouve dans odds: '+apsHome+' vs '+apsAway); return parseLeagueOdds(null); }
            console.log('  ✅ Cotes: '+ev.bookmakers.length+' bookmakers pour '+apsHome+' vs '+apsAway);
            return parseLeagueOdds(ev, apsHome, apsAway);
          }

          // ─── BLESSURES & SUSPENSIONS ────────────────────────────────────
          async function getInjuries(fixtureId) {
            var r = await get(
              'https://v3.football.api-sports.io/injuries?fixture='+fixtureId,
              APS
            );
            if (!r.response||!r.response.length) return [];
            return r.response.map(function(inj) {
              return {
                name:   (inj.player&&inj.player.name)||'',
                team:   (inj.team&&inj.team.id)||0,
                reason: (inj.player&&inj.player.reason)||'Blessure',
                status: (inj.player&&inj.player.type)||'Injured',
              };
            });
          }

          // ─── HEAD TO HEAD ────────────────────────────────────────────────
          async function getH2H(homeId, awayId) {
            var r = await get(
              'https://v3.football.api-sports.io/fixtures?h2h='+homeId+'-'+awayId+'&last=5',
              APS
            );
            return r.response || [];
          }

          // ─── MÉTÉO ───────────────────────────────────────────────────────
          async function getWeather(city) {
            if (!city||!city.trim()||!OWM_KEY) return null;
            var r = await get(
              'https://api.openweathermap.org/data/2.5/weather?q='+encodeURIComponent(city)+'&appid='+OWM_KEY+'&units=metric&lang=fr',
              {}
            );
            if (!r||!r.main) return null;
            var icon = (r.weather&&r.weather[0]&&r.weather[0].main)||'';
            var desc = (r.weather&&r.weather[0]&&r.weather[0].description)||'';
            var temp = Math.round(r.main.temp);
            var emoji = '\ud83c\udf24\ufe0f';
            if (icon==='Thunderstorm')         emoji='\u26c8\ufe0f';
            else if (icon==='Rain'||icon==='Drizzle') emoji='\ud83c\udf27\ufe0f';
            else if (icon==='Snow')            emoji='\u2744\ufe0f';
            else if (icon==='Clear')           emoji='\u2600\ufe0f';
            else if (icon==='Clouds')          emoji='\u2601\ufe0f';
            else if (icon==='Mist'||icon==='Fog') emoji='\ud83c\udf2b\ufe0f';
            return {
              emoji, temp:temp+'\u00b0C', desc,
              wind: Math.round((r.wind&&r.wind.speed)||0)+' km/h',
              humidity: (r.main.humidity||0)+'%'
            };
          }

          // ─── NEWS ────────────────────────────────────────────────────────
          async function getNews(team) {
            if (!NEWS_KEY) return [];
            var r = await get(
              'https://newsapi.org/v2/everything?q='+encodeURIComponent(team)+'&language=fr&pageSize=2&sortBy=publishedAt&apiKey='+NEWS_KEY,
              {}
            );
            return ((r.articles||[]).slice(0,2)).map(function(a){
              return {c:team, t:a.title||'', tx:a.description||'', tm:(a.publishedAt||'').split('T')[0]};
            });
          }

          // ─── HELPERS ─────────────────────────────────────────────────────
          function sleep(ms) { return new Promise(function(r){ setTimeout(r,ms); }); }

          function lgIcon(l) {
            var s=(l||'').toLowerCase();
            if(s.includes('ligue 1')) return '\uD83C\uDDEB\uD83C\uDDF7';
            if(s.includes('la liga')) return '\uD83C\uDDEA\uD83C\uDDF8';
            if(s.includes('serie a')) return '\uD83C\uDDEE\uD83C\uDDF9';
            if(s.includes('bundesliga')) return '\uD83C\uDDE9\uD83C\uDDEA';
            if(s.includes('premier league')) return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
            if(s.includes('championship')) return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
            if(s.includes('champions')) return '\uD83C\uDFC6';
            return '\uD83C\uDFC6';
          }

          function lgKey(lgId) { return LG_KEY[lgId]||'other'; }

          // Formate last 10 pour form_home / form_away
          function formatLast10(fixtures, teamId) {
            return fixtures.slice(0,10).map(function(f) {
              var isH = f.teams.home.id===teamId;
              var gf  = isH?(f.goals.home||0):(f.goals.away||0);
              var ga  = isH?(f.goals.away||0):(f.goals.home||0);
              var opp = isH?f.teams.away.name:f.teams.home.name;
              var oppId = isH?f.teams.away.id:f.teams.home.id;
              var res = gf>ga?'W':gf<ga?'L':'D';
              return {
                d:       (f.fixture.date||'').split('T')[0],
                opponent: opp,
                opp_id:  oppId,
                score:   gf+'-'+ga,
                result:  res,
                home:    isH,
                match:   opp,
                lieu:    isH?'DOM':'EXT',
                date_full: f.fixture.date||''
              };
            });
          }

          // ─── FATIGUE CALCULÉ ─────────────────────────────────────────────
          function calcFatigue(last10, teamName) {
            if (!last10||!last10.length) return {val:40, info:'Calendrier inconnu'};
            var now = new Date();
            var last = new Date(last10[0].date_full||last10[0].d);
            var daysSince = Math.round((now-last)/(1000*60*60*24));
            var matchesIn14 = last10.filter(function(m){
              var d = new Date(m.date_full||m.d);
              return (now-d)/(1000*60*60*24) <= 14;
            }).length;
            // Score fatigue : 0=frais, 100=épuisé
            var score = 0;
            if (daysSince<=2)  score=90;
            else if(daysSince<=4) score=70;
            else if(daysSince<=6) score=50;
            else if(daysSince<=8) score=30;
            else score=15;
            if (matchesIn14>=3) score = Math.min(100,score+20);
            var info = daysSince<=7
              ? 'Dernier match il y a '+daysSince+'j — '+matchesIn14+' match(s) en 14j'
              : 'Repos '+daysSince+' jours';
            return {val:Math.round(score), info:info};
          }

          // ─── TENDANCES BUTS ──────────────────────────────────────────────
          function calcTendances(last10Home, last10Away, homeId, awayId) {
            // Over 2.5 sur les 10 derniers de chaque équipe
            function countOver25(games, tid) {
              return games.filter(function(g){
                var isH = g.home;
                // On utilise le score formaté "2-1"
                var parts = (g.score||'').split('-');
                var total = parseInt(parts[0]||0)+parseInt(parts[1]||0);
                return total>2;
              }).length;
            }
            function countBTTS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                return parseInt(parts[0]||0)>0 && parseInt(parts[1]||0)>0;
              }).length;
            }
            function countCS(games) { // clean sheets à domicile
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                if(g.home) return parseInt(parts[1]||0)===0;
                return parseInt(parts[0]||0)===0;
              }).length;
            }

            var o25H = countOver25(last10Home, homeId);
            var o25A = countOver25(last10Away, awayId);
            var bttsH = countBTTS(last10Home);
            var bttsA = countBTTS(last10Away);
            var csH = countCS(last10Home.filter(function(g){return g.home===true;}));

            return {
              over25_home: o25H,
              over25_away: o25A,
              over25_home_txt: o25H+'/10 matchs de '+
                (last10Home[0]?last10Home[0].match:'?')+' termin\u00e9s Over 2.5',
              over25_away_txt: o25A+'/10 matchs termin\u00e9s Over 2.5',
              btts_home: bttsH,
              btts_away: bttsA,
              cs_home: csH,
              cs_home_txt: csH+' clean sheets sur les derniers matchs \u00e0 domicile'
            };
          }

          // ─── CRITÈRES RADAR ──────────────────────────────────────────────
          function calcCriteres(stats, isDom, rank) {
            if (!stats) return {fd:50,att:50,def:50,fr:50,mot:70,fat:50};
            var total=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.total)||30;
            var bm=(stats.goals&&stats.goals.for&&stats.goals.for.total&&stats.goals.for.total.total)||0;
            var be=(stats.goals&&stats.goals.against&&stats.goals.against.total&&stats.goals.against.total.total)||0;
            var form=(stats.form||'').slice(-5);
            var pts=form.split('').reduce(function(a,c){return a+(c==='W'?3:c==='D'?1:0);},0);
            var fr=Math.round(pts/Math.max(form.length*3,1)*100);
            var att=Math.min(100,Math.round(bm/Math.max(total,1)*40));
            var def=Math.max(0,Math.min(100,Math.round((2.5-be/Math.max(total,1))*35)));
            var vd=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.home)||0;
            var ve=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.away)||0;
            var md=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.home)||Math.round(total/2);
            var me=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.away)||Math.round(total/2);
            var fd=isDom?Math.min(100,Math.round(vd/Math.max(md,1)*100)):Math.min(100,Math.round(ve/Math.max(me,1)*100));
            var mot=70;
            if(rank){if(rank<=3)mot=95;else if(rank<=6)mot=85;else if(rank<=10)mot=70;else if(rank>=17)mot=90;else mot=60;}
            return {
              fd:Math.max(0,Math.min(100,fd)),
              att:Math.max(0,Math.min(100,att)),
              def:Math.max(0,Math.min(100,def)),
              fr:Math.max(0,Math.min(100,fr)),
              mot:Math.max(0,Math.min(100,mot)),
              fat:50
            };
          }

          // ─── CLAUDE ANALYSE ─────────────────────────────────────────────
          async function genAnalyse(d) {
            var moyBmH = d.bmH&&d.totalH?(d.bmH/d.totalH).toFixed(2):'?';
            var moyBeH = d.beH&&d.totalH?(d.beH/d.totalH).toFixed(2):'?';
            var moyBmA = d.bmA&&d.totalA?(d.bmA/d.totalA).toFixed(2):'?';
            var moyBeA = d.beA&&d.totalA?(d.beA/d.totalA).toFixed(2):'?';
            var totalButs = ((+moyBmH + +moyBeA)/2 + (+moyBmA + +moyBeH)/2).toFixed(2);

            // Probabilités implicites depuis les cotes réelles
            var pi1 = (d.c1&&d.c1!=='--') ? Math.round(100/parseFloat(d.c1)) : '?';
            var piN = (d.cn&&d.cn!=='--') ? Math.round(100/parseFloat(d.cn)) : '?';
            var pi2 = (d.c2&&d.c2!=='--') ? Math.round(100/parseFloat(d.c2)) : '?';
            var pio25 = (d.co25&&d.co25!=='--') ? Math.round(100/parseFloat(d.co25)) : '?';
            var pibtts = (d.btts_oui&&d.btts_oui!=='--') ? Math.round(100/parseFloat(d.btts_oui)) : '?';

            // Résumé injuries
            var injStr = 'Aucune blessure majeure signalée.';
            if (d.injuries && d.injuries.length) {
              var injHome = d.injuries.filter(function(x){return x.team===d.homeId;});
              var injAway = d.injuries.filter(function(x){return x.team===d.awayId;});
              injStr = '';
              if (injHome.length) injStr += d.home+' absents: '+injHome.map(function(x){return x.name+' ('+x.reason+')';}).join(', ')+'. ';
              if (injAway.length) injStr += d.away+' absents: '+injAway.map(function(x){return x.name+' ('+x.reason+')';}).join(', ')+'. ';
              if (!injStr) injStr = 'Aucune absence majeure.';
            }

            // H2H résumé
            var h2hStr = 'Historique indisponible.';
            if (d.h2h && d.h2h.length) {
              var w1=0,wN=0,w2=0;
              d.h2h.forEach(function(g){
                var isH=g.teams.home.id===d.homeId;
                var gfH=g.goals.home||0, gfA=g.goals.away||0;
                if(gfH>gfA) isH?w1++:w2++;
                else if(gfH<gfA) isH?w2++:w1++;
                else wN++;
              });
              h2hStr = 'Sur les 5 derniers H2H: '+d.home+' '+w1+'V / '+wN+'N / '+w2+'D pour '+d.away+'.';
            }

            var prompt =
              'Tu es IASHARK, IA experte en paris sportifs. Analyse ce match avec une precision chirurgicale pour BATTRE les bookmakers. Reponds UNIQUEMENT avec un JSON valide, sans backtick, sans commentaire.\n\n'

              +'=== MATCH ===\n'
              +d.home+' vs '+d.away+' | '+d.league+' | '+d.date+'\n'
              +'Stade: '+d.stade+' | Meteo: '+d.meteo+'\n\n'

              +'=== '+d.home.toUpperCase()+' — DOMICILE (classement #'+(d.rkH||'?')+') ===\n'
              +'Matchs: '+d.totalH+' | Buts marques: '+d.bmH+' ('+moyBmH+'/match) | Buts encaisses: '+d.beH+' ('+moyBeH+'/match)\n'
