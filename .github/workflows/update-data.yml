name: Update data.json

on:
  schedule:
    - cron: '0 7 * * *'  # Chaque jour à 7h UTC (8h Paris)
  workflow_dispatch:       # Lancement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Reset data.json
        run: echo '{"matchs":[],"combis":[],"historique":[]}' > data.json

      - name: Update data.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          node << 'SCRIPT'
          const https = require('https');

          const BASE_ID = 'appWZRYiCM6c4wQfG';
          const TOKEN = process.env.AIRTABLE_TOKEN;
          const TODAY = new Date().toISOString().split('T')[0];

          function airtableGet(table, formula) {
            return new Promise((resolve, reject) => {
              const params = new URLSearchParams({
                filterByFormula: formula,
                pageSize: '100'
              });
              const options = {
                hostname: 'api.airtable.com',
                path: `/v0/${BASE_ID}/${encodeURIComponent(table)}?${params}`,
                headers: { Authorization: `Bearer ${TOKEN}` }
              };
              https.get(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    resolve(parsed.records || []);
                  } catch(e) {
                    reject(e);
                  }
                });
              }).on('error', reject);
            });
          }

