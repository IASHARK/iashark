name: Update IASHARK Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Write pipeline script
        run: |
          cat > pipeline.js << 'JSEOF'
          const https = require('https');
          const fs = require('fs');

          const AT_TOKEN = process.env.AIRTABLE_TOKEN;
          const APS_KEY  = process.env.APISPORTS_KEY;
          const ODDS_KEY = process.env.ODDS_KEY;
          const OWM_KEY  = process.env.OPENWEATHER_KEY;
          const NEWS_KEY = process.env.NEWSAPI_KEY;
          const ANT_KEY  = process.env.ANTHROPIC_KEY;
          const BASE     = 'appWZRYiCM6c4wQfG';
          const LEAGUES  = [39, 61, 140, 135, 78, 2, 3];
          const SEASON   = 2025;
          const TODAY    = new Date().toISOString().split('T')[0];

          function get(url, headers) {
            headers = headers || {};
            return new Promise(function(resolve) {
              var u = new URL(url);
              https.get({hostname:u.hostname, path:u.pathname+u.search, headers:headers}, function(res) {
                var d = '';
                res.on('data', function(c){ d += c; });
                res.on('end', function(){ try { resolve(JSON.parse(d)); } catch(e){ resolve({}); } });
              }).on('error', function(){ resolve({}); });
            });
          }

          function postJSON(host, path, body, headers) {
            headers = headers || {};
            return new Promise(function(resolve) {
              var data = JSON.stringify(body);
              var req = https.request({
                hostname:host, path:path, method:'POST',
                headers:Object.assign({'Content-Type':'application/json','Content-Length':Buffer.byteLength(data)}, headers)
              }, function(res) {
                var d = '';
                res.on('data', function(c){ d += c; });
                res.on('end', function(){ try { resolve(JSON.parse(d)); } catch(e){ resolve({}); } });
              });
              req.on('error', function(){ resolve({}); });
              req.write(data); req.end();
            });
          }

          function patchJSON(host, path, body, headers) {
            headers = headers || {};
            return new Promise(function(resolve) {
              var data = JSON.stringify(body);
              var req = https.request({
                hostname:host, path:path, method:'PATCH',
                headers:Object.assign({'Content-Type':'application/json','Content-Length':Buffer.byteLength(data)}, headers)
              }, function(res) {
                var d = '';
                res.on('data', function(c){ d += c; });
                res.on('end', function(){ try { resolve(JSON.parse(d)); } catch(e){ resolve({}); } });
              });
              req.on('error', function(){ resolve({}); });
              req.write(data); req.end();
            });
          }

          var sleep = function(ms){ return new Promise(function(r){ setTimeout(r, ms); }); };
          var APS = {'x-apisports-key': APS_KEY};
          var AT  = {Authorization: 'Bearer ' + AT_TOKEN, 'Content-Type': 'application/json'};

          function atUpsert(table, fields) {
            return patchJSON('api.airtable.com',
              '/v0/' + BASE + '/' + encodeURIComponent(table),
              {records:[{fields:fields}], performUpsert:{fieldsToMergeOn:['match_id']}},
              AT
            );
          }

          async function getFixtures() {
            var all = [];
            for (var i = 0; i < LEAGUES.length; i++) {
              var r = await get('https://v3.football.api-sports.io/fixtures?date=' + TODAY + '&league=' + LEAGUES[i] + '&season=' + SEASON, APS);
              if (r.response) all = all.concat(r.response);
              await sleep(300);
            }
            return all;
          }

          async function getTeamStats(teamId, leagueId) {
            var r = await get('https://v3.football.api-sports.io/teams/statistics?team=' + teamId + '&league=' + leagueId + '&season=' + SEASON, APS);
            return r.response || null;
          }

          async function getLast5(teamId) {
            var r = await get('https://v3.football.api-sports.io/fixtures?team=' + teamId + '&last=5&status=FT&season=' + SEASON, APS);
            return r.response || [];
          }

          async function getFullStanding(leagueId) {
            var r = await get('https://v3.football.api-sports.io/standings?league=' + leagueId + '&season=' + SEASON, APS);
            var group = (r.response && r.response[0] && r.response[0].league && r.response[0].league.standings && r.response[0].league.standings[0]) || [];
            return group;
          }

          async function getOdds(homeTeam, awayTeam) {
            var r = await get('https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=' + ODDS_KEY + '&regions=eu&markets=h2h,totals,btts,double_chance&oddsFormat=decimal', {});
            if (!Array.isArray(r)) { console.log('Odds API error:', JSON.stringify(r).slice(0,100)); return null; }
            function sim(a, b) {
              a = a.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();
              b = b.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();
              var wa = a.split(' ').filter(function(x){ return x.length>2; });
              var wb = b.split(' ').filter(function(x){ return x.length>2; });
              return wa.some(function(w){ return wb.some(function(v){ return v.includes(w)||w.includes(v); }); });
            }
            var match = r.find(function(m){
              return (sim(m.home_team||'', homeTeam) && sim(m.away_team||'', awayTeam)) ||
                     (sim(m.home_team||'', awayTeam) && sim(m.away_team||'', homeTeam));
            });
            return match || null;
          }

          function parseOdds(o) {
            if (!o) return {c1:'--',cn:'--',c2:'--',co15:'--',co25:'--',cu25:'--',dc1x:'--',dcx2:'--',btts_oui:'--',btts_non:'--',bookies:[]};
            var c1='--',cn='--',c2='--',co15='--',co25='--',cu25='--',dc1x='--',dcx2='--',btts_oui='--',btts_non='--';
            var bookieNames = [
              {key:'betclic',    label:'\ud83d\udd35 Betclic'},
              {key:'unibet',     label:'\ud83d\udfe2 Unibet'},
              {key:'winamax',    label:'\ud83d\udfe0 Winamax'},
              {key:'bet365',     label:'\u26bd Bet365'},
              {key:'bwin',       label:'\ud83c\udfaf Bwin'},
              {key:'pinnacle',   label:'\ud83d\udccc Pinnacle'},
              {key:'draftkings', label:'\ud83e\udd85 DraftKings'},
              {key:'fanduel',    label:'\ud83c\udfc8 FanDuel'},
            ];
            var bookies = [];
            (o.bookmakers||[]).forEach(function(bk) {
              var h2h  = (bk.markets||[]).find(function(m){ return m.key==='h2h'; });
              var tot  = (bk.markets||[]).find(function(m){ return m.key==='totals'; });
              var dc   = (bk.markets||[]).find(function(m){ return m.key==='double_chance'; });
              var btts = (bk.markets||[]).find(function(m){ return m.key==='btts'; });
              if (h2h) {
                var hm = (h2h.outcomes||[]).find(function(x){ return x.name===o.home_team; });
                var dr = (h2h.outcomes||[]).find(function(x){ return x.name==='Draw'; });
                var aw = (h2h.outcomes||[]).find(function(x){ return x.name===o.away_team; });
                if (c1==='--' && hm) {
                  c1 = hm.price.toFixed(2);
                  cn = dr ? dr.price.toFixed(2) : '--';
                  c2 = aw ? aw.price.toFixed(2) : '--';
                }
                var bkNameLower = bk.title.toLowerCase();
                var found = bookieNames.find(function(b){ return bkNameLower.includes(b.key); });
                var label = found ? found.label : '\ud83c\udfb2 ' + bk.title;
                if (bookies.length < 4) bookies.push({n:label, o:'', c:hm?hm.price.toFixed(2):'--', l:'#'});
              }
              if (tot && co25==='--') {
                var ov25 = (tot.outcomes||[]).find(function(x){ return x.name==='Over'&&x.point===2.5; });
                var ov15 = (tot.outcomes||[]).find(function(x){ return x.name==='Over'&&x.point===1.5; });
                var un25 = (tot.outcomes||[]).find(function(x){ return x.name==='Under'&&x.point===2.5; });
                if (ov25) co25 = ov25.price.toFixed(2);
                if (ov15) co15 = ov15.price.toFixed(2);
                if (un25) cu25 = un25.price.toFixed(2);
              }
              if (dc && dc1x==='--') {
                var d1x = (dc.outcomes||[]).find(function(x){ return x.name==='1X'; });
                var dx2 = (dc.outcomes||[]).find(function(x){ return x.name==='X2'; });
                if (d1x) dc1x = d1x.price.toFixed(2);
                if (dx2) dcx2 = dx2.price.toFixed(2);
              }
              if (btts && btts_oui==='--') {
                var by = (btts.outcomes||[]).find(function(x){ return x.name==='Yes'; });
                var bn = (btts.outcomes||[]).find(function(x){ return x.name==='No'; });
                if (by) btts_oui = by.price.toFixed(2);
                if (bn) btts_non = bn.price.toFixed(2);
              }
            });
            // Fallback bookies si vide
            if (!bookies.length) {
              bookies = [
                {n:'\ud83d\udd35 Betclic', o:'200\u20ac offerts', c:c1, l:'https://www.betclic.fr'},
                {n:'\ud83d\udfe0 Winamax', o:'100\u20ac offerts', c:cn, l:'https://www.winamax.fr'},
                {n:'\ud83d\udfe2 Unibet',  o:'100\u20ac rembours\u00e9s', c:c2, l:'https://www.unibet.fr'}
              ];
            }
            return {c1:c1,cn:cn,c2:c2,co15:co15,co25:co25,cu25:cu25,dc1x:dc1x,dcx2:dcx2,btts_oui:btts_oui,btts_non:btts_non,bookies:bookies};
          }

          async function getWeather(city) {
            if (!city || city.trim()==='') return null;
            var r = await get('https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(city) + '&appid=' + OWM_KEY + '&units=metric&lang=fr', {});
            if (!r || !r.main) return null;
            var desc = (r.weather && r.weather[0] && r.weather[0].description) || '';
            var temp = Math.round(r.main.temp);
            var icon = (r.weather && r.weather[0] && r.weather[0].main) || '';
            var emoji = '\ud83c\udf24\ufe0f';
            if (icon==='Thunderstorm') emoji='\u26c8\ufe0f';
            else if (icon==='Rain'||icon==='Drizzle') emoji='\ud83c\udf27\ufe0f';
            else if (icon==='Snow') emoji='\u2744\ufe0f';
            else if (icon==='Clear') emoji='\u2600\ufe0f';
            else if (icon==='Clouds') emoji=(r.weather[0].description||'').includes('few')?'\ud83c\udf24\ufe0f':'\u2601\ufe0f';
            else if (icon==='Mist'||icon==='Fog') emoji='\ud83c\udf2b\ufe0f';
            return {
              desc: desc.charAt(0).toUpperCase() + desc.slice(1) + ', ' + temp + '\u00b0C',
              temp: temp + '\u00b0C',
              emoji: emoji,
              humidity: r.main.humidity + '%',
              wind: Math.round((r.wind&&r.wind.speed||0)*3.6) + ' km/h'
            };
          }

          async function getNews(team) {
            if (!NEWS_KEY) return [];
            var r = await get('https://newsapi.org/v2/everything?q=' + encodeURIComponent(team) + '&language=fr&pageSize=2&sortBy=publishedAt&apiKey=' + NEWS_KEY, {});
            return ((r.articles||[]).slice(0,2)).map(function(a){
              return {c:team, t:a.title||'', tx:a.description||'', tm:(a.publishedAt||'').split('T')[0]};
            });
          }

          function formatLast5(fixtures, teamId) {
            return fixtures.slice(0,5).map(function(f) {
              var isH = f.teams.home.id === teamId;
              var gf = isH ? (f.goals.home||0) : (f.goals.away||0);
              var ga = isH ? (f.goals.away||0) : (f.goals.home||0);
              var opp = isH ? f.teams.away.name : f.teams.home.name;
              var oppId = isH ? f.teams.away.id : f.teams.home.id;
              var res = gf > ga ? 'W' : gf < ga ? 'L' : 'D';
              var dateStr = (f.fixture.date||'').split('T')[0];
              return {
                d: dateStr,
                opponent: opp,
                opp_id: oppId,
                score: gf + '-' + ga,
                result: res,
                home: isH,
                match: opp,
                lieu: isH ? 'DOM' : 'EXT'
              };
            });
          }

          function calcCriteres(stats, isDom, rank) {
            if (!stats) return {fd:50, att:50, def:50, fr:50, mot:70, fat:50};
            var total = (stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.total)||30;
            var bm = (stats.goals&&stats.goals.for&&stats.goals.for.total&&stats.goals.for.total.total)||0;
            var be = (stats.goals&&stats.goals.against&&stats.goals.against.total&&stats.goals.against.total.total)||0;
            var form = (stats.form||'').slice(-5);
            var pts = form.split('').reduce(function(a,c){ return a+(c==='W'?3:c==='D'?1:0); },0);
            var fr = Math.round(pts/Math.max(form.length*3,1)*100);
            var att = Math.min(100, Math.round(bm/Math.max(total,1)*40));
            var def = Math.max(0, Math.min(100, Math.round((2.5-be/Math.max(total,1))*35)));
            var vd = (stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.home)||0;
            var ve = (stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.away)||0;
            var md = (stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.home)||Math.round(total/2);
            var me = (stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.away)||Math.round(total/2);
            var fd = isDom ? Math.min(100,Math.round(vd/Math.max(md,1)*100)) : Math.min(100,Math.round(ve/Math.max(me,1)*100));
            var mot = 70;
            if (rank) { if(rank<=3) mot=95; else if(rank<=6) mot=85; else if(rank<=10) mot=70; else if(rank>=17) mot=90; else mot=60; }
            return {
              fd:  Math.max(0,Math.min(100,fd)),
              att: Math.max(0,Math.min(100,att)),
              def: Math.max(0,Math.min(100,def)),
              fr:  Math.max(0,Math.min(100,fr)),
              mot: Math.max(0,Math.min(100,mot)),
              fat: 50
            };
          }

          async function genAnalyse(d) {
            var moyBmH = d.bmH&&d.totalH ? (d.bmH/d.totalH).toFixed(2) : '?';
            var moyBeH = d.beH&&d.totalH ? (d.beH/d.totalH).toFixed(2) : '?';
            var moyBmA = d.bmA&&d.totalA ? (d.bmA/d.totalA).toFixed(2) : '?';
            var moyBeA = d.beA&&d.totalA ? (d.beA/d.totalA).toFixed(2) : '?';
            var totalButs = ((d.bmH+d.beA)/2/d.totalH + (d.bmA+d.beH)/2/d.totalA).toFixed(2);

            var prompt =
              'Tu es IASHARK, un expert en paris sportifs avec acces aux donnees statistiques officielles. Tu dois analyser ce match avec une precision chirurgicale et identifier le pari avec le meilleur rapport valeur/risque. Reponds UNIQUEMENT avec un JSON valide, sans backticks, sans commentaires.\
\
'

              + '=== MATCH ===\
'
              + d.home + ' vs ' + d.away + ' | ' + d.league + ' | ' + d.date + '\
'
              + 'Stade: ' + d.stade + ' | Meteo: ' + d.meteo + '\
\
'

              + '=== ' + d.home.toUpperCase() + ' \u2014 DOMICILE (classement #' + (d.rkH||'?') + ') ===\
'
              + 'Matchs joues: ' + d.totalH + ' | Buts marques: ' + d.bmH + ' (' + moyBmH + '/match) | Buts encaisses: ' + d.beH + ' (' + moyBeH + '/match)\
'
              + 'Victoires a domicile: ' + d.vdH + '/' + d.mdH + ' | Forme globale: ' + d.fH + '\
'
              + '5 derniers matchs: ' + d.d5H + '\
\
'

              + '=== ' + d.away.toUpperCase() + ' \u2014 EXTERIEUR (classement #' + (d.rkA||'?') + ') ===\
'
              + 'Matchs joues: ' + d.totalA + ' | Buts marques: ' + d.bmA + ' (' + moyBmA + '/match) | Buts encaisses: ' + d.beA + ' (' + moyBeA + '/match)\
'
              + 'Victoires a l exterieur: ' + d.veA + '/' + d.meA + ' | Forme globale: ' + d.fA + '\
'
              + '5 derniers matchs: ' + d.d5A + '\
\
'

              + '=== COTES REELLES BOOKMAKERS (utilise ces cotes exactes, ne les invente pas) ===\
'
              + '1 (Victoire ' + d.home + '): ' + d.c1 + '\
'
              + 'N (Nul): ' + d.cn + '\
'
              + '2 (Victoire ' + d.away + '): ' + d.c2 + '\
'
              + 'Over 1.5: ' + d.co15 + ' | Over 2.5: ' + d.co25 + ' | Under 2.5: ' + d.cu25 + '\
'
              + 'Double Chance 1X: ' + d.dc1x + ' | Double Chance X2: ' + d.dcx2 + '\
'
              + 'BTTS Oui: ' + d.btts_oui + ' | BTTS Non: ' + d.btts_non + '\
\
'

              + '=== MOYENNES BUTS COMBIN\u00c9ES ===\
'
              + 'Moyenne de buts attendus dans ce match: ' + totalButs + ' buts\
\
'

              + '=== MARCHES DISPONIBLES ===\
'
              + '1. Resultat simple: Victoire ' + d.home + ' / Nul / Victoire ' + d.away + '\
'
              + '2. Double Chance: 1X / X2 / 12\
'
              + '3. Total buts: Over 0.5 / Over 1.5 / Over 2.5 / Over 3.5 / Under 2.5 / Under 1.5\
'
              + '4. BTTS (Les 2 equipes marquent): Oui / Non\
'
              + '5. Combines: Victoire + Under/Over (ex: "Victoire ' + d.home + ' + Under 2.5")\
'
              + '6. Double chance + buts: "1X + Over 1.5"\
\
'

              + '=== REGLES D ANALYSE ===\
'
              + '- Compare la probabilite implicite des cotes (100/cote) avec la probabilite reelle selon les stats\
'
              + '- Si la probabilite reelle depasse la probabilite implicite de la cote de plus de 5%, c est un VALUE BET\
'
              + '- Priorite: securite > rendement. Un pari a 75% de chance a 1.35 est meilleur qu un pari a 45% a 2.10\
'
              + '- Si les defenses sont solides (moins de 1 but encaisse/match), joue Under 2.5\
'
              + '- Si les deux equipes marquent beaucoup (plus de 1.3 buts/match chacune), joue BTTS Oui\
'
              + '- Si une equipe domine clairement a domicile (plus de 60% de victoires chez elle), joue sa victoire\
'
              + '- Ne recommande JAMAIS un pari contraire aux statistiques pour faire plaisir\
\
'

              + '=== FORMAT DE REPONSE OBLIGATOIRE ===\
'
              + 'Reponds avec exactement ce JSON (toutes les cles sont obligatoires):\
'
              + '{\
'
              + '  "confiance": 7.4,\
'
              + '  "pari_rec": "Victoire ' + d.home + ' + Under 2.5",\
'
              + '  "marche": "COMBINE",\
'
              + '  "risque": "MODERE",\
'
              + '  "vbet": "OUI",\
'
              + '  "edge": "+8%",\
'
              + '  "argument": "3 arguments cles courts et percutants justifiant ce pari avec des chiffres precis. Ex: 1. ' + d.home + ' imbattable a domicile (8V/2N/1D). 2. Under 2.5 sorti dans 7 des 10 derniers matchs de ' + d.away + '. 3. Cote 1.85 sous-evaluee vs probabilite reelle 62%.",\
'
              + '  "conseil": "Analyse detaillee en 3-4 phrases. Cite les stats exactes (moyennes buts, forme, classement). Explique pourquoi ce pari est le meilleur selon les donnees. Mentionne les risques eventuels.",\
'
              + '  "contexte": "2-3 phrases sur le contexte du match: importance du match, historique recents des equipes, dynamique actuelle (serie en cours, pression, objectifs de saison).",\
'
              + '  "enjeux": "1 phrase sur les enjeux sportifs: lutte pour le titre / maintien / Europe / coupe / classement direct.",\
'
              + '  "scores_probables": "1-0, 2-0, 1-1, 2-1, 0-0",\
'
              + '  "p1": 55,\
'
              + '  "pn": 25,\
'
              + '  "p2": 20,\
'
              + '  "po15": 82,\
'
              + '  "po25": 45,\
'
              + '  "btts": 38,\
'
              + '  "mise": "3% bankroll"\
'
              + '}\
\
'
              + 'CONTRAINTES STRICTES:\
'
              + '- confiance: decimal entre 1.0 et 10.0 (ex: 7.4 pas 74 pas 0.74)\
'
              + '- p1+pn+p2 doit etre egal a 100\
'
              + '- edge: utilise les cotes reelles fournies pour calculer l edge reel\
'
              + '- vbet = "OUI" seulement si edge superieur a +4%\
'
              + '- pari_rec: nom exact comme chez un bookmaker\
'
              + '- argument: toujours 3 points numerotes, avec chiffres concrets\
'
              + '- mise: entre 1% et 5% bankroll selon la confiance';

            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 1200,
              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});

            var txt = (r.content&&r.content[0]&&r.content[0].text)||'{}';
            try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
            catch(e) { console.log('Parse error:', txt.slice(0,300)); return null; }
          }

          async function genCombis(list) {
            if (list.length < 2) return [];
            var lines = list.map(function(a){
              return '- ' + a.home + ' vs ' + a.away + ': ' + a.pari + ' (confiance ' + a.conf + '/10, edge ' + (a.edge||'?') + ')';
            }).join('\
');
            var prompt = 'Expert paris sportifs IASHARK. Analyses validees du jour:\
' + lines + '\
\
'
              + 'Genere 6 combines intelligents en combinant uniquement les paris les plus solides. Reponds UNIQUEMENT avec ce JSON sans backticks:\
'
              + '{"safe1":{"label":"SAFE 1","type":"safe","selections":"pari1, pari2","matchs":"match1, match2","cote_totale":2.1,"conseil":"Explication courte et precise"},'
              + '"safe2":{"label":"SAFE 2","type":"safe","selections":"","matchs":"","cote_totale":2.5,"conseil":""},'
              + '"medium1":{"label":"MEDIUM 1","type":"medium","selections":"","matchs":"","cote_totale":8.5,"conseil":""},'
              + '"medium2":{"label":"MEDIUM 2","type":"medium","selections":"","matchs":"","cote_totale":11.0,"conseil":""},'
              + '"fun1":{"label":"FUN 1","type":"fun","selections":"","matchs":"","cote_totale":65.0,"conseil":""},'
              + '"fun2":{"label":"FUN 2","type":"fun","selections":"","matchs":"","cote_totale":120.0,"conseil":""}}';

            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 1000,
              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});

            var txt = (r.content&&r.content[0]&&r.content[0].text)||'{}';
            try {
              var raw = JSON.parse(txt.replace(/```json|```/g,'').trim());
              return Object.values(raw).map(function(c){
                return {
                  label: c.label||'', type: c.type||'safe',
                  cote_totale: c.cote_totale||0, desc: c.conseil||'',
                  legs: (c.selections||'').split(',').map(function(s,i){
                    return {match:(c.matchs||'').split(',')[i]?((c.matchs||'').split(',')[i].trim()):'', bet:s.trim(), cote:'--'};
                  })
                };
              });
            } catch(e) { return []; }
          }

          function lgIcon(l) {
            var s = (l||'').toLowerCase();
            if(s.includes('ligue 1')||s.includes('ligue 2')) return '\uD83C\uDDEB\uD83C\uDDF7';
            if(s.includes('la liga')) return '\uD83C\uDDEA\uD83C\uDDF8';
            if(s.includes('serie a')) return '\uD83C\uDDEE\uD83C\uDDF9';
            if(s.includes('bundesliga')) return '\uD83C\uDDE9\uD83C\uDDEA';
            if(s.includes('premier')) return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
            if(s.includes('champions')) return '\uD83C\uDFC6';
            return '\uD83C\uDFC6';
          }

          async function main() {
            console.log('=== IASHARK', TODAY, '===');
            var fixtures = await getFixtures();
            console.log('Fixtures:', fixtures.length);

            if (!fixtures.length) {
              fs.writeFileSync('data.json', JSON.stringify({matchs:[],combis:[],historique:[]},null,2));
              return;
            }

            var matchsData = [];
            var forCombis = [];
            var standingsCache = {};

            for (var fi = 0; fi < fixtures.length; fi++) {
              var fix = fixtures[fi];
              var f    = fix.fixture;
              var lg   = fix.league;
              var home = fix.teams.home;
              var away = fix.teams.away;
              console.log('\
-> ' + home.name + ' vs ' + away.name + ' (' + lg.name + ')');

              // Cache classement par ligue
              if (!standingsCache[lg.id]) {
                standingsCache[lg.id] = await getFullStanding(lg.id);
                await sleep(300);
              }
              var standings = standingsCache[lg.id];
              var entryH = standings.find(function(s){ return s.team.id===home.id; });
              var entryA = standings.find(function(s){ return s.team.id===away.id; });
              var rkH = entryH ? entryH.rank : null;
              var rkA = entryA ? entryA.rank : null;
              var ptsH = entryH ? entryH.points : null;
              var ptsA = entryA ? entryA.points : null;

              var results = await Promise.all([
                getTeamStats(home.id, lg.id),
                getTeamStats(away.id, lg.id),
                getLast5(home.id),
                getLast5(away.id),
                getWeather(f.venue&&f.venue.city ? f.venue.city : ''),
                getNews(home.name),
                getNews(away.name),
                getOdds(home.name, away.name)
              ]);
              await sleep(500);

              var sH=results[0], sA=results[1], l5H=results[2], l5A=results[3];
              var wx=results[4], nH=results[5], nA=results[6], oddsRaw=results[7];

              var d5H = formatLast5(l5H, home.id);
              var d5A = formatLast5(l5A, away.id);
              var odds = parseOdds(oddsRaw);
              var critH = calcCriteres(sH, true,  rkH);
              var critA = calcCriteres(sA, false, rkA);

              var totalH = (sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.total)||30;
              var totalA = (sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.total)||30;
              var mdH = (sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.home)||Math.round(totalH/2);
              var meA = (sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.away)||Math.round(totalA/2);

              var d5Hstr = d5H.map(function(m){ return m.result+' '+m.score+' vs '+m.match+' ('+m.lieu+')'; }).join(' | ') || 'N/A';
              var d5Astr = d5A.map(function(m){ return m.result+' '+m.score+' vs '+m.match+' ('+m.lieu+')'; }).join(' | ') || 'N/A';
              var heure = (f.date||'').split('T')[1] ? (f.date||'').split('T')[1].slice(0,5) : '';

              var meteoStr = wx ? (wx.desc + ' | Vent: ' + wx.wind + ' | Humidite: ' + wx.humidity) : 'N/A';

              var an = await genAnalyse({
                home:home.name, away:away.name, league:lg.name,
                date:TODAY+' '+heure, stade:(f.venue&&f.venue.name)||'',
                meteo: meteoStr,
                fH:(sH&&sH.form)||'', fA:(sA&&sA.form)||'',
                rkH:rkH, rkA:rkA,
                totalH:totalH, totalA:totalA,
                mdH:mdH, meA:meA,
                bmH:(sH&&sH.goals&&sH.goals.for&&sH.goals.for.total&&sH.goals.for.total.total)||0,
                beH:(sH&&sH.goals&&sH.goals.against&&sH.goals.against.total&&sH.goals.against.total.total)||0,
                bmA:(sA&&sA.goals&&sA.goals.for&&sA.goals.for.total&&sA.goals.for.total.total)||0,
                beA:(sA&&sA.goals&&sA.goals.against&&sA.goals.against.total&&sA.goals.against.total.total)||0,
                vdH:(sH&&sH.fixtures&&sH.fixtures.wins&&sH.fixtures.wins.home)||0,
                veH:(sH&&sH.fixtures&&sH.fixtures.wins&&sH.fixtures.wins.away)||0,
                vdA:(sA&&sA.fixtures&&sA.fixtures.wins&&sA.fixtures.wins.home)||0,
                veA:(sA&&sA.fixtures&&sA.fixtures.wins&&sA.fixtures.wins.away)||0,
                d5H:d5Hstr, d5A:d5Astr,
                c1:odds.c1, cn:odds.cn, c2:odds.c2,
                co15:odds.co15, co25:odds.co25, cu25:odds.cu25,
                dc1x:odds.dc1x, dcx2:odds.dcx2,
                btts_oui:odds.btts_oui, btts_non:odds.btts_non
              });
              await sleep(600);

              var matchObj = {
                id: f.id,
                home: {n:home.name, id:home.id},
                away: {n:away.name, id:away.id},
                league: lg.name,
                ligue_icon: lgIcon(lg.name),
                date: (TODAY+' '+heure).trim(),
                cat: ['all'],
                val:  an ? (an.confiance||0) >= 6.5 : false,
                hot:  an ? (an.confiance||0) >= 8.0 : false,
                // confiance stockee directement sur 10, pas divisee
                conf: an ? parseFloat(an.confiance||0) : 0,
                p1:   an?(an.p1||0):0,
                pn:   an?(an.pn||0):0,
                p2:   an?(an.p2||0):0,
                po15: an?(an.po15||0):0,
                po25: an?(an.po25||0):0,
                btts: an?(an.btts||0):0,
                // cotes reelles bookmakers
                c1:odds.c1, cn:odds.cn, c2:odds.c2,
                co15:odds.co15, co25:odds.co25, cu25:odds.cu25,
                dc1x:odds.dc1x, dcx2:odds.dcx2,
                btts_oui:odds.btts_oui, btts_non:odds.btts_non,
                edge: an?(an.edge||''):'',
                marche: an?(an.marche||'RESULTAT'):'RESULTAT',
                risque: an?(an.risque||''):'',
                pari_rec: an?(an.pari_rec||''):'',
                mise: an?(an.mise||'2-3% bankroll'):'2-3% bankroll',
                argument: an?(an.argument||''):'',
                conseil_public: an?(an.conseil||''):'',
                contexte: an?(an.contexte||''):'',
                enjeux: an?(an.enjeux||''):'',
                vbet: an?(an.vbet||'NON'):'NON',
                scores: an?((an.scores_probables||'').split(',').map(function(s){ return s.trim(); }).filter(Boolean)):[],
                stade: {
                  nom: f.venue&&f.venue.name ? f.venue.name+(f.venue.city?' \u2014 '+f.venue.city:'') : '',
                  cap: '',
                  meteo: wx ? wx.emoji : '\ud83c\udf24\ufe0f',
                  temp: wx ? wx.temp : '',
                  desc: wx ? wx.desc : ''
                },
                crit_home: critH,
                crit_away: critA,
                h2h: [], h2h_txt: '',
                joueurs: [],
                actu: (nH||[]).concat(nA||[]),
                bookies: odds.bookies,
                paris_risque: {bet:'', cote:'', proba:''},
                paris_safe: {
                  bet: an?(an.pari_rec||''):'',
                  cote: odds.c1,
                  proba: an?(an.p1||0)+'%':''
                },
                value_calc: an?(an.edge||''):'',
                // forme sur la saison
                forme_h: (sH&&sH.form)||'',
                forme_a: (sA&&sA.form)||'',
                // 5 derniers matchs format index
                form_home: d5H,
                form_away: d5A,
                derniers_home: d5H,
                derniers_away: d5A,
                // classement complet
                classement_home: rkH,
                classement_away: rkA,
                standing_home: entryH ? {
                  rank: entryH.rank,
                  pts: entryH.points,
                  won: entryH.all.win,
                  draw: entryH.all.draw,
                  lost: entryH.all.lose,
                  gf: entryH.all.goals.for,
                  ga: entryH.all.goals.against,
                  gd: entryH.goalsDiff,
                  form: entryH.form||''
                } : null,
                standing_away: entryA ? {
                  rank: entryA.rank,
                  pts: entryA.points,
                  won: entryA.all.win,
                  draw: entryA.all.draw,
                  lost: entryA.all.lose,
                  gf: entryA.all.goals.for,
                  ga: entryA.all.goals.against,
                  gd: entryA.goalsDiff,
                  form: entryA.form||''
                } : null
              };

              matchsData.push(matchObj);
              if (an) forCombis.push({home:home.name, away:away.name, pari:an.pari_rec, conf:an.confiance, edge:an.edge});

              try {
                await atUpsert('MATCHES', {
                  match_id:String(f.id), home_team:home.name, away_team:away.name,
                  home_team_id:home.id, away_team_id:away.id, league:lg.name,
                  date:TODAY, heure:heure, stade:(f.venue&&f.venue.name)||'',
                  ville_stade:(f.venue&&f.venue.city)||''
                });
                if (an) await atUpsert('ANALYSES', {
                  match_id:String(f.id),
                  confiance:an.confiance,
                  pari_rec:an.pari_rec,
                  risque:an.risque,
                  edge:an.edge,
                  argument:an.argument||'',
                  conseil:an.conseil,
                  contexte:an.contexte,
                  enjeux:an.enjeux,
                  vbet:an.vbet,
                  p1:an.p1, pn:an.pn, p2:an.p2,
                  po15:an.po15, po25:an.po25,
                  btts:an.btts,
                  date_generation:TODAY
                });
              } catch(e) { console.log('AT err:', e.message); }

              console.log('  OK conf:' + (an&&an.confiance) + ' | ' + (an&&an.pari_rec) + ' | edge:' + (an&&an.edge));
            }

            console.log('\
Generating combis...');
            var combisData = await genCombis(forCombis);

            fs.writeFileSync('data.json', JSON.stringify({matchs:matchsData, combis:combisData, historique:[]}, null, 2));
            console.log('=== DONE: ' + matchsData.length + ' matchs | ' + combisData.length + ' combis ===');
          }

          main().catch(function(e){ console.error('FATAL:', e.message); process.exit(0); });
          JSEOF

      - name: Run pipeline
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node pipeline.js

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily update - $(date +%Y-%m-%d)"
          git push
