                else if(p2.includes('under')) coteRec2=odds.cu25;
                else if(p2.includes('nul')) coteRec2=odds.cn;
                else if(p2.includes('victoire')&&(p2.includes(away.name.toLowerCase().slice(0,4))||p2.includes('ext'))) coteRec2=odds.c2;
                forCombis.push({home:home.name,away:away.name,pari:an.pari_rec,conf:an.confiance,edge:an.edge||'',cote:coteRec2&&coteRec2!=='--'?parseFloat(coteRec2):1.5});
              }
              console.log('  OK conf='+matchObj.conf+' edge='+matchObj.edge+' pari='+matchObj.pari_rec);
            }
            matchsData.sort(function(a, b) {
              var timeA = (a.date||'').split(' ')[1]||'99:99';
              var timeB = (b.date||'').split(' ')[1]||'99:99';
              if (timeA < timeB) return -1;
              if (timeA > timeB) return 1;
              return 0;
            });
            var todayDate = new Date(TODAY+'T12:00:00Z');
            var dayOfWeek = todayDate.getUTCDay();
            var isSamedi = (dayOfWeek === 6);
            var isDimanche = (dayOfWeek === 0);
            var combisRaw = await genCombis(forCombis, isSamedi, isDimanche, matchsData);
            var combisData = combisRaw.map(function(c){
              return {label:c.label,type:c.type,selections:c.selections,matchs:c.matchs,cote_totale:c.cote_totale,conseil:c.conseil};
            });

            if (matchsData.length > 0) {
              console.log('\n=== TRADUCTION EN COURS ===');
              var LANGS_TR = ['en'];
              var LANG_NAMES_TR = {en:'English'};
              for (var li = 0; li < LANGS_TR.length; li++) {
                var lg = LANGS_TR[li];
                var lgName = LANG_NAMES_TR[lg];
                try {
                  var textsForLang = matchsData.map(function(m) {
                    return {id:m.id, a:m.analyse_card||'', c:m.conseil_public||'', p:m.pari_rec||'', v:m.verdict_shark||'', fx:m.facteur_x||''};
                  });
                  var trPrompt = 'Translate these football betting analyses to ' + lgName + '.\n'
                    + 'Rules: keep BTTS, Over 2.5, Under 2.5, Double Chance, Edge, Value Bet in English. Do not translate team names.\n'
                    + 'Return ONLY valid JSON array, no markdown, no explanation:\n'
                    + '[{"id":1,"a":"analyse_card","c":"conseil","p":"pari_rec","v":"verdict_shark","fx":"facteur_x"},...]\n\n'
                    + JSON.stringify(textsForLang);
                  var trResp = await postJSON('api.anthropic.com', '/v1/messages', {
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 2000,
                    messages: [{role:'user', content: trPrompt}]
                  }, {'x-api-key': ANT_KEY, 'anthropic-version': '2023-06-01'});
                  var trText = (trResp.content&&trResp.content[0]&&trResp.content[0].text)||'[]';
                  var trClean = trText.replace(/```json|```/g,'').trim();
                  var trData = JSON.parse(trClean);
                  trData.forEach(function(tr) {
                    var m = matchsData.find(function(x){return x.id===tr.id;});
                    if (!m) return;
                    m['analyse_card_'+lg] = tr.a||m.analyse_card;
                    m['conseil_public_'+lg] = tr.c||m.conseil_public;
                    m['pari_rec_'+lg] = tr.p||m.pari_rec;
                    m['verdict_shark_'+lg] = tr.v||m.verdict_shark;
                    m['facteur_x_'+lg] = tr.fx||m.facteur_x;
                  });
                  console.log('  ' + lgName + ' OK');
                } catch(e) {
                  console.log('  ' + lgName + ' erreur: ' + e.message);
                }
              }
              console.log('  Traduction terminee pour ' + matchsData.length + ' matchs');
            }
            fs.writeFileSync('data.json', JSON.stringify({matchs:matchsData,combis:combisData},null,2));
            console.log('\n=== DONE: '+matchsData.length+' matchs | '+combisData.length+' combis ===');

            // ═══════════════════════════════════════════
            // HISTORIQUE — Résultats d'hier + ROI mensuel
            // ═══════════════════════════════════════════
            async function updateHistorique() {
              console.log('\n=== HISTORIQUE UPDATE ===');
              var histoPath = 'historique.json';
              var histo = {predictions:[], stats:{winrate:0,roi:0,total:0,streak:0,wins:0,losses:0}, monthly:[], backtesting:{}};
              try { histo = JSON.parse(fs.readFileSync(histoPath,'utf8')); } catch(e) {}

              // Récupérer les résultats d'hier
              var yesterday = new Date(TODAY+'T12:00:00Z');
              yesterday.setDate(yesterday.getDate()-1);
              var yDate = yesterday.toISOString().split('T')[0];

              try {
                var yFixtures = await get('https://v3.football.api-sports.io/fixtures?date='+yDate+'&timezone=Europe/Paris', APS);
                var yResults = (yFixtures.response||[]);

                for (var yr=0; yr<yResults.length; yr++) {
                  var fix = yResults[yr];
                  var fid = fix.fixture&&fix.fixture.id;
                  var homeN = fix.teams&&fix.teams.home&&fix.teams.home.name||'';
                  var awayN = fix.teams&&fix.teams.away&&fix.teams.away.name||'';
                  var gh = fix.goals&&fix.goals.home!=null?fix.goals.home:null;
                  var ga = fix.goals&&fix.goals.away!=null?fix.goals.away:null;
                  var status = fix.fixture&&fix.fixture.status&&fix.fixture.status.short||'';
                  if(status!=='FT'&&status!=='AET'&&status!=='PEN') continue;
                  if(gh===null||ga===null) continue;

                  // Chercher la prédiction pending — d'abord par fixture_id, puis par noms
                  var found = histo.predictions.find(function(p){
                    return p.result==='pending' && p.fixture_id===fid;
                  });
                  if(!found) {
                    found = histo.predictions.find(function(p){
                      return p.result==='pending'
                        && p.type==='single'
                        && p.date&&p.date.substring(0,10)===yDate
                        && levenshtein((p.home||'').toLowerCase(), homeN.toLowerCase()) <= 3
                        && levenshtein((p.away||'').toLowerCase(), awayN.toLowerCase()) <= 3;
                    });
                  }
                  if(!found) continue;

                  // Vérifier le résultat selon le marché
                  var pred = (found.prediction||'').toLowerCase();
                  var isWin = false;
                  if(pred.includes('over 1.5'))                                          isWin=(gh+ga)>1;
                  else if(pred.includes('over 2.5'))                                     isWin=(gh+ga)>2;
                  else if(pred.includes('over 3.5'))                                     isWin=(gh+ga)>3;
                  else if(pred.includes('under 2.5'))                                    isWin=(gh+ga)<3;
                  else if(pred.includes('under 3.5'))                                    isWin=(gh+ga)<4;
                  else if(pred.includes('btts non')||pred.includes('les deux equipes ne marquent pas')) isWin=(gh===0||ga===0);
                  else if(pred.includes('btts'))                                         isWin=(gh>0&&ga>0);
                  else if(pred.includes('1x')||pred.includes('dc 1x'))                  isWin=(gh>=ga);
                  else if(pred.includes('x2')||pred.includes('dc x2'))                  isWin=(ga>=gh);
                  else if(pred.includes('nul')||pred.includes('draw'))                   isWin=(gh===ga);
                  else if(pred.includes('victoire')||pred.includes(homeN.toLowerCase().slice(0,4))) {
                    // Victoire DOM ou EXT — détecter lequel
                    if(pred.includes(awayN.toLowerCase().slice(0,4))||pred.includes('ext')||pred.includes(awayN.toLowerCase().slice(0,5))) isWin=(ga>gh);
                    else isWin=(gh>ga);
                  }
                  found.result = isWin?'win':'loss';
                  found.score  = gh+'-'+ga;
                  found.fixture_id = fid;
                  found.resolved_date = yDate;
                  console.log('  Résolu: '+found.match+' → '+found.result+' ('+gh+'-'+ga+')');
                }
              } catch(e) {
                console.log('  Résultats hier erreur:', e.message);
              }

              // Ajouter les prédictions du jour (pending) — pari principal + marché + edge + conf
              for (var mi=0; mi<matchsData.length; mi++) {
                var m = matchsData[mi];
                var alreadyExists = histo.predictions.find(function(p){
                  return p.fixture_id===m.id || (p.home===m.home.n && p.away===m.away.n && p.date&&p.date.substring(0,10)===TODAY);
                });
                if(!alreadyExists) {
                  // TOUJOURS utiliser pari_rec — même pari partout (index + page match + historique)
                  var betLabel = m.pari_rec || '';
                  var betCote  = parseFloat(m.cote_rec)||null;
                  // Marché normalisé pour le backtesting
                  var marketType = 'autre';
                  if(betLabel){
                    var bl=betLabel.toLowerCase();
                    if(bl.includes('over 2.5'))      marketType='over25';
                    else if(bl.includes('under 2.5')) marketType='under25';
                    else if(bl.includes('over 1.5'))  marketType='over15';
                    else if(bl.includes('btts non'))  marketType='btts_non';
                    else if(bl.includes('btts'))      marketType='btts_oui';
                    else if(bl.includes('1x'))        marketType='dc1x';
                    else if(bl.includes('x2'))        marketType='dc_x2';
                    else if(bl.includes('nul'))       marketType='nul';
                    else if(bl.includes('victoire')&&(bl.includes(m.home.n.toLowerCase().slice(0,4))||bl.includes('dom'))) marketType='dom';
                    else if(bl.includes('victoire')) marketType='ext';
                  }
                  // Bucket de confiance
                  var confBucket = m.conf>=8?'8+':m.conf>=7?'7-8':m.conf>=6?'6-7':m.conf>=5?'5-6':'<5';
                  // Bucket d'edge
                  var edgeNum=parseFloat((m.edge||'').replace(/[^0-9.]/g,''))||0;
                  var edgeBucket = edgeNum>=10?'10%+':edgeNum>=7?'7-10%':edgeNum>=5?'5-7%':edgeNum>0?'1-5%':'0%';

                  if(betLabel) {
                    histo.predictions.unshift({
                      match: m.home.n+' vs '+m.away.n,
                      home: m.home.n, away: m.away.n,
                      prediction: betLabel,
                      cote: betCote,
                      conf: m.conf,
                      conf_bucket: confBucket,
                      edge: m.edge,
                      edge_num: edgeNum,
                      edge_bucket: edgeBucket,
                      market: marketType,
                      league: m.league||'',
                      league_key: m.league_key||'',
                      elo_diff: m.elo_diff||null,
                      has_pinnacle: !!(m.pinnacle_snapshot),
                      has_elo: !!(m.elo_home),
                      date: TODAY,
                      result: 'pending',
                      fixture_id: m.id,
                      type: 'single',
                      score: null
                    });
                  }
                }
              }

              // Ajouter les combinés du jour
              for (var ci=0; ci<combisData.length; ci++) {
                var combi = combisData[ci];
                var alreadyCombi = histo.predictions.find(function(p){
                  return p.type==='combi' && p.label===combi.label && p.date&&p.date.substring(0,10)===TODAY;
                });
                if(!alreadyCombi && combi.selections) {
                  histo.predictions.unshift({
                    match: combi.label+' — '+combi.matchs,
                    home: combi.label,
                    away: '',
                    prediction: combi.selections,
                    cote: parseFloat(combi.cote_totale)||null,
                    date: TODAY,
                    result: 'pending',
                    fixture_id: null,
                    type: 'combi',
                    label: combi.label,
                    conseil: combi.conseil||''
                  });
                }
              }

              // Garder max 90 jours
              histo.predictions = histo.predictions.slice(0, 270);

              // Recalculer les stats globales
              var resolved = histo.predictions.filter(function(p){return p.result!=='pending';});
              var wins = resolved.filter(function(p){return p.result==='win';});
              var total = resolved.length;
              var winrate = total>0?(wins.length/total*100):0;
              // ROI basé sur les vraies cotes (fallback 1.75)
              var roiTotal = 0;
              resolved.forEach(function(p){
                var c = parseFloat(p.cote)||1.75;
                roiTotal += p.result==='win' ? (c-1) : -1;
              });
              var roi = total>0?(roiTotal/total*100):0;

              // Série en cours — uniquement sur les paris singles résolus
              var streak=0;
              var singles=histo.predictions.filter(function(p){return p.type==='single'&&p.result!=='pending';});
              for(var si=0;si<singles.length;si++){
                var isW=singles[si].result==='win';
                if(si===0){ streak=isW?1:-1; }
                else if(isW&&streak>0){ streak++; }
                else if(!isW&&streak<0){ streak--; }
                else break;
              }

              histo.stats = {
                winrate: Math.round(winrate*10)/10,
                roi: Math.round(roi*10)/10,
                total: total,
                streak: streak,
                wins: wins.length,
                losses: total-wins.length
              };

              // ── BREAKDOWN BACKTESTING ─────────────────────────────
              function breakdown(field) {
                var groups={};
                resolved.filter(function(p){return p.type==='single';}).forEach(function(p){
                  var k=p[field]||'inconnu';
                  if(!groups[k])groups[k]={wins:0,losses:0,roi:0};
                  if(p.result==='win'){groups[k].wins++;groups[k].roi+=(parseFloat(p.cote)||1.75)-1;}
                  else{groups[k].losses++;groups[k].roi-=1;}
                });
                return Object.keys(groups).sort().map(function(k){
                  var g=groups[k];
                  var tot=g.wins+g.losses;
                  return {key:k,wins:g.wins,losses:g.losses,total:tot,
                    winrate:tot>0?Math.round(g.wins/tot*1000)/10:0,
                    roi:tot>0?Math.round(g.roi/tot*1000)/10:0};
                }).sort(function(a,b){return b.total-a.total;});
              }

              histo.backtesting = {
                by_market:     breakdown('market'),
                by_league:     breakdown('league_key'),
                by_conf:       breakdown('conf_bucket'),
                by_edge:       breakdown('edge_bucket'),
                by_has_pinnacle: breakdown('has_pinnacle'),
                by_has_elo:    breakdown('has_elo'),
                updated: TODAY
              };

              // Log les insights les plus utiles
              var mktStats = histo.backtesting.by_market;
              console.log('  === BACKTESTING INSIGHTS ===');
              mktStats.forEach(function(m){
                if(m.total>=5) console.log('  '+m.key+': '+m.winrate+'% winrate | ROI '+m.roi+'% | '+m.total+' paris');
              });
              var confStats = histo.backtesting.by_conf;
              confStats.forEach(function(c){
                if(c.total>=5) console.log('  Conf '+c.key+': '+c.winrate+'% winrate | '+c.total+' paris');
              });

              // Calcul ROI mensuel
              var months = {};
              histo.predictions.forEach(function(p){
                if(p.result==='pending')return;
                var key = (p.date||'').substring(0,7); // YYYY-MM
                if(!months[key])months[key]={wins:0,losses:0,label:''};
                if(p.result==='win')months[key].wins++;
                else months[key].losses++;
              });
              histo.monthly = Object.keys(months).sort().reverse().slice(0,6).map(function(k){
                var mo=months[k];
                var tot=mo.wins+mo.losses;
                var r=tot>0?((mo.wins*0.75-mo.losses)/tot*100):0;
                var parts=k.split('-');
                var mn=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
                return {month:k,label:(mn[parseInt(parts[1])-1]||parts[1])+' '+parts[0],wins:mo.wins,losses:mo.losses,total:tot,roi:Math.round(r*10)/10};
              });

              fs.writeFileSync(histoPath, JSON.stringify(histo,null,2));
              console.log('  Historique: '+total+' paris resolus | Winrate: '+winrate.toFixed(0)+'% | ROI: '+roi.toFixed(1)+'%');
            }
            // ── RESET HISTORIQUE PROPRE pour repartir de zéro demain ──
            // On vide les anciennes prédictions mais on garde la structure
            try {
              var histoReset = {
                predictions: [],
                stats: {winrate:0,roi:0,total:0,streak:0,wins:0,losses:0},
                monthly: [],
                backtesting: {},
                reset_date: TODAY,
                note: 'Historique réinitialisé le '+TODAY+' — nouveau pipeline actif'
              };
              // Lire l'existant pour ne pas écraser si déjà reset aujourd'hui
              var existHisto = null;
              try { existHisto = JSON.parse(fs.readFileSync('historique.json','utf8')); } catch(e){}
              if(!existHisto||!existHisto.reset_date||existHisto.reset_date!==TODAY) {
                fs.writeFileSync('historique.json', JSON.stringify(histoReset,null,2));
                console.log('=== HISTORIQUE RÉINITIALISÉ — Nouveau départ propre ===');
              }
            } catch(e){ console.log('Reset historique erreur:', e.message); }

            await updateHistorique();


            console.log('\n=== MULTILINGUAL PIPELINE START ===');
            generateWorldCupPages();
            await generateMultilingualMatchPages(matchsData);

            // ── RÉCUPÉRER MATCHS J+3 à J+10 pour previews ──
            var upcomingFixtures = [];
            try {
              var upcomingLeagues = LEAGUES.slice(0, 8);
              for (var uli = 0; uli < upcomingLeagues.length; uli++) {
                var uLg = upcomingLeagues[uli];
                for (var dayOffset = 3; dayOffset <= 10; dayOffset++) {
                  var futureDate = new Date(TODAY+'T12:00:00Z');
                  futureDate.setDate(futureDate.getDate() + dayOffset);
                  var futureDateStr = futureDate.toISOString().split('T')[0];
                  var futUrl = 'https://v3.football.api-sports.io/fixtures?league='+uLg+'&season='+SEASON+'&date='+futureDateStr;
                  var futResp = await get(futUrl, APS);
                  if (futResp && futResp.response) {
                    futResp.response.forEach(function(fx) {
                      if (fx.teams && fx.fixture) {
                        upcomingFixtures.push({
                          home: fx.teams.home.name,
                          away: fx.teams.away.name,
                          date: futureDateStr,
                          league: fx.league ? fx.league.name : ''
                        });
                      }
                    });
                  }
                  await sleep(100);
                }
              }
              var seen = {};
              upcomingFixtures = upcomingFixtures.filter(function(f) {
                var k = f.home+'_'+f.away+'_'+f.date;
                if (seen[k]) return false;
                seen[k] = true;
                return true;
              });
              console.log('  Matchs a venir trouves: '+upcomingFixtures.length);
            } catch(e) {
              console.log('  Fixtures a venir erreur: '+e.message);
            }

            await generateBlogArticles(matchsData, upcomingFixtures);
            await generateTranslatedGuides();
            await generateBlogGuideIndexPages();
            await generateBlogIndexPages(matchsData, upcomingFixtures);
            generateSitemaps(matchsData);
            console.log('\n=== MULTILINGUAL DONE ===');
          }
          main().catch(function(e){ console.error('FATAL:', e.message); process.exit(0); });
          JSEOF

      - name: Run pipeline
        env:
          APISPORTS_KEY:   ${{ secrets.APISPORTS_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          NEWSAPI_KEY:     ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY:   ${{ secrets.ANTHROPIC_KEY }}
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
        run: node pipeline.js

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json historique.json sitemap.xml sitemap-*.xml
          git add en/ es/ pt/ de/ it/ ar/ tr/ nl/ pl/ id/ no/ sv/ ro/ el/ cs/ hu/ sr/ uk/ ru/ ja/ ko/ th/ hi/ ms/ da/ fi/ sw/ 2>/dev/null || true
          git add blog/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily update + multilingual - $(date +%Y-%m-%d)"
          git push
