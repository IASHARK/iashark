              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});

            var txt = ((r.content||[]).find(function(b){return b.type==='text';})||{}).text||'{}';
            try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
            catch(e) { console.log('Parse error genAnalyse:', txt.slice(0,200)); return null; }
          }

          async function genCombis(list, isSamedi, isDimanche, allMatchs) {
            if (list.length < 1) return [];
            var sortedForCombis = list.slice().sort(function(a,b){return b.conf-a.conf;});
            var topPicks = sortedForCombis.slice(0, 10);
            var lines = topPicks.map(function(a){
              return '- '+a.home+' vs '+a.away+': '+a.pari+' cote '+a.cote+' (confiance '+a.conf+'/10, edge '+(a.edge||'?')+')';
            }).join('\n');
            var promptClassic =
              'Expert paris sportifs IASHARK. Meilleurs signaux du jour (triés par confiance):\n'+lines+'\n\n'
              +'MISSION : Génère 3 combinés optimisés pour un TAUX DE RÉUSSITE MAXIMAL.\n'
              +'RÈGLES :\n'
              +'- Marchés autorisés : Over 2.5, BTTS Non, Double Chance 1X ou X2 uniquement. INTERDITS : Under 2.5, BTTS Oui, victoires sèches.\n'
              +'- RÈGLE ANTI-CORRÉLATION : max 2 paris du même type dans un combiné.\n'
