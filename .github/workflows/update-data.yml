              +'"c3":{"label":"SHARK AUDACE","type":"audace","selections":"pari1, pari2, pari3","matchs":"m1, m2, m3","cote_totale":"7.2","conseil":"..."}}';
            var r = await postJSON('api.anthropic.com', '/v1/messages', {
              model: 'claude-sonnet-4-6',
              max_tokens: 800,
              messages: [{role:'user', content:promptClassic}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});
