name: Update data.json

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Reset data.json
        run: echo '{"matchs":[],"combis":[],"historique":[]}' > data.json

      - name: Update data.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const BASE_ID = 'appWZRYiCM6c4wQfG';
          const TOKEN = process.env.AIRTABLE_TOKEN;

          function airtableGet(table, formula) {
            return new Promise((resolve, reject) => {
              const params = new URLSearchParams({ filterByFormula: formula, pageSize: '100' });
              const url = `/v0/${BASE_ID}/${encodeURIComponent(table)}?${params}`;
              console.log('GET', table, '|', formula);
              const options = {
                hostname: 'api.airtable.com',
                path: url,
                headers: { Authorization: `Bearer ${TOKEN}` }
              };
              https.get(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    if (parsed.error) console.log('AIRTABLE ERROR:', JSON.stringify(parsed.error));
                    resolve(parsed.records || []);
                  } catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          // Récupérer SANS filtre pour voir ce qui existe
          function airtableGetAll(table) {
            return new Promise((resolve, reject) => {
              const params = new URLSearchParams({ pageSize: '5' });
              const options = {
                hostname: 'api.airtable.com',
                path: `/v0/${BASE_ID}/${encodeURIComponent(table)}?${params}`,
                headers: { Authorization: `Bearer ${TOKEN}` }
              };
              https.get(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data).records || []); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function getLigueIcon(league) {
            const l = (league || '').toLowerCase();
            if (l.includes('ligue 1') || l.includes('france')) return '🇫🇷';
            if (l.includes('liga') || l.includes('espagne')) return '🇪🇸';
            if (l.includes('serie a') || l.includes('italie')) return '🇮🇹';
            if (l.includes('bundesliga') || l.includes('allemagne')) return '🇩🇪';
            if (l.includes('premier') || l.includes('championship')) return '🏴󠁧󠁢󠁥󠁮󠁧󠁿';
            if (l.includes('champions') || l.includes('ldc') || l.includes('ucl')) return '🏆';
            return '🏆';
          }

          async function main() {
            // DEBUG: voir les 5 premiers enregistrements sans filtre
            console.log('=== DEBUG: 5 premiers matchs sans filtre ===');
            const allMatches = await airtableGetAll('TABLE 1 - MATCHES');
            allMatches.forEach(r => {
              console.log('MATCH:', JSON.stringify(r.fields).substring(0, 200));
            });

            console.log('=== DEBUG: 5 premières analyses sans filtre ===');
            const allAnalyses = await airtableGetAll('TABLE 2 - ANALYSES');
            allAnalyses.forEach(r => {
              console.log('ANALYSE:', JSON.stringify(r.fields).substring(0, 200));
            });

            console.log('=== DEBUG: 5 premiers combis sans filtre ===');
            const allCombis = await airtableGetAll('TABLE 7 - COMBINES');
            allCombis.forEach(r => {
              console.log('COMBI:', JSON.stringify(r.fields).substring(0, 200));
            });

            // Maintenant avec filtre TODAY()
            console.log('=== Filtre TODAY() ===');
            const [matches, analyses, combis] = await Promise.all([
              airtableGet('TABLE 1 - MATCHES',  `IS_SAME({date}, TODAY(), 'day')`),
              airtableGet('TABLE 2 - ANALYSES', `IS_SAME({date_generation}, TODAY(), 'day')`),
              airtableGet('TABLE 7 - COMBINES', `IS_SAME({date}, TODAY(), 'day')`)
            ]);
            console.log(`Avec filtre => Matchs: ${matches.length}, Analyses: ${analyses.length}, Combis: ${combis.length}`);

            const analysesMap = {};
            analyses.forEach(a => { if (a.fields.match_id) analysesMap[a.fields.match_id] = a.fields; });

            const matchsData = matches.map(m => {
              const f = m.fields;
              const a = analysesMap[f.match_id] || {};
              return {
                id: f.match_id,
                home: { n: f.home_team, id: f.home_team_id || 0 },
                away: { n: f.away_team, id: f.away_team_id || 0 },
                league: f.league || '',
                ligue_icon: getLigueIcon(f.league || ''),
                date: `${f.date || ''} ${f.heure || ''}`.trim(),
                cat: ['all'],
                val: (a.confiance || 0) >= 65,
                hot: (a.confiance || 0) >= 80,
                conf: a.confiance || 0,
                po15: a.po15 || 0, po25: a.po25 || 0,
                p1: 0, pn: 0, p2: 0,
                edge: a.edge || '', edge_detail: '',
                risque: a.risque || '',
                pari_rec: a.pari_rec || '',
                mise: '2-3% bankroll',
                conseil_public: a.conseil || '',
                arg: '', contexte: a.contexte || '', enjeux: a.enjeux || '',
                vbet: a.vbet || '',
                scores: (a.scores_probables || '').split(',').map(s => s.trim()).filter(Boolean),
                stade: { nom: [f.stade, f.ville_stade].filter(Boolean).join(' · '), cap: '', meteo: '', temp: '' },
                crit_home: { att: 50, def: 50, fd: 50, fr: 50, mot: 50, fat: 50 },
                crit_away: { att: 50, def: 50, fd: 50, fr: 50, mot: 50, fat: 50 }
              };
            });

            const combisData = combis.map(c => ({
              label: c.fields.label || '',
              type: c.fields.type || '',
              cote_totale: c.fields.cote_totale || 0,
              selections: c.fields.selections || '',
              matchs: c.fields.matchs || '',
              conseil: c.fields.conseil || ''
            }));

            fs.writeFileSync('data.json', JSON.stringify({ matchs: matchsData, combis: combisData, historique: [] }, null, 2));
            console.log(`FINAL: ${matchsData.length} matchs, ${combisData.length} combis`);
          }

          main().catch(e => { console.error('ERREUR:', e); process.exit(0); });
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update daily - $(date +%Y-%m-%d)"
          git push
