name: Update data.json

on:
  schedule:
    - cron: '0 7 * * *'  # Chaque jour à 7h UTC (8h Paris)
  workflow_dispatch:       # Lancement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update data.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');

          const BASE_ID = 'appWZRYiCM6c4wQfG';
          const TOKEN = process.env.AIRTABLE_TOKEN;
          const TODAY = new Date().toISOString().split('T')[0];

          function airtableGet(table, formula) {
            return new Promise((resolve, reject) => {
              const params = new URLSearchParams({
                filterByFormula: formula,
                pageSize: '100'
              });
              const options = {
                hostname: 'api.airtable.com',
                path: `/v0/${BASE_ID}/${encodeURIComponent(table)}?${params}`,
                headers: { Authorization: `Bearer ${TOKEN}` }
              };
              https.get(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    resolve(parsed.records || []);
                  } catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          async function main() {
            console.log('Fetching data for', TODAY);

            // Lire l'ancien data.json pour récupérer l'historique existant
            let oldData = { matchs: [], combis: [], historique: [] };
            try {
              oldData = JSON.parse(fs.readFileSync('data.json', 'utf8'));
            } catch(e) {
              console.log('No existing data.json, starting fresh');
            }

            // Récupérer les matchs du jour
            const matches = await airtableGet(
              'TABLE 1 - MATCHES',
              `IS_SAME({date}, "${TODAY}", 'day')`
            );
            console.log(`Found ${matches.length} matches`);

            // Récupérer les analyses du jour
            const analyses = await airtableGet(
              'TABLE 2 - ANALYSES',
              `IS_SAME({date_generation}, "${TODAY}", 'day')`
            );
            console.log(`Found ${analyses.length} analyses`);

            // Récupérer les combinés du jour
            const combis = await airtableGet(
              'TABLE 7 - COMBINES',
              `IS_SAME({date}, "${TODAY}", 'day')`
            );
            console.log(`Found ${combis.length} combis`);

            // Map analyses par match_id
            const analysesMap = {};
            analyses.forEach(a => {
              const mid = a.fields.match_id;
              if (mid) analysesMap[mid] = a.fields;
            });

            // Construire les matchs avec leurs analyses
            const matchsData = matches.map(m => {
              const f = m.fields;
              const analyse = analysesMap[f.match_id] || {};
              return {
                id: f.match_id,
                home: { n: f.home_team, id: f.home_team_id },
                away: { n: f.away_team, id: f.away_team_id },
                league: f.league || '',
                ligue_icon: getLigueIcon(f.league),
                date: `${f.date || ''} ${f.heure || ''}`.trim(),
                cat: ['all'],
                val: (analyse.confiance || 0) >= 70,
                hot: (analyse.confiance || 0) >= 75,
                conf: parseFloat(analyse.confiance) || 0,
                po15: parseFloat(analyse.po15) || 0,
                po25: parseFloat(analyse.po25) || 0,
                p1: 0, pn: 0, p2: 0,
                edge: analyse.edge || '',
                edge_detail: '',
                risque: analyse.risque || '',
                pari_rec: analyse.pari_rec || '',
                mise: '2-3% bankroll',
                conseil_public: analyse.conseil || '',
                arg: '',
                contexte: analyse.contexte || '',
                enjeux: analyse.enjeux || '',
                vbet: analyse.vbet || '',
                scores: (analyse.scores_probables || '').split(',').map(s => s.trim()).filter(Boolean),
                stade: {
                  nom: [f.stade, f.ville_stade].filter(Boolean).join(' · '),
                  cap: '', meteo: '', temp: ''
                },
                crit_home: { att:0, def:0, fr:0, mot:0, fat:0 },
                crit_away: { att:0, def:0, fr:0, mot:0, fat:0 }
              };
            });

            // Construire les combinés
            const combisData = combis.map(c => {
              const f = c.fields;
              return {
                label: f.label || '',
                type: f.type || '',
                cote_totale: f.cote_totale || 0,
                selections: f.selections || '',
                matchs: f.matchs || '',
                conseil: f.conseil || ''
              };
            });

            // ── GESTION HISTORIQUE ──
            // Ajouter les matchs d'hier à l'historique
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });

            let historique = oldData.historique || [];

            // Si les anciens matchs ne sont pas déjà dans l'historique, les ajouter
            if (oldData.matchs && oldData.matchs.length > 0) {
              const oldMatchDate = oldData.matchs[0]?.date || '';
              const todayDate = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
              // Ajouter seulement si ce ne sont pas les matchs d'aujourd'hui
              if (!oldMatchDate.includes(TODAY)) {
                const toAdd = oldData.matchs.map(m => ({
                  date_match: yesterdayStr,
                  home: m.home?.n || '',
                  away: m.away?.n || '',
                  league: m.league || '',
                  pari_rec: m.pari_rec || '',
                  conf: m.conf || 0
                }));
                historique = [...toAdd, ...historique];
              }
            }

            // Garder seulement les 7 derniers jours (max 100 entrées)
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            historique = historique.slice(0, 100);

            const result = {
              matchs: matchsData,
              combis: combisData,
              historique: historique
            };

            fs.writeFileSync('data.json', JSON.stringify(result, null, 2));
            console.log(`✅ data.json updated: ${matchsData.length} matchs, ${combisData.length} combis, ${historique.length} historique`);
          }

          function getLigueIcon(league) {
            const icons = {
              'Premier League': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
              'La Liga': '🇪🇸',
              'Serie A': '🇮🇹',
              'Bundesliga': '🇩🇪',
              'Ligue 1': '🇫🇷',
              'Champions League': '⭐',
              'Ligue des Champions': '⭐'
            };
            return icons[league] || '🏆';
          }

          main().catch(e => {
            console.error(e);
            process.exit(1);
          });
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update daily"
          git push
