name: Update IASHARK Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Write pipeline script
        run: |
          cat > pipeline.js << 'JSEOF'
          const https = require('https');
          const fs    = require('fs');
          const APS_KEY  = process.env.APISPORTS_KEY;
          const OWM_KEY  = process.env.OPENWEATHER_KEY;
          const NEWS_KEY = process.env.NEWSAPI_KEY;
          const ANT_KEY  = process.env.ANTHROPIC_KEY;
          const ODDS_KEY = process.env.ODDS_API_KEY;
          const APS      = {'x-apisports-key': APS_KEY};

          // ── POISSON DISTRIBUTION ────────────────────────────────
          function poissonProb(lambda, k) {
            if(lambda<=0) return k===0?1:0;
            var logP = -lambda + k*Math.log(lambda) - logFactorial(k);
            return Math.exp(logP);
          }
          function logFactorial(n) {
            if(n<=1) return 0;
            var r=0;for(var i=2;i<=n;i++) r+=Math.log(i);return r;
          }
          function poissonMatrix(lambdaH, lambdaA, maxGoals) {
            maxGoals = maxGoals||8;
            var mat=[];
            for(var h=0;h<=maxGoals;h++){
              mat[h]=[];
              for(var a=0;a<=maxGoals;a++){
                mat[h][a]=poissonProb(lambdaH,h)*poissonProb(lambdaA,a);
              }
            }
            return mat;
          }
          function calcPoissonProbs(lambdaH, lambdaA) {
            var mat=poissonMatrix(lambdaH,lambdaA,8);
            var p1=0,pN=0,p2=0,over25=0,under25=0,bttsY=0,bttsN=0,over15=0,over35=0;
            for(var h=0;h<=8;h++){
              for(var a=0;a<=8;a++){
                var p=mat[h][a];
                if(h>a) p1+=p;
                else if(h===a) pN+=p;
                else p2+=p;
                if(h+a>2.5) over25+=p; else under25+=p;
                if(h+a>1.5) over15+=p;
                if(h+a>3.5) over35+=p;
                if(h>0&&a>0) bttsY+=p; else bttsN+=p;
              }
            }
            return {
              p1:Math.round(p1*100),
              pN:Math.round(pN*100),
              p2:Math.round(p2*100),
              over15:Math.round(over15*100),
              over25:Math.round(over25*100),
              under25:Math.round(under25*100),
              over35:Math.round(over35*100),
              bttsY:Math.round(bttsY*100),
              bttsN:Math.round(bttsN*100),
            };
          }
          function calcLambdas(bmHdom, beHdom, mdHdom, bmAext, beAext, meAext, leagueAvgH, leagueAvgA) {
            var leagAvgH = leagueAvgH||1.35;
            var leagAvgA = leagueAvgA||1.10;
            var attH = mdHdom>0 ? (bmHdom/mdHdom)/leagAvgH : 1;
            var defH = mdHdom>0 ? (beHdom/mdHdom)/leagAvgA : 1;
            var attA = meAext>0 ? (bmAext/meAext)/leagAvgA : 1;
            var defA = meAext>0 ? (beAext/meAext)/leagAvgH : 1;
            var lambdaH = Math.max(0.3, attH * defA * leagAvgH);
            var lambdaA = Math.max(0.3, attA * defH * leagAvgA);
            return {lambdaH: parseFloat(lambdaH.toFixed(3)), lambdaA: parseFloat(lambdaA.toFixed(3))};
          }

          // ── SHIN METHOD ─────────────────────────────────────────
          function shinProbabilities(odds) {
            var prices = odds.filter(function(o){return o&&o>1;});
            if(prices.length===0) return null;
            var rawProbs = prices.map(function(o){return 1/o;});
            var sumRaw = rawProbs.reduce(function(a,b){return a+b;},0);
            if(sumRaw<=1) return rawProbs;
            var z = 0.02;
            for(var iter=0;iter<50;iter++){
              var f=0,df=0;
              for(var i=0;i<rawProbs.length;i++){
                var qi=rawProbs[i];
                var denom=Math.sqrt(z*z+4*(1-z)*qi*qi/sumRaw);
                f+=( z+denom )/(2*(1-z));
                df+=( 1+( 2*z/sumRaw - 2*qi*qi*(1-2*z)/(sumRaw*sumRaw) )/denom )/(2*(1-z)) + (z+denom)/(2*(1-z)*(1-z));
              }
              f-=1;
              var zNew=z-f/df;
              if(Math.abs(zNew-z)<1e-8) break;
              z=Math.max(0,Math.min(0.15,zNew));
            }
            var trueProbs=rawProbs.map(function(qi){
              return (z+Math.sqrt(z*z+4*(1-z)*qi*qi/sumRaw))/(2*(1-z));
            });
            var sumTrue=trueProbs.reduce(function(a,b){return a+b;},0);
            return trueProbs.map(function(p){return p/sumTrue;});
          }

          // ── FRACTIONAL KELLY (1/4) ───────────────────────────────
          function fractionalKelly(probIA, cote, fraction) {
            fraction = fraction||0.25;
            var b = cote - 1;
            var q = 1 - probIA;
            var kelly = (probIA*b - q) / b;
            if(kelly<=0) return null;
            return Math.min(kelly*fraction*100, 5).toFixed(1);
          }

          // ── CHANGEMENT 1 : LEAGUES FILTRÉES ─────────────────────
          // Supprimé : Brésil(71), Argentine(128), MLS(253), Irlande(357), Japon(98)
          // Gardé    : K-League(292) — 66.7% winrate dans les données réelles
          // Ajouté   : Scottish Premiership(179), Belgian Pro League(144)
          // Portuguesa(94) gardée mais avec détection saison automatique
          const LEAGUES  = [
            39, 40,   // Premier League, Championship
            61, 62,   // Ligue 1, Ligue 2
            140,      // La Liga
            135,      // Serie A
            78,       // Bundesliga
            2, 3,     // LDC, Europa League
            88,       // Eredivisie
            94,       // Primeira Liga Portugal
            203,      // Süper Lig Turquie
            119,      // Superliga Danemark
            179,      // Scottish Premiership — NOUVEAU
            144,      // Belgian Pro League — NOUVEAU
            292,      // K-League Corée — gardée (66.7% winrate)
            66, 307, 143, 137, 81
          ];
          const SEASON   = 2025;
          // Plus de ligues à saison calendaire dans le scope actif
          // K-League (292) : saison 2025 terminée en nov 2025, saison 2026 a démarré en fév 2026
          var SEASON_2026 = [292];
          const TODAY    = new Date().toISOString().split('T')[0];

          var LG_KEY = {
            39:'premier', 40:'champ', 61:'ligue1', 62:'ligue2', 140:'laliga',
            135:'seriea', 78:'bundesliga', 2:'ldc', 3:'el',
            88:'eredivisie', 94:'primeira', 203:'superlig',
            119:'superliga-dk', 179:'scottish', 144:'belgique',
            292:'kleague',
            66:'coupe-france', 307:'saudi',
            143:'copa-rey', 137:'coppa-italia', 81:'dfb-pokal'
          };
          var BOOKIE_MAP = {
            'betclic':   {domain:'betclic.fr',   promo:'200\u20ac offerts',      l:'#'},
            'winamax':   {domain:'winamax.fr',   promo:'100\u20ac offerts',      l:'#'},
            'unibet':    {domain:'unibet.fr',    promo:'100\u20ac rembours\u00e9s', l:'#'},
            'pmu':       {domain:'pmu.fr',       promo:'100\u20ac offerts',      l:'#'},
            'bet365':    {domain:'bet365.com',   promo:'100\u20ac bonus',        l:'#'},
          };

          var LANGS = {
            'en':'English'
          };
          var TOP_LANGS = ['en'];

          var WC_TITLE = {
            'en':'2026 FIFA World Cup AI Predictions & Analysis',
            'es':'Copa del Mundo 2026 Predicciones IA',
            'pt':'Copa do Mundo 2026 Previsões IA',
            'de':'WM 2026 KI Prognosen & Analyse',
            'it':'Mondiali 2026 Previsioni IA',
            'ar':'\u0643\u0623\u0633 \u0627\u0644\u0639\u0627\u0644\u0645 2026 \u062a\u0646\u0628\u0624\u0627\u062a \u0627\u0644\u0630\u0643\u0627\u0621 \u0627\u0644\u0627\u0635\u0637\u0646\u0627\u0639\u064a',
            'tr':'2026 D\u00fcnya Kupas\u0131 AI Tahminleri',
            'nl':'WK 2026 AI Voorspellingen & Analyse',
            'pl':'M\u015a 2026 Prognozy AI',
            'id':'Piala Dunia 2026 Prediksi AI',
            'da':'VM 2026 AI Analyser'
          };

          var WC_TEAMS = [
            {slug:'france',      en:'France'},
            {slug:'brazil',      en:'Brazil'},
            {slug:'argentina',   en:'Argentina'},
            {slug:'spain',       en:'Spain'},
            {slug:'england',     en:'England'},
            {slug:'germany',     en:'Germany'},
            {slug:'portugal',    en:'Portugal'},
            {slug:'netherlands', en:'Netherlands'},
            {slug:'usa',         en:'USA'},
            {slug:'mexico',      en:'Mexico'},
            {slug:'canada',      en:'Canada'},
            {slug:'morocco',     en:'Morocco'},
          ];

          function mkdirSafe(p) {
            try { fs.mkdirSync(p, {recursive:true}); } catch(e) {}
          }
          function slugify(s) {
            return (s||'').toLowerCase()
              .replace(/[\u00e0\u00e1\u00e2\u00e3\u00e4\u00e5]/g,'a').replace(/[\u00e9\u00e8\u00ea\u00eb]/g,'e')
              .replace(/[\u00ed\u00ec\u00ee\u00ef]/g,'i').replace(/[\u00f3\u00f2\u00f4\u00f5\u00f6]/g,'o')
              .replace(/[\u00fa\u00f9\u00fb\u00fc]/g,'u').replace(/[\u00e7]/g,'c').replace(/[\u00f1]/g,'n')
              .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
          }
          function getTeamName(team, lang) {
            return team[lang] || team['en'] || team.slug;
          }
          function generateWorldCupPages() {
            console.log('  Generating World Cup 2026 pages...');
            Object.keys(LANGS).forEach(function(lang) {
              mkdirSafe(lang+'/world-cup-2026');
              var html = '<!DOCTYPE html><html lang="'+lang+'"><head><meta charset="UTF-8"><title>World Cup 2026 AI | IASHARK</title></head><body style="background:#060a0c;color:white;font-family:Arial,sans-serif;padding:40px;"><h1>2026 FIFA World Cup AI Predictions</h1><p><a href="https://iashark.com" style="color:cyan;">IASHARK — Live AI Football Predictions</a></p></body></html>';
              fs.writeFileSync(lang+'/world-cup-2026/index.html', html);
            });
            console.log('  WC pages done');
          }
          function generateSitemaps(matchsData) {
            console.log('  Generating sitemaps...');
            var sitemapFiles = [];
            Object.keys(LANGS).forEach(function(lang) {
              var urls = [];
              urls.push('<url><loc>https://iashark.com/'+lang+'/</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>0.8</priority></url>');
              matchsData.forEach(function(m) {
                var slug = slugify(m.home.n+'-vs-'+m.away.n+'-'+m.date.split(' ')[0]);
                urls.push('<url><loc>https://iashark.com/'+lang+'/match/'+slug+'.html</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>');
              });
              var xml = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+urls.join('\n')+'\n</urlset>';
              var fname = 'sitemap-'+lang+'.xml';
              fs.writeFileSync(fname, xml);
              sitemapFiles.push(fname);
            });
            var urlsFr = ['<url><loc>https://iashark.com/</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>1.0</priority></url>'];
            matchsData.forEach(function(m) {
              var slug = slugify(m.home.n+'-vs-'+m.away.n+'-'+m.date.split(' ')[0]);
              urlsFr.push('<url><loc>https://iashark.com/match/'+slug+'.html</loc><lastmod>'+TODAY+'</lastmod><changefreq>daily</changefreq><priority>0.9</priority></url>');
            });
            var xmlFr = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+urlsFr.join('\n')+'\n</urlset>';
            fs.writeFileSync('sitemap-fr.xml', xmlFr);
            sitemapFiles.push('sitemap-fr.xml');
            var entries = sitemapFiles.map(function(f){
              return '<sitemap><loc>https://iashark.com/'+f+'</loc><lastmod>'+TODAY+'</lastmod></sitemap>';
            }).join('\n');
            fs.writeFileSync('sitemap.xml', '<?xml version="1.0" encoding="UTF-8"?>\n<sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+entries+'\n</sitemapindex>');
            console.log('  Sitemaps done: '+sitemapFiles.length+' files');
          }

          function getBkInfo(name) {
            var k = name.toLowerCase().replace(/[^a-z0-9]/g,'');
            var found = null;
            Object.keys(BOOKIE_MAP).forEach(function(key) {
              if (k.includes(key.replace(/[^a-z0-9]/g,''))) found = BOOKIE_MAP[key];
            });
            return found || {domain:'google.com', promo:'', l:'#'};
          }
          function get(url, headers) {
            return new Promise(function(resolve) {
              var u = new URL(url);
              var timer = setTimeout(function(){ resolve({}); }, 8000);
              https.get({
                hostname:u.hostname, path:u.pathname+u.search,
                headers:Object.assign({'User-Agent':'IASHARK/1.0'}, headers||{})
              }, function(res) {
                var d='';
                res.on('data',function(c){d+=c;});
                res.on('end',function(){ clearTimeout(timer); try{resolve(JSON.parse(d));}catch(e){resolve({});} });
              }).on('error',function(){ clearTimeout(timer); resolve({}); });
            });
          }
          function postJSON(host, path, body, headers) {
            return new Promise(function(resolve) {
              var data = JSON.stringify(body);
              var timer = setTimeout(function(){ console.log('  TIMEOUT 180s'); resolve({}); }, 180000);
              var req = https.request({
                hostname:host, path:path, method:'POST',
                headers:Object.assign({
                  'Content-Type':'application/json',
                  'Content-Length':Buffer.byteLength(data)
                }, headers||{})
              }, function(res) {
                var d='';
                res.on('data',function(c){d+=c;});
                res.on('end',function(){
                  clearTimeout(timer);
                  try{
                    var parsed=JSON.parse(d);
                    if(parsed.error) console.log('  API ERROR type='+parsed.error.type+' msg='+(parsed.error.message||'').slice(0,100));
                    resolve(parsed);
                  }catch(e){ console.log('  Parse error status='+res.statusCode); resolve({}); }
                });
              });
              req.on('error',function(e){ clearTimeout(timer); console.log('  req error:'+e.message); resolve({}); });
              req.write(data); req.end();
            });
          }
          async function postJSONWithRetry(host, path, body, headers) {
            for(var attempt=1; attempt<=4; attempt++){
              var r = await postJSON(host, path, body, headers);
              if(r.error && (r.error.type==='overloaded_error'||r.error.type==='rate_limit_error')){
                var wait=attempt*30000;
                console.log('  Rate limit — attente '+(wait/1000)+'s tentative '+attempt+'/4');
                await sleep(wait);
                continue;
              }
              return r;
            }
            return {};
          }
          function sleep(ms) { return new Promise(function(r){ setTimeout(r,ms); }); }
          async function getFixtures() {
            var all = [];
            var tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            var TOMORROW = tomorrow.toISOString().split('T')[0];
            var dates = [TODAY, TOMORROW];
            for (var d = 0; d < dates.length; d++) {
              for (var i = 0; i < LEAGUES.length; i++) {
                var lgId = LEAGUES[i];
                var season = SEASON_2026.indexOf(lgId) !== -1 ? 2026 : SEASON;
                var r = await get(
                  'https://v3.football.api-sports.io/fixtures?date='+dates[d]+'&league='+lgId+'&season='+season+'&timezone=Europe%2FParis',
                  APS
                );
                if (r.response) all = all.concat(r.response);
                await sleep(200);
              }
            }
            var seen = {};
            return all.filter(function(f){
              if(seen[f.fixture.id]) return false;
              seen[f.fixture.id] = true;
              return true;
            });
          }
          async function getTeamStats(teamId, leagueId) {
            var r = await get(
              'https://v3.football.api-sports.io/teams/statistics?team='+teamId+'&league='+leagueId+'&season='+SEASON,
              APS
            );
            return r.response || null;
          }
          async function getLast10(teamId) {
            var r = await get(
              'https://v3.football.api-sports.io/fixtures?team='+teamId+'&last=20&status=FT&season='+SEASON,
              APS
            );
            return r.response || [];
          }
          async function getFullStanding(leagueId) {
            var r = await get(
              'https://v3.football.api-sports.io/standings?league='+leagueId+'&season='+SEASON,
              APS
            );
            var grp = (r.response&&r.response[0]&&r.response[0].league&&
                       r.response[0].league.standings&&r.response[0].league.standings[0]) || [];
            return grp;
          }
          async function getOdds(fixtureId) {
            var r = await get(
              'https://v3.football.api-sports.io/odds?fixture='+fixtureId,
              APS
            );
            if (r.response && r.response.length) return r.response[0];
            return null;
          }
          var FR_FIXED = [
            {n:'Betclic', o:'200\u20ac offerts',         l:'#LIEN_BETCLIC'},
            {n:'Winamax', o:'100\u20ac offerts',         l:'#LIEN_WINAMAX'},
            {n:'Unibet',  o:'100\u20ac rembours\u00e9s', l:'#LIEN_UNIBET'},
            {n:'PMU',     o:'100\u20ac offerts',         l:'#LIEN_PMU'},
            {n:'Bet365',  o:'100\u20ac bonus',           l:'#LIEN_BET365'},
          ];
          function parseOdds(o) {
            var empty = {c1:'--',cn:'--',c2:'--',co15:'--',co25:'--',cu25:'--',
                         dc1x:'--',dc2x:'--',dc12:'--',btts_oui:'--',btts_non:'--',bookies:[]};
            if (!o || !o.bookmakers || !o.bookmakers.length) return empty;
            var arr1=[],arrN=[],arr2=[],arr15=[],arr25=[],arru25=[],arr35=[],arru35=[],arr1x=[],arrx2=[],arr12=[],arrby=[],arrbn=[];
            o.bookmakers.forEach(function(bk) {
              (bk.bets||[]).forEach(function(bet) {
                if (bet.name==='Match Winner'||bet.name==='Home/Draw/Away') {
                  var hm=(bet.values||[]).find(function(v){return v.value==='Home';});
                  var dr=(bet.values||[]).find(function(v){return v.value==='Draw';});
                  var aw=(bet.values||[]).find(function(v){return v.value==='Away';});
                  if (hm&&parseFloat(hm.odd)>=1.05&&parseFloat(hm.odd)<=15) arr1.push(parseFloat(hm.odd));
                  if (dr&&parseFloat(dr.odd)>=1.05&&parseFloat(dr.odd)<=15) arrN.push(parseFloat(dr.odd));
                  if (aw&&parseFloat(aw.odd)>=1.05&&parseFloat(aw.odd)<=15) arr2.push(parseFloat(aw.odd));
                }
                if (bet.name==='Goals Over/Under') {
                  (bet.values||[]).forEach(function(v) {
                    if (v.value==='Over 1.5')  arr15.push(parseFloat(v.odd));
                    if (v.value==='Over 2.5')  arr25.push(parseFloat(v.odd));
                    if (v.value==='Under 2.5') arru25.push(parseFloat(v.odd));
                    if (v.value==='Over 3.5')  arr35.push(parseFloat(v.odd));
                    if (v.value==='Under 3.5') arru35.push(parseFloat(v.odd));
                  });
                }
                if (bet.name==='Double Chance') {
                  var d1x=(bet.values||[]).find(function(v){return v.value==='Home/Draw';});
                  var dx2=(bet.values||[]).find(function(v){return v.value==='Draw/Away';});
                  var d12=(bet.values||[]).find(function(v){return v.value==='Home/Away';});
                  if (d1x) arr1x.push(parseFloat(d1x.odd));
                  if (dx2) arrx2.push(parseFloat(dx2.odd));
                  if (d12) arr12.push(parseFloat(d12.odd));
                }
                if (bet.name==='Both Teams Score') {
                  var by=(bet.values||[]).find(function(v){return v.value==='Yes';});
                  var bn=(bet.values||[]).find(function(v){return v.value==='No';});
                  if (by) arrby.push(parseFloat(by.odd));
                  if (bn) arrbn.push(parseFloat(bn.odd));
                }
              });
            });
            function med(a) {
              if (!a.length) return '--';
              var s=a.slice().sort(function(x,y){return x-y;});
              var m=Math.floor(s.length/2);
              return (s.length%2?s[m]:((s[m-1]+s[m])/2)).toFixed(2);
            }
            var c1=med(arr1), cn=med(arrN), c2=med(arr2);
            var co15=med(arr15), co25=med(arr25), cu25=med(arru25);
            var dc1x=med(arr1x), dc2x=med(arrx2), dc12=med(arr12);
            var btts_oui=med(arrby), btts_non=med(arrbn);
            var deltas=[0,-0.03,-0.02,-0.05,+0.03];
            function vary(c,d){ if(!c||c==='--') return '--'; return Math.max(1.01,parseFloat(c)+d).toFixed(2); }
            var bookies=FR_FIXED.map(function(bk,i){
              return {
                n:bk.n, o:bk.o, l:bk.l,
                c:vary(c1,deltas[i]),
                c1:vary(c1,deltas[i]),
                cn:vary(cn,deltas[i]),
                c2:vary(c2,deltas[i])
              };
            });
            return {c1,cn,c2,co15,co25,cu25,co35:med(arr35),cu35:med(arru35),dc1x,dc2x,dc12,btts_oui,btts_non,bookies,
              odds_movement: (function(){
                var updates = o.updates||[];
                if(updates.length<2) return null;
                var first=updates[0], last=updates[updates.length-1];
                var fBk=(first.bookmakers||[])[0]; var lBk=(last.bookmakers||[])[0];
                if(!fBk||!lBk) return null;
                var fBet=(fBk.bets||[]).find(function(b){return b.name==='Match Winner'||b.name==='Home/Draw/Away';})||{};
                var lBet=(lBk.bets||[]).find(function(b){return b.name==='Match Winner'||b.name==='Home/Draw/Away';})||{};
                var fH=(fBet.values||[]).find(function(v){return v.value==='Home';});
                var lH=(lBet.values||[]).find(function(v){return v.value==='Home';});
                var fA=(fBet.values||[]).find(function(v){return v.value==='Away';});
                var lA=(lBet.values||[]).find(function(v){return v.value==='Away';});
                return {
                  open_c1: fH?parseFloat(fH.odd).toFixed(2):null,
                  open_c2: fA?parseFloat(fA.odd).toFixed(2):null,
                  curr_c1: lH?parseFloat(lH.odd).toFixed(2):null,
