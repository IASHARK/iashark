                var coteRec;
                if(p.includes('btts non')||p.includes('les deux equipes ne marquent pas')) coteRec=odds.btts_non;
                else if(p.includes('btts')||p.includes('les deux equipes marquent')||p.includes('les 2 equipes marquent')) coteRec=odds.btts_oui;
                else if(p.includes('x2')||(p.includes('double chance')&&(p.includes('nul ou')||p.includes('ou nul'))&&!p.includes('ou nul '+home.name.toLowerCase().slice(0,4)))) coteRec=odds.dcx2;
                else if(p.includes('1x')||(p.includes('double chance')&&p.includes(home.name.toLowerCase().slice(0,4)))) coteRec=odds.dc1x;
                else if(p.includes('double chance')) coteRec=odds.dcx2;
                else if(p.includes('over 2.5')||p.includes('plus de 2.5')) coteRec=odds.co25;
                else if(p.includes('over 1.5')||p.includes('plus de 1.5')) coteRec=odds.co15;
                else if(p.includes('under')||p.includes('moins de 2.5')) coteRec=odds.cu25;
                else if(p.includes('nul')||p.includes('match nul')) coteRec=odds.cn;
                else if(p.includes('victoire')&&(p.includes(away.name.toLowerCase().slice(0,4))||p.includes('ext')||p.includes('away'))) coteRec=odds.c2;
                else coteRec=odds.c1;
                var deltas=[0,-0.03,-0.02,-0.05,+0.03];
                if(odds.bookies&&odds.bookies.length&&coteRec&&coteRec!=='--') {
                  odds.bookies.forEach(function(bk, i) {
                    var delta = deltas[i]||0;
                    bk.c = Math.max(1.01, parseFloat(coteRec)+delta).toFixed(2);
                  });
                }
              })();
              var kellyVal = null;
              if (an&&an.pari_rec&&odds.c1&&odds.c1!=='--') {
                var bestCote = parseFloat(odds.c1)||0;
                var aiProb = (an.p1||0)/100;
                if (bestCote>1&&aiProb>0) {
                  var b = bestCote-1;
                  var k = Math.max(0,((aiProb*b-(1-aiProb))/b)*100);
                  kellyVal = Math.min(k,10).toFixed(1);
                }
              }
              var classementObj = null;
              if (entryH||entryA) {
                var rankH = rkH||99, rankA = rkA||99;
                var minRank = Math.max(1,Math.min(rankH,rankA)-2);
                var maxRank = Math.min(Math.max(rankH,rankA)+2, standings.length);
                var nearStandings = standings.filter(function(s){return s.rank>=minRank && s.rank<=maxRank;});
                classementObj = {
                  league_name: lg.name,
                  standings: nearStandings.map(function(s){
                    return {rank:s.rank,name:s.team.name,team_id:s.team.id,played:s.all.played,won:s.all.win,drawn:s.all.draw,lost:s.all.lose,gd:s.goalsDiff,pts:s.points,form:s.form||''};
                  }),
                  home: entryH?{rank:entryH.rank,pts:entryH.points,played:entryH.all.played,won:entryH.all.win,lost:entryH.all.lose,gd:entryH.goalsDiff,form:entryH.form||''}:null,
                  away: entryA?{rank:entryA.rank,pts:entryA.points,played:entryA.all.played,won:entryA.all.win,lost:entryA.all.lose,gd:entryA.goalsDiff,form:entryA.form||''}:null
                };
              }
              var risqueRaw = an?(an.risque||'MODERE'):'MODERE';
              var risqueNorm = risqueRaw.toUpperCase();
              if(risqueNorm.includes('FAIBLE')||risqueNorm.includes('LOW')) risqueNorm='FAIBLE';
              else if(risqueNorm.includes('ELEVE')||risqueNorm.includes('HIGH')||risqueNorm.includes('FORT')) risqueNorm='ELEVE';
              else risqueNorm='MODERE';
              var matchObj = {
                id:f.id, sport:'football',
                home:{n:home.name,id:home.id}, away:{n:away.name,id:away.id},
                league:lg.name, ligue_icon:lgIcon(lg.name), league_key:lgKey(lg.id),
                date:(TODAY+' '+heure).trim(), cat:['all'],
                val:an?(an.vbet==='OUI'&&(an.confiance||0)>=6.0):false,
                hot:an?(an.confiance||0)>=8.0:false,
                conf:an?parseFloat(an.confiance||0):0,
                p1:an?(an.p1||0):0, pn:an?(an.pn||0):0, p2:an?(an.p2||0):0,
                po15:an?(an.po15||0):0, po25:an?(an.po25||0):0, btts:an?(an.btts||0):0,
                c1:odds.c1, cn:odds.cn, c2:odds.c2,
                co15:odds.co15, co25:odds.co25, cu25:odds.cu25,
                dc1x:odds.dc1x, dcx2:odds.dcx2,
                cdc1x:odds.dc1x, cdc2x:odds.dcx2,
                cbtts:odds.btts_oui, cbtts_non:odds.btts_non,
                btts_oui:odds.btts_oui, btts_non:odds.btts_non,
                bookies:odds.bookies,
                edge:an?(an.edge||''):'',
                edge_detail:an?'Probabilit\u00e9 IA vs probabilit\u00e9 implicite bookmaker = '+(an.edge||''):'',
                marche:an?(an.marche||'RESULTAT'):'RESULTAT',
                risque:risqueNorm,
                pari_rec:an?(an.pari_rec||''):'',
                mise:an?(an.mise||'2-3% bankroll'):'2-3% bankroll',
                argument:an?(an.argument||''):'',
                analyse_card:an?(an.analyse_card||an.conseil||''):'',
                conseil_public:an?(an.conseil||an.analyse_card||''):'',
                contexte:an?(an.contexte||''):'',
                enjeux:an?(an.enjeux||''):'',
                vbet:an?(an.vbet||'NON'):'NON',
                value_calc:an?(an.edge||''):'',
                scores:an?((an.scores_probables||'').split(',').map(function(s){return s.trim();}).filter(Boolean)):[],
                paris_3:an?(an.paris_3||null):null,
                paris_safe:{bet:an?(an.pari_rec||''):'',cote:odds.c1,proba:an?(an.p1||0)+'%':''},
                paris_risque:{bet:'',cote:'',proba:''},
                kelly_pct:kellyVal,
                stade:{
                  nom:f.venue&&f.venue.name?(f.venue.name+(f.venue.city?' \u2014 '+f.venue.city:'')):home.name+' (domicile)',
                  cap:'', meteo:wx?wx.emoji:'\ud83c\udf24\ufe0f', temp:wx?wx.temp:'', desc:wx?wx.desc:''
                },
                crit_home:critH, crit_away:critA,
                form_home:last10H.slice(0,5), form_away:last10A.slice(0,5),
                forme_h:(sH&&sH.form)||'', forme_a:(sA&&sA.form)||'',
                h2h:h2hFormatted,
                h2h_txt:h2hRaw.length?'Historique sur '+h2hRaw.length+' match(s) recents':'',
                injuries:injuries,
                fatigue:{home:{val:fatigueH.val,info:fatigueH.info},away:{val:fatigueA.val,info:fatigueA.info}},
                tendances:tendances,
                classement:classementObj,
                actu:(nH||[]).concat(nA||[]),
              };
              matchsData.push(matchObj);
              if (an&&(an.confiance||0)>=6.5) {
                forCombis.push({home:home.name,away:away.name,pari:an.pari_rec,conf:an.confiance,edge:an.edge||''});
              }
              console.log('  OK conf='+matchObj.conf+' edge='+matchObj.edge+' pari='+matchObj.pari_rec);
            }

            // ══ TENNIS ══
            var tennisMatchs = await processTennis();
            matchsData = matchsData.concat(tennisMatchs);

            var combisRaw = await genCombis(forCombis);
            var combisData = combisRaw.map(function(c){
              return {label:c.label,type:c.type,selections:c.selections,matchs:c.matchs,cote_totale:c.cote_totale,conseil:c.conseil};
            });
            fs.writeFileSync('data.json', JSON.stringify({matchs:matchsData,combis:combisData},null,2));
            console.log('\n=== DONE: '+matchsData.length+' matchs ('+tennisMatchs.length+' tennis) | '+combisData.length+' combis ===');
          }
          main().catch(function(e){ console.error('FATAL:', e.message); process.exit(0); });
          JSEOF
      - name: Run pipeline
        env:
          APISPORTS_KEY:   ${{ secrets.APISPORTS_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          NEWSAPI_KEY:     ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY:   ${{ secrets.ANTHROPIC_KEY }}
        run: node pipeline.js

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily update - $(date +%Y-%m-%d)"
          git push
