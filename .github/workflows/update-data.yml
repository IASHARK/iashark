              +'=== COTES REELLES BOOKMAKERS (utilise ces cotes exactes) ===\n'
              +'1 (Victoire '+d.home+'): '+d.c1+' — prob. implicite: '+pi1+'%\n'
              +'N (Nul): '+d.cn+' — prob. implicite: '+piN+'%\n'
