                beA:(sA&&sA.goals&&sA.goals.against&&sA.goals.against.total&&sA.goals.against.total.total)||0,
                vdH:(sH&&sH.fixtures&&sH.fixtures.wins&&sH.fixtures.wins.home)||0,
