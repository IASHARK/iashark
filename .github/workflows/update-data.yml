          function parseTennisOdds(o) {
            var empty = {
              c_home: '--', c_away: '--',
              c_home_set15: '--', c_away_set15: '--',  // handicap sets -1.5/+1.5
              c_over225j: '--', c_under225j: '--',      // total jeux O/U 22.5
              c_over205j: '--', c_under205j: '--',      // total jeux O/U 20.5
              c_p1set_home: '--', c_p1set_away: '--',   // vainqueur 1er set
              c_2sets: '--', c_3sets: '--',             // nombre de sets
              c_home_tiebreak: '--',                    // tiebreak dans le match
              bookies: []
            };
            if (!o || !o.bookmakers || !o.bookmakers.length) return empty;
          
            var arrH = [], arrA = [];
            var arrHset15 = [], arrAset15 = [];
            var arrO225 = [], arrU225 = [];
            var arrO205 = [], arrU205 = [];
            var arrP1H = [], arrP1A = [];
            var arr2sets = [], arr3sets = [];
            var arrTie = [];
          
            o.bookmakers.forEach(function(bk) {
              (bk.bets || []).forEach(function(bet) {
                var n = bet.name || '';
                // Vainqueur match
                if (n.includes('Winner') || n.includes('Match Winner') || n.includes('Home/Away')) {
                  var h = (bet.values || []).find(function(v) { return v.value === 'Home'; });
                  var a = (bet.values || []).find(function(v) { return v.value === 'Away'; });
                  if (h && parseFloat(h.odd) >= 1.01) arrH.push(parseFloat(h.odd));
                  if (a && parseFloat(a.odd) >= 1.01) arrA.push(parseFloat(a.odd));
                }
                // Handicap sets
                if (n.includes('Handicap') || n.includes('Set Handicap')) {
                  var h15 = (bet.values || []).find(function(v) { return v.value && v.value.includes('-1.5'); });
                  var a15 = (bet.values || []).find(function(v) { return v.value && v.value.includes('+1.5'); });
                  if (h15) arrHset15.push(parseFloat(h15.odd));
                  if (a15) arrAset15.push(parseFloat(a15.odd));
                }
                // Total jeux
                if (n.includes('Total Games') || n.includes('Games Over/Under')) {
                  (bet.values || []).forEach(function(v) {
                    if (v.value === 'Over 22.5') arrO225.push(parseFloat(v.odd));
                    if (v.value === 'Under 22.5') arrU225.push(parseFloat(v.odd));
                    if (v.value === 'Over 20.5') arrO205.push(parseFloat(v.odd));
                    if (v.value === 'Under 20.5') arrU205.push(parseFloat(v.odd));
                  });
                }
                // 1er set
                if (n.includes('1st Set') || n.includes('First Set Winner')) {
                  var h = (bet.values || []).find(function(v) { return v.value === 'Home'; });
                  var a = (bet.values || []).find(function(v) { return v.value === 'Away'; });
                  if (h) arrP1H.push(parseFloat(h.odd));
                  if (a) arrP1A.push(parseFloat(a.odd));
                }
                // Nombre de sets
                if (n.includes('Number of Sets') || n.includes('Sets Played')) {
                  var s2 = (bet.values || []).find(function(v) { return v.value === '2'; });
                  var s3 = (bet.values || []).find(function(v) { return v.value === '3'; });
                  if (s2) arr2sets.push(parseFloat(s2.odd));
                  if (s3) arr3sets.push(parseFloat(s3.odd));
                }
                // Tiebreak
                if (n.includes('Tie Break') || n.includes('Tiebreak')) {
                  var yes = (bet.values || []).find(function(v) { return v.value === 'Yes'; });
                  if (yes) arrTie.push(parseFloat(yes.odd));
                }
              });
            });
          
            function med(a) {
              if (!a.length) return '--';
              var s = a.slice().sort(function(x, y) { return x - y; });
              var m = Math.floor(s.length / 2);
              return (s.length % 2 ? s[m] : ((s[m - 1] + s[m]) / 2)).toFixed(2);
            }
          
            var c_home = med(arrH), c_away = med(arrA);
            var deltas = [0, -0.03, -0.02, -0.05, +0.03];
            function vary(c, d) {
              if (!c || c === '--') return '--';
              return Math.max(1.01, parseFloat(c) + d).toFixed(2);
            }
            var bookies = FR_FIXED.map(function(bk, i) {
              return { n: bk.n, o: bk.o, l: bk.l, c: vary(c_home, deltas[i]) };
            });
          
            return {
              c_home: c_home, c_away: c_away,
              c_home_set15: med(arrHset15), c_away_set15: med(arrAset15),
              c_over225j: med(arrO225), c_under225j: med(arrU225),
              c_over205j: med(arrO205), c_under205j: med(arrU205),
              c_p1set_home: med(arrP1H), c_p1set_away: med(arrP1A),
              c_2sets: med(arr2sets), c_3sets: med(arr3sets),
              c_tiebreak: med(arrTie),
              bookies: bookies
            };
          }
          
          function parseTennisSurfaceStats(stats, surface) {
            if (!stats) return { win_pct: null, aces: null, df: null, first_serve: null };
            var sl = (surface || '').toLowerCase();
            var key = sl.includes('clay') || sl.includes('terre') ? 'clay'
                     : sl.includes('grass') || sl.includes('gazon') ? 'grass'
                     : 'hard';
            // API-Sports retourne clay_won, clay_played, etc.
            var won = stats[key + '_won'] || 0;
            var played = stats[key + '_played'] || (stats[key + '_won'] + stats[key + '_lost']) || 0;
            return {
              win_pct: played > 0 ? Math.round(won / played * 100) + '%' : null,
              aces: stats.aces || null,
              df: stats.double_faults || null,
              first_serve: stats.first_serve_percentage ? Math.round(stats.first_serve_percentage) + '%' : null,
