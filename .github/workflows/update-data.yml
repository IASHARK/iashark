          // ── PINNACLE ODDS via The Odds API ───────────────────────
          var TEAM_NAME_MAP = {
            'Manchester City':'Manchester City','Manchester United':'Manchester United',
            'AC Milan':'AC Milan','Inter':'Inter Milan','Internazionale':'Inter Milan',
            'Atletico Madrid':'Atletico Madrid','Athletic Club':'Athletic Bilbao',
            'Real Betis':'Real Betis Balompie','Celta Vigo':'Celta de Vigo',
            'Brighton':'Brighton and Hove Albion','Brighton & Hove Albion':'Brighton and Hove Albion',
            'Nottingham Forest':'Nottingham Forest','Newcastle':'Newcastle United',
            'PSG':'Paris Saint-Germain','Paris Saint Germain':'Paris Saint-Germain',
            'Marseille':'Olympique de Marseille','Lyon':'Olympique Lyonnais',
            'Bayern Munich':'Bayern Munich','Bayer Leverkusen':'Bayer 04 Leverkusen',
            'Atletico de Madrid':'Atletico Madrid','Sevilla':'Sevilla FC',
          };
          function levenshtein(a,b){
            var m=a.length,n=b.length,dp=[];
            for(var i=0;i<=m;i++){dp[i]=[i];for(var j=1;j<=n;j++)dp[i][j]=0;}
            for(var j=0;j<=n;j++)dp[0][j]=j;
            for(var i=1;i<=m;i++)for(var j=1;j<=n;j++){
              if(a[i-1]===b[j-1])dp[i][j]=dp[i-1][j-1];
              else dp[i][j]=1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
            }
            return dp[m][n];
          }
          function bestTeamMatch(name,candidates){
            var mapped=TEAM_NAME_MAP[name]||name;
            var nameLow=mapped.toLowerCase();
            var best=null,bestScore=Infinity;
            candidates.forEach(function(c){
              var score=levenshtein(nameLow,c.toLowerCase())/Math.max(nameLow.length,c.length);
              if(score<bestScore){bestScore=score;best=c;}
            });
            return bestScore<0.4?best:null;
          }
          async function getPinnacleOdds(homeTeam, awayTeam, leagueKey) {
            if(!ODDS_KEY) return null;
            var sportMap = {
              'premier':'soccer_england_league1','champ':'soccer_england_championship',
              'ligue1':'soccer_france_ligue_1','laliga':'soccer_spain_la_liga',
              'seriea':'soccer_italy_serie_a','bundesliga':'soccer_germany_bundesliga',
              'ldc':'soccer_uefa_champs_league','el':'soccer_uefa_europa_league',
            };
            var sport=sportMap[leagueKey]||'soccer_uefa_champs_league';
            try {
              var url='https://api.the-odds-api.com/v4/sports/'+sport+'/odds/?apiKey='+ODDS_KEY
                +'&regions=eu&markets=h2h,totals,btts&bookmakers=pinnacle&oddsFormat=decimal';
              var r=await get(url,{});
              if(!r||!Array.isArray(r)) return null;
              var allTeams=[];
              r.forEach(function(g){allTeams.push(g.home_team,g.away_team);});
              var matchedHome=bestTeamMatch(homeTeam,allTeams);
              var matchedAway=bestTeamMatch(awayTeam,allTeams);
              if(!matchedHome||!matchedAway){
                console.log('Pinnacle: no match for',homeTeam,'vs',awayTeam);
                return null;
              }
              var match=r.find(function(g){
                return (g.home_team===matchedHome&&g.away_team===matchedAway)||
                       (g.home_team===matchedAway&&g.away_team===matchedHome);
              });
              if(!match||!match.bookmakers||!match.bookmakers[0]) return null;
              var bk=match.bookmakers[0];
              var result={};
              (bk.markets||[]).forEach(function(mkt){
                if(mkt.key==='h2h'){
                  (mkt.outcomes||[]).forEach(function(o){
                    if(o.name===match.home_team) result.c1=o.price;
                    else if(o.name==='Draw') result.cn=o.price;
                    else result.c2=o.price;
                  });
                }
                if(mkt.key==='totals'){
                  (mkt.outcomes||[]).forEach(function(o){
                    if(o.point===2.5&&o.name==='Over') result.over25=o.price;
                    if(o.point===2.5&&o.name==='Under') result.under25=o.price;
                  });
                }
                if(mkt.key==='btts'){
                  (mkt.outcomes||[]).forEach(function(o){
                    if(o.name==='Yes') result.bttsY=o.price;
                    if(o.name==='No') result.bttsN=o.price;
                  });
                }
              });
              if(Object.keys(result).length>0) console.log('Pinnacle matched:',homeTeam,'→',matchedHome);
              return Object.keys(result).length>0?result:null;
            } catch(e) {
              console.log('Pinnacle fetch error:',e.message);
              return null;
            }
          }

          // ── xG PONDÉRÉ — utilise le cache global pré-chargé, zéro appel API ──
          async function getWeightedXGStats(teamId, fixtureIds, rawFixtures, xgConcededCache) {
            xgConcededCache = xgConcededCache||{};
            var results=[];
            for(var i=0;i<Math.min(fixtureIds.length,10);i++){
              try{
                var r=await get('https://v3.football.api-sports.io/fixtures/statistics?fixture='+fixtureIds[i],APS);
                if(!r.response||!r.response.length){await sleep(150);continue;}
                var teamBlock=r.response.find(function(b){return b.team&&b.team.id===teamId;});
                var oppBlock=r.response.find(function(b){return b.team&&b.team.id!==teamId;});
                if(!teamBlock){await sleep(150);continue;}
                var s={};
                (teamBlock.statistics||[]).forEach(function(x){
                  var k=(x.type||'').toLowerCase().replace(/ /g,'_');s[k]=x.value;
                });
                // xGA = xG généré par l'adversaire contre nous (buts qu'on aurait dû encaisser)
                var sOpp={};
                if(oppBlock)(oppBlock.statistics||[]).forEach(function(x){
                  var k=(x.type||'').toLowerCase().replace(/ /g,'_');sOpp[k]=x.value;
                });
                var xgTeam=parseFloat(s['expected_goals'])||null;
                var xgAgainst=parseFloat(sOpp['expected_goals'])||null; // xGA ce match
                var shots_on=parseInt(s['shots_on_goal'])||0;
                var shots_total=parseInt(s['total_shots'])||0;
                var fouls=parseInt(s['fouls'])||0;
                // Adversaire depuis rawFixtures
                var fx=rawFixtures.find(function(f){return f.fixture.id===fixtureIds[i];});
                var oppId=fx?(fx.teams.home.id===teamId?fx.teams.away.id:fx.teams.home.id):null;
                // xG pondéré = xG_match / buts_concédés_moy_saison_adversaire (cache)
                var xgWeighted=null;
                if(xgTeam!==null&&oppId&&xgConcededCache[oppId]){
                  xgWeighted=parseFloat((xgTeam/xgConcededCache[oppId]).toFixed(3));
                }
                results.push({xg:xgTeam, xga:xgAgainst, xg_weighted:xgWeighted, shots_on, shots_total, fouls});
                await sleep(150);
              }catch(e){}
            }
            if(!results.length) return {xg_avg:null,xga_avg:null,xg_weighted:null,shots_on_avg:null,shots_total_avg:null,fouls_avg:null};
            function avg(arr){return arr.length?arr.reduce(function(a,b){return a+b;},0)/arr.length:null;}
            var xgs=results.filter(function(r){return r.xg!==null;}).map(function(r){return r.xg;});
            var xgas=results.filter(function(r){return r.xga!==null;}).map(function(r){return r.xga;});
            var xgsW=results.filter(function(r){return r.xg_weighted!==null;}).map(function(r){return r.xg_weighted;});
            var shots=results.map(function(r){return r.shots_on;}).filter(Boolean);
            var shotsT=results.map(function(r){return r.shots_total;}).filter(Boolean);
            var foulsArr=results.map(function(r){return r.fouls;}).filter(Boolean);
            // Alerte défense en surchauffe: pas encaissé mais xGA élevé
            var avgXGA=avg(xgas);
            var surchauffe=false;
            if(avgXGA&&avgXGA>=1.5){
              // Vérifier si les derniers matchs ont peu de buts encaissés malgré xGA élevé
              var recentBE=results.slice(0,5).filter(function(r){return r.xga!==null&&r.xga>=1.5;}).length;
              if(recentBE>=3) surchauffe=true;
            }
            return {
              xg_avg: avg(xgs)?parseFloat(avg(xgs).toFixed(2)):null,
              xga_avg: avgXGA?parseFloat(avgXGA.toFixed(2)):null,
              xg_weighted: avg(xgsW)?parseFloat(avg(xgsW).toFixed(3)):null,
              shots_on_avg: avg(shots)?avg(shots).toFixed(1):null,
              shots_total_avg: avg(shotsT)?avg(shotsT).toFixed(1):null,
              fouls_avg: avg(foulsArr)?avg(foulsArr).toFixed(1):null,
              defense_surchauffe: surchauffe,
              n: results.length
            };
          }
