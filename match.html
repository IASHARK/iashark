<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analyse Match — IASHARK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a10;--card:#0c1520;--card2:#101d2a;
  --cyan:#22d3ee;--cyan2:#06b6d4;
  --amber:#f59e0b;
  --green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--muted:#4a6580;--muted2:#2a3f55;
  --border:rgba(255,255,255,0.05);--border-c:rgba(34,211,238,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;}
.hdr{position:sticky;top:0;z-index:99;background:rgba(6,10,16,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:50px;display:flex;align-items:center;padding:0 16px;gap:12px;}
.hdr-back{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);border:1px solid var(--border);padding:5px 10px;border-radius:6px;background:none;cursor:pointer;transition:.15s;}
.hdr-back:hover{color:var(--cyan);border-color:var(--border-c);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;text-decoration:none;color:var(--text);}
.logo span{color:var(--cyan);}
.hdr-pill{margin-left:auto;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--border-c);padding:3px 8px;border-radius:20px;background:rgba(34,211,238,0.05);}
.wrap{max-width:660px;margin:16px auto 0;padding:0 14px;}
.card{border:1px solid var(--border);border-radius:18px;overflow:hidden;animation:up .4s ease forwards;}
.card.hot{border-color:rgba(245,158,11,0.2);}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
/* TOPBAR */
.topbar{background:linear-gradient(135deg,#090f1c,#0c1828);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.lg-row{display:flex;align-items:center;gap:7px;}
.lg-name{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;}
.badges{display:flex;gap:5px;align-items:center;}
.badge{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1.5px;padding:3px 9px;border-radius:20px;}
.badge.hot{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:var(--amber);}
.badge.val{background:rgba(34,211,238,0.06);border:1px solid var(--border-c);color:var(--cyan);}
.badge.time{font-size:10px;letter-spacing:0;color:var(--text);padding:0;}
/* TEAMS */
.teams{padding:22px 18px 16px;background:linear-gradient(180deg,#090f1c,var(--card));}
.teams-row{display:grid;grid-template-columns:1fr 56px 1fr;align-items:center;gap:8px;margin-bottom:14px;}
.team{text-align:center;}
.team-logo{width:48px;height:48px;border-radius:50%;object-fit:contain;background:rgba(255,255,255,0.03);margin:0 auto 7px;display:block;}
.team-logo-ph{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);margin:0 auto 7px;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,4.5vw,26px);letter-spacing:1px;line-height:1;margin-bottom:3px;}
.team-sub{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.team-form{display:flex;justify-content:center;gap:2px;margin-top:5px;}
.fd{width:14px;height:14px;border-radius:2px;font-size:6px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;}
.fw{background:rgba(16,185,129,0.18);color:var(--green);}
.fn{background:rgba(245,158,11,0.1);color:var(--amber);}
.fl{background:rgba(239,68,68,0.13);color:var(--red);}
.team.away .team-name{color:rgba(226,232,240,0.65);}
.vs-col{text-align:center;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted2);display:block;}
.vs-hr{font-family:'Space Mono',monospace;font-size:10px;color:var(--cyan);margin-top:2px;}
.pbar{display:flex;height:3px;border-radius:3px;overflow:hidden;margin-bottom:7px;}
.pb1{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.pbn{background:rgba(255,255,255,0.07);}
.pb2{background:rgba(226,232,240,0.15);}
.plabels{display:flex;justify-content:space-between;}
.pi{text-align:center;}
.pi-pct{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;}
.pi-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:1px;}
.meteo{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
.meteo-item{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);}
/* SECTION */
.s{padding:0 18px 13px;}
.s.pt{padding-top:14px;}
.sep{height:1px;background:var(--border);margin:0 18px 13px;}
.stitle{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}
/* CONTEXTE */
.ctx{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ctx-c{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.ctx-l{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:2px;margin-bottom:5px;}
.ctx-t{font-size:11px;color:#94a3b8;line-height:1.6;}
.ctx-t strong{color:var(--text);}
/* COMP */
.comp{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--border);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.comp-c{background:var(--card2);padding:12px;}
.comp-c:first-child{border-right:1px solid var(--border);}
.comp-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.crit{display:flex;flex-direction:column;gap:8px;}
.cr{display:flex;flex-direction:column;gap:3px;}
.cr-top{display:flex;justify-content:space-between;}
.cr-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:1px;}
.cr-val{font-family:'Space Mono',monospace;font-size:8px;}
.cr-bar{height:2px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.cr-fill{height:100%;border-radius:2px;transition:width 1.2s ease;}
.cr-fill.hi{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.cr-fill.mid{background:linear-gradient(90deg,#d97706,var(--amber));}
.cr-fill.lo{background:linear-gradient(90deg,#dc2626,var(--red));}
/* VERDICT */
.verdict{background:linear-gradient(135deg,rgba(34,211,238,0.05),rgba(6,182,212,0.01));border:1px solid var(--border-c);border-radius:11px;padding:14px;position:relative;overflow:hidden;}
.verdict::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);}
.verdict-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.verdict-pari{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--cyan);letter-spacing:1px;line-height:1;}
.verdict-cote{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--text);line-height:1;}
.verdict-bk{font-family:'Space Mono',monospace;font-size:7px;color:var(--cyan);}
.edge-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;color:var(--green);background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.18);padding:3px 10px;border-radius:5px;margin-bottom:8px;}
.verdict-txt{font-size:12px;line-height:1.65;color:#94a3b8;}
.verdict-txt strong{color:var(--text);}
/* FACTEUR */
.facteur{background:rgba(245,158,11,0.03);border:1px solid rgba(245,158,11,0.12);border-radius:10px;padding:11px 14px;display:flex;gap:10px;align-items:flex-start;}
.fact-icon{font-size:18px;flex-shrink:0;}
.fact-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--amber);letter-spacing:2px;margin-bottom:3px;}
.fact-txt{font-size:12px;color:var(--text);line-height:1.5;}
/* CONFIANCE */
.conf{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:14px;}
.conf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.conf-score{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;color:var(--cyan);}
.conf-score sup{font-size:18px;color:var(--muted);}
.conf-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:5px 12px;border-radius:20px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);color:var(--amber);display:inline-block;margin-bottom:3px;}
.conf-hint{font-size:10px;color:var(--muted);text-align:right;}
.conf-track{background:rgba(255,255,255,0.03);border-radius:5px;height:5px;overflow:hidden;}
.conf-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--cyan2),var(--amber),#f97316);}
.conf-scale{display:flex;justify-content:space-between;margin-top:5px;}
.conf-scale span{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted2);letter-spacing:1px;}
/* CONSEIL */
.conseil{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.conseil-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:5px;}
.conseil-txt{font-size:12px;color:#94a3b8;line-height:1.65;font-style:italic;}
.conseil-txt strong{color:var(--text);font-style:normal;}
/* PARI VALEUR */
.pv{background:linear-gradient(135deg,rgba(34,211,238,0.05),rgba(6,182,212,0.01));border:1px solid var(--border-c);border-radius:12px;padding:15px;position:relative;overflow:hidden;}
.pv::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);}
.pv-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.pv-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--cyan);letter-spacing:2px;margin-bottom:3px;}
.pv-bet{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);line-height:1.1;margin-bottom:3px;}
.pv-hint{font-size:11px;color:var(--muted);line-height:1.5;max-width:240px;}
.pv-cote{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--cyan);line-height:1;}
.pv-bk{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);text-align:right;}
.pv-foot{display:flex;align-items:center;gap:7px;padding-top:9px;border-top:1px solid var(--border);flex-wrap:wrap;}
.pv-tag{font-family:'Space Mono',monospace;font-size:8px;padding:3px 8px;border-radius:4px;}
.pv-tag.edge{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.18);color:var(--green);}
.pv-tag.kelly{background:rgba(34,211,238,0.06);border:1px solid var(--border-c);color:var(--cyan);}
.pv-tag.mise{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);}
.pv-warn{margin-top:7px;font-family:'Space Mono',monospace;font-size:7px;color:var(--amber);}
/* SCORE PREDIT */
.sp{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.sp-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:3px;}
.sp-score{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:6px;color:var(--text);line-height:1;}
.sp-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:3px;}
.sp-ci-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);margin-bottom:2px;text-align:right;}
.sp-ci{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--cyan);text-align:right;}
.sp-ci-sub{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);text-align:right;}
/* COTES */
.cotes{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.cote-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;}
.cote-t{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
.cote-v{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);line-height:1;}
.cote-v.hi{color:var(--amber);}
/* PATTERNS */
.pat-outer{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pat{background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.pat-head{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pat-team{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;}
.pat-games{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);}
.pat-body{padding:10px 12px;}
.pat-chart-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;}
.pat-chart{width:100%;height:52px;margin-bottom:8px;}
.pat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.pat-stat{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 7px;text-align:center;}
.pat-stat-v{font-family:'Bebas Neue',sans-serif;font-size:17px;line-height:1;}
.pat-stat-l{font-family:'Space Mono',monospace;font-size:5.5px;color:var(--muted);margin-top:1px;}
.pat-stat.c .pat-stat-v{color:var(--cyan);}
.pat-stat.a .pat-stat-v{color:var(--amber);}
.pat-stat.r .pat-stat-v{color:var(--red);}
.pat-stat.g .pat-stat-v{color:var(--green);}
/* SCENARIO */
.scen-list{display:flex;flex-direction:column;}
.scen-phase{display:flex;align-items:stretch;}
.scen-l{display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;}
.scen-badge{font-family:'Space Mono',monospace;font-size:7px;color:var(--cyan);background:rgba(34,211,238,0.06);border:1px solid var(--border-c);padding:3px 4px;border-radius:4px;text-align:center;line-height:1.3;white-space:nowrap;}
.scen-line{flex:1;width:1px;background:linear-gradient(180deg,rgba(34,211,238,0.18),rgba(34,211,238,0.02));margin:3px auto 0;}
.scen-body{flex:1;padding:0 0 12px 10px;}
.scen-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.scen-bar{flex:1;height:2px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.scen-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.scen-pct{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);white-space:nowrap;}
.scen-txt{font-size:11px;color:#94a3b8;line-height:1.6;}
.scen-txt strong{color:var(--text);}
.scen-resume{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-top:9px;}
.scen-resume-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.scen-resume-txt{font-size:12px;color:#94a3b8;line-height:1.7;}
/* JOUEURS COMPARISON 3v3 */
.pc-head{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:6px;}
.pc-team-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1px;padding:5px 9px;border-radius:5px;}
.pc-team-lbl.home{color:var(--cyan);background:rgba(34,211,238,0.06);border:1px solid var(--border-c);}
.pc-team-lbl.away{color:var(--text);background:rgba(255,255,255,0.03);border:1px solid var(--border);text-align:right;}
.players-compare{display:flex;flex-direction:column;gap:5px;}
.pc-row{display:grid;grid-template-columns:1fr 28px 1fr;gap:5px;align-items:center;}
.pc-player{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;}
.pc-player.away{flex-direction:row-reverse;}
.pc-photo{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--card);}
.pc-photo-ph{width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);flex-shrink:0;}
.pc-info{flex:1;min-width:0;}
.pc-info.away .pc-name{text-align:right;}
.pc-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-absent{font-family:'Space Mono',monospace;font-size:6px;color:var(--red);}
.pc-info.away .pc-absent{text-align:right;}
.pc-pills{display:flex;gap:3px;margin-top:3px;}
.pc-info.away .pc-pills{justify-content:flex-end;}
.pc-pill{font-family:'Space Mono',monospace;font-size:7px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.pc-pill.g{color:var(--text);}
.pc-pill.a{color:var(--muted);}
.pc-sep{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted2);text-align:center;}
/* FIFA CARD */
.fut-wrap{display:flex;gap:14px;align-items:flex-start;}
.fut-card{width:128px;flex-shrink:0;border-radius:13px;padding:11px 9px 13px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at top,#3d2a00 0%,#1e1400 40%,#150e00 100%);border:1px solid rgba(245,158,11,0.4);}
.fut-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,0.14) 0%,transparent 55%,rgba(245,158,11,0.06) 100%);pointer-events:none;}
.fut-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.6),transparent);}
.fut-rating{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;z-index:1;}
.fut-pos{font-family:'Space Mono',monospace;font-size:7px;color:rgba(245,158,11,0.55);letter-spacing:2px;margin-bottom:5px;z-index:1;}
.fut-photo{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid rgba(245,158,11,0.45);margin-bottom:5px;background:var(--card);z-index:1;}
.fut-photo-ph{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#1a2a3e,#0d1520);border:2px solid rgba(245,158,11,0.45);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--amber);margin-bottom:5px;z-index:1;}
.fut-name{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--amber);text-align:center;line-height:1.1;margin-bottom:7px;z-index:1;max-width:108px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fut-divider{width:80%;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.3),transparent);margin-bottom:7px;z-index:1;}
.fut-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;width:100%;z-index:1;}
.fut-st{text-align:center;}
.fut-st-v{font-family:'Bebas Neue',sans-serif;font-size:14px;color:rgba(245,158,11,0.9);line-height:1;}
.fut-st-l{font-family:'Space Mono',monospace;font-size:5px;color:rgba(245,158,11,0.45);}
.fut-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.fut-marche-l{font-family:'Space Mono',monospace;font-size:6px;color:var(--muted);letter-spacing:2px;margin-bottom:3px;}
.fut-marche-v{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--text);line-height:1.1;margin-bottom:7px;}
.fut-raison{font-size:11px;color:#94a3b8;line-height:1.55;margin-bottom:10px;}
.fut-cote-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.fut-cote-l{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);}
.fut-cote-v{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;}
.fut-alert{background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.12);border-radius:7px;padding:7px 9px;font-family:'Space Mono',monospace;font-size:6.5px;color:rgba(245,158,11,0.6);letter-spacing:.5px;line-height:1.6;}
/* SKIP */
.skip{border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
.skip.danger{background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.17);}
.skip.ok{background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.13);}
.skip-icon{font-size:18px;flex-shrink:0;}
.skip-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;margin-bottom:4px;}
.skip.danger .skip-lbl{color:var(--red);}
.skip.ok .skip-lbl{color:var(--green);}
.skip-txt{font-size:12px;color:#94a3b8;line-height:1.55;}
.skip-txt strong{color:var(--text);}
/* MUR PRO */
.pro-wall{position:relative;margin:0 18px 13px;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
.pro-wall-inner{filter:blur(5px);pointer-events:none;user-select:none;opacity:.22;}
.pro-wall-overlay{position:absolute;inset:0;display:flex;flex-direction:column;z-index:10;background:linear-gradient(180deg,rgba(6,10,16,0.05) 0%,rgba(6,10,16,0.92) 28%,rgba(6,10,16,0.99) 50%);cursor:pointer;}
.pw-top{background:rgba(255,255,255,0.015);border-bottom:1px solid rgba(255,255,255,0.04);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.pw-top-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--amber);letter-spacing:3px;}
.pw-lock{width:22px;height:22px;border:1px solid rgba(255,255,255,0.08);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.pw-lock svg{width:10px;height:10px;fill:none;stroke:rgba(255,255,255,0.25);stroke-width:2;stroke-linecap:round;}
.pw-body{padding:18px 18px 0;}
.pw-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#f1f5f9;letter-spacing:2px;margin-bottom:4px;}
.pw-title span{color:var(--cyan);}
.pw-sub{font-size:11px;color:rgba(148,163,184,0.45);line-height:1.5;margin-bottom:14px;}
.pw-feats{display:flex;flex-direction:column;}
.pw-feat{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);gap:10px;}
.pw-feat:last-child{border-bottom:none;}
.pw-feat-l{display:flex;align-items:flex-start;gap:8px;flex:1;}
.pw-feat-i{font-family:'Space Mono',monospace;font-size:7px;color:var(--amber);opacity:.5;min-width:14px;padding-top:1px;}
.pw-feat-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:1px;margin-bottom:2px;font-weight:700;}
.pw-feat-desc{font-size:10px;color:rgba(148,163,184,0.4);line-height:1.4;}
.pw-badge{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:1px;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.pw-badge.c1{background:rgba(245,158,11,0.06);color:rgba(245,158,11,0.5);border:1px solid rgba(245,158,11,0.12);}
.pw-badge.c2{background:rgba(34,211,238,0.04);color:rgba(34,211,238,0.35);border:1px solid rgba(34,211,238,0.09);}
.pw-pricing{margin:0 18px;padding:14px 0 0;border-top:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:14px;justify-content:space-between;}
.pw-price{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--amber);line-height:1;}
.pw-price span{font-size:20px;color:rgba(245,158,11,0.3);}
.pw-price-sub{font-family:'Space Mono',monospace;font-size:7px;color:rgba(148,163,184,0.28);letter-spacing:2px;margin-bottom:5px;}
.pw-item{font-size:10px;color:rgba(148,163,184,0.4);display:flex;align-items:center;gap:6px;padding:1px 0;}
.pw-item::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--cyan);opacity:.35;flex-shrink:0;}
.pw-cta-wrap{padding:14px 18px 18px;}
.pw-cta{width:100%;background:var(--cyan);color:#060a10;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;font-weight:700;padding:13px;border:none;border-radius:9px;cursor:pointer;text-align:center;display:block;}
.pw-note{font-family:'Space Mono',monospace;font-size:6px;color:rgba(148,163,184,0.18);text-align:center;margin-top:7px;letter-spacing:1px;}
.pro-pari{background:var(--card2);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.pro-pari-l{flex:1;min-width:0;}
.pro-pari-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--cyan);letter-spacing:2px;margin-bottom:2px;}
.pro-pari-bet{font-size:13px;font-weight:600;color:var(--text);}
.pro-pari-hint{font-size:10px;color:var(--muted);margin-top:1px;}
.pro-pari-cote{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--cyan);line-height:1;}
/* LOADING/NAV */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;}
.card-footer{padding:10px 18px;border-top:1px solid var(--border);background:rgba(0,0,0,0.1);}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,10,16,0.97);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;height:60px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ni-icon{font-size:17px;transition:.2s;}
.ni:hover .ni-icon{transform:translateY(-2px);}
.ni-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:1px;color:var(--muted);}
@media(max-width:480px){.pat-outer{grid-template-columns:1fr;}.fut-wrap{flex-direction:column;}}

<body>

</header>
<div id="root"><div class="loading"><div class="spinner"></div><div class="loading-lbl">CHARGEMENT...</div></div></div>
<nav class="nav">
  <div class="ni" onclick="location='/'"><div class="ni-icon">⚡</div><div class="ni-lbl">ANALYSES</div></div>
  <div class="ni" onclick="location='/historique.html'"><div class="ni-icon">📊</div><div class="ni-lbl">HISTORIQUE</div></div>
  <div class="ni" onclick="location='/combis.html'"><div class="ni-icon">🎰</div><div class="ni-lbl">COMBINÉS</div></div>

</nav>
<script>
var fId=new URLSearchParams(location.search).get('id');
var isPro=true;

function forme(str){if(!str)return '';return str.split('').slice(0,5).map(function(c){var cls=c==='W'||c==='V'?'fw':c==='D'||c==='N'?'fn':'fl';var l=c==='W'?'V':c==='D'?'N':c==='L'?'D':c;return '<div class="fd '+cls+'">'+l+'</div>';}).join('');}
function lgImg(team,ini){if(!team)return '';var url=team.logo||(team.id?'https://media.api-sports.io/football/teams/'+team.id+'.png':'');if(!url)return '<div class="team-logo-ph">'+ini+'</div>';return '<img class="team-logo" src="'+url+'" onerror="this.outerHTML=\'<div class=team-logo-ph>'+ini+'</div>\'">';}
function ph(name){return name?name.slice(0,2).toUpperCase():'??';}
function pImg(p,cls){if(!p)return '<div class="'+cls+'-ph">??</div>';return p.photo?'<img class="'+cls+'" src="'+p.photo+'" onerror="this.outerHTML=\'<div class='+cls+'-ph>'+ph(p.name)+'</div>\'">'  :'<div class="'+cls+'-ph">'+ph(p.name)+'</div>';}

function buildComp(hn,an,ch,ca){
  var dh=ch&&ch.length?ch:[{label:'ATTAQUE xG',val:55},{label:'DEFENSE',val:50},{label:'FORME',val:60},{label:'POSSESSION',val:50},{label:'PRESSING',val:55}];
  var da=ca&&ca.length?ca:[{label:'ATTAQUE xG',val:60},{label:'DEFENSE',val:65},{label:'FORME',val:70},{label:'POSSESSION',val:55},{label:'PRESSING',val:60}];
  function rows(crits){return crits.map(function(c){var w=Math.min(Math.max(c.val||0,0),100);var cls=w>=65?'hi':w>=40?'mid':'lo';var col=w>=65?'var(--green)':w>=40?'var(--amber)':'var(--red)';return '<div class="cr"><div class="cr-top"><span class="cr-lbl">'+(c.label||'')+'</span><span class="cr-val" style="color:'+col+'">'+w+'</span></div><div class="cr-bar"><div class="cr-fill '+cls+'" data-w="'+w+'" style="width:0%"></div></div></div>';}).join('');}
  return '<div class="comp"><div class="comp-c"><div class="comp-lbl" style="color:var(--cyan)">'+hn.toUpperCase().slice(0,13)+'</div><div class="crit">'+rows(dh)+'</div></div><div class="comp-c"><div class="comp-lbl" style="color:var(--text)">'+an.toUpperCase().slice(0,13)+'</div><div class="crit">'+rows(da)+'</div></div></div>';
}

function buildCotes(m){
  var items=[{t:'DOM',v:m.c1},{t:'NUL',v:m.cn},{t:'EXT',v:m.c2},{t:'OV 1.5',v:m.co15},{t:'OV 2.5',v:m.co25},{t:'UN 2.5',v:m.cu25},{t:'DC 1X',v:m.dc1x},{t:'DC X2',v:m.dc2x},{t:'BTTS',v:m.btts_oui},{t:'NO BTTS',v:m.btts_non}].filter(function(x){return x.v&&x.v!=='--';});
  if(!items.length)return '';
  return '<div class="s"><div class="stitle">COTES DU MATCH</div><div class="cotes">'+items.map(function(x){var hi=parseFloat(x.v)>=2?' hi':'';return '<div class="cote-item"><div class="cote-t">'+x.t+'</div><div class="cote-v'+hi+'">'+x.v+'</div></div>';}).join('')+'</div></div><div class="sep"></div>';
}

function buildPatterns(hn,an,evH,evA,m){
  if(!evH&&!evA)return '';
  function patCol(lbl,ev,colorVar,isHome){
    if(!ev)return '';
    var slots=ev.slots||[];
    var maxN=Math.max.apply(null,slots.map(function(s){return s.n||0;}).concat([1]));
    var W=180,H=50,nS=6,gap=2,bw=Math.floor((W-(nS-1)*gap)/nS);
    var bars=slots.map(function(s,i){
      var bh=maxN>0?Math.round((s.n/maxN)*(H-16)):0;
      var x=i*(bw+gap),y=H-bh-16;
      var fill=s.n>=3?colorVar:s.n>=1?colorVar.replace(')',',0.4)').replace('var(','rgba(34,211,238,'):' rgba(255,255,255,0.05)';
      if(s.n>=3)fill=colorVar;else if(s.n===2)fill='rgba(34,211,238,0.5)';else if(s.n===1)fill='rgba(34,211,238,0.25)';else fill='rgba(255,255,255,0.05)';
      if(!isHome){if(s.n>=3)fill='rgba(226,232,240,0.7)';else if(s.n===2)fill='rgba(226,232,240,0.4)';else if(s.n===1)fill='rgba(226,232,240,0.2)';else fill='rgba(255,255,255,0.05)';}
      return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="2" fill="'+fill+'"/>'
        +'<text x="'+(x+bw/2)+'" y="'+(H-1)+'" font-family="Space Mono,monospace" font-size="5.5" fill="rgba(74,101,128,0.7)" text-anchor="middle">'+s.t+'</text>'
        +(s.n>0?'<text x="'+(x+bw/2)+'" y="'+(y>6?y-2:8)+'" font-family="Bebas Neue,sans-serif" font-size="9" fill="'+fill+'" text-anchor="middle">'+s.n+'</text>':'');
    }).join('');
    var shotsCadres=isHome?(m&&m.xgH_shots):(m&&m.xgA_shots);
    var shotsTotal=isHome?(m&&m.xgH_shots_total):(m&&m.xgA_shots_total);
    return '<div class="pat"><div class="pat-head"><span class="pat-team" style="color:'+colorVar+'">'+lbl.toUpperCase().slice(0,12)+'</span><span class="pat-games">'+(ev.games||10)+' M</span></div><div class="pat-body">'
      +'<div class="pat-chart-lbl">BUTS PAR TRANCHE</div>'
      +'<svg class="pat-chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+bars+'</svg>'
      +'<div class="pat-grid">'
      +(shotsTotal?'<div class="pat-stat c"><div class="pat-stat-v">'+shotsTotal+'</div><div class="pat-stat-l">TIRS/M</div></div>':'')
      +(shotsCadres?'<div class="pat-stat g"><div class="pat-stat-v">'+shotsCadres+'</div><div class="pat-stat-l">CADRES/M</div></div>':'')
      +(ev.corners_per_game?'<div class="pat-stat c"><div class="pat-stat-v">'+ev.corners_per_game+'</div><div class="pat-stat-l">CORNERS/M</div></div>':'')
      +'<div class="pat-stat a"><div class="pat-stat-v">'+(ev.yellow_per_game||'—')+'</div><div class="pat-stat-l">JAUNES/M</div></div>'
      +'<div class="pat-stat r"><div class="pat-stat-v">'+(ev.red_cards||0)+'</div><div class="pat-stat-l">ROUGES</div></div>'
      +(ev.goals_total!=null?'<div class="pat-stat g"><div class="pat-stat-v">'+ev.goals_total+'</div><div class="pat-stat-l">BUTS TOT</div></div>':'')
      +'</div></div></div>';
  }
  return '<div class="s"><div class="stitle">PATTERNS — 10 MATCHS</div><div class="pat-outer">'+patCol(hn,evH,'var(--cyan)',true)+patCol(an,evA,'var(--text)',false)+'</div></div><div class="sep"></div>';
}

function buildScen(m){
  var sc15=m.scenario_15min||null;
  var phases=[];
  if(sc15&&sc15.length){phases=sc15;}
  else if(m.scenario){if(m.scenario.phase1)phases.push({t:"0-25'",prob:10,txt:m.scenario.phase1});if(m.scenario.phase2)phases.push({t:"25-65'",prob:16,txt:m.scenario.phase2});if(m.scenario.phase3)phases.push({t:"65-90'",prob:14,txt:m.scenario.phase3});}
  if(!phases.length)return '';
  var list=phases.map(function(p,i){var w=Math.min((p.prob||0)*4,100);var last=i===phases.length-1;return '<div class="scen-phase"><div class="scen-l"><div class="scen-badge">'+(p.t||'')+'</div>'+(!last?'<div class="scen-line"></div>':'')+'</div><div class="scen-body"><div class="scen-bar-row"><div class="scen-bar"><div class="scen-bar-fill" style="width:'+w+'%"></div></div><span class="scen-pct">'+(p.prob||0)+'%</span></div><div class="scen-txt">'+(p.txt||'')+'</div></div></div>';}).join('');
  var resumeTxt=phases.map(function(p){return p.txt||'';}).filter(Boolean).join(' ');
  var resume=resumeTxt?'<div class="scen-resume"><div class="scen-resume-lbl">RESUME DU SOIR</div><div class="scen-resume-txt">'+resumeTxt+'</div></div>':'';
  return '<div class="s"><div class="stitle">SCENARIO ATTENDU</div><div class="scen-list">'+list+'</div>'+resume+'</div><div class="sep"></div>';
}

function buildPlayers(hn,an,scH,scA){
  if((!scH||!scH.length)&&(!scA||!scA.length))return '';
  var maxLen=Math.max((scH||[]).length,(scA||[]).length);
  var rows='';
  for(var i=0;i<maxLen;i++){
    var ph_=scH&&scH[i]||null,pa=scA&&scA[i]||null;
    function pb(p,side){
      if(!p)return '<div class="pc-player '+side+'" style="opacity:.15"><div class="pc-photo-ph">—</div><div class="pc-info '+side+'"><div class="pc-name">—</div></div></div>';
      var img=p.photo?'<img class="pc-photo" src="'+p.photo+'" onerror="this.outerHTML=\'<div class=pc-photo-ph>'+ph(p.name)+'</div>\'">':'<div class="pc-photo-ph">'+ph(p.name)+'</div>';
      var absent=p.absent?'<div class="pc-absent">ABSENT</div>':'';
      var pills='<div class="pc-pills"><span class="pc-pill g">'+p.goals+'G</span>'+(p.assists!=null?'<span class="pc-pill a">'+p.assists+'PD</span>':'')+'<span class="pc-pill m">'+p.games+'M</span></div>';
      return '<div class="pc-player '+side+'">'+img+'<div class="pc-info '+side+'"><div class="pc-name">'+p.name+'</div>'+absent+pills+'</div></div>';
    }
    rows+='<div class="pc-row">'+pb(ph_,'home')+'<div class="pc-sep">vs</div>'+pb(pa,'away')+'</div>';
  }
  return '<div class="s"><div class="stitle">BUTEURS CLES</div><div class="pc-head"><div class="pc-team-lbl home">'+hn.toUpperCase().slice(0,12)+'</div><div></div><div class="pc-team-lbl away">'+an.toUpperCase().slice(0,12)+'</div></div><div class="players-compare">'+rows+'</div></div><div class="sep"></div>';
}

function buildFifa(jd,scH,scA){
  if(!jd||!jd.nom)return '';
  if(jd.absent)return '<div class="s"><div class="stitle">BONUS — JOUEUR DU SOIR</div><div class="skip danger"><div class="skip-icon">⛔</div><div><div class="skip-lbl">ABSENT</div><div class="skip-txt">'+jd.nom.toUpperCase()+' — Pari joueur deconseille</div></div></div></div><div class="sep"></div>';
  var all=(scH||[]).concat(scA||[]);
  var found=all.find(function(p){return p&&p.name===jd.nom;});
  var goals=found?found.goals:'—',assists=found&&found.assists!=null?found.assists:'—',games=found?found.games:'—';
  var rating=found&&found.rating?Math.round(parseFloat(found.rating)):'—';
  var photoHtml=found&&found.photo?'<img class="fut-photo" src="'+found.photo+'" onerror="this.outerHTML=\'<div class=fut-photo-ph>'+ph(jd.nom)+'</div>\'">':'<div class="fut-photo-ph">'+ph(jd.nom)+'</div>';
  var lastName=jd.nom.split(' ').pop().toUpperCase();
  var eq=jd.equipe==='DOM'?'DOM':'EXT';
  return '<div class="s"><div class="stitle">BONUS — JOUEUR DU SOIR</div><div class="fut-wrap">'
    +'<div class="fut-card"><div class="fut-rating">'+(rating!=='—'?rating:'★')+'</div><div class="fut-pos">'+eq+'</div>'+photoHtml+'<div class="fut-name">'+lastName+'</div><div class="fut-divider"></div><div class="fut-stats"><div class="fut-st"><div class="fut-st-v">'+goals+'</div><div class="fut-st-l">BUT</div></div><div class="fut-st"><div class="fut-st-v">'+assists+'</div><div class="fut-st-l">PD</div></div><div class="fut-st"><div class="fut-st-v">'+games+'</div><div class="fut-st-l">MJ</div></div></div></div>'
    +'<div class="fut-info"><div><div class="fut-marche-l">MARCHE</div><div class="fut-marche-v">'+(jd.marche||'Buteur dans le match')+'</div><div class="fut-raison">'+(jd.raison||'')+'</div>'+(jd.cote_estimee?'<div class="fut-cote-row"><span class="fut-cote-l">COTE EST.</span><span class="fut-cote-v">'+jd.cote_estimee+'</span></div>':'')+'</div><div class="fut-alert">Verifier la composition avant de jouer. Ne pas miser si non titulaire.</div></div>'
    +'</div></div><div class="sep"></div>';
}

function render(m){
  var hn=m.home&&m.home.n||'',an=m.away&&m.away.n||'';
  var heure=(m.date||'').split(' ')[1]||'';
  var isHot=m.hot||(m.conf||0)>=8,isVal=m.val||m.vbet==='OUI';
  var confPct=Math.round(((m.conf||0)/10)*100);
  var confLvl=(m.conf||0)>=7.5?'SHARK LOCK':(m.conf||0)>=6.5?'ELEVE':'MODERE';
  var confStyle=(m.conf||0)>=7.5?'':' style="background:rgba(34,211,238,0.07);border-color:rgba(34,211,238,0.18);color:var(--cyan)"';
  var p3=m.paris_3||{};
  var bk=m.bookies&&m.bookies[0]||null;
  var meteo='';
  if(m.meteo)meteo='<div class="meteo">'+(m.meteo.temp?'<span class="meteo-item">'+m.meteo.temp+'C</span>':'')+(m.meteo.desc?'<span class="meteo-item">'+m.meteo.desc+'</span>':'')+(m.meteo.vent?'<span class="meteo-item">'+m.meteo.vent+' km/h</span>':'')+'</div>';
  // Score predit
  var spHtml='';
  var sp=m.score_predit;
