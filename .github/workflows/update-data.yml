          function lgKey(lgId) { return LG_KEY[lgId]||'other'; }
          function formatLast10(fixtures, teamId) {
            return fixtures.slice(0,20).map(function(f) {
              var isH = f.teams.home.id===teamId;
              var gf  = isH?(f.goals.home||0):(f.goals.away||0);
              var ga  = isH?(f.goals.away||0):(f.goals.home||0);
              var opp = isH?f.teams.away.name:f.teams.home.name;
              var oppId = isH?f.teams.away.id:f.teams.home.id;
              var res = gf>ga?'W':gf<ga?'L':'D';
              return {
                d:       (f.fixture.date||'').split('T')[0],
                opponent: opp,
                opp_id:  oppId,
                score:   gf+'-'+ga,
                result:  res,
                home:    isH,
                match:   opp,
                lieu:    isH?'DOM':'EXT',
                date_full: f.fixture.date||''
              };
            });
          }
          function calcFatigue(last10, teamName) {
            if (!last10||!last10.length) return {val:40, info:'Calendrier inconnu'};
            var now = new Date();
            var last = new Date(last10[0].date_full||last10[0].d);
            var daysSince = Math.round((now-last)/(1000*60*60*24));
            var matchesIn14 = last10.filter(function(m){
              var d = new Date(m.date_full||m.d);
              return (now-d)/(1000*60*60*24) <= 14;
            }).length;
            var score = 0;
            if (daysSince<=2)  score=90;
            else if(daysSince<=4) score=70;
            else if(daysSince<=6) score=50;
            else if(daysSince<=8) score=30;
            else score=15;
            if (matchesIn14>=3) score = Math.min(100,score+20);
            var info = daysSince<=7
              ? 'Dernier match il y a '+daysSince+'j \u2014 '+matchesIn14+' match(s) en 14j'
              : 'Repos '+daysSince+' jours';
            return {val:Math.round(score), info:info};
          }
          function calcTendances(last10Home, last10Away, homeId, awayId) {
            function countOver25(games) {
              return games.filter(function(g){
                var parts = (g.score||'').split('-');
                var total = parseInt(parts[0]||0)+parseInt(parts[1]||0);
                return total>2;
              }).length;
            }
            function countBTTS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                return parseInt(parts[0]||0)>0 && parseInt(parts[1]||0)>0;
              }).length;
            }
            function countCS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                if(g.home) return parseInt(parts[1]||0)===0;
                return parseInt(parts[0]||0)===0;
              }).length;
            }
            var domGames=last10Home.filter(function(g){return g.home===true;});
            var extGames=last10Away.filter(function(g){return g.home===false;});
            var o25H = countOver25(domGames);
            var o25A = countOver25(extGames);
            var bttsH = countBTTS(domGames);
            var bttsA = countBTTS(extGames);
            var csH = countCS(domGames);
            var o25Hn=Math.max(domGames.length,1);
            var o25An=Math.max(extGames.length,1);
            return {
              over25_home: o25H, over25_away: o25A,
              over25_home_n: o25Hn, over25_away_n: o25An,
              over25_home_txt: o25H+'/'+o25Hn+' matchs DOM Over 2.5',
              over25_away_txt: o25A+'/'+o25An+' matchs EXT Over 2.5',
              btts_home: bttsH, btts_away: bttsA,
              btts_home_n: o25Hn, btts_away_n: o25An,
              cs_home: csH,
              cs_home_txt: csH+' clean sheets sur les derniers matchs à domicile'
            };
          }
          function calcCriteres(stats, isDom, rank) {
            if (!stats) return {fd:50,att:50,def:50,fr:50,mot:70,fat:50};
            var total=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.total)||30;
            var bm=(stats.goals&&stats.goals.for&&stats.goals.for.total&&stats.goals.for.total.total)||0;
            var be=(stats.goals&&stats.goals.against&&stats.goals.against.total&&stats.goals.against.total.total)||0;
            var form=(stats.form||'').slice(-5);
            var pts=form.split('').reduce(function(a,c){return a+(c==='W'?3:c==='D'?1:0);},0);
            var fr=Math.round(pts/Math.max(form.length*3,1)*100);
            var att=Math.min(100,Math.round(bm/Math.max(total,1)*40));
            var def=Math.max(0,Math.min(100,Math.round((2.5-be/Math.max(total,1))*35)));
            var vd=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.home)||0;
            var ve=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.away)||0;
            var md=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.home)||Math.round(total/2);
            var me=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.away)||Math.round(total/2);
            var fd=isDom?Math.min(100,Math.round(vd/Math.max(md,1)*100)):Math.min(100,Math.round(ve/Math.max(me,1)*100));
            var mot=70;
            if(rank){if(rank<=3)mot=95;else if(rank<=6)mot=85;else if(rank<=10)mot=70;else if(rank>=17)mot=90;else mot=60;}
            return {
              fd:Math.max(0,Math.min(100,fd)),
              att:Math.max(0,Math.min(100,att)),
              def:Math.max(0,Math.min(100,def)),
              fr:Math.max(0,Math.min(100,fr)),
              mot:Math.max(0,Math.min(100,mot)),
              fat:50
            };
          }

          // ── INDICE DE MOTIVATION ─────────────────────────────────
          // ── INDICE DE RISQUE DISCIPLINAIRE ──────────────────────
          function calcDisciplineRisk(refStats, xgH, xgA, homeName, awayName) {
            if(!refStats) return null;
            var cartons = parseFloat(refStats.cards_per_game)||0;
            var rouges  = parseFloat(refStats.pens_per_game)||0; // proxy rouges
            var foutesH = xgH&&xgH.fouls_avg?parseFloat(xgH.fouls_avg):0;
            var foutesA = xgA&&xgA.fouls_avg?parseFloat(xgA.fouls_avg):0;
            var alerts  = [];
            var riskScore = 0;

            // Arbitre sévère
            if(cartons>=5.0){ riskScore+=30; alerts.push('🟨 Arbitre très sévère ('+cartons+' cartons/match)'); }
            else if(cartons>=4.0){ riskScore+=15; alerts.push('🟨 Arbitre sévère ('+cartons+' cartons/match)'); }

            // Équipe agressive × arbitre
            if(foutesH>=14&&cartons>=4.0){
              riskScore+=25;
              alerts.push('⚠️ '+homeName+' très agressif ('+foutesH+' fautes/match) + arbitre sévère → risque carton rouge DOM');
            }
            if(foutesA>=14&&cartons>=4.0){
              riskScore+=25;
              alerts.push('⚠️ '+awayName+' très agressif ('+foutesA+' fautes/match) + arbitre sévère → risque carton rouge EXT');
            }

            if(!alerts.length) return null;
            return {
              score: Math.min(riskScore,100),
              alerts: alerts,
              conseil: riskScore>=40?'Éviter les paris sur victoire, préférer les marchés sans handicap d\'homme':'Modérer les paris sur victoire nette'
            };
          }

          // ── DÉTECTEUR GARDIEN TITULAIRE ABSENT ──────────────────
          function calcGoalkeeperAlert(injuries, lineups, homeId, awayId, homeName, awayName) {
            var alerts = [];

            function checkGK(teamId, teamName, side) {
              // Méthode 1 : via les lineups — le gardien titulaire n'est pas dans le XI
              if(lineups&&lineups[side]&&lineups[side].startXI){
                var gkInXI = lineups[side].startXI.find(function(p){return p.pos==='G';});
                // Si pas de gardien dans le XI c'est un bug de data, on ignore
                if(!gkInXI) return;
              }

              // Méthode 2 : via les injuries — cherche un joueur avec "Goalkeeper" ou position GK
              var injTeam = (injuries||[]).filter(function(x){
                return x.team===teamId||(side==='home'&&x.team==='home')||(side==='away'&&x.team==='away');
              });
              injTeam.forEach(function(inj){
                var reason=(inj.reason||'').toLowerCase();
                var name=(inj.name||'').toLowerCase();
                // Détecter gardien par des indices dans le nom ou la raison
                // API-Sports ne donne pas toujours la position dans injuries
                // On cross-check avec les lineups si dispo
                if(lineups&&lineups[side]){
                  var bench=lineups[side].bench||[];
                  var gkBench=bench.find(function(p){return p.pos==='G';});
                  var xiGK=lineups[side].startXI.find(function(p){return p.pos==='G';});
                  if(xiGK&&gkBench){
                    // Vérifier si le gardien titulaire habituel est dans les blessés
                    var injNames=injTeam.map(function(x){return x.name.toLowerCase();});
                    var xiGKname=(xiGK.name||'').toLowerCase();
                    var injured=injNames.some(function(n){
                      return levenshtein(n,xiGKname)/Math.max(n.length,xiGKname.length)<0.3;
                    });
                    if(injured){
                      alerts.push('🚨 ALERTE DÉFENSE: Gardien titulaire probable de '+teamName+' BLESSÉ — +25-40% de buts encaissés attendus → privilégier Over 2.5 ou BTTS Oui contre cette équipe');
                    }
                  }
                }
              });
            }

            checkGK(homeId, homeName, 'home');
            checkGK(awayId, awayName, 'away');
            return alerts;
          }
          function calcMotivation(rank, totalTeams, pts, ptsLeader, matchsLeft, isHome, leagueName, homeName, awayName) {
            totalTeams = totalTeams||20;
            matchsLeft = matchsLeft||5;
            var relegZone = totalTeams-3; // 3 derniers relégués
            var euroZone  = 5;            // top 5 = Europe
            var title     = 1;
            var alerts    = [];
            var score     = 50; // base neutre

            if(!rank) return {score:50, alerts:[], label:'Enjeu standard'};

            // Relégation
            if(rank>=relegZone){
              var urgency = Math.max(0, 4-matchsLeft); // plus c'est tard, plus c'est urgent
              score += 30 + urgency*5;
              alerts.push('⚠️ EN ZONE DE RELÉGATION (#'+rank+'/'+totalTeams+') — survie en jeu');
            } else if(rank===relegZone-1){
              score += 20;
              alerts.push('🔴 A 1 PLACE de la relégation (#'+rank+') — pression maximale');
            } else if(rank>=relegZone-3){
              score += 12;
              alerts.push('🟡 Proche de la relégation (#'+rank+') — doit gagner');
            }

            // Title race
            if(rank===title && ptsLeader){
              score += 15;
              alerts.push('🏆 LEADER — défend sa place');
            } else if(rank<=3 && ptsLeader){
              var gap = (ptsLeader - pts)||0;
              if(gap<=6){ score+=20; alerts.push('🏆 À '+gap+' pts du titre — match crucial'); }
              else if(gap<=12){ score+=10; alerts.push('🏆 Dans la course au titre'); }
            }

            // Europe
            if(rank<=euroZone && rank>title){
              score += 10;
              alerts.push('🌍 En course pour l\'Europe (#'+rank+')');
            } else if(rank===euroZone+1 || rank===euroZone+2){
              score += 8;
              alerts.push('🌍 À la porte de l\'Europe (#'+rank+')');
            }

            // Derby detection (noms communs)
            var cityWords = ['manchester','london','milan','madrid','rome','rome','glasgow','buenos aires','paris'];
            var hLow = (homeName||'').toLowerCase();
            var aLow = (awayName||'').toLowerCase();
            var isDerby = cityWords.some(function(c){return hLow.includes(c)&&aLow.includes(c);}) ||
              (hLow.includes('city')&&aLow.includes('united')) ||
              (hLow.includes('inter')&&aLow.includes('milan')) ||
              (hLow.includes('atletico')&&aLow.includes('real')) ||
              (hLow.includes('river')&&aLow.includes('boca'));
            if(isDerby){ score+=25; alerts.push('🔥 DERBY — tension et imprévisibilité maximale'); }

            // Fin de saison
            if(matchsLeft<=3){ score+=10; alerts.push('⏱️ Fin de saison ('+matchsLeft+' matchs restants) — urgence absolue'); }

            score = Math.max(0,Math.min(100,score));
            var label = score>=80?'ENJEU CRITIQUE':score>=60?'ENJEU ÉLEVÉ':score>=40?'Enjeu modéré':'Enjeu faible';
            return {score:score, alerts:alerts, label:label, isDerby:isDerby};
          }

          // ── MATCHUP TACTIQUE ──────────────────────────────────────
          function calcMatchup(xgH, xgA, sH, sA, last10H, last10A) {
            var possH = xgH&&xgH.possession_avg?parseFloat(xgH.possession_avg):50;
            var possA = xgA&&xgA.possession_avg?parseFloat(xgA.possession_avg):50;
            var shotsH = xgH&&xgH.shots_total_avg?parseFloat(xgH.shots_total_avg):10;
            var shotsA = xgA&&xgA.shots_total_avg?parseFloat(xgA.shots_total_avg):10;
            var xgHavg = xgH&&xgH.xg_avg?parseFloat(xgH.xg_avg):1.2;
            var xgAavg = xgA&&xgA.xg_avg?parseFloat(xgA.xg_avg):1.0;

            // Buts encaissés / matchs pour mesurer la défense
            var totalH=(sH&&sH.fixtures&&sH.fixtures.played&&sH.fixtures.played.total)||20;
            var totalA=(sA&&sA.fixtures&&sA.fixtures.played&&sA.fixtures.played.total)||20;
            var defH = sH&&sH.goals&&sH.goals.against&&sH.goals.against.total?
              (sH.goals.against.total.total/totalH).toFixed(2):1.2;
            var defA = sA&&sA.goals&&sA.goals.against&&sA.goals.against.total?
              (sA.goals.against.total.total/totalA).toFixed(2):1.2;

            // Styles
            var styleH = possH>=55?'Possession':(shotsH>=14?'Pressing haut':'Équilibré');
            var styleA = possA>=55?'Possession':(shotsA>=14?'Pressing haut':'Équilibré');
            if(possH<45) styleH='Contre-attaque';
            if(possA<45) styleA='Contre-attaque';

            var insights=[];

            // Contre-attaque vs Possession = danger
            if(styleH==='Possession'&&styleA==='Contre-attaque'){
              insights.push('⚡ '+styleA+' EXT face à l\'équipe de possession DOM — risque de buts EXT sur transition');
            } else if(styleA==='Possession'&&styleH==='Contre-attaque'){
              insights.push('⚡ DOM en contre face à l\'équipe de possession EXT — match ouvert des deux côtés');
            }

            // Deux équipes offensives
            if(xgHavg>=1.4&&xgAavg>=1.2){
              insights.push('⚽ Deux équipes offensives (xG DOM '+xgHavg+' / EXT '+xgAavg+') — renforce Over 2.5 et BTTS Oui');
            }

            // Deux défenses solides
            if(parseFloat(defH)<=1.0&&parseFloat(defA)<=1.0){
              insights.push('🔒 Deux défenses solides ('+defH+' et '+defA+' buts encaissés/match) — renforce Under 2.5 et BTTS Non');
            }

            // Défense fragile DOM face à attaque EXT forte
            if(parseFloat(defH)>=1.6&&xgAavg>=1.3){
              insights.push('🚨 Défense DOM fragile ('+defH+' buts encaissés/match) face à attaque EXT productive (xG '+xgAavg+')');
            }

            return {
              styleH:styleH, styleA:styleA,
              possH:possH, possA:possA,
              defH:defH, defA:defA,
              insights:insights
            };
          }

          // ── POIDS RÉEL DES ABSENTS ───────────────────────────────
          function calcKeyAbsences(injuries, topScorersH, topScorersA, homeId, awayId, bmHdom, mdHdom, bmAext, meAext) {
            var alerts=[];
            if(!injuries||!injuries.length) return alerts;

            var injH=injuries.filter(function(x){return x.team===homeId||x.team==='home';});
            var injA=injuries.filter(function(x){return x.team===awayId||x.team==='away';});

            function checkAbsence(injList, scorers, teamGoals, teamGames, teamLabel){
              if(!injList.length||!scorers||!scorers.length) return;
              var totalGoals=teamGoals||1;
              var totalGames=teamGames||1;
              scorers.forEach(function(player){
                var isAbsent=injList.find(function(inj){
                  var pn=(player.name||'').toLowerCase();
                  var in_=(inj.name||'').toLowerCase();
                  // Match si au moins 5 caractères communs consécutifs (nom de famille)
                  var words=pn.split(' ');
                  return words.some(function(w){return w.length>=4&&in_.includes(w);});
                });
                if(isAbsent){
                  var goalsContrib=player.goals||0;
                  var assistContrib=player.assists||0;
                  var totalContrib=goalsContrib+assistContrib;
                  // Buts totaux équipe sur la saison
                  var teamTotalGoals=(teamGoals||1);
                  var pct=Math.round((totalContrib/Math.max(teamTotalGoals*1.5,1))*100);
                  var severity=pct>=30?'🚨 ALERTE ROUGE':pct>=20?'🔴 ABSENCE MAJEURE':'🟡 Absence notable';
                  alerts.push(severity+': '+player.name+' ('+teamLabel+') ABSENT — impliqué dans ~'+pct+'% des buts ('+goalsContrib+' buts + '+assistContrib+' passes D. en '+player.games+' matchs)');
                  if(pct>=25) alerts.push('  → Impact direct: xG de '+teamLabel+' probablement en baisse. Envisager Under ou BTTS Non.');
                }
              });
            }

            checkAbsence(injH, topScorersH, bmHdom, mdHdom, 'DOM');
            checkAbsence(injA, topScorersA, bmAext, meAext, 'EXT');
            return alerts;
          }
          async function genAnalyse(d) {
            var moyBmH = d.bmH&&d.totalH?(d.bmH/d.totalH).toFixed(2):'?';
            var moyBeH = d.beH&&d.totalH?(d.beH/d.totalH).toFixed(2):'?';
            var moyBmA = d.bmA&&d.totalA?(d.bmA/d.totalA).toFixed(2):'?';
            var moyBeA = d.beA&&d.totalA?(d.beA/d.totalA).toFixed(2):'?';
            var moyBmHdom = d.bmHdom&&d.mdHdom?(d.bmHdom/d.mdHdom).toFixed(2):'?';
            var moyBeHdom = d.beHdom&&d.mdHdom?(d.beHdom/d.mdHdom).toFixed(2):'?';
            var moyBmAext = d.bmAext&&d.meAext?(d.bmAext/d.meAext).toFixed(2):'?';
            var moyBeAext = d.beAext&&d.meAext?(d.beAext/d.meAext).toFixed(2):'?';
            // Probas implicites avec déduction marge bookmaker
