<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analyse Match — IASHARK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c12;--card:#0d1520;--card2:#111a26;--cyan:#22d3ee;--cyan2:#06b6d4;--amber:#f59e0b;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--text:#e2e8f0;--muted:#4a6580;--border:rgba(255,255,255,0.06);--border-cyan:rgba(34,211,238,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:90px;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(34,211,238,0.035) 0%,transparent 70%);pointer-events:none;}
.hdr{position:sticky;top:0;z-index:99;background:rgba(8,12,18,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:14px;}
.hdr-back{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;transition:.2s;flex-shrink:0;}
.hdr-back:hover{color:var(--cyan);border-color:var(--cyan);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);text-decoration:none;}
.logo span{color:var(--cyan);}
.hdr-badge{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--border-cyan);padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.06);margin-left:auto;}
.wrap{max-width:680px;margin:20px auto 0;padding:0 16px;}
.match-card{border:1px solid var(--border);border-radius:20px;overflow:hidden;animation:reveal .5s ease forwards;}
.match-card.free{border-color:rgba(34,211,238,0.15);}
.match-card.hot{border-color:rgba(245,158,11,0.25);}
@keyframes reveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-topbar{background:linear-gradient(135deg,#0a1628,#0d1d30);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.league-info{display:flex;align-items:center;gap:8px;}
.league-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;}
.match-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);}
.badge-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.b-hot{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.08));border:1px solid rgba(245,158,11,0.35);color:var(--amber);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 12px 2px rgba(245,158,11,0.2)}}
.b-val{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:rgba(34,211,238,0.08);border:1px solid var(--border-cyan);color:var(--cyan);}
.b-free{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;padding:4px 10px;border-radius:20px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:var(--green);}
.teams-header{padding:24px 20px 18px;background:linear-gradient(180deg,#0a1628 0%,var(--card) 100%);}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:14px;}
.team{text-align:center;}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,28px);letter-spacing:1px;line-height:1;margin-bottom:4px;}
.team-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;}
.team-form{display:flex;justify-content:center;gap:3px;margin-top:6px;}
.fd{width:16px;height:16px;border-radius:3px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;}
.fw{background:rgba(16,185,129,0.2);color:var(--green);}
.fn{background:rgba(245,158,11,0.12);color:var(--amber);}
.fl{background:rgba(239,68,68,0.15);color:var(--red);}
.team.away .team-name{color:rgba(226,232,240,0.7);}
.vs-block{text-align:center;}
.vs{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);display:block;}
.vs-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--cyan);margin-top:2px;}
.proba-bar{display:flex;height:4px;border-radius:4px;overflow:hidden;margin-bottom:8px;}
.pb1{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.pbn{background:rgba(255,255,255,0.1);}
.pb2{background:rgba(226,232,240,0.2);}
.proba-labels{display:flex;justify-content:space-between;}
.prob-item{text-align:center;}
.prob-pct{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;}
.prob-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;}
.meta-item{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.section{padding:0 20px 14px;}
.section.pt{padding-top:16px;}
.block-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.block-title::after{content:'';flex:1;height:1px;background:var(--border);}
.dv{height:1px;background:var(--border);margin:0 20px 14px;}
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ctx-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.ctx-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.ctx-txt{font-size:12px;color:#94a3b8;line-height:1.6;}
.ctx-txt strong{color:var(--text);}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--border);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.comp-col{background:var(--card2);padding:14px;}
.comp-col:first-child{border-right:1px solid var(--border);}
.comp-team-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.comp-rows{display:flex;flex-direction:column;gap:9px;}
.comp-row{display:flex;flex-direction:column;gap:4px;}
.comp-row-top{display:flex;justify-content:space-between;align-items:center;}
.comp-row-label{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.comp-row-val{font-family:'Space Mono',monospace;font-size:9px;}
.comp-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.comp-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
.comp-fill.hi{background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.comp-fill.mid{background:linear-gradient(90deg,#d97706,var(--amber));}
.comp-fill.lo{background:linear-gradient(90deg,#dc2626,var(--red));}
.verdict-box{background:linear-gradient(135deg,rgba(34,211,238,0.07),rgba(6,182,212,0.03));border:1px solid var(--border-cyan);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.verdict-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);}
.verdict-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-top:4px;}
.verdict-pari{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cyan);letter-spacing:1px;line-height:1;}
.verdict-cote-wrap{text-align:right;}
.verdict-cote{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--text);line-height:1;}
.verdict-bk{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);}
.edge-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;color:var(--green);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);padding:4px 12px;border-radius:6px;margin-bottom:10px;}
.verdict-txt{font-size:13px;line-height:1.65;color:#94a3b8;}
.verdict-txt strong{color:var(--text);}
.facteur-box{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;}
.facteur-icon{font-size:22px;flex-shrink:0;}
.facteur-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--amber);letter-spacing:2px;margin-bottom:4px;}
.facteur-txt{font-size:13px;color:var(--text);line-height:1.5;}
.conf-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.conf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.conf-score{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;color:var(--cyan);}
.conf-score sup{font-size:20px;color:var(--muted);}
.conf-lvl-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(239,68,68,0.08));border:1px solid rgba(245,158,11,0.3);color:var(--amber);margin-bottom:4px;}
.conf-hint{font-size:11px;color:var(--muted);}
.conf-bar-track{background:rgba(255,255,255,0.04);border-radius:6px;height:6px;overflow:hidden;}
.conf-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--cyan2),var(--amber),#f97316);}
.conf-scale{display:flex;justify-content:space-between;margin-top:6px;}
.conf-scale span{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;}
.conseil-box{background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.15);border-radius:12px;padding:14px 16px;}
.conseil-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--purple);letter-spacing:2px;margin-bottom:6px;}
.conseil-txt{font-size:13px;color:#94a3b8;line-height:1.65;font-style:italic;}
.conseil-txt strong{color:var(--text);font-style:normal;}
.pari-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.pari-card.safe{border-color:rgba(16,185,129,0.25);background:rgba(16,185,129,0.03);}
.pari-card.value{border-color:rgba(34,211,238,0.2);background:rgba(34,211,238,0.03);}
.pari-card.specu{border-color:rgba(139,92,246,0.2);background:rgba(139,92,246,0.03);}
.pari-left{flex:1;min-width:0;}
.pari-type{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:2px;margin-bottom:3px;}
.pari-card.safe .pari-type{color:var(--green);}
.pari-card.value .pari-type{color:var(--cyan);}
.pari-card.specu .pari-type{color:var(--purple);}
.pari-bet{font-size:14px;font-weight:600;color:var(--text);}
.pari-hint{font-size:11px;color:var(--muted);margin-top:2px;}
.pari-edge{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);margin-top:3px;}
.pari-right{text-align:right;flex-shrink:0;}
.pari-cote{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;}
.pari-bookie{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);}
.cotes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cote-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.cote-item.rec{border-color:var(--border-cyan);background:rgba(34,211,238,0.04);}
.cote-type{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.cote-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);line-height:1;}
.cote-val.hot{color:var(--amber);}
.cote-item.rec .cote-val{color:var(--cyan);}
.h2h-list{display:flex;flex-direction:column;gap:6px;}
.h2h-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;}
.h2h-date{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);flex-shrink:0;width:68px;}
.h2h-teams{flex:1;font-size:12px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.h2h-score{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);flex-shrink:0;}
.h2h-w{font-family:'Space Mono',monospace;font-size:8px;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.h2h-w.w1{background:rgba(34,211,238,0.1);color:var(--cyan);}
.h2h-w.wn{background:rgba(255,255,255,0.05);color:var(--muted);}
.h2h-w.w2{background:rgba(226,232,240,0.08);color:rgba(226,232,240,0.5);}
.bookie-cta{background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(6,182,212,0.04));border:1px solid var(--border-cyan);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.bookie-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:2px;}
.bookie-promo{font-family:'Space Mono',monospace;font-size:9px;color:var(--green);letter-spacing:1px;}
.bookie-btn{background:var(--cyan);color:#000;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .15s;}
.bookie-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,211,238,0.3);}
.card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.2);}
.footer-edge{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);padding:6px 12px;border-radius:8px;}
/* MUR PRO */
.pro-wall{position:relative;margin:0 20px 14px;border-radius:16px;overflow:hidden;border:1px solid rgba(139,92,246,0.12);}
.pro-wall-inner{filter:blur(5px);pointer-events:none;user-select:none;opacity:.4;}
.pro-wall-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10;background:linear-gradient(180deg,rgba(8,12,18,0) 0%,rgba(8,12,18,0.55) 35%,rgba(8,12,18,0.94) 100%);cursor:pointer;padding:32px 20px 28px;}
.pro-wall-overlay:hover .pw-unlock{border-color:var(--cyan);color:var(--cyan);}
.pw-lock-icon{font-size:26px;}
.pw-title{font-family:'Bebas Neue',sans-serif;font-size:21px;color:var(--text);letter-spacing:2px;text-align:center;line-height:1.25;margin-top:2px;}
.pw-price{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--amber);letter-spacing:2px;line-height:1;margin-top:6px;}
.pw-price-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.pw-unlock{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);border:1px solid rgba(255,255,255,0.1);padding:11px 30px;border-radius:10px;background:rgba(255,255,255,0.04);transition:.2s;margin-top:4px;}
.pw-note{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);opacity:.6;margin-top:2px;text-align:center;}
/* Éléments PRO internes */
.paris-list{display:flex;flex-direction:column;gap:8px;}
.arb-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;}
.arb-avatar{width:50px;height:50px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--amber);background:linear-gradient(135deg,#1a2a3e,#0d1520);border:2px solid rgba(245,158,11,0.3);position:relative;}
.arb-flag{position:absolute;bottom:2px;right:2px;font-size:10px;}
.arb-info{flex:1;}
.arb-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:8px;}
.arb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;}
.arb-stat{background:var(--card);padding:8px 6px;text-align:center;}
.arb-stat-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber);line-height:1;}
.arb-stat-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);margin-top:2px;}
.arb-warn{font-size:12px;color:var(--amber);background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.15);border-radius:6px;padding:8px 10px;line-height:1.55;}
.scen-list{display:flex;flex-direction:column;}
.scen-phase{display:flex;align-items:stretch;}
.scen-left{display:flex;flex-direction:column;align-items:center;width:50px;flex-shrink:0;}
.scen-badge{font-family:'Space Mono',monospace;font-size:8px;color:var(--cyan);background:rgba(34,211,238,0.07);border:1px solid var(--border-cyan);padding:3px 5px;border-radius:5px;text-align:center;line-height:1.3;white-space:nowrap;}
.scen-line{flex:1;width:2px;background:linear-gradient(180deg,rgba(34,211,238,0.25),rgba(34,211,238,0.04));margin:4px auto 0;}
.scen-body{flex:1;padding:0 0 14px 12px;}
.scen-prob-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.scen-bar{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.scen-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan2),var(--cyan));}
.scen-pct{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);white-space:nowrap;}
.scen-txt{font-size:12px;color:#94a3b8;line-height:1.6;}
.scen-txt strong{color:var(--text);}
.score-predit{background:linear-gradient(135deg,rgba(34,211,238,0.08),rgba(34,211,238,0.02));border:1px solid rgba(34,211,238,0.25);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.score-predit::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);}
.sp-row{display:flex;align-items:center;justify-content:space-between;}
.sp-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:1px;margin-bottom:5px;}
.sp-score{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:8px;color:var(--text);line-height:1;}
.sp-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;}
.sp-prob{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--cyan);}
.sp-impl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.kelly-box{background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:14px 16px;}
.kelly-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.kelly-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);letter-spacing:2px;margin-bottom:4px;}
.kelly-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.kelly-val{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--green);line-height:1;text-align:right;}
.kelly-unit{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);text-align:right;}
.kelly-euros{font-family:'Space Mono',monospace;font-size:11px;color:var(--green);text-align:right;margin-top:3px;}
.kelly-calc{background:rgba(16,185,129,0.06);border-radius:8px;padding:9px 12px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);line-height:1.7;}
.kelly-calc strong{color:var(--green);}
.skip-box{border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.skip-box.danger{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.25);}
.skip-box.ok{background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.2);opacity:.8;}
.skip-icon{font-size:22px;flex-shrink:0;}
.skip-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;margin-bottom:5px;}
.skip-box.danger .skip-lbl{color:var(--red);}
.skip-box.ok .skip-lbl{color:var(--green);}
.skip-txt{font-size:13px;color:#94a3b8;line-height:1.55;}
.skip-txt strong{color:var(--text);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,12,18,0.97);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;height:64px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;gap:3px;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent;}
.nav-item .nav-icon{font-size:18px;transition:.2s;}
.nav-item:hover .nav-icon{transform:translateY(-2px);}
.nav-item .nav-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:1px;color:var(--muted);}
.nav-item.active .nav-lbl{color:var(--cyan);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px rgba(34,211,238,0.5));}
@media(max-width:480px){
  .ctx-grid{grid-template-columns:1fr;}
  .cotes-grid{grid-template-columns:repeat(2,1fr);}
  .comp-grid{grid-template-columns:1fr;}
  .arb-stats{grid-template-columns:repeat(2,1fr);}
}

<body>
<header class="hdr">
  <button class="hdr-back" onclick="history.back()">← RETOUR</button>
  <a href="/" class="logo"><span>IA</span>SHARK</a>
  <div class="hdr-badge">🦈 ANALYSE IA</div>
</header>
<div id="root">
  <div class="loading"><div class="spinner"></div><div class="loading-lbl">CHARGEMENT ANALYSE...</div></div>
</div>
<nav class="nav-bottom">
  <div class="nav-item" onclick="window.location='/'"><div class="nav-icon">⚡</div><div class="nav-lbl">ANALYSES</div></div>
  <div class="nav-item" onclick="window.location='/historique.html'"><div class="nav-icon">📊</div><div class="nav-lbl">HISTORIQUE</div></div>
  <div class="nav-item" onclick="window.location='/combis.html'"><div class="nav-icon">🎰</div><div class="nav-lbl">COMBINÉS</div></div>
  <div class="nav-item" onclick="window.location='/blog/'"><div class="nav-icon">📖</div><div class="nav-lbl">GUIDES</div></div>
  <div class="nav-item" onclick="window.location='/compte.html'"><div class="nav-icon">👤</div><div class="nav-lbl">COMPTE</div></div>
</nav>
<script>
var fId = new URLSearchParams(location.search).get('id');

function buildForme(str){
  if(!str) return '';
  return str.split('').slice(0,5).map(function(c){
    var cls=c==='W'||c==='V'?'fw':c==='D'||c==='N'?'fn':'fl';
    var l=c==='W'?'V':c==='D'?'N':c==='L'?'D':c;
    return '<div class="fd '+cls+'">'+l+'</div>';
  }).join('');
}

function buildComp(hn,an,ch,ca){
  var dh=ch&&ch.length?ch:[{label:'ATTAQUE xG',val:62},{label:'DÉFENSE',val:55},{label:'FORME (5J)',val:70},{label:'POSSESSION',val:58},{label:'PRESSING',val:64}];
  var da=ca&&ca.length?ca:[{label:'ATTAQUE xG',val:78},{label:'DÉFENSE',val:82},{label:'FORME (5J)',val:85},{label:'POSSESSION',val:66},{label:'PRESSING',val:72}];
  function rows(crits){
    return crits.map(function(c){
      var w=Math.min(Math.max(c.val||0,0),100);
      var cls=w>=65?'hi':w>=40?'mid':'lo';
      var col=w>=65?'var(--green)':w>=40?'var(--amber)':'var(--red)';
      return '<div class="comp-row"><div class="comp-row-top"><span class="comp-row-label">'+(c.label||'')+'</span><span class="comp-row-val" style="color:'+col+'">'+w+'</span></div><div class="comp-bar"><div class="comp-fill '+cls+'" data-w="'+w+'" style="width:0%"></div></div></div>';
    }).join('');
  }
  return '<div class="comp-grid"><div class="comp-col"><div class="comp-team-lbl" style="color:var(--cyan)">⚪ '+hn.toUpperCase().slice(0,14)+'</div><div class="comp-rows">'+rows(dh)+'</div></div><div class="comp-col"><div class="comp-team-lbl" style="color:var(--text)">🔵 '+an.toUpperCase().slice(0,14)+'</div><div class="comp-rows">'+rows(da)+'</div></div></div>';
}

function buildH2H(h2h,hn){
  if(!h2h||!h2h.length) return '';
  return '<div class="section"><div class="block-title">⚔️ HEAD TO HEAD</div><div class="h2h-list">'+h2h.slice(0,5).map(function(g){var bc=g.w==='1'?'w1':g.w==='N'?'wn':'w2';var wl=g.w==='1'?(hn||'').slice(0,7).toUpperCase():g.w==='N'?'NUL':(g.away||'').slice(0,7).toUpperCase();return '<div class="h2h-item"><span class="h2h-date">'+(g.d||'')+'</span><span class="h2h-teams">'+(g.home||'')+' — '+(g.away||'')+'</span><span class="h2h-score">'+(g.s||'')+'</span><span class="h2h-w '+bc+'">'+wl+'</span></div>';}).join('')+'</div></div>';
}

function buildCotes(m){
  var rec=(m.pari_rec||'').toLowerCase();
  var items=[{t:'VICTOIRE DOM',v:m.c1,k:'1'},{t:'NUL',v:m.cn,k:'n'},{t:'VICTOIRE EXT',v:m.c2,k:'2'},{t:'OVER 1.5',v:m.co15},{t:'OVER 2.5',v:m.co25},{t:'UNDER 2.5',v:m.cu25},{t:'DC 1X',v:m.dc1x},{t:'DC X2',v:m.dc2x},{t:'BTTS OUI',v:m.btts_oui},{t:'BTTS NON',v:m.btts_non}].filter(function(x){return x.v&&x.v!=='--';});
  if(!items.length) return '';
  return '<div class="section"><div class="block-title">📋 COTES MÉDIANES</div><div class="cotes-grid">'+items.map(function(x){var hot=parseFloat(x.v)>=1.5?' hot':'';return '<div class="cote-item"><div class="cote-type">'+x.t+'</div><div class="cote-val'+hot+'">'+x.v+'</div></div>';}).join('')+'</div></div>';
}

function buildArbitre(arb){
  if(!arb||!arb.nom) return '';
  var ini=arb.initiales||(arb.nom||'').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  var flag=arb.flag||'🇪🇺';
  return '<div class="arb-card"><div class="arb-avatar">'+ini+'<span class="arb-flag">'+flag+'</span></div><div class="arb-info"><div class="arb-name">'+(arb.nom||'').toUpperCase()+'</div><div class="arb-stats"><div class="arb-stat"><div class="arb-stat-val">'+(arb.cartons||'—')+'</div><div class="arb-stat-lbl">CARTONS/M</div></div><div class="arb-stat"><div class="arb-stat-val">'+(arb.penaltys||'—')+'</div><div class="arb-stat-lbl">PENALTYS/M</div></div><div class="arb-stat"><div class="arb-stat-val">'+(arb.dom_pct||'—')+'</div><div class="arb-stat-lbl">AVA. DOM</div></div><div class="arb-stat"><div class="arb-stat-val">'+(arb.matchs||'—')+'</div><div class="arb-stat-lbl">MATCHS</div></div></div>'+(arb.note?'<div class="arb-warn">⚠️ '+arb.note+'</div>':'')+'</div></div>';
}

function buildScen15(phases){
  if(!phases||!phases.length) return '';
  return '<div class="scen-list">'+phases.map(function(p,i){
    var w=Math.min((p.prob||0)*4,100);
    var last=i===phases.length-1;
    return '<div class="scen-phase"><div class="scen-left"><div class="scen-badge">'+(p.t||'')+'</div>'+(!last?'<div class="scen-line"></div>':'')+'</div><div class="scen-body"><div class="scen-prob-row"><div class="scen-bar"><div class="scen-bar-fill" style="width:'+w+'%"></div></div><span class="scen-pct">'+(p.prob||0)+'% but</span></div><div class="scen-txt">'+(p.txt||'')+'</div></div></div>';
  }).join('')+'</div>';
}

function render(m){
  var hn=m.home&&m.home.n||'';
  var an=m.away&&m.away.n||'';
  var heure=(m.date||'').split(' ')[1]||'';
  var isHot=m.hot||(m.conf||0)>=8.0;
  var isVal=m.val||m.vbet==='OUI';
  var isPro=false; // TODO: Supabase session
  var confPct=Math.round(((m.conf||0)/10)*100);
  var confLvl=(m.conf||0)>=7.5?'🔥 SHARK LOCK':(m.conf||0)>=6.5?'⚡ ÉLEVÉ':'✓ MODÉRÉ';
  var confStyle=(m.conf||0)>=7.5?'':' style="background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.25);color:var(--cyan)"';
  var p3=m.paris_3||{};
  var bk=m.bookies&&m.bookies[0]||null;

  // Météo
  var meteoHtml='';
  if(m.meteo){meteoHtml='<div class="meta-row">'+(m.stade&&m.stade.nom?'<span class="meta-item">🏟 '+m.stade.nom+'</span>':'')+(m.meteo.temp?'<span class="meta-item">🌡 '+m.meteo.temp+'°C</span>':'')+(m.meteo.desc?'<span class="meta-item">'+m.meteo.desc+'</span>':'')+(m.meteo.vent?'<span class="meta-item">💨 '+m.meteo.vent+' km/h</span>':'')+'</div>';}

  // Paris PRO
  var parisProHtml='<div class="paris-list">';
  if(p3.valeur){var ev=p3.valeur.edge?'<div class="pari-edge">⚡ EDGE '+p3.valeur.edge+'</div>':'';parisProHtml+='<div class="pari-card value"><div class="pari-left"><div class="pari-type">💎 VALEUR — '+(p3.valeur.mise||'2-3% bankroll')+'</div><div class="pari-bet">'+(p3.valeur.bet||'')+'</div><div class="pari-hint">'+(p3.valeur.hint||'')+'</div>'+ev+'</div><div class="pari-right"><div class="pari-cote" style="color:var(--cyan)">'+(p3.valeur.cote||'—')+'</div><div class="pari-bookie">'+(p3.valeur.bookie||'')+'</div></div></div>';}
  if(p3.specu){var es=p3.specu.edge?'<div class="pari-edge">⚡ EDGE '+p3.specu.edge+'</div>':'';parisProHtml+='<div class="pari-card specu"><div class="pari-left"><div class="pari-type">🚀 AUDACE — '+(p3.specu.mise||'1% bankroll')+'</div><div class="pari-bet">'+(p3.specu.bet||'')+'</div><div class="pari-hint">'+(p3.specu.hint||'')+'</div>'+es+'</div><div class="pari-right"><div class="pari-cote" style="color:var(--purple)">'+(p3.specu.cote||'—')+'</div><div class="pari-bookie">'+(p3.specu.bookie||'')+'</div></div></div>';}
  parisProHtml+='</div>';

  // Score prédit
  var sp=m.score_predit||null;
  var scorePreditHtml='';
  if(sp){var spScore=sp.score||'?-?';var spProb=sp.prob||'—';var spImpl=sp.cote_implicite||'';scorePreditHtml='<div class="score-predit"><div class="sp-row"><div><div class="sp-tag">⚡ IA PRÉDIT CE SOIR</div><div class="sp-score">'+spScore.replace('-','—')+'</div><div class="sp-sub">Score le plus probable · '+spProb+' de probabilité</div></div><div style="text-align:right"><div class="sp-tag">COTE IMPLICITE</div><div class="sp-prob">'+(spImpl||spProb)+'</div><div class="sp-impl">vs prob IA</div></div></div></div>';}

  // Kelly
  var kellyHtml='';
  if(m.kelly){var ke=m.kelly_euros||'';var kb=m.bankroll_ref||'500';kellyHtml='<div class="kelly-box"><div class="kelly-top"><div><div class="kelly-lbl">📐 MISE KELLY</div><div class="kelly-desc">Mise optimale calculée par l\'IA<br>pour maximiser tes gains long terme</div></div><div><div class="kelly-val">'+m.kelly+'</div><div class="kelly-unit">% BANKROLL</div>'+(ke?'<div class="kelly-euros">→ '+ke+'€ sur '+kb+'€</div>':'')+'</div></div><div class="kelly-calc">edge ÷ (cote − 1) = <strong>'+m.kelly+'%</strong>'+(ke?' → miser <strong>'+ke+'€ ce soir</strong>':'')+'</div></div>';}

  // Skip
  var skipHtml=m.passe_ton_tour
    ?'<div class="skip-box danger"><div class="skip-icon">🚨</div><div><div class="skip-lbl">PASSE TON TOUR CE SOIR</div><div class="skip-txt">'+(m.passe_ton_tour_raison||'Ce match présente des signaux contradictoires. <strong>L\'IA recommande de ne pas jouer</strong> pour préserver ta bankroll.')+'</div></div></div>'
    :'<div class="skip-box ok"><div class="skip-icon">✅</div><div><div class="skip-lbl">FEU VERT CE SOIR</div><div class="skip-txt">Aucun signal d\'alerte. <strong>Configuration favorable</strong> pour jouer selon le verdict du Shark.</div></div></div>';

  // Scénario
  var scen15=m.scenario_15min||null;
  var scenHtml='';
  if(scen15&&scen15.length){scenHtml=buildScen15(scen15);}
  else if(m.scenario){var fb=[];if(m.scenario.phase1)fb.push({t:"0–25'",prob:10,txt:m.scenario.phase1});if(m.scenario.phase2)fb.push({t:"25–65'",prob:16,txt:m.scenario.phase2});if(m.scenario.phase3)fb.push({t:"65–90'",prob:14,txt:m.scenario.phase3});if(fb.length)scenHtml=buildScen15(fb);}

  // Arbitre
  var arbHtml=buildArbitre(m.arbitre||null);

  // Contenu PRO
  var proContent=''
    +'<div class="section pt"><div class="block-title">🎯 PARIS VALEUR & AUDACE</div>'+parisProHtml+'</div>'
    +(arbHtml?'<div class="dv"></div><div class="section"><div class="block-title">🟡 ARBITRE CE SOIR</div>'+arbHtml+'</div>':'')
    +(scenHtml?'<div class="dv"></div><div class="section"><div class="block-title">🎬 SCÉNARIO 15 MIN PAR 15 MIN</div>'+scenHtml+'</div>':'')
    +(scorePreditHtml?'<div class="dv"></div><div class="section"><div class="block-title">🔮 SCORE PRÉDIT PAR L\'IA</div>'+scorePreditHtml+'</div>':'')
    +(kellyHtml?'<div class="dv"></div><div class="section">'+kellyHtml+'</div>':'')
    +'<div class="dv"></div><div class="section"><div class="block-title">🚨 ALERTE SÉCURITÉ</div>'+skipHtml+'</div>';

  document.title=hn+' vs '+an+' — IASHARK';

  return '<div class="wrap"><div class="match-card '+(isHot?'hot':'free')+'">'
    // TOPBAR
    +'<div class="card-topbar"><div class="league-info"><span style="font-size:16px">'+(m.ligue_icon||'🏆')+'</span><span class="league-name">'+(m.league||'').toUpperCase()+(m.round?' · '+m.round:'')+'</span></div><div class="badge-row">'+(heure?'<span class="match-time">'+heure+'</span>':'')+(isHot?'<span class="b-hot">🔥 SHARK LOCK</span>':isVal?'<span class="b-val">⚡ VALUE BET</span>':'<span class="b-free">✓ GRATUIT</span>')+'</div></div>'
    // TEAMS
    +'<div class="teams-header"><div class="teams-row"><div class="team home"><div class="team-name">'+hn.toUpperCase()+'</div><div class="team-sub">DOMICILE</div>'+(buildForme(m.forme_h)?'<div class="team-form">'+buildForme(m.forme_h)+'</div>':'')+'</div><div class="vs-block"><span class="vs">VS</span>'+(heure?'<div class="vs-time">'+heure+'</div>':'')+'</div><div class="team away"><div class="team-name">'+an.toUpperCase()+'</div><div class="team-sub">EXTÉRIEUR</div>'+(buildForme(m.forme_a)?'<div class="team-form">'+buildForme(m.forme_a)+'</div>':'')+'</div></div><div class="proba-bar"><div class="pb1" style="width:'+(m.p1||0)+'%"></div><div class="pbn" style="width:'+(m.pn||0)+'%"></div><div class="pb2" style="width:'+(m.p2||0)+'%"></div></div><div class="proba-labels"><div class="prob-item"><div class="prob-pct" style="color:var(--cyan)">'+(m.p1||0)+'%</div><div class="prob-lbl">'+hn.slice(0,8).toUpperCase()+'</div></div><div class="prob-item"><div class="prob-pct" style="color:var(--muted)">'+(m.pn||0)+'%</div><div class="prob-lbl">NUL</div></div><div class="prob-item"><div class="prob-pct" style="color:rgba(226,232,240,0.5)">'+(m.p2||0)+'%</div><div class="prob-lbl">'+an.slice(0,8).toUpperCase()+'</div></div></div>'+meteoHtml+'</div>'
    // 1. CONTEXTE & ENJEUX
    +((m.contexte||m.enjeux)?'<div class="section pt"><div class="block-title">📍 CONTEXTE & ENJEUX</div><div class="ctx-grid">'+(m.contexte?'<div class="ctx-card"><div class="ctx-lbl">📍 CONTEXTE</div><div class="ctx-txt">'+m.contexte+'</div></div>':'')+(m.enjeux?'<div class="ctx-card"><div class="ctx-lbl">🎯 ENJEUX</div><div class="ctx-txt">'+m.enjeux+'</div></div>':'')+'</div></div>':'<div style="height:14px"></div>')
    +'<div class="dv"></div>'
    // 2. ANALYSE COMPARATIVE
    +'<div class="section"><div class="block-title">📊 ANALYSE COMPARATIVE</div>'+buildComp(hn,an,m.crit_home,m.crit_away)+'</div>'
    +'<div class="dv"></div>'
    // 3. VERDICT
    +(m.verdict_shark||m.pari_rec?'<div class="section"><div class="block-title">🦈 VERDICT DU SHARK</div><div class="verdict-box">'+(m.pari_rec?'<div class="verdict-top"><div><div class="verdict-pari">'+(m.pari_rec||'').toUpperCase()+'</div></div><div class="verdict-cote-wrap"><div class="verdict-cote">'+(m.cote_rec||'—')+'</div><div class="verdict-bk">'+(bk?bk.n:'')+'</div></div></div>':'')+(m.edge?'<div class="edge-tag">⚡ EDGE '+m.edge+'</div>':'')+(m.verdict_shark?'<div class="verdict-txt">'+m.verdict_shark+'</div>':'')+'</div></div>':'')
    // 4. FACTEUR
    +(m.facteur_x?'<div class="section"><div class="facteur-box"><div class="facteur-icon">⚡</div><div><div class="facteur-lbl">FACTEUR DÉCISIF</div><div class="facteur-txt">'+m.facteur_x+'</div></div></div></div>':'')
    +'<div class="dv"></div>'
    // 5. CONFIANCE
    +'<div class="section"><div class="block-title">📈 JAUGE DE CONFIANCE</div><div class="conf-box"><div class="conf-top"><div><div class="conf-score">'+(m.conf||0).toFixed(1)+'<sup>/10</sup></div></div><div style="text-align:right"><div class="conf-lvl-badge"'+confStyle+'>'+confLvl+'</div><div class="conf-hint">'+(m.argument?(m.argument.split('.')[0]):'')+'</div></div></div><div class="conf-bar-track"><div class="conf-bar-fill" style="width:'+confPct+'%"></div></div><div class="conf-scale"><span>PRUDENT</span><span>CONFIANT</span><span>ÉLEVÉ</span><span>🔥 LOCK</span></div></div></div>'
    // 6. CONSEIL
    +((m.conseil_public||m.analyse)?'<div class="section"><div class="conseil-box"><div class="conseil-lbl">💡 CONSEIL IA</div><div class="conseil-txt">'+(m.conseil_public||m.analyse)+'</div></div></div>':'')
    +'<div class="dv"></div>'
    // 7. PARI SAFE
    +(p3&&p3.safe?'<div class="section"><div class="block-title">✅ PARI GRATUIT DU SHARK</div><div class="pari-card safe"><div class="pari-left"><div class="pari-type">✅ SAFE — '+(p3.safe.mise||'2-3% bankroll')+'</div><div class="pari-bet">'+(p3.safe.bet||'')+'</div><div class="pari-hint">'+(p3.safe.hint||'')+'</div></div><div class="pari-right"><div class="pari-cote">'+(p3.safe.cote||'—')+'</div><div class="pari-bookie">'+(p3.safe.bookie||'')+'</div></div></div></div>':'')
    +'<div class="dv"></div>'
    // COTES + H2H + BOOKIE
    +buildCotes(m)
    +buildH2H(m.h2h,hn)
    +(bk?'<div class="section"><div class="bookie-cta"><div><div class="bookie-name">'+bk.n+'</div><div class="bookie-promo">✓ '+(bk.o||bk.promo||'Bonus bienvenue')+'</div></div><button class="bookie-btn">PARIER →</button></div></div>':'')
    +'<div class="dv"></div>'
    // MUR PRO
    +(isPro?proContent
      :'<div class="pro-wall"><div class="pro-wall-inner">'+proContent+'</div><div class="pro-wall-overlay" onclick="location.href=\'/compte.html\'"><div class="pw-lock-icon">🔒</div><div class="pw-title">VALEUR · AUDACE · ARBITRE<br>SCÉNARIO · SCORE PRÉDIT · KELLY</div><div class="pw-price">5€</div><div class="pw-price-sub">/ MOIS · SANS ENGAGEMENT</div><div class="pw-unlock">DEVENIR PRO ▸</div><div class="pw-note">Valable pour tous les matchs du site chaque soir</div></div></div>')
    // FOOTER
    +'<div class="card-footer"><div style="font-size:12px;color:#94a3b8">'+(m.stade&&m.stade.nom?'🏟️ '+m.stade.nom:'🏟️ '+hn+' — Domicile')+'</div>'+(m.edge?'<div class="footer-edge">EDGE '+m.edge+' 🎯</div>':'')+'</div>'
    +'</div></div>';
}

async function init(){
  var el=document.getElementById('root');
  if(!fId){el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="font-family:\'Space Mono\',monospace;color:var(--muted)">ID MANQUANT</div><div style="margin-top:16px"><a href="/" style="color:var(--cyan);font-family:\'Space Mono\',monospace;font-size:10px">← RETOUR</a></div></div>';return;}
  try{
    var r=await fetch('data.json?t='+Date.now());
    var data=await r.json();
    var m=(data.matchs||[]).find(function(x){return String(x.id)===String(fId);});
    if(!m){el.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:16px">🦈</div><div style="font-family:\'Space Mono\',monospace;color:var(--muted)">MATCH INTROUVABLE</div><div style="margin-top:16px"><a href="/" style="color:var(--cyan);font-family:\'Space Mono\',monospace;font-size:10px">← RETOUR AUX ANALYSES</a></div></div>';return;}
    el.innerHTML=render(m);
    setTimeout(function(){
      document.querySelectorAll('.comp-fill[data-w]').forEach(function(b){var w=b.getAttribute('data-w');b.style.width='0%';requestAnimationFrame(function(){setTimeout(function(){b.style.width=w+'%';},60);});});
    },100);
  }catch(e){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px">⚠️</div><div style="margin-top:16px">Erreur de chargement</div></div>';}
}
init();
</script>
</body>
</html>
