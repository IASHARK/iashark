          function getElo(eloData, teamName) {
            if(!eloData||!teamName) return null;
            var nameLow=teamName.toLowerCase();
            if(eloData[nameLow]) return eloData[nameLow];
            var best=null, bestScore=Infinity;
            Object.keys(eloData).forEach(function(k){
              var score=levenshtein(nameLow,k)/Math.max(nameLow.length,k.length);
              if(score<bestScore){bestScore=score;best=k;}
            });
            return bestScore<0.35?eloData[best]:null;
          }
          function eloWinProb(eloH, eloA, vdH, mdHdom) {
            if(!eloH||!eloA) return null;
            var homeBonus = 70;
            if(vdH!=null&&mdHdom&&mdHdom>0){
              var homeWinRate = vdH/mdHdom;
              if(homeWinRate>=0.65)      homeBonus=100;
              else if(homeWinRate>=0.50) homeBonus=70;
              else if(homeWinRate>=0.35) homeBonus=40;
              else                        homeBonus=20;
            }
            var probHadj=1/(1+Math.pow(10,(eloA-(eloH+homeBonus))/400));
            return {
              probH:Math.round(probHadj*100),
              probA:Math.round((1-probHadj)*100),
              diff:Math.round(eloH-eloA),
              homeBonus:homeBonus,
              signal: Math.abs(eloH-eloA)>=100?'FORT':Math.abs(eloH-eloA)>=50?'MOD\u00c9R\u00c9':'FAIBLE'
            };
          }
