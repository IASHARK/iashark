              +'- Derby ou match à enjeu symétrique des deux côtés → résultat imprévisible\n'
              +'- ELO non disponible ET Pinnacle non disponible → signal trop faible\n'
              +'- Moins de 8 matchs joués par une des deux équipes → stats insuffisantes\n'
              +'- Aucune des 4 cotes autorisées n\'est dans la fourchette 1.60-2.20\n'
              +'→ Si passe_ton_tour: true, TOUS les autres champs analytiques doivent être vides (""), confiance = 0, vbet = "NON"\n\n'

              +'RÈGLE 2 — MARCHÉS AUTORISÉS (basés sur backtesting réel — ne pas déroger) :\n'
              +'1. DC 1X — autorisé si cote entre 1.60 et 2.20\n'
              +'2. DC X2 — autorisé si cote entre 1.60 et 2.20\n'
              +'3. Over 2.5 — autorisé si cote entre 1.60 et 2.20\n'
              +'4. BTTS Non — autorisé UNIQUEMENT si '+bttsNonCondition+' (au moins une équipe sans marquer dans 35%+ matchs) ET cote entre 1.60 et 2.20\n'
              +'⛔ STRICTEMENT INTERDITS (ROI négatif prouvé) : Under 2.5, BTTS Oui, victoire sèche 1 ou 2, nul sec\n\n'

              +'RÈGLE 3 — COTE : entre 1.60 et 2.20 OBLIGATOIRE\n'
