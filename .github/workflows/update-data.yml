name: 🦈 IASHARK — Génération Quotidienne

on:
  schedule:
    - cron: '0 7 * * *'   # Tous les jours à 7h UTC (9h Paris)
  workflow_dispatch:        # Permet de lancer manuellement

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer dépendances
        run: pip install requests

      - name: 🦈 Générer data.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE:  ${{ secrets.AIRTABLE_BASE }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python generate_data.py

      - name: 📤 Commit & Push data.json
        run: |
          git config user.name "IASHARK Bot"
          git config user.email "bot@iashark.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🦈 data.json — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
