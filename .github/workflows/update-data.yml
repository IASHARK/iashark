          // ── POISSON DISTRIBUTION ────────────────────────────────
          function poissonProb(lambda, k) {
            // P(X=k) = e^(-lambda) * lambda^k / k!
            if(lambda<=0) return k===0?1:0;
            var logP = -lambda + k*Math.log(lambda) - logFactorial(k);
            return Math.exp(logP);
          }
          function logFactorial(n) {
            if(n<=1) return 0;
            var r=0;for(var i=2;i<=n;i++) r+=Math.log(i);return r;
          }
          function poissonMatrix(lambdaH, lambdaA, maxGoals) {
            // Génère matrice de scores [home][away]
            maxGoals = maxGoals||8;
            var mat=[];
            for(var h=0;h<=maxGoals;h++){
              mat[h]=[];
              for(var a=0;a<=maxGoals;a++){
                mat[h][a]=poissonProb(lambdaH,h)*poissonProb(lambdaA,a);
              }
            }
            return mat;
          }
          function calcPoissonProbs(lambdaH, lambdaA) {
            var mat=poissonMatrix(lambdaH,lambdaA,8);
            var p1=0,pN=0,p2=0,over25=0,under25=0,bttsY=0,bttsN=0,over15=0,over35=0;
            for(var h=0;h<=8;h++){
              for(var a=0;a<=8;a++){
                var p=mat[h][a];
                if(h>a) p1+=p;
                else if(h===a) pN+=p;
                else p2+=p;
                if(h+a>2.5) over25+=p; else under25+=p;
                if(h+a>1.5) over15+=p;
                if(h+a>3.5) over35+=p;
                if(h>0&&a>0) bttsY+=p; else bttsN+=p;
              }
            }
            return {
              p1:Math.round(p1*100),
              pN:Math.round(pN*100),
              p2:Math.round(p2*100),
              over15:Math.round(over15*100),
              over25:Math.round(over25*100),
              under25:Math.round(under25*100),
              over35:Math.round(over35*100),
              bttsY:Math.round(bttsY*100),
              bttsN:Math.round(bttsN*100),
            };
          }
          function calcLambdas(bmHdom, beHdom, mdHdom, bmAext, beAext, meAext, leagueAvgH, leagueAvgA) {
            // Force attaque/défense relative à la moyenne ligue
            var leagAvgH = leagueAvgH||1.35; // moy buts marqués DOM en Europe
            var leagAvgA = leagueAvgA||1.10; // moy buts marqués EXT en Europe
            var attH = mdHdom>0 ? (bmHdom/mdHdom)/leagAvgH : 1;
            var defH = mdHdom>0 ? (beHdom/mdHdom)/leagAvgA : 1;
            var attA = meAext>0 ? (bmAext/meAext)/leagAvgA : 1;
            var defA = meAext>0 ? (beAext/meAext)/leagAvgH : 1;
            // Lambda = attaque_equipe * défense_adverse * moyenne_ligue
            var lambdaH = Math.max(0.3, attH * defA * leagAvgH);
            var lambdaA = Math.max(0.3, attA * defH * leagAvgA);
            return {lambdaH: parseFloat(lambdaH.toFixed(3)), lambdaA: parseFloat(lambdaA.toFixed(3))};
          }

          // ── SHIN METHOD — déduction marge bookmaker ─────────────
          function shinProbabilities(odds) {
            // Méthode de Shin pour déduire les vraies probas en tenant compte du biais favoris/outsiders
            var prices = odds.filter(function(o){return o&&o>1;});
            if(prices.length===0) return null;
            var rawProbs = prices.map(function(o){return 1/o;});
            var sumRaw = rawProbs.reduce(function(a,b){return a+b;},0);
            if(sumRaw<=1) return rawProbs; // pas de marge
            // Itération de Newton pour trouver z (marge de Shin)
            var z = 0.02; // estimation initiale
            for(var iter=0;iter<50;iter++){
              var f=0,df=0;
              for(var i=0;i<rawProbs.length;i++){
                var qi=rawProbs[i];
                var denom=Math.sqrt(z*z+4*(1-z)*qi*qi/sumRaw);
                f+=( z+denom )/(2*(1-z));
                df+=( 1+( 2*z/sumRaw - 2*qi*qi*(1-2*z)/(sumRaw*sumRaw) )/denom )/(2*(1-z)) + (z+denom)/(2*(1-z)*(1-z));
              }
              f-=1;
              var zNew=z-f/df;
              if(Math.abs(zNew-z)<1e-8) break;
              z=Math.max(0,Math.min(0.15,zNew));
            }
            // Calculer les vraies probas avec z trouvé
            var trueProbs=rawProbs.map(function(qi){
              return (z+Math.sqrt(z*z+4*(1-z)*qi*qi/sumRaw))/(2*(1-z));
            });
            var sumTrue=trueProbs.reduce(function(a,b){return a+b;},0);
            return trueProbs.map(function(p){return p/sumTrue;}); // normaliser
          }

          // ── FRACTIONAL KELLY (1/4) ───────────────────────────────
          function fractionalKelly(probIA, cote, fraction) {
            fraction = fraction||0.25; // 1/4 Kelly par défaut
            var b = cote - 1;
            var q = 1 - probIA;
            var kelly = (probIA*b - q) / b;
            if(kelly<=0) return null; // pas de valeur
            return Math.min(kelly*fraction*100, 5).toFixed(1); // max 5% bankroll
