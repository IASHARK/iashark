              var failHdom=(sH&&sH.failed_to_score&&sH.failed_to_score.home)||0;
              var failAext=(sA&&sA.failed_to_score&&sA.failed_to_score.away)||0;
              var u25H=last10H.filter(function(m){var p=m.score.split('-');return(parseInt(p[0]||0)+parseInt(p[1]||0))<3;}).length;
              var u25A=last10A.filter(function(m){var p=m.score.split('-');return(parseInt(p[0]||0)+parseInt(p[1]||0))<3;}).length;
              var bttsNonH=last10H.filter(function(m){var p=m.score.split('-');return parseInt(p[0]||0)===0||parseInt(p[1]||0)===0;}).length;
              var bttsNonA=last10A.filter(function(m){var p=m.score.split('-');return parseInt(p[0]||0)===0||parseInt(p[1]||0)===0;}).length;
              var h2hAvgButs='?', h2hNuls=0;
              if(h2hRaw&&h2hRaw.length){
                var h2hTotal=0;
                h2hRaw.slice(0,5).forEach(function(g){h2hTotal+=(g.goals.home||0)+(g.goals.away||0);if((g.goals.home||0)===(g.goals.away||0))h2hNuls++;});
                h2hAvgButs=(h2hTotal/Math.min(h2hRaw.length,5)).toFixed(2);
              }
              var heureUTC = (f.date||'').split('T')[1]?(f.date||'').split('T')[1].slice(0,5):'';
              var heure = toParisHeure(f.date||'');
              if (!heure) heure = heureUTC;
              var meteoStr = wx?wx.desc+' '+wx.emoji+' '+wx.temp+' | Vent: '+wx.wind:'N/A';
              var an = await genAnalyse({
                home:home.name, away:away.name, homeId:home.id, awayId:away.id,
                league:lg.name, date:TODAY+' '+heure,
                stade:(f.venue&&f.venue.name)||'', meteo:meteoStr,
                fH:(sH&&sH.form)||'', fA:(sA&&sA.form)||'',
                rkH, rkA, totalH, totalA, mdH, meA,
                bmH:(sH&&sH.goals&&sH.goals.for&&sH.goals.for.total&&sH.goals.for.total.total)||0,
                beH:(sH&&sH.goals&&sH.goals.against&&sH.goals.against.total&&sH.goals.against.total.total)||0,
                bmA:(sA&&sA.goals&&sA.goals.for&&sA.goals.for.total&&sA.goals.for.total.total)||0,
                beA:(sA&&sA.goals&&sA.goals.against&&sA.goals.against.total&&sA.goals.against.total.total)||0,
                vdH:(sH&&sH.fixtures&&sH.fixtures.wins&&sH.fixtures.wins.home)||0,
                veA:(sA&&sA.fixtures&&sA.fixtures.wins&&sA.fixtures.wins.away)||0,
                d10H:d10Hstr, d10A:d10Astr,
                o25H:tendances.over25_home, o25A:tendances.over25_away,
                bttsH:tendances.btts_home, bttsA:tendances.btts_away,
                u25H, u25A, bttsNonH, bttsNonA,
                csHdom, csAext, failHdom, failAext,
                bmHdom, beHdom, bmAext, beAext, mdHdom, meAext,
                h2hAvgButs, h2hNuls,
                c1:odds.c1, cn:odds.cn, c2:odds.c2,
                co15:odds.co15, co25:odds.co25, cu25:odds.cu25,
                dc1x:odds.dc1x, dcx2:odds.dcx2,
                btts_oui:odds.btts_oui, btts_non:odds.btts_non,
                injuries, h2h:h2hRaw,
                fatH:fatigueH.info, fatScoreH:fatigueH.val,
                fatA:fatigueA.info, fatScoreA:fatigueA.val,
              });
              await sleep(500);
              (function(){
                var p=(an&&an.pari_rec||'').toLowerCase();
                var coteRec;
                if(p.includes('btts non')||p.includes('les deux equipes ne marquent pas')) coteRec=odds.btts_non;
                else if(p.includes('btts')||p.includes('les deux equipes marquent')||p.includes('les 2 equipes marquent')) coteRec=odds.btts_oui;
                else if(p.includes('x2')||(p.includes('double chance')&&(p.includes('nul ou')||p.includes('ou nul'))&&!p.includes('ou nul '+home.name.toLowerCase().slice(0,4)))) coteRec=odds.dcx2;
                else if(p.includes('1x')||(p.includes('double chance')&&p.includes(home.name.toLowerCase().slice(0,4)))) coteRec=odds.dc1x;
                else if(p.includes('double chance')) coteRec=odds.dcx2;
                else if(p.includes('over 2.5')||p.includes('plus de 2.5')) coteRec=odds.co25;
                else if(p.includes('over 1.5')||p.includes('plus de 1.5')) coteRec=odds.co15;
                else if(p.includes('under')||p.includes('moins de 2.5')) coteRec=odds.cu25;
                else if(p.includes('nul')||p.includes('match nul')) coteRec=odds.cn;
                else if(p.includes('victoire')&&(p.includes(away.name.toLowerCase().slice(0,4))||p.includes('ext')||p.includes('away'))) coteRec=odds.c2;
                else coteRec=odds.c1;
                var deltas=[0,-0.03,-0.02,-0.05,+0.03];
                if(odds.bookies&&odds.bookies.length&&coteRec&&coteRec!=='--') {
                  odds.bookies.forEach(function(bk, i) {
                    var delta = deltas[i]||0;
                    bk.c = Math.max(1.01, parseFloat(coteRec)+delta).toFixed(2);
                  });
                }
              })();
              var kellyVal = null;
              if (an&&an.pari_rec&&odds.c1&&odds.c1!=='--') {
                var bestCote = parseFloat(odds.c1)||0;
                var aiProb = (an.p1||0)/100;
                if (bestCote>1&&aiProb>0) {
                  var b = bestCote-1;
                  var k = Math.max(0,((aiProb*b-(1-aiProb))/b)*100);
                  kellyVal = Math.min(k,10).toFixed(1);
                }
              }
              var classementObj = null;
              if (entryH||entryA) {
                var rankH = rkH||99, rankA = rkA||99;
                var minRank = Math.max(1,Math.min(rankH,rankA)-2);
                var maxRank = Math.min(Math.max(rankH,rankA)+2, standings.length);
                var nearStandings = standings.filter(function(s){return s.rank>=minRank && s.rank<=maxRank;});
                classementObj = {
                  league_name: lg.name,
                  standings: nearStandings.map(function(s){
                    return {rank:s.rank,name:s.team.name,team_id:s.team.id,played:s.all.played,won:s.all.win,drawn:s.all.draw,lost:s.all.lose,gd:s.goalsDiff,pts:s.points,form:s.form||''};
                  }),
                  home: entryH?{rank:entryH.rank,pts:entryH.points,played:entryH.all.played,won:entryH.all.win,lost:entryH.all.lose,gd:entryH.goalsDiff,form:entryH.form||''}:null,
                  away: entryA?{rank:entryA.rank,pts:entryA.points,played:entryA.all.played,won:entryA.all.win,lost:entryA.all.lose,gd:entryA.goalsDiff,form:entryA.form||''}:null
                };
              }
              var risqueRaw = an?(an.risque||'MODERE'):'MODERE';
              var risqueNorm = risqueRaw.toUpperCase();
              if(risqueNorm.includes('FAIBLE')||risqueNorm.includes('LOW')) risqueNorm='FAIBLE';
              else if(risqueNorm.includes('ELEVE')||risqueNorm.includes('HIGH')||risqueNorm.includes('FORT')) risqueNorm='ELEVE';
              else risqueNorm='MODERE';
              var matchObj = {
                id:f.id, sport:'football',
                home:{n:home.name,id:home.id}, away:{n:away.name,id:away.id},
                league:lg.name, ligue_icon:lgIcon(lg.name), league_key:lgKey(lg.id),
                date:(TODAY+' '+heure).trim(), cat:['all'],
                val:an?(an.vbet==='OUI'&&(an.confiance||0)>=6.0):false,
                hot:an?(an.confiance||0)>=8.0:false,
                conf:an?parseFloat(an.confiance||0):0,
                p1:an?(an.p1||0):0, pn:an?(an.pn||0):0, p2:an?(an.p2||0):0,
                po15:an?(an.po15||0):0, po25:an?(an.po25||0):0, btts:an?(an.btts||0):0,
                c1:odds.c1, cn:odds.cn, c2:odds.c2,
                co15:odds.co15, co25:odds.co25, cu25:odds.cu25,
                dc1x:odds.dc1x, dcx2:odds.dcx2,
                cdc1x:odds.dc1x, cdc2x:odds.dcx2,
                cbtts:odds.btts_oui, cbtts_non:odds.btts_non,
                btts_oui:odds.btts_oui, btts_non:odds.btts_non,
                bookies:odds.bookies,
                edge:an?(an.edge||''):'',
                edge_detail:an?'Probabilit\u00e9 IA vs probabilit\u00e9 implicite bookmaker = '+(an.edge||''):'',
                marche:an?(an.marche||'RESULTAT'):'RESULTAT',
                risque:risqueNorm,
                pari_rec:an?(an.pari_rec||''):'',
                mise:an?(an.mise||'2-3% bankroll'):'2-3% bankroll',
                argument:an?(an.argument||''):'',
                analyse_card:an?(an.analyse_card||an.conseil||''):'',
                conseil_public:an?(an.conseil||an.analyse_card||''):'',
                contexte:an?(an.contexte||''):'',
                enjeux:an?(an.enjeux||''):'',
                vbet:an?(an.vbet||'NON'):'NON',
                value_calc:an?(an.edge||''):'',
                scores:an?((an.scores_probables||'').split(',').map(function(s){return s.trim();}).filter(Boolean)):[],
                paris_3:an?(an.paris_3||null):null,
                paris_safe:{bet:an?(an.pari_rec||''):'',cote:odds.c1,proba:an?(an.p1||0)+'%':''},
                paris_risque:{bet:'',cote:'',proba:''},
                kelly_pct:kellyVal,
                stade:{
                  nom:f.venue&&f.venue.name?(f.venue.name+(f.venue.city?' \u2014 '+f.venue.city:'')):home.name+' (domicile)',
                  cap:'', meteo:wx?wx.emoji:'\ud83c\udf24\ufe0f', temp:wx?wx.temp:'', desc:wx?wx.desc:''
                },
                crit_home:critH, crit_away:critA,
                form_home:last10H.slice(0,5), form_away:last10A.slice(0,5),
                forme_h:(sH&&sH.form)||'', forme_a:(sA&&sA.form)||'',
                h2h:h2hFormatted,
                h2h_txt:h2hRaw.length?'Historique sur '+h2hRaw.length+' match(s) recents':'',
                injuries:injuries,
                fatigue:{home:{val:fatigueH.val,info:fatigueH.info},away:{val:fatigueA.val,info:fatigueA.info}},
                tendances:tendances,
                classement:classementObj,
                actu:(nH||[]).concat(nA||[]),
              };
              matchsData.push(matchObj);
              if (an&&(an.confiance||0)>=6.5) {
                var coteRec2 = odds.c1;
                var p2=(an&&an.pari_rec||'').toLowerCase();
                if(p2.includes('btts non')) coteRec2=odds.btts_non;
                else if(p2.includes('btts')) coteRec2=odds.btts_oui;
                else if(p2.includes('x2')) coteRec2=odds.dcx2;
                else if(p2.includes('1x')) coteRec2=odds.dc1x;
                else if(p2.includes('over 2.5')) coteRec2=odds.co25;
                else if(p2.includes('over 1.5')) coteRec2=odds.co15;
                else if(p2.includes('under')) coteRec2=odds.cu25;
                else if(p2.includes('nul')) coteRec2=odds.cn;
                else if(p2.includes('victoire')&&(p2.includes(away.name.toLowerCase().slice(0,4))||p2.includes('ext'))) coteRec2=odds.c2;
                forCombis.push({home:home.name,away:away.name,pari:an.pari_rec,conf:an.confiance,edge:an.edge||'',cote:coteRec2&&coteRec2!=='--'?parseFloat(coteRec2):1.5});
              }
              console.log('  OK conf='+matchObj.conf+' edge='+matchObj.edge+' pari='+matchObj.pari_rec);
            }
            // TRI PAR HEURE CROISSANTE
            matchsData.sort(function(a, b) {
              var timeA = (a.date||'').split(' ')[1]||'99:99';
              var timeB = (b.date||'').split(' ')[1]||'99:99';
              if (timeA < timeB) return -1;
              if (timeA > timeB) return 1;
              return 0;
            });
            // DETECTION SAMEDI / DIMANCHE
            var todayDate = new Date(TODAY+'T12:00:00Z');
            var dayOfWeek = todayDate.getUTCDay();
            var isSamedi = (dayOfWeek === 6);
            var isDimanche = (dayOfWeek === 0);
            var combisRaw = await genCombis(forCombis, isSamedi, isDimanche, matchsData);
            var combisData = combisRaw.map(function(c){
              return {label:c.label,type:c.type,selections:c.selections,matchs:c.matchs,cote_totale:c.cote_totale,conseil:c.conseil};
            });

            // ================================================================
            // TRADUCTION AUTOMATIQUE — EN/ES/IT/PT/DE/NL/PL/SV/DA/JA
            // ================================================================
            if (matchsData.length > 0) {
              console.log('\n=== TRADUCTION EN COURS ===');
              var LANGS_TR = ['en','es','it','pt','de','nl','pl','sv','da','ja','ko','vi','th','el','ro','tr','id'];
              var LANG_NAMES_TR = {en:'English',es:'Spanish',it:'Italian',pt:'Portuguese',de:'German',nl:'Dutch',pl:'Polish',sv:'Swedish',da:'Danish',ja:'Japanese',ko:'Korean',vi:'Vietnamese',th:'Thai',el:'Greek',ro:'Romanian',tr:'Turkish',id:'Indonesian'};
              // Traduire par batch de 5 matchs max pour eviter timeout
              for (var li = 0; li < LANGS_TR.length; li++) {
                var lg = LANGS_TR[li];
                var lgName = LANG_NAMES_TR[lg];
                try {
                  var textsForLang = matchsData.map(function(m) {
                    return {id:m.id, a:m.analyse_card||'', c:m.conseil_public||'', p:m.pari_rec||''};
                  });
                  var trPrompt = 'Translate these football betting analyses to ' + lgName + '.\n'
                    + 'Rules: keep BTTS, Over 2.5, Under 2.5, Double Chance, Edge, Value Bet in English. Do not translate team names.\n'
                    + 'Return ONLY valid JSON array, no markdown, no explanation:\n'
                    + '[{"id":1,"a":"translated analyse_card","c":"translated conseil","p":"translated pari_rec"},...]\n\n'
                    + JSON.stringify(textsForLang);
                  var trResp = await postJSON('api.anthropic.com', '/v1/messages', {
                    model: 'claude-haiku-4-5-20251001',
                    max_tokens: 2000,
                    messages: [{role:'user', content: trPrompt}]
                  }, {'x-api-key': ANT_KEY, 'anthropic-version': '2023-06-01'});
                  var trText = (trResp.content&&trResp.content[0]&&trResp.content[0].text)||'[]';
                  var trClean = trText.replace(/```json|```/g,'').trim();
                  var trData = JSON.parse(trClean);
                  trData.forEach(function(tr) {
                    var m = matchsData.find(function(x){return x.id===tr.id;});
                    if (!m) return;
                    m['analyse_card_'+lg] = tr.a||m.analyse_card;
                    m['conseil_public_'+lg] = tr.c||m.conseil_public;
                    m['pari_rec_'+lg] = tr.p||m.pari_rec;
                  });
                  console.log('  ' + lgName + ' OK');
                } catch(e) {
                  console.log('  ' + lgName + ' erreur: ' + e.message);
                }
              }
              console.log('  Traduction terminee pour ' + matchsData.length + ' matchs');
            }
            fs.writeFileSync('data.json', JSON.stringify({matchs:matchsData,combis:combisData},null,2));
            console.log('\n=== DONE: '+matchsData.length+' matchs | '+combisData.length+' combis ===');

            // ================================================================
            // PIPELINE MULTILINGUE
            // ================================================================
            console.log('\n=== MULTILINGUAL PIPELINE START ===');
            generateWorldCupPages();
            await generateMultilingualMatchPages(matchsData);

            // ── RÉCUPÉRER MATCHS J+3 à J+10 pour previews ──
            var upcomingFixtures = [];
            try {
              var upcomingLeagues = LEAGUES.slice(0, 8); // Top 8 ligues seulement
              for (var uli = 0; uli < upcomingLeagues.length; uli++) {
                var uLg = upcomingLeagues[uli];
                for (var dayOffset = 3; dayOffset <= 10; dayOffset++) {
                  var futureDate = new Date(TODAY+'T12:00:00Z');
                  futureDate.setDate(futureDate.getDate() + dayOffset);
                  var futureDateStr = futureDate.toISOString().split('T')[0];
                  var futUrl = 'https://v3.football.api-sports.io/fixtures?league='+uLg.id+'&season='+uLg.season+'&date='+futureDateStr;
                  var futResp = await get(futUrl, {'x-apisports-key': API_KEY});
                  if (futResp && futResp.response) {
                    futResp.response.forEach(function(fx) {
                      if (fx.teams && fx.fixture) {
                        upcomingFixtures.push({
                          home: fx.teams.home.name,
                          away: fx.teams.away.name,
                          date: futureDateStr,
                          league: fx.league ? fx.league.name : ''
                        });
                      }
                    });
                  }
                  await sleep(100);
                }
              }
              // Dédoublonner
              var seen = {};
              upcomingFixtures = upcomingFixtures.filter(function(f) {
                var k = f.home+'_'+f.away+'_'+f.date;
                if (seen[k]) return false;
                seen[k] = true;
                return true;
              });
              console.log('  Matchs à venir trouvés: '+upcomingFixtures.length);
            } catch(e) {
              console.log('  Fixtures à venir erreur: '+e.message);
            }

            // ── GÉNÉRER ARTICLES BLOG ──
            await generateBlogArticles(matchsData, upcomingFixtures);
            generateSitemaps(matchsData);
            var totalMatchPages = matchsData.length * Object.keys(LANGS).length;
            var totalWCPages = WC_TEAMS.length * Object.keys(LANGS).length;
            console.log('\n=== MULTILINGUAL DONE ===');
            console.log('Match pages: '+totalMatchPages);
            console.log('WC 2026 pages: '+totalWCPages);
            console.log('Sitemaps: '+(Object.keys(LANGS).length+1)+' files');
          }
          main().catch(function(e){ console.error('FATAL:', e.message); process.exit(0); });
          JSEOF

      - name: Run pipeline
        env:
          APISPORTS_KEY:   ${{ secrets.APISPORTS_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          NEWSAPI_KEY:     ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY:   ${{ secrets.ANTHROPIC_KEY }}
        run: node pipeline.js

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json sitemap.xml sitemap-*.xml
          git add en/ es/ pt/ de/ it/ ar/ tr/ nl/ pl/ id/ no/ sv/ ro/ el/ cs/ hu/ sr/ uk/ ru/ ja/ ko/ th/ hi/ ms/ da/ fi/ sw/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily update + multilingual - $(date +%Y-%m-%d)"
          git push
