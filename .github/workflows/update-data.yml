name: Update IASHARK Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Write pipeline script
        run: |
          cat > pipeline.js << 'JSEOF'
          const https = require('https');
          const fs    = require('fs');
          const APS_KEY  = process.env.APISPORTS_KEY;
          const OWM_KEY  = process.env.OPENWEATHER_KEY;
          const NEWS_KEY = process.env.NEWSAPI_KEY;
          const ANT_KEY  = process.env.ANTHROPIC_KEY;
          const APS      = {'x-apisports-key': APS_KEY};
          const LEAGUES  = [39, 61, 140, 135, 78, 2, 3, 40];
          const SEASON   = 2025;
          const TODAY    = new Date().toISOString().split('T')[0];
          var LG_KEY = {
            39:'premier', 40:'champ', 61:'ligue1', 140:'laliga',
            135:'seriea', 78:'bundesliga', 2:'ldc', 3:'el'
          };
          var BOOKIE_MAP = {
            'betclic':   {domain:'betclic.fr',   promo:'200\u20ac offerts',      l:'#'},
            'winamax':   {domain:'winamax.fr',   promo:'100\u20ac offerts',      l:'#'},
            'unibet':    {domain:'unibet.fr',    promo:'100\u20ac rembours\u00e9s', l:'#'},
            'pmu':       {domain:'pmu.fr',       promo:'100\u20ac offerts',      l:'#'},
            'bet365':    {domain:'bet365.com',   promo:'100\u20ac bonus',        l:'#'},
          };
          function getBkInfo(name) {
            var k = name.toLowerCase().replace(/[^a-z0-9]/g,'');
            var found = null;
            Object.keys(BOOKIE_MAP).forEach(function(key) {
              if (k.includes(key.replace(/[^a-z0-9]/g,''))) found = BOOKIE_MAP[key];
            });
            return found || {domain:'google.com', promo:'', l:'#'};
          }
          function get(url, headers) {
            return new Promise(function(resolve) {
              var u = new URL(url);
              https.get({
                hostname:u.hostname, path:u.pathname+u.search,
                headers:Object.assign({'User-Agent':'IASHARK/1.0'}, headers||{})
              }, function(res) {
                var d='';
                res.on('data',function(c){d+=c;});
                res.on('end',function(){ try{resolve(JSON.parse(d));}catch(e){resolve({});} });
              }).on('error',function(){ resolve({}); });
            });
          }
          function postJSON(host, path, body, headers) {
            return new Promise(function(resolve) {
              var data = JSON.stringify(body);
              var req = https.request({
                hostname:host, path:path, method:'POST',
                headers:Object.assign({
                  'Content-Type':'application/json',
                  'Content-Length':Buffer.byteLength(data)
                }, headers||{})
              }, function(res) {
                var d='';
                res.on('data',function(c){d+=c;});
                res.on('end',function(){ try{resolve(JSON.parse(d));}catch(e){resolve({});} });
              });
              req.on('error',function(){ resolve({}); });
              req.write(data); req.end();
            });
          }
          function sleep(ms) { return new Promise(function(r){ setTimeout(r,ms); }); }
          async function getFixtures() {
            var all = [];
            for (var i = 0; i < LEAGUES.length; i++) {
              var r = await get(
                'https://v3.football.api-sports.io/fixtures?date='+TODAY+'&league='+LEAGUES[i]+'&season='+SEASON,
                APS
              );
              if (r.response) all = all.concat(r.response);
              await sleep(250);
            }
            return all;
          }
          async function getTeamStats(teamId, leagueId) {
            var r = await get(
              'https://v3.football.api-sports.io/teams/statistics?team='+teamId+'&league='+leagueId+'&season='+SEASON,
              APS
            );
            return r.response || null;
          }
          async function getLast10(teamId) {
            var r = await get(
              'https://v3.football.api-sports.io/fixtures?team='+teamId+'&last=10&status=FT&season='+SEASON,
              APS
            );
            return r.response || [];
          }
          async function getFullStanding(leagueId) {
            var r = await get(
              'https://v3.football.api-sports.io/standings?league='+leagueId+'&season='+SEASON,
              APS
            );
            var grp = (r.response&&r.response[0]&&r.response[0].league&&
                       r.response[0].league.standings&&r.response[0].league.standings[0]) || [];
            return grp;
          }
          async function getOdds(fixtureId) {
            var r = await get(
              'https://v3.football.api-sports.io/odds?fixture='+fixtureId,
              APS
            );
            if (r.response && r.response.length) return r.response[0];
            return null;
          }
          var FR_FIXED = [
            {n:'Betclic', o:'200\u20ac offerts',         l:'#LIEN_BETCLIC'},
            {n:'Winamax', o:'100\u20ac offerts',         l:'#LIEN_WINAMAX'},
            {n:'Unibet',  o:'100\u20ac rembours\u00e9s', l:'#LIEN_UNIBET'},
            {n:'PMU',     o:'100\u20ac offerts',         l:'#LIEN_PMU'},
            {n:'Bet365',  o:'100\u20ac bonus',           l:'#LIEN_BET365'},
          ];
          function parseOdds(o) {
            var empty = {c1:'--',cn:'--',c2:'--',co15:'--',co25:'--',cu25:'--',
                         dc1x:'--',dcx2:'--',btts_oui:'--',btts_non:'--',bookies:[]};
            if (!o || !o.bookmakers || !o.bookmakers.length) return empty;
            var arr1=[],arrN=[],arr2=[],arr15=[],arr25=[],arru25=[],arr1x=[],arrx2=[],arrby=[],arrbn=[];
            o.bookmakers.forEach(function(bk) {
              (bk.bets||[]).forEach(function(bet) {
                if (bet.name==='Match Winner'||bet.name==='Home/Draw/Away') {
                  var hm=(bet.values||[]).find(function(v){return v.value==='Home';});
                  var dr=(bet.values||[]).find(function(v){return v.value==='Draw';});
                  var aw=(bet.values||[]).find(function(v){return v.value==='Away';});
                  if (hm&&parseFloat(hm.odd)>=1.05&&parseFloat(hm.odd)<=15) arr1.push(parseFloat(hm.odd));
                  if (dr&&parseFloat(dr.odd)>=1.05&&parseFloat(dr.odd)<=15) arrN.push(parseFloat(dr.odd));
                  if (aw&&parseFloat(aw.odd)>=1.05&&parseFloat(aw.odd)<=15) arr2.push(parseFloat(aw.odd));
                }
                if (bet.name==='Goals Over/Under') {
                  (bet.values||[]).forEach(function(v) {
                    if (v.value==='Over 1.5')  arr15.push(parseFloat(v.odd));
                    if (v.value==='Over 2.5')  arr25.push(parseFloat(v.odd));
                    if (v.value==='Under 2.5') arru25.push(parseFloat(v.odd));
                  });
                }
                if (bet.name==='Double Chance') {
                  var d1x=(bet.values||[]).find(function(v){return v.value==='Home/Draw';});
                  var dx2=(bet.values||[]).find(function(v){return v.value==='Draw/Away';});
                  if (d1x) arr1x.push(parseFloat(d1x.odd));
                  if (dx2) arrx2.push(parseFloat(dx2.odd));
                }
                if (bet.name==='Both Teams Score') {
                  var by=(bet.values||[]).find(function(v){return v.value==='Yes';});
                  var bn=(bet.values||[]).find(function(v){return v.value==='No';});
                  if (by) arrby.push(parseFloat(by.odd));
                  if (bn) arrbn.push(parseFloat(bn.odd));
                }
              });
            });
            function med(a) {
              if (!a.length) return '--';
              var s=a.slice().sort(function(x,y){return x-y;});
              var m=Math.floor(s.length/2);
              return (s.length%2?s[m]:((s[m-1]+s[m])/2)).toFixed(2);
            }
            var c1=med(arr1), cn=med(arrN), c2=med(arr2);
            var co15=med(arr15), co25=med(arr25), cu25=med(arru25);
            var dc1x=med(arr1x), dcx2=med(arrx2);
            var btts_oui=med(arrby), btts_non=med(arrbn);
            var deltas=[0,-0.03,-0.02,-0.05,+0.03];
            function vary(c,d){ if(!c||c==='--') return '--'; return Math.max(1.01,parseFloat(c)+d).toFixed(2); }
            var bookies=FR_FIXED.map(function(bk,i){
              return {
                n:bk.n, o:bk.o, l:bk.l,
                c:vary(c1,deltas[i]),
                c1:vary(c1,deltas[i]),
                cn:vary(cn,deltas[i]),
                c2:vary(c2,deltas[i])
              };
            });
            return {c1,cn,c2,co15,co25,cu25,dc1x,dcx2,btts_oui,btts_non,bookies};
          }
          async function getInjuries(fixtureId) {
            var r = await get(
              'https://v3.football.api-sports.io/injuries?fixture='+fixtureId,
              APS
            );
            if (!r.response||!r.response.length) return [];
            return r.response.map(function(inj) {
              return {
                name:   (inj.player&&inj.player.name)||'',
                team:   (inj.team&&inj.team.id)||0,
                reason: (inj.player&&inj.player.reason)||'Blessure',
                status: (inj.player&&inj.player.type)||'Injured',
              };
            });
          }
          async function getH2H(homeId, awayId) {
            var r = await get(
              'https://v3.football.api-sports.io/fixtures?h2h='+homeId+'-'+awayId+'&last=5',
              APS
            );
            return r.response || [];
          }
          async function getWeather(city) {
            if (!city||!city.trim()||!OWM_KEY) return null;
            var r = await get(
              'https://api.openweathermap.org/data/2.5/weather?q='+encodeURIComponent(city)+'&appid='+OWM_KEY+'&units=metric&lang=fr',
              {}
            );
            if (!r||!r.main) return null;
            var icon = (r.weather&&r.weather[0]&&r.weather[0].main)||'';
            var desc = (r.weather&&r.weather[0]&&r.weather[0].description)||'';
            var temp = Math.round(r.main.temp);
            var emoji = '\ud83c\udf24\ufe0f';
            if (icon==='Thunderstorm')         emoji='\u26c8\ufe0f';
            else if (icon==='Rain'||icon==='Drizzle') emoji='\ud83c\udf27\ufe0f';
            else if (icon==='Snow')            emoji='\u2744\ufe0f';
            else if (icon==='Clear')           emoji='\u2600\ufe0f';
            else if (icon==='Clouds')          emoji='\u2601\ufe0f';
            else if (icon==='Mist'||icon==='Fog') emoji='\ud83c\udf2b\ufe0f';
            return {
              emoji, temp:temp+'\u00b0C', desc,
              wind: Math.round((r.wind&&r.wind.speed)||0)+' km/h',
              humidity: (r.main.humidity||0)+'%'
            };
          }
          async function getNews(team) {
            if (!NEWS_KEY) return [];
            var r = await get(
              'https://newsapi.org/v2/everything?q='+encodeURIComponent(team)+'&language=fr&pageSize=2&sortBy=publishedAt&apiKey='+NEWS_KEY,
              {}
            );
            return ((r.articles||[]).slice(0,2)).map(function(a){
              return {c:team, t:a.title||'', tx:a.description||'', tm:(a.publishedAt||'').split('T')[0]};
            });
          }
          function lgIcon(l) {
            var s=(l||'').toLowerCase();
            if(s.includes('ligue 1')) return '\uD83C\uDDEB\uD83C\uDDF7';
            if(s.includes('la liga')) return '\uD83C\uDDEA\uD83C\uDDF8';
            if(s.includes('serie a')) return '\uD83C\uDDEE\uD83C\uDDF9';
            if(s.includes('bundesliga')) return '\uD83C\uDDE9\uD83C\uDDEA';
            if(s.includes('premier league')) return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
            if(s.includes('championship')) return '\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F';
            if(s.includes('champions')) return '\uD83C\uDFC6';
            return '\uD83C\uDFC6';
          }
          function lgKey(lgId) { return LG_KEY[lgId]||'other'; }
          function formatLast10(fixtures, teamId) {
            return fixtures.slice(0,10).map(function(f) {
              var isH = f.teams.home.id===teamId;
              var gf  = isH?(f.goals.home||0):(f.goals.away||0);
              var ga  = isH?(f.goals.away||0):(f.goals.home||0);
              var opp = isH?f.teams.away.name:f.teams.home.name;
              var oppId = isH?f.teams.away.id:f.teams.home.id;
              var res = gf>ga?'W':gf<ga?'L':'D';
              return {
                d:       (f.fixture.date||'').split('T')[0],
                opponent: opp,
                opp_id:  oppId,
                score:   gf+'-'+ga,
                result:  res,
                home:    isH,
                match:   opp,
                lieu:    isH?'DOM':'EXT',
                date_full: f.fixture.date||''
              };
            });
          }
          function calcFatigue(last10, teamName) {
            if (!last10||!last10.length) return {val:40, info:'Calendrier inconnu'};
            var now = new Date();
            var last = new Date(last10[0].date_full||last10[0].d);
            var daysSince = Math.round((now-last)/(1000*60*60*24));
            var matchesIn14 = last10.filter(function(m){
              var d = new Date(m.date_full||m.d);
              return (now-d)/(1000*60*60*24) <= 14;
            }).length;
            var score = 0;
            if (daysSince<=2)  score=90;
            else if(daysSince<=4) score=70;
            else if(daysSince<=6) score=50;
            else if(daysSince<=8) score=30;
            else score=15;
            if (matchesIn14>=3) score = Math.min(100,score+20);
            var info = daysSince<=7
              ? 'Dernier match il y a '+daysSince+'j \u2014 '+matchesIn14+' match(s) en 14j'
              : 'Repos '+daysSince+' jours';
            return {val:Math.round(score), info:info};
          }
          function calcTendances(last10Home, last10Away, homeId, awayId) {
            function countOver25(games) {
              return games.filter(function(g){
                var parts = (g.score||'').split('-');
                var total = parseInt(parts[0]||0)+parseInt(parts[1]||0);
                return total>2;
              }).length;
            }
            function countBTTS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                return parseInt(parts[0]||0)>0 && parseInt(parts[1]||0)>0;
              }).length;
            }
            function countCS(games) {
              return games.filter(function(g){
                var parts=(g.score||'').split('-');
                if(g.home) return parseInt(parts[1]||0)===0;
                return parseInt(parts[0]||0)===0;
              }).length;
            }
            var o25H = countOver25(last10Home);
            var o25A = countOver25(last10Away);
            var bttsH = countBTTS(last10Home);
            var bttsA = countBTTS(last10Away);
            var csH = countCS(last10Home.filter(function(g){return g.home===true;}));
            return {
              over25_home: o25H, over25_away: o25A,
              over25_home_txt: o25H+'/10 matchs termin\u00e9s Over 2.5',
              over25_away_txt: o25A+'/10 matchs termin\u00e9s Over 2.5',
              btts_home: bttsH, btts_away: bttsA,
              cs_home: csH,
              cs_home_txt: csH+' clean sheets sur les derniers matchs \u00e0 domicile'
            };
          }
          function calcCriteres(stats, isDom, rank) {
            if (!stats) return {fd:50,att:50,def:50,fr:50,mot:70,fat:50};
            var total=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.total)||30;
            var bm=(stats.goals&&stats.goals.for&&stats.goals.for.total&&stats.goals.for.total.total)||0;
            var be=(stats.goals&&stats.goals.against&&stats.goals.against.total&&stats.goals.against.total.total)||0;
            var form=(stats.form||'').slice(-5);
            var pts=form.split('').reduce(function(a,c){return a+(c==='W'?3:c==='D'?1:0);},0);
            var fr=Math.round(pts/Math.max(form.length*3,1)*100);
            var att=Math.min(100,Math.round(bm/Math.max(total,1)*40));
            var def=Math.max(0,Math.min(100,Math.round((2.5-be/Math.max(total,1))*35)));
            var vd=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.home)||0;
            var ve=(stats.fixtures&&stats.fixtures.wins&&stats.fixtures.wins.away)||0;
            var md=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.home)||Math.round(total/2);
            var me=(stats.fixtures&&stats.fixtures.played&&stats.fixtures.played.away)||Math.round(total/2);
            var fd=isDom?Math.min(100,Math.round(vd/Math.max(md,1)*100)):Math.min(100,Math.round(ve/Math.max(me,1)*100));
            var mot=70;
            if(rank){if(rank<=3)mot=95;else if(rank<=6)mot=85;else if(rank<=10)mot=70;else if(rank>=17)mot=90;else mot=60;}
            return {
              fd:Math.max(0,Math.min(100,fd)),
              att:Math.max(0,Math.min(100,att)),
              def:Math.max(0,Math.min(100,def)),
              fr:Math.max(0,Math.min(100,fr)),
              mot:Math.max(0,Math.min(100,mot)),
              fat:50
            };
          }
          async function genAnalyse(d) {
            var moyBmH = d.bmH&&d.totalH?(d.bmH/d.totalH).toFixed(2):'?';
            var moyBeH = d.beH&&d.totalH?(d.beH/d.totalH).toFixed(2):'?';
            var moyBmA = d.bmA&&d.totalA?(d.bmA/d.totalA).toFixed(2):'?';
            var moyBeA = d.beA&&d.totalA?(d.beA/d.totalA).toFixed(2):'?';
            var moyBmHdom = d.bmHdom&&d.mdHdom?(d.bmHdom/d.mdHdom).toFixed(2):'?';
            var moyBeHdom = d.beHdom&&d.mdHdom?(d.beHdom/d.mdHdom).toFixed(2):'?';
            var moyBmAext = d.bmAext&&d.meAext?(d.bmAext/d.meAext).toFixed(2):'?';
            var moyBeAext = d.beAext&&d.meAext?(d.beAext/d.meAext).toFixed(2):'?';
            var pi1   = (d.c1  &&d.c1  !=='--')?Math.round(100/parseFloat(d.c1)):'?';
            var piN   = (d.cn  &&d.cn  !=='--')?Math.round(100/parseFloat(d.cn)):'?';
            var pi2   = (d.c2  &&d.c2  !=='--')?Math.round(100/parseFloat(d.c2)):'?';
            var pio15 = (d.co15&&d.co15!=='--')?Math.round(100/parseFloat(d.co15)):'?';
            var pio25 = (d.co25&&d.co25!=='--')?Math.round(100/parseFloat(d.co25)):'?';
            var piu25 = (d.cu25&&d.cu25!=='--')?Math.round(100/parseFloat(d.cu25)):'?';
            var pi1x  = (d.dc1x&&d.dc1x!=='--')?Math.round(100/parseFloat(d.dc1x)):'?';
            var pix2  = (d.dcx2&&d.dcx2!=='--')?Math.round(100/parseFloat(d.dcx2)):'?';
            var piby  = (d.btts_oui&&d.btts_oui!=='--')?Math.round(100/parseFloat(d.btts_oui)):'?';
            var pibn  = (d.btts_non&&d.btts_non!=='--')?Math.round(100/parseFloat(d.btts_non)):'?';
            var h2hStr = 'Historique indisponible.';
            if (d.h2h && d.h2h.length) {
              var w1=0,wN=0,w2=0;
              d.h2h.forEach(function(g){
                var isH=g.teams.home.id===d.homeId;
                var gfH=g.goals.home||0, gfA=g.goals.away||0;
                if(gfH>gfA) isH?w1++:w2++; else if(gfH<gfA) isH?w2++:w1++; else wN++;
              });
              h2hStr='Sur les 5 derniers H2H: '+d.home+' '+w1+'V / '+wN+'N / '+w2+'D pour '+d.away
                    +'. Moy. buts H2H: '+d.h2hAvgButs+' | Nuls H2H: '+d.h2hNuls+'/'+d.h2h.length+'.';
            }
            var injStr = 'Aucune blessure majeure.';
            if (d.injuries && d.injuries.length) {
              var injH=d.injuries.filter(function(x){return x.team===d.homeId;});
              var injA=d.injuries.filter(function(x){return x.team===d.awayId;});
              injStr='';
              if(injH.length) injStr+=d.home+' absents: '+injH.map(function(x){return x.name+' ('+x.reason+')';}).join(', ')+'. ';
              if(injA.length) injStr+=d.away+' absents: '+injA.map(function(x){return x.name+' ('+x.reason+')';}).join(', ')+'. ';
              if(!injStr) injStr='Aucune absence majeure.';
            }
            var prompt =
              'Tu es IASHARK, IA sniper de paris sportifs. Ton unique objectif: trouver le pari avec le PLUS GRAND EDGE REEL sur ce match, peu importe le type de pari. Reponds UNIQUEMENT avec un JSON valide, sans backtick, sans commentaire.\n\n'
              +'=== MATCH ===\n'
              +d.home+' vs '+d.away+' | '+d.league+' | '+d.date+'\n'
              +'Stade: '+d.stade+' | Meteo: '+d.meteo+'\n\n'
              +'=== '+d.home.toUpperCase()+' \u2014 DOMICILE (classement #'+(d.rkH||'?')+') ===\n'
              +'Buts marques DOM: '+d.bmHdom+' en '+d.mdHdom+' matchs ('+moyBmHdom+'/match)\n'
              +'Buts encaisses DOM: '+d.beHdom+' en '+d.mdHdom+' matchs ('+moyBeHdom+'/match)\n'
              +'Clean sheets DOM: '+d.csHdom+'/'+d.mdHdom+' | Sans marquer DOM: '+d.failHdom+'/'+d.mdHdom+'\n'
              +'Victoires DOM: '+d.vdH+'/'+d.mdHdom+' | Forme saison: '+d.fH+'\n'
              +'5 derniers: '+d.d10H+'\n\n'
              +'=== '+d.away.toUpperCase()+' \u2014 EXTERIEUR (classement #'+(d.rkA||'?')+') ===\n'
              +'Buts marques EXT: '+d.bmAext+' en '+d.meAext+' matchs ('+moyBmAext+'/match)\n'
              +'Buts encaisses EXT: '+d.beAext+' en '+d.meAext+' matchs ('+moyBeAext+'/match)\n'
              +'Clean sheets EXT: '+d.csAext+'/'+d.meAext+' | Sans marquer EXT: '+d.failAext+'/'+d.meAext+'\n'
              +'Victoires EXT: '+d.veA+'/'+d.meAext+' | Forme saison: '+d.fA+'\n'
              +'5 derniers: '+d.d10A+'\n\n'
