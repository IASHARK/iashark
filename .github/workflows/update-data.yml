              percent_draw: p.predictions&&p.predictions.percent&&p.predictions.percent.draw||null,
              percent_away: p.predictions&&p.predictions.percent&&p.predictions.percent.away||null,
              comp_attack_home: p.comparison&&p.comparison.att&&p.comparison.att.home||null,
              comp_attack_away: p.comparison&&p.comparison.att&&p.comparison.att.away||null,
              comp_defense_home: p.comparison&&p.comparison.def&&p.comparison.def.home||null,
              comp_defense_away: p.comparison&&p.comparison.def&&p.comparison.def.away||null,
              comp_form_home: p.comparison&&p.comparison.form&&p.comparison.form.home||null,
              comp_form_away: p.comparison&&p.comparison.form&&p.comparison.form.away||null,
              comp_h2h_home: p.comparison&&p.comparison.h2h&&p.comparison.h2h.home||null,
              comp_h2h_away: p.comparison&&p.comparison.h2h&&p.comparison.h2h.away||null,
            };
          }
          async function getLineups(fixtureId) {
            var r = await get(
              'https://v3.football.api-sports.io/fixtures/lineups?fixture='+fixtureId,
              APS
            );
            if (!r.response||!r.response.length) return null;
            function extractLineup(team) {
              return {
                formation: team.formation||null,
                coach: team.coach&&team.coach.name||null,
                startXI: (team.startXI||[]).map(function(p){
                  return {name:(p.player&&p.player.name)||'', pos:(p.player&&p.player.pos)||'', number:(p.player&&p.player.number)||0};
                }),
                substitutes: (team.substitutes||[]).map(function(p){
                  return {name:(p.player&&p.player.name)||'', pos:(p.player&&p.player.pos)||''};
                })
              };
            }
            return {
              home: extractLineup(r.response[0]),
              away: extractLineup(r.response[1]||{})
            };
          }
          function calcXGStats(fixtureStatsList, teamSide) {
            var xgs=[], shots=[], shotsTotal=[], poss=[], fouls=[];
            fixtureStatsList.forEach(function(fs){
              var side = fs[teamSide];
              if (!side) return;
              if (side.xg !== null) xgs.push(side.xg);
              if (side.shots_on) shots.push(side.shots_on);
              if (side.shots_total) shotsTotal.push(side.shots_total);
              if (side.possession) poss.push(side.possession);
              if (side.fouls) fouls.push(side.fouls);
            });
            function avg(arr){ return arr.length?( arr.reduce(function(a,b){return a+b;},0)/arr.length ).toFixed(1):null; }
            return {
              xg_avg: avg(xgs),
              shots_on_avg: avg(shots),
              shots_total_avg: avg(shotsTotal),
              possession_avg: avg(poss),
              fouls_avg: avg(fouls),
              n: fixtureStatsList.length
            };
          }
          function lgIcon(l) {
            var s=(l||'').toLowerCase();
            if(s.includes('ligue 1')) return '\uD83C\uDDEB\uD83C\uDDF7';
            if(s.includes('la liga')) return '\uD83C\uDDEA\uD83C\uDDF8';
