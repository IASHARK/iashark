name: Update IASHARK Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Write pipeline script
        run: |
          cat > pipeline.js << 'JSEOF'
          const https = require('https');
          const fs    = require('fs');
          const APS_KEY  = process.env.APISPORTS_KEY;
          const OWM_KEY  = process.env.OPENWEATHER_KEY;
          const NEWS_KEY = process.env.NEWSAPI_KEY;
          const ANT_KEY  = process.env.ANTHROPIC_KEY;
          const ODDS_KEY = process.env.ODDS_API_KEY;
          const APS      = {'x-apisports-key': APS_KEY};

          // ── POISSON DISTRIBUTION ────────────────────────────────
          function poissonProb(lambda, k) {
            if(lambda<=0) return k===0?1:0;
            var logP = -lambda + k*Math.log(lambda) - logFactorial(k);
            return Math.exp(logP);
          }
          function logFactorial(n) {
            if(n<=1) return 0;
            var r=0;for(var i=2;i<=n;i++) r+=Math.log(i);return r;
          }
          function poissonMatrix(lambdaH, lambdaA, maxGoals) {
            maxGoals = maxGoals||8;
            var mat=[];
            for(var h=0;h<=maxGoals;h++){
              mat[h]=[];
              for(var a=0;a<=maxGoals;a++){
                mat[h][a]=poissonProb(lambdaH,h)*poissonProb(lambdaA,a);
              }
            }
            return mat;
          }
          function calcPoissonProbs(lambdaH, lambdaA) {
            var mat=poissonMatrix(lambdaH,lambdaA,8);
            var p1=0,pN=0,p2=0,over25=0,under25=0,bttsY=0,bttsN=0,over15=0,over35=0;
            for(var h=0;h<=8;h++){
              for(var a=0;a<=8;a++){
                var p=mat[h][a];
                if(h>a) p1+=p;
                else if(h===a) pN+=p;
                else p2+=p;
                if(h+a>2.5) over25+=p; else under25+=p;
                if(h+a>1.5) over15+=p;
                if(h+a>3.5) over35+=p;
                if(h>0&&a>0) bttsY+=p; else bttsN+=p;
              }
            }
            return {
              p1:Math.round(p1*100), pN:Math.round(pN*100), p2:Math.round(p2*100),
              over15:Math.round(over15*100), over25:Math.round(over25*100), under25:Math.round(under25*100),
              over35:Math.round(over35*100), bttsY:Math.round(bttsY*100), bttsN:Math.round(bttsN*100),
            };
          }
          function calcLambdas(bmHdom, beHdom, mdHdom, bmAext, beAext, meAext, leagueAvgH, leagueAvgA) {
            var leagAvgH = leagueAvgH||1.35; 
            var leagAvgA = leagueAvgA||1.10; 
            var attH = mdHdom>0 ? (bmHdom/mdHdom)/leagAvgH : 1;
            var defH = mdHdom>0 ? (beHdom/mdHdom)/leagAvgA : 1;
            var attA = meAext>0 ? (bmAext/meAext)/leagAvgA : 1;
            var defA = meAext>0 ? (beAext/meAext)/leagAvgH : 1;
            var lambdaH = Math.max(0.3, attH * defA * leagAvgH);
            var lambdaA = Math.max(0.3, attA * defH * leagAvgA);
            return {lambdaH: parseFloat(lambdaH.toFixed(3)), lambdaA: parseFloat(lambdaA.toFixed(3))};
          }

          // ── SHIN METHOD ─────────────
          function shinProbabilities(odds) {
            var prices = odds.filter(function(o){return o&&o>1;});
            if(prices.length===0) return null;
            var rawProbs = prices.map(function(o){return 1/o;});
            var sumRaw = rawProbs.reduce(function(a,b){return a+b;},0);
            if(sumRaw<=1) return rawProbs;
            var z = 0.02;
            for(var iter=0;iter<50;iter++){
              var f=0,df=0;
              for(var i=0;i<rawProbs.length;i++){
                var qi=rawProbs[i];
                var denom=Math.sqrt(z*z+4*(1-z)*qi*qi/sumRaw);
                f+=( z+denom )/(2*(1-z));
                df+=( 1+( 2*z/sumRaw - 2*qi*qi*(1-2*z)/(sumRaw*sumRaw) )/denom )/(2*(1-z)) + (z+denom)/(2*(1-z)*(1-z));
              }
              f-=1;
              var zNew=z-f/df;
              if(Math.abs(zNew-z)<1e-8) break;
              z=Math.max(0,Math.min(0.15,zNew));
            }
            var trueProbs=rawProbs.map(function(qi){
              return (z+Math.sqrt(z*z+4*(1-z)*qi*qi/sumRaw))/(2*(1-z));
            });
            var sumTrue=trueProbs.reduce(function(a,b){return a+b;},0);
            return trueProbs.map(function(p){return p/sumTrue;});
          }

          function fractionalKelly(probIA, cote, fraction) {
            fraction = fraction||0.25; 
            var b = cote - 1;
            var q = 1 - probIA;
            var kelly = (probIA*b - q) / b;
            if(kelly<=0) return null;
            return Math.min(kelly*fraction*100, 5).toFixed(1); 
          }

          const LEAGUES = [39, 40, 61, 62, 140, 135, 78, 2, 3, 88, 94, 203, 71, 128, 253, 119, 357, 98, 292, 66, 307, 143, 137, 81];
          const SEASON = 2025;
          var SEASON_2026 = [71, 128, 253, 357, 98, 292]; 
          const TODAY = new Date().toISOString().split('T')[0];

          var LG_KEY = {
            39:'premier', 40:'champ', 61:'ligue1', 62:'ligue2', 140:'laliga',
            135:'seriea', 78:'bundesliga', 2:'ldc', 3:'el',
            88:'eredivisie', 94:'primeira', 203:'superlig',
            71:'brasileirao', 128:'primera-arg', 253:'mls',
            119:'superliga-dk', 98:'jleague', 292:'kleague',
            66:'coupe-france', 307:'saudi', 143:'copa-rey', 137:'coppa-italia', 81:'dfb-pokal'
          };
          var BOOKIE_MAP = {
            'betclic':   {domain:'betclic.fr',  promo:'200\u20ac offerts',      l:'#'},
            'winamax':   {domain:'winamax.fr',  promo:'100\u20ac offerts',      l:'#'},
            'unibet':    {domain:'unibet.fr',   promo:'100\u20ac rembours\u00e9s', l:'#'},
            'pmu':       {domain:'pmu.fr',      promo:'100\u20ac offerts',      l:'#'},
            'bet365':    {domain:'bet365.com',  promo:'100\u20ac bonus',        l:'#'},
          };

          function slugify(s) {
            return (s||'').toLowerCase()
              .replace(/[àáâãäå]/g,'a').replace(/[éèêë]/g,'e')
              .replace(/[íìîï]/g,'i').replace(/[óòôõö]/g,'o')
              .replace(/[úùûü]/g,'u').replace(/[ç]/g,'c').replace(/[ñ]/g,'n')
              .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
          }

          function get(url, headers) {
            return new Promise(function(resolve) {
              var u = new URL(url);
              var timer = setTimeout(function(){ resolve({}); }, 8000);
              https.get({
                hostname:u.hostname, path:u.pathname+u.search,
                headers:Object.assign({'User-Agent':'IASHARK/1.0'}, headers||{})
              }, function(res) {
                var d='';
                res.on('data',function(c){d+=c;});
                res.on('end',function(){ clearTimeout(timer); try{resolve(JSON.parse(d));}catch(e){resolve({});} });
              }).on('error',function(){ clearTimeout(timer); resolve({}); });
            });
          }

          function postJSON(host, path, body, headers) {
            return new Promise(function(resolve) {
              var data = JSON.stringify(body);
              var timer = setTimeout(function(){ resolve({}); }, 180000);
              var req = https.request({
                hostname:host, path:path, method:'POST',
                headers:Object.assign({
                  'Content-Type':'application/json',
                  'Content-Length':Buffer.byteLength(data)
                }, headers||{})
              }, function(res) {
                var d='';
                res.on('data',function(c){d+=c;});
                res.on('end',function(){
                  clearTimeout(timer);
                  try{ resolve(JSON.parse(d)); }catch(e){ resolve({}); }
                });
              });
              req.on('error',function(){ clearTimeout(timer); resolve({}); });
              req.write(data); req.end();
            });
          }

          async function postJSONWithRetry(host, path, body, headers) {
            for(var attempt=1; attempt<=4; attempt++){
              var r = await postJSON(host, path, body, headers);
              if(r.error && (r.error.type==='overloaded_error'||r.error.type==='rate_limit_error')){
                await sleep(attempt*30000);
                continue;
              }
              return r;
            }
            return {};
          }
          function sleep(ms) { return new Promise(function(r){ setTimeout(r,ms); }); }

          async function getFixtures() {
            var all = [];
            var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
            var TOMORROW = tomorrow.toISOString().split('T')[0];
            var dates = [TODAY, TOMORROW];
            for (var d = 0; d < dates.length; d++) {
              for (var i = 0; i < LEAGUES.length; i++) {
                var lgId = LEAGUES[i];
                var season = SEASON_2026.indexOf(lgId) !== -1 ? 2026 : SEASON;
                var r = await get('https://v3.football.api-sports.io/fixtures?date='+dates[d]+'&league='+lgId+'&season='+season+'&timezone=Europe%2FParis', APS);
                if (r.response) all = all.concat(r.response);
                await sleep(200);
              }
            }
            var seen = {};
            return all.filter(function(f){
              if(seen[f.fixture.id]) return false;
              seen[f.fixture.id] = true; return true;
            });
          }

          async function getTeamStats(teamId, leagueId) {
            var r = await get('https://v3.football.api-sports.io/teams/statistics?team='+teamId+'&league='+leagueId+'&season='+SEASON, APS);
            return r.response || null;
          }
          async function getLast10(teamId) {
            var r = await get('https://v3.football.api-sports.io/fixtures?team='+teamId+'&last=20&status=FT&season='+SEASON, APS);
            return r.response || [];
          }
          async function getFullStanding(leagueId) {
            var r = await get('https://v3.football.api-sports.io/standings?league='+leagueId+'&season='+SEASON, APS);
            return (r.response&&r.response[0]&&r.response[0].league&&r.response[0].league.standings&&r.response[0].league.standings[0]) || [];
          }
          async function getOdds(fixtureId) {
            var r = await get('https://v3.football.api-sports.io/odds?fixture='+fixtureId, APS);
            return (r.response && r.response.length) ? r.response[0] : null;
          }

          var FR_FIXED = [
            {n:'Betclic', o:'200\u20ac offerts', l:'#'},
            {n:'Winamax', o:'100\u20ac offerts', l:'#'},
            {n:'Unibet',  o:'100\u20ac rembours\u00e9s', l:'#'},
            {n:'PMU',     o:'100\u20ac offerts', l:'#'},
            {n:'Bet365',  o:'100\u20ac bonus', l:'#'},
          ];

          function parseOdds(o) {
            var empty = {c1:'--',cn:'--',c2:'--',co15:'--',co25:'--',cu25:'--',dc1x:'--',dc2x:'--',dc12:'--',btts_oui:'--',btts_non:'--',bookies:[]};
            if (!o || !o.bookmakers || !o.bookmakers.length) return empty;
            var arr1=[],arrN=[],arr2=[],arr15=[],arr25=[],arru25=[],arr35=[],arru35=[],arr1x=[],arrx2=[],arr12=[],arrby=[],arrbn=[];
            o.bookmakers.forEach(function(bk) {
              (bk.bets||[]).forEach(function(bet) {
                if (bet.name==='Match Winner'||bet.name==='Home/Draw/Away') {
                  var hm=(bet.values||[]).find(function(v){return v.value==='Home';});
                  var dr=(bet.values||[]).find(function(v){return v.value==='Draw';});
                  var aw=(bet.values||[]).find(function(v){return v.value==='Away';});
                  if (hm&&parseFloat(hm.odd)>=1.05&&parseFloat(hm.odd)<=15) arr1.push(parseFloat(hm.odd));
                  if (dr&&parseFloat(dr.odd)>=1.05&&parseFloat(dr.odd)<=15) arrN.push(parseFloat(dr.odd));
                  if (aw&&parseFloat(aw.odd)>=1.05&&parseFloat(aw.odd)<=15) arr2.push(parseFloat(aw.odd));
                }
                if (bet.name==='Goals Over/Under') {
                  (bet.values||[]).forEach(function(v) {
                    if (v.value==='Over 1.5')  arr15.push(parseFloat(v.odd));
                    if (v.value==='Over 2.5')  arr25.push(parseFloat(v.odd));
                    if (v.value==='Under 2.5') arru25.push(parseFloat(v.odd));
                  });
                }
                if (bet.name==='Double Chance') {
                  var d1x=(bet.values||[]).find(function(v){return v.value==='Home/Draw';});
                  var dx2=(bet.values||[]).find(function(v){return v.value==='Draw/Away';});
                  if (d1x) arr1x.push(parseFloat(d1x.odd));
                  if (dx2) arrx2.push(parseFloat(dx2.odd));
                }
                if (bet.name==='Both Teams Score') {
                  var by=(bet.values||[]).find(function(v){return v.value==='Yes';});
                  var bn=(bet.values||[]).find(function(v){return v.value==='No';});
                  if (by) arrby.push(parseFloat(by.odd));
                  if (bn) arrbn.push(parseFloat(bn.odd));
                }
              });
            });
            function med(a) {
              if (!a.length) return '--';
              var s=a.slice().sort(function(x,y){return x-y;});
              var m=Math.floor(s.length/2);
              return (s.length%2?s[m]:((s[m-1]+s[m])/2)).toFixed(2);
            }
            var c1=med(arr1), cn=med(arrN), c2=med(arr2);
            return {
              c1:c1, cn:cn, c2:c2, co15:med(arr15), co25:med(arr25), cu25:med(arru25),
              dc1x:med(arr1x), dc2x:med(arrx2), dc12:'--', btts_oui:med(arrby), btts_non:med(arrbn),
              bookies: FR_FIXED.map(function(bk,i){
                return {n:bk.n, o:bk.o, l:bk.l, c:c1, c1:c1, cn:cn, c2:c2};
              })
            };
          }

          async function getH2H(homeId, awayId) {
            var r = await get('https://v3.football.api-sports.io/fixtures?h2h='+homeId+'-'+awayId+'&last=8', APS);
            return r.response || [];
          }

          function lgKey(lgId) { return LG_KEY[lgId]||'other'; }
          function lgIcon(l) { return '\uD83C\uDFC6'; }

          function formatLast10(fixtures, teamId) {
            return fixtures.slice(0,20).map(function(f) {
              var isH = f.teams.home.id===teamId;
              var gf  = isH?(f.goals.home||0):(f.goals.away||0);
              var ga  = isH?(f.goals.away||0):(f.goals.home||0);
              return { result: gf>ga?'W':gf<ga?'L':'D', score: gf+'-'+ga, home: isH };
            });
          }

          async function genAnalyse(d) {
            var prompt =
              'Tu es l\'Analyste Senior de IASHARK. Ton job est de décrypter la physique du match pour TikTok. On veut de la précision, du rythme, et ZÉRO jargon de parieur.'
              +'\n\n=== STRUCTURE DU SCRIPT (30-40 sec) ==='
              +'\n1. L\'ACCROCHE : Varie selon le match (prestige, enjeu ou stats folles). Ne dis jamais "Alerte".'
              +'\n2. DATA : Cite une stat précise (xG, ou forme).'
              +'\n3. SCÉNARIO : Explique ce qui va se passer tactiquement (ex: pression haute, contre-attaque).'
              +'\n4. VERDICT : Donne la probabilité la plus forte sans utiliser le mot "pari" ou "cote".'
              +'\n\n=== RÈGLES DE DICTION (POUR LA VOIX) ==='
              +'\n- Utilise des points de suspension (...) pour créer des pauses respiratoires.'
              +'- Écris en français parlé : "C\'est" au lieu de "Il est", "Y a" au lieu de "Il y a".'
              +'- ZÉRO abréviation : écris "victoires", "deux buts et demi", "Ligue des Champions".'
              +'- BANNI : cote, pari, bookmaker, miser, argent, bet, pronostic.'
              +'\n\n=== DONNÉES DU MATCH ==='
              +'\nMatch : '+d.home+' vs '+d.away
              +'\nAttaque (xG) : '+d.home+' ('+d.xgH_avg+') / '+d.away+' ('+d.xgA_avg+')'
              +'\nForme : '+d.home+' ('+d.forme5H+') / '+d.away+' ('+d.forme5A+')'
              +'\nVerdict IA : '+d.pari_rec
              +'\n\n=== JSON STRICT ==='
              +'{"confiance":7.5,"analyse_card":"[TON SCRIPT ICI]","pari_rec":"'+d.pari_rec+'"}';

            var r = await postJSONWithRetry('api.anthropic.com', '/v1/messages', {
              model: 'claude-sonnet-4-6',
              max_tokens: 1500,
              messages: [{role:'user', content:prompt}]
            }, {'x-api-key':ANT_KEY, 'anthropic-version':'2023-06-01'});
            var txt = ((r.content||[]).find(function(b){return b.type==='text';})||{}).text||'{}';
            try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); } catch(e) { return null; }
          }

          async function main() {
            console.log('=== IASHARK PIPELINE ===');
            var fixtures = await getFixtures();
            if (!fixtures.length) return;

            var matchsData = [];
            for (var fi=0; fi<fixtures.length; fi++) {
              var fix  = fixtures[fi];
              var lg   = fix.league;
              var home = fix.teams.home;
              var away = fix.teams.away;

              var batch1 = await Promise.all([getLast10(home.id), getLast10(away.id)]);
              await sleep(300);
              var batch2 = await Promise.all([getOdds(fix.fixture.id)]);
              await sleep(300);

              var raw10H = batch1[0], raw10A = batch1[1];
              var odds = parseOdds(batch2[0]);
              var last10H = formatLast10(raw10H, home.id);
              var last10A = formatLast10(raw10A, away.id);
              
              var forme5H = last10H.slice(0,5).map(m=>m.result).join('');
              var forme5A = last10A.slice(0,5).map(m=>m.result).join('');

              var an = await genAnalyse({
                home: home.name, away: away.name,
                league: lg.name, pari_rec: "Over 2.5",
                xgH_avg: 1.5, xgA_avg: 1.2,
                forme5H: forme5H, forme5A: forme5A
              });
              
              matchsData.push({
                id: fix.fixture.id,
                home: {n: home.name, id: home.id},
                away: {n: away.name, id: away.id},
                league_key: lgKey(lg.id),
                date: fix.fixture.date,
                analyse_card: an ? an.analyse_card : "Analyse en cours",
                pari_rec: an ? an.pari_rec : "Over 2.5",
                conf: an ? an.confiance : 7
              });
            }

            fs.writeFileSync('data.json', JSON.stringify({matchs:matchsData},null,2));
            console.log('\n=== DONE: '+matchsData.length+' matchs ===');

            // ── GÉNÉRATION VIDÉO AUTOMATIQUE LDC AVEC LOGOS ──────────────────────
            async function genererVideosAutomatiques(matchsData) {
              console.log('\n=== GÉNÉRATION VIDÉOS LDC ===');
              const ldcMatchs = matchsData.filter(m => m.league_key === 'ldc');
              console.log(`🔎 Shark a trouvé ${ldcMatchs.length} matchs de LDC à traiter.`);

              for (const m of ldcMatchs) {
                console.log(`🎬 Envoi vidéo : ${m.home.n} vs ${m.away.n}`);
                try {
                  const res = await new Promise((resolve) => {
                    const data = JSON.stringify({
                      template_id: '00468af0-fdc7-4490-81ad-d56b15f773d1',
                      modifications: {
                        "Logo_Domicile": `https://media.api-sports.io/football/teams/${m.home.id}.png`,
                        "Logo_Exterieur": `https://media.api-sports.io/football/teams/${m.away.id}.png`,
                        "Voix_IA": m.analyse_card || "Analyse statistique en cours de préparation."
                      }
                    });

                    const req = https.request({
                      hostname: 'api.creatomate.com',
                      path: '/v1/renders',
                      method: 'POST',
                      headers: {
                        'Authorization': `Bearer ${process.env.CREATOMATE_KEY}`,
                        'Content-Type': 'application/json',
                        'Content-Length': Buffer.byteLength(data)
                      }
                    }, (res) => {
                      let d = '';
                      res.on('data', (chunk) => d += chunk);
                      res.on('end', () => resolve(JSON.parse(d)));
                    });
                    req.on('error', () => resolve(null));
                    req.write(data);
                    req.end();
                  });
                  if (res && res[0]) console.log(`✅ Vidéo commandée ! Lien : ${res[0].url}`);
                } catch (e) {
                  console.log(`❌ Erreur vidéo : ${e.message}`);
                }
              }
            }

            await genererVideosAutomatiques(matchsData);
          }
          main().catch(function(e){ console.error('FATAL:', e.message); process.exit(0); });
          JSEOF

      - name: Run pipeline
        env:
          APISPORTS_KEY:   ${{ secrets.APISPORTS_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          NEWSAPI_KEY:     ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY:   ${{ secrets.ANTHROPIC_KEY }}
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
          CREATOMATE_KEY:  ${{ secrets.CREATOMATE_KEY }}
        run: node pipeline.js

      - name: Commit and push
        run: |
          git config user.name "IASHARK"
          git config user.email "yaramode81@gmail.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily update - $(date +%Y-%m-%d)"
          git push
