            var classics = [];
            try {
              var obj = JSON.parse(txt.replace(/```json|```/g,'').trim());
              classics = Object.values(obj).filter(Boolean).map(function(c){
                return {label:c.label||'COMBINE',type:c.type||'safe',selections:c.selections||'',matchs:c.matchs||'',cote_totale:c.cote_totale||'',conseil:c.conseil||''};
              });
            } catch(e) { classics = []; }
            // Combiné spécial weekend — ALGO pur, sans IA pour la cote
            if (!isSamedi && !isDimanche) return classics;
            var labelFou = isSamedi ? 'SAMEDI FOU' : 'DIMANCHE FOU';
            var typeFou  = isSamedi ? 'samedi_fou' : 'dimanche_fou';
            // Construire pool: pour chaque match, garder LA sélection la plus probable (cote la plus basse >= 1.20)
            // en priorité: dc1x, c1, co15, btts_non, co25, btts_oui, dcx2, c2
            var pool = [];
            (allMatchs||[]).forEach(function(m) {
              var matchLabel = m.home.n+' vs '+m.away.n;
              var candidates = [];
              if (m.dc1x &&m.dc1x !=='--'&&parseFloat(m.dc1x )>=1.20) candidates.push({match:matchLabel,sel:'Double Chance 1X',cote:parseFloat(m.dc1x ),prob:Math.round(100/parseFloat(m.dc1x ))});
              if (m.c1   &&m.c1   !=='--'&&parseFloat(m.c1   )>=1.20) candidates.push({match:matchLabel,sel:'Victoire '+m.home.n,cote:parseFloat(m.c1   ),prob:Math.round(100/parseFloat(m.c1   ))});
              if (m.co15 &&m.co15 !=='--'&&parseFloat(m.co15 )>=1.20) candidates.push({match:matchLabel,sel:'Over 1.5 buts',cote:parseFloat(m.co15 ),prob:Math.round(100/parseFloat(m.co15 ))});
              if (m.btts_non&&m.btts_non!=='--'&&parseFloat(m.btts_non)>=1.20) candidates.push({match:matchLabel,sel:'BTTS Non',cote:parseFloat(m.btts_non),prob:Math.round(100/parseFloat(m.btts_non))});
              if (m.co25 &&m.co25 !=='--'&&parseFloat(m.co25 )>=1.20) candidates.push({match:matchLabel,sel:'Over 2.5 buts',cote:parseFloat(m.co25 ),prob:Math.round(100/parseFloat(m.co25 ))});
              if (m.btts_oui&&m.btts_oui!=='--'&&parseFloat(m.btts_oui)>=1.20) candidates.push({match:matchLabel,sel:'BTTS Oui',cote:parseFloat(m.btts_oui),prob:Math.round(100/parseFloat(m.btts_oui))});
              if (m.dcx2 &&m.dcx2 !=='--'&&parseFloat(m.dcx2 )>=1.20) candidates.push({match:matchLabel,sel:'Double Chance X2',cote:parseFloat(m.dcx2 ),prob:Math.round(100/parseFloat(m.dcx2 ))});
              if (m.c2   &&m.c2   !=='--'&&parseFloat(m.c2   )>=1.20) candidates.push({match:matchLabel,sel:'Victoire '+m.away.n,cote:parseFloat(m.c2   ),prob:Math.round(100/parseFloat(m.c2   ))});
              if (!candidates.length) return;
              // Garder la plus probable (cote la plus basse)
              candidates.sort(function(a,b){return a.cote-b.cote;});
              pool.push(candidates[0]);
            });
            if (pool.length < 4) {
              classics.push({label:labelFou,type:typeFou,selections:'Pas assez de matchs ce jour',matchs:'',cote_totale:'--',conseil:'Reviens demain pour le combiné fou !'});
              return classics;
            }
            // Trier par probabilité décroissante (cote croissante = plus probable)
            pool.sort(function(a,b){return a.cote-b.cote;});
            // Construire le combiné: prendre les N sélections les plus probables
            // pour que la cote totale soit dans [40, 70]
            var TARGET_MIN = 40, TARGET_MAX = 70;
            var selected = [];
            var coteTotale = 1.0;
            for (var si=0; si<pool.length; si++) {
              var next = coteTotale * pool[si].cote;
              selected.push(pool[si]);
              coteTotale = next;
              if (coteTotale >= TARGET_MIN) break; // on a atteint la cible min, on s'arrête
            }
            // Si on dépasse TARGET_MAX, retirer la dernière sélection et en reprendre une moins forte
            if (coteTotale > TARGET_MAX && selected.length > 2) {
              selected.pop();
              coteTotale = selected.reduce(function(acc,s){return acc*s.cote;},1.0);
              // Chercher une sélection intermédiaire pour rester dans la plage
              for (var si2=selected.length; si2<pool.length; si2++) {
                if (selected.find(function(s){return s.match===pool[si2].match;})) continue;
                var candidate = coteTotale * pool[si2].cote;
                if (candidate >= TARGET_MIN && candidate <= TARGET_MAX) {
                  selected.push(pool[si2]);
                  coteTotale = candidate;
                  break;
                }
              }
            }
            var coteFinalStr = coteTotale.toFixed(2);
            var selectionsStr = selected.map(function(s){return s.sel;}).join(', ');
            var matchsStr     = selected.map(function(s){return s.match;}).join(', ');
            var probMin = selected.reduce(function(mn,s){return Math.min(mn,s.prob);},100);
            var probMax = selected.reduce(function(mx,s){return Math.max(mx,s.prob);},0);
